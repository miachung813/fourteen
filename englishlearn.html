<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>國中英文 2000 單字 × 故事閱讀｜系統性學習工具</title>
<style>
:root{
  --bg:#faf7f2;
  --card:#ffffff;
  --ink:#2d2a26;
  --muted:#767066;
  --brand:#c96f4a;
  --brand-dark:#a8562f;
  --good:#4c8c5c;
  --bad:#c0503f;
  --line:#ece5da;
  --radius:14px;
}
*{box-sizing:border-box;}
html,body{margin:0;padding:0;}
body{
  font-family:"PingFang TC","Microsoft JhengHei","Noto Sans TC",-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
  background:var(--bg);
  color:var(--ink);
  line-height:1.6;
}
.lock-screen{
  position:fixed; inset:0;
  background:linear-gradient(135deg,#c96f4a,#a8562f);
  display:flex; align-items:center; justify-content:center;
  z-index:200; padding:20px;
}
.lock-card{
  background:var(--card); border-radius:var(--radius);
  padding:28px 24px; max-width:320px; width:100%;
  text-align:center; box-shadow:0 8px 30px rgba(0,0,0,.25);
}
.lock-card h2{margin:0 0 6px;}
.lock-card .input-text{width:100%; margin:14px 0 10px; text-align:center; font-size:16px;}
.lock-card .btn{width:100%;}
.celebrate-overlay{
  position:fixed; inset:0;
  background:rgba(45,42,38,.55);
  display:flex; align-items:center; justify-content:center;
  z-index:300; padding:20px;
}
.celebrate-card{
  background:var(--card); border-radius:var(--radius);
  padding:32px 28px; max-width:340px; width:100%;
  text-align:center; box-shadow:0 12px 40px rgba(0,0,0,.3);
  animation:celebrate-pop .35s ease;
}
.celebrate-emoji{font-size:52px; line-height:1; margin-bottom:8px;}
.celebrate-card h2{margin:0 0 10px;}
.celebrate-card p{margin:0 0 8px;}
.celebrate-card .btn{margin-top:10px; width:100%;}
@keyframes celebrate-pop{
  from{ transform:scale(.85); opacity:0; }
  to{ transform:scale(1); opacity:1; }
}
#cloudSyncModal .celebrate-card{max-width:420px;}
#cloudSyncModal .btn{width:auto; flex:1; margin-top:0;}
header.topbar{
  background:linear-gradient(135deg,#c96f4a,#a8562f);
  color:#fff;
  padding:18px 20px 12px;
  position:sticky; top:0; z-index:10;
  box-shadow:0 2px 10px rgba(0,0,0,.12);
}
header.topbar h1{margin:0 0 10px; font-size:20px;}
.sync-indicator{font-size:12px; margin:-4px 0 10px; opacity:.9;}
.sync-indicator:hover{text-decoration:underline; opacity:1;}
.sync-indicator.sync-success{color:#dff2e1;}
.sync-indicator.sync-error{color:#ffd9d0;}
.sync-indicator.sync-pending,.sync-indicator.sync-saving{color:#fff2df;}
.tts-settings{
  display:flex; flex-wrap:wrap; align-items:center; gap:10px;
  font-size:12.5px; color:#fff; opacity:.95; margin:0 0 10px;
}
.tts-settings label{display:inline-flex; align-items:center; gap:4px;}
.tts-settings select{
  font-size:12.5px; padding:2px 6px; border-radius:6px; border:1px solid rgba(255,255,255,.5);
  background:#fff; color:var(--ink);
}
.tts-settings .btn{padding:3px 10px; font-size:12px;}
.tts-settings input[type="range"]{width:90px; vertical-align:middle;}
.tts-settings #ttsRateValue{min-width:30px; display:inline-block; font-variant-numeric:tabular-nums;}
nav.tabs{display:flex; flex-wrap:wrap; gap:6px;}
.tab-btn{
  background:rgba(255,255,255,.15);
  border:1px solid rgba(255,255,255,.35);
  color:#fff;
  padding:6px 12px;
  border-radius:999px;
  cursor:pointer;
  font-size:13px;
  text-decoration:none;
  white-space:nowrap;
}
.tab-btn.active{ background:#fff; color:var(--brand-dark); font-weight:600; }
main{max-width:960px; margin:0 auto; padding:16px 14px 60px;}
.grid{display:grid; grid-template-columns:1fr 1fr; gap:14px;}
.grid .span-2{grid-column:1/3;}
@media (max-width:720px){ .grid{grid-template-columns:1fr;} .grid .span-2{grid-column:1;} }
.card{
  background:var(--card);
  border:1px solid var(--line);
  border-radius:var(--radius);
  padding:16px 18px;
  margin-bottom:14px;
  box-shadow:0 1px 3px rgba(0,0,0,.04);
}
.card.highlight{ border-color:var(--brand); background:#fff7f1; }
.card h2{margin:0 0 8px; font-size:19px;}
.card h3{margin:0 0 10px; font-size:16px;}
.muted{color:var(--muted); font-size:14px;}
.small{font-size:12px;}
.good{color:var(--good); font-weight:600;}
.bad{color:var(--bad); font-weight:600;}
.ai-box{background:#f4efe6; border-radius:10px; padding:10px 12px; margin-top:8px; font-size:14px; white-space:pre-wrap;}
.ai-box.ai-warn{background:#fbe7e3; color:var(--bad);}
.ai-box.ai-loading{color:var(--muted); font-style:italic;}
.translate-wrap{margin-top:10px;}
.translate-box{color:#555;}
.translate-box .story-p{margin:0 0 8px; font-size:14px;}
.translate-box .story-p:last-child{margin-bottom:0;}
.hint{background:#f4efe6; border-left:3px solid var(--brand); padding:8px 12px; border-radius:6px; font-size:13.5px; margin-bottom:8px;}
.progressbar{background:#eee2d3; border-radius:999px; height:14px; overflow:hidden; margin:8px 0 4px;}
.progressbar-fill{background:linear-gradient(90deg,#c96f4a,#e0956e); height:100%; transition:width .3s;}
.stat-row{display:flex; flex-wrap:wrap; gap:10px; margin-top:12px;}
.pill{background:#f4efe6; border-radius:10px; padding:8px 12px; min-width:92px; text-align:center;}
.pill-val{font-weight:700; font-size:16px; color:var(--brand-dark);}
.pill-label{font-size:11.5px; color:var(--muted);}
.row{display:flex; align-items:center;}
.row.gap{gap:8px;}
.row.wrap{flex-wrap:wrap;}
.row.space-between{justify-content:space-between;}
.row.center, .card.center{justify-content:center; text-align:center;}
.btn{
  background:#f4efe6; border:1px solid var(--line); color:var(--ink);
  padding:8px 14px; border-radius:10px; cursor:pointer; font-size:14px;
}
.btn:hover{filter:brightness(.97);}
.btn.small{padding:5px 10px; font-size:12.5px;}
.btn.big{padding:12px 22px; font-size:16px;}
.btn.primary{background:var(--brand); color:#fff; border-color:var(--brand);}
.btn.primary:hover{background:var(--brand-dark);}
.btn.ok{background:#e5f2e6; border-color:#bcdcc0; color:var(--good);}
.btn.danger{background:#fbe7e3; border-color:#f2c3ba; color:var(--bad);}
.speak-btn{
  background:#fff2df; border:1px solid #f0dcb3; color:var(--brand-dark);
  width:28px; height:28px; border-radius:50%; cursor:pointer;
  font-size:14px; line-height:1; display:inline-flex; align-items:center; justify-content:center;
  padding:0; vertical-align:middle;
}
.speak-btn:hover{filter:brightness(.96);}
.speak-btn.small{width:22px; height:22px; font-size:12px;}
.speak-btn.playing{background:var(--brand); border-color:var(--brand); color:#fff;}
.weak-btn{
  background:#fff; border:1px solid var(--line); color:#c9a227;
  width:28px; height:28px; border-radius:50%; cursor:pointer;
  font-size:15px; line-height:1; display:inline-flex; align-items:center; justify-content:center;
  padding:0; vertical-align:middle;
}
.weak-btn:hover{filter:brightness(.96);}
.weak-btn.flagged{background:#fff6dc; border-color:#f0d778; color:#c9a227;}
.weak-btn.small{width:22px; height:22px; font-size:13px;}
.input-num{width:80px; padding:6px 8px; border-radius:8px; border:1px solid var(--line);}
.input-text{padding:8px 10px; border-radius:8px; border:1px solid var(--line); font-size:14px; flex:1; min-width:140px;}
select.input-text{flex:0 0 auto;}
.code-block{background:#2d2a26; color:#f4efe6; padding:12px 14px; border-radius:10px; font-size:12.5px; line-height:1.5; overflow-x:auto; white-space:pre; font-family:Menlo,Consolas,monospace;}
.row.wrap{flex-wrap:wrap;}

.flashcard{
  width:100%; max-width:420px; height:180px; margin:10px auto; cursor:pointer;
  position:relative; perspective:1000px;
}
.flash-front, .flash-back{
  position:absolute; inset:0; border-radius:16px; display:flex; flex-direction:column;
  align-items:center; justify-content:center; backface-visibility:hidden;
  transition:transform .5s; border:1px solid var(--line);
}
.flash-front{ background:#fff; transform:rotateY(0deg); }
.flash-back{ background:#fff2e8; transform:rotateY(180deg); }
.flashcard.flipped .flash-front{ transform:rotateY(180deg); }
.flashcard.flipped .flash-back{ transform:rotateY(360deg); }
.fw{font-size:30px; font-weight:700; color:var(--brand-dark);}
.fpos{font-size:13px; color:var(--muted); margin-top:6px;}
.fm{font-size:24px; font-weight:700;}

table.vocab-table{width:100%; border-collapse:collapse; font-size:14px;}
table.vocab-table th, table.vocab-table td{ text-align:left; padding:7px 8px; border-bottom:1px solid var(--line); }
table.vocab-table th{color:var(--muted); font-weight:600; font-size:12.5px;}
td.en{font-weight:600; color:var(--brand-dark);}
span.en.big{font-size:18px; font-weight:700; color:var(--brand-dark);}

.pattern-list{margin:0 0 10px; padding-left:18px; font-size:13.5px; color:#555;}
.sentence-input{width:100%; padding:10px; border-radius:10px; border:1px solid var(--line); font-size:14px; resize:vertical; font-family:inherit;}

.quiz-q{margin-bottom:14px;}
.quiz-question{font-weight:600; margin-bottom:6px;}
.quiz-options{display:flex; flex-direction:column; gap:4px;}
.quiz-opt{font-size:14px; display:flex; align-items:center; gap:6px; cursor:pointer;}
.quiz-result{margin:10px 0;}

.story-card{display:flex; flex-direction:column; gap:4px;}
.story-p{font-size:15px; margin:0 0 12px; text-align:justify;}
.word-click{cursor:pointer; border-radius:3px;}
.word-click:hover{background:#f0e6d6;}
.word-click.underlined{text-decoration:underline; text-decoration-color:var(--brand); text-decoration-thickness:2.5px; text-underline-offset:2px;}
.word-click.weak-word-flagged{background:#fdecea; text-decoration:underline wavy var(--bad); text-decoration-thickness:1.5px; text-underline-offset:3px;}
.vocab-tags{display:flex; flex-wrap:wrap; gap:8px;}
.tag{background:#f4efe6; border-radius:999px; padding:5px 6px 5px 12px; font-size:13px; display:inline-flex; align-items:center; gap:4px;}

footer{max-width:960px; margin:0 auto; padding:0 14px 40px; color:var(--muted); font-size:12px; text-align:center;}

</style>
</head>
<body>
<div id="lockScreen" class="lock-screen">
  <div class="lock-card">
    <h2>🔒 請輸入密碼</h2>
    <p class="muted">請輸入密碼以繼續使用這個學習系統。</p>
    <input id="lockPasswordInput" type="password" class="input-text" placeholder="密碼" autocomplete="off">
    <button id="lockSubmitBtn" class="btn primary">進入</button>
    <p id="lockError" class="bad small" style="display:none;">密碼錯誤，請再試一次。</p>
  </div>
</div>
<div id="appRoot" style="display:none;">
<header class="topbar">
  <h1>📗 國中英文 2000 單字 × 故事閱讀學習系統</h1>
  <div id="cloudSyncIndicator" class="sync-indicator">☁️ 尚未設定雲端同步</div>
  <div id="ttsSettings" class="tts-settings">
    <span>🔊 朗讀：</span>
    <label class="tts-rate-label">語速
      <input type="range" id="ttsRateRange" min="0.4" max="1.4" step="0.05" value="0.85">
      <span id="ttsRateValue">0.85</span>
    </label>
    <button id="ttsRateTestBtn" class="btn small" type="button">🔊 試聽</button>
    <label>語音
      <select id="ttsVoiceSelect"><option value="">系統預設</option></select>
    </label>
    <button id="ttsStopBtn" class="btn small" type="button">⏹ 停止朗讀</button>
  </div>
  <nav class="tabs" id="tabs">
    <a class="tab-btn" data-tab="storybook" href="#storybook">世界故事集</a>
    <a class="tab-btn" data-tab="reading" href="#reading">經典故事</a>
    <a class="tab-btn" data-tab="vocab" href="#vocab">每日故事</a>
    <a class="tab-btn" data-tab="extra" href="#extra">課外單字</a>
    <a class="tab-btn" data-tab="guide" href="#guide">使用說明</a>
  </nav>
</header>
<main>
  <div id="view"></div>
</main>
<footer>資料來源：國中單字王 2000 單字題庫表（主題）；每日短文為原創寫作，用於情境化學習 2000 單字；延伸閱讀故事改寫自伊索寓言、格林童話、安徒生童話等公版經典故事；「世界故事集」的主題與重點單字取材自《國中生必讀世界經典英文故事集》，故事內文與中文翻譯為原創改寫撰寫（非原書文字或翻譯），如需原書完整內容、練習題與官方翻譯請另行參閱原書。</footer>
</div>

const STORIES = [{"id": 1, "title_en": "The Boy Who Cried Wolf", "title_zh": "放羊的孩子", "level": "★☆☆☆☆", "words": 110, "text": ["A young shepherd boy watched sheep near a village. Every day, he sat alone on a hill. He felt bored. One day, he decided to play a trick.", "\"Wolf! Wolf!\" he shouted. \"A wolf wants to chase my sheep!\" The villagers ran up the hill. They carried sticks and stones. But there was no wolf. The boy laughed loudly. \"It was just a joke!\" he said.", "A few days later, the boy played the same trick again. \"Wolf! Wolf!\" he cried. Again, the villagers ran to help him. Again, there was no wolf. The villagers were angry. They walked away.", "Then one evening, a real wolf came out of the forest. It attacked the sheep. The boy was terrified. \"Wolf! Wolf!\" he screamed. But this time, nobody came. The villagers thought it was just another lie.", "The wolf ate many sheep that night. The boy learned an important lesson. If you tell lies a lot, people stop believing you. They won't believe you, even when you tell the truth."], "newWords": [{"en": "shepherd", "zh": "牧羊人"}, {"en": "chase", "zh": "追逐"}, {"en": "villager", "zh": "村民"}, {"en": "terrified", "zh": "非常害怕的"}, {"en": "lesson", "zh": "教訓；課"}, {"en": "lie", "zh": "謊言；說謊"}], "questions": [{"q": "Why did the boy shout “Wolf! Wolf!” the first two times?", "options": ["He saw a real wolf", "He wanted to play a trick", "He was hungry", "He was lost"], "answer": 1}, {"q": "How did the villagers feel after the second false alarm?", "options": ["Happy", "Excited", "Angry", "Sleepy"], "answer": 2}, {"q": "What happened when the real wolf came?", "options": ["The villagers came quickly", "Nobody believed the boy", "The boy caught the wolf", "The sheep ran away safely"], "answer": 1}, {"q": "What is the moral of this story?", "options": ["Sheep are dangerous", "Always sleep early", "If you often lie, people won’t believe you when you tell the truth", "Wolves are afraid of villagers"], "answer": 2}], "moral_zh": "說謊成習慣的人，就算說了真話也不會有人相信。", "writingPrompt": "請用 lie（說謊）或 believe（相信）造一個句子，說說你對「誠實」的看法。", "text_zh": ["一個年輕的牧羊少年在村莊附近看羊。他每天都自己坐在山丘上。他覺得很無聊。有一天，他決定捉弄大家。", "「狼來了！狼來了！」他大喊。「有一隻狼在追我的羊！」村民們跑上山丘。他們拿著棍子和石頭。但根本沒有狼。男孩大聲笑了出來。「這只是開玩笑的！」他說。", "過了幾天，男孩又玩了同樣的把戲。「狼來了！狼來了！」他喊道。村民們又跑來幫他。結果還是沒有狼。村民們很生氣，轉身就走了。", "後來有一天晚上，一隻真正的狼從森林裡跑出來。牠攻擊了羊群。男孩嚇壞了。「狼來了！狼來了！」他尖叫。但這一次，沒有人來。村民們以為這又是個謊言。", "那天晚上，狼吃掉了很多隻羊。男孩學到了重要的一課。如果你常常說謊，大家就不會相信你了。就算你講的是實話，也沒有人會相信你。"]}, {"id": 2, "title_en": "The Tortoise and the Hare", "title_zh": "龜兔賽跑", "level": "★☆☆☆☆", "words": 140, "text": ["A hare always laughed at a tortoise. The tortoise was very slow. \"You walk so slowly!\" the hare said with a smile. \"Do you ever get anywhere?\"", "\"Yes, I do,\" said the tortoise. \"And I get there faster than you think. Let's have a race and see.\" The hare laughed. But he agreed.", "The fox marked out a course. He said, \"Ready, get set, go!\" The hare ran very fast. He was soon far ahead of the tortoise. He thought, \"I have plenty of time. I will take a short nap under this tree.\"", "So the hare lay down. He fell asleep. Meanwhile, the tortoise kept walking. He walked slowly but steadily. He did not stop to rest.", "When the hare woke up, the sun was going down. He ran as fast as he could. But it was too late. The tortoise had already crossed the finish line.", "\"Slow and steady wins the race,\" said the tortoise with a smile."], "newWords": [{"en": "hare", "zh": "野兔"}, {"en": "tortoise", "zh": "陸龜"}, {"en": "race", "zh": "賽跑；競賽"}, {"en": "steadily", "zh": "穩定地"}, {"en": "nap", "zh": "小睡"}, {"en": "finish line", "zh": "終點線"}], "questions": [{"q": "Why did the hare agree to race the tortoise?", "options": ["He was afraid", "He thought he would easily win", "He wanted to be kind", "The fox forced him"], "answer": 1}, {"q": "What did the hare do during the race?", "options": ["He walked backward", "He stopped to eat lunch", "He took a nap", "He helped the tortoise"], "answer": 2}, {"q": "How did the tortoise win the race?", "options": ["He ran faster than the hare", "He kept walking steadily without stopping", "He took a shortcut", "The hare gave up"], "answer": 1}, {"q": "What lesson does this story teach?", "options": ["Sleeping is bad for you", "Slow and steady can win over fast and careless", "Rabbits cannot run fast", "Races are unfair"], "answer": 1}], "moral_zh": "穩定前進，比一時的快速卻大意更重要。", "writingPrompt": "請用 slow（慢的）和 fast（快的）各造一個句子，比較兩種做事態度。", "text_zh": ["兔子總是嘲笑烏龜。烏龜走得很慢。「你走路好慢喔！」兔子笑著說。「你到得了任何地方嗎？」", "「當然可以，」烏龜回答。「而且我到的時間會比你想的還快。我們來比賽看看吧。」兔子笑了，但還是答應了。", "狐狸畫出了比賽路線。牠說：「預備，各就各位，出發！」兔子跑得非常快，很快就遠遠超過烏龜。牠心想：「我時間多得很。我就在這棵樹下小睡一下吧。」", "於是兔子躺下來，睡著了。同一時間，烏龜繼續往前走。牠走得很慢，但每一步都很穩。牠沒有停下來休息。", "兔子醒來時，太陽快下山了。牠盡全力狂奔，但已經太遲了。烏龜早就越過終點線了。", "「穩紮穩打才能贏得比賽，」烏龜微笑著說。"]}, {"id": 3, "title_en": "The Ant and the Grasshopper", "title_zh": "螞蟻與蚱蜢", "level": "★☆☆☆☆", "words": 130, "text": ["In a green field, an ant worked hard all summer. Every day, she carried food to her home under the ground. She wanted to be ready for winter.", "A grasshopper watched her. He laughed. \"Why do you work so hard?\" he asked. \"Come sing with me instead! Summer is for fun, not for work!\"", "\"I store food for winter,\" said the ant. \"You should do the same.\" But the grasshopper just laughed. He kept playing his music all summer long.", "When winter came, snow covered the field. The grasshopper had no food. He felt very hungry and cold. He went to the ant's house. He asked for help.", "The ant shared her food with him. But she said, \"Next time, prepare for the future. Don't just enjoy today.\" The grasshopper felt sorry. He thanked her."], "newWords": [{"en": "ant", "zh": "螞蟻"}, {"en": "grasshopper", "zh": "蚱蜢"}, {"en": "store", "zh": "儲存"}, {"en": "instead", "zh": "取而代之"}, {"en": "prepare", "zh": "準備"}, {"en": "share", "zh": "分享"}], "questions": [{"q": "What did the ant do all summer?", "options": ["She played music", "She stored food for winter", "She slept all day", "She traveled"], "answer": 1}, {"q": "What did the grasshopper do all summer?", "options": ["He worked hard", "He sang and played", "He stored food too", "He helped the ant"], "answer": 1}, {"q": "What happened to the grasshopper in winter?", "options": ["He had plenty of food", "He felt hungry and cold", "He moved to a warmer place", "He became a musician"], "answer": 1}, {"q": "What is the main lesson of this story?", "options": ["Music is more important than food", "It is wise to prepare for the future", "Ants are unfriendly", "Winter never comes"], "answer": 1}], "moral_zh": "未雨綢繆，為未來做準備，比只顧眼前享樂更重要。", "writingPrompt": "請用 prepare（準備）造一個句子，說說你會怎麼為考試做準備。", "text_zh": ["在一片綠色的田野裡，一隻螞蟻整個夏天都很努力工作。她每天都把食物搬到地底下的家。她想為冬天做好準備。", "一隻蚱蜢看著她，笑了出來。「妳幹嘛工作得那麼辛苦？」他問。「不如來跟我一起唱歌吧！夏天是用來玩的，不是用來工作的！」", "「我在為冬天儲存食物，」螞蟻說。「你也應該這樣做。」但蚱蜢只是笑一笑。他整個夏天都繼續彈他的音樂。", "冬天來了，雪覆蓋了整片田野。蚱蜢沒有食物。他覺得又餓又冷。他跑去螞蟻家，請求幫忙。", "螞蟻把食物分給了他。但她說：「下次，要為未來做準備。不要只顧著享受今天。」蚱蜢感到很抱歉，向她道謝。"]}, {"id": 4, "title_en": "The Fox and the Grapes", "title_zh": "狐狸與葡萄", "level": "★☆☆☆☆", "words": 100, "text": ["One hot afternoon, a hungry fox walked through a garden. He saw a bunch of purple grapes. They hung from a high branch. They looked sweet and juicy.", "\"Those grapes will make a perfect meal,\" the fox thought. He jumped as high as he could. But he could not reach them. He tried again and again. Every time, he failed.", "Finally, the tired fox stopped jumping. He looked at the grapes one more time. He said, \"Those grapes are probably sour anyway. I don't want them.\"", "Then he walked away. He pretended he never wanted the grapes at all."], "newWords": [{"en": "bunch", "zh": "一串；一群"}, {"en": "branch", "zh": "樹枝"}, {"en": "juicy", "zh": "多汁的"}, {"en": "reach", "zh": "到達；伸手拿到"}, {"en": "sour", "zh": "酸的"}, {"en": "pretend", "zh": "假裝"}], "questions": [{"q": "What did the fox see in the garden?", "options": ["Apples", "Grapes", "Bananas", "Bread"], "answer": 1}, {"q": "Why couldn’t the fox eat the grapes?", "options": ["He was not hungry", "They were too high for him to reach", "They were rotten", "A dog stopped him"], "answer": 1}, {"q": "What did the fox say about the grapes at the end?", "options": ["They were delicious", "They were probably sour", "They were too small", "They were not ripe"], "answer": 1}, {"q": "What does this story teach us?", "options": ["People often say they don’t want something they can’t get", "Foxes love vegetables", "Jumping is good exercise", "Grapes are always sour"], "answer": 0}], "moral_zh": "得不到的東西，人們常會說它其實沒那麼好，藉此安慰自己。", "writingPrompt": "請用 want（想要）或 reach（達到）造一個句子。", "text_zh": ["一個炎熱的午後，一隻飢餓的狐狸走過一座花園。他看見一串紫色的葡萄。葡萄掛在高高的樹枝上。看起來又甜又多汁。", "「那些葡萄一定是一頓完美的大餐，」狐狸心想。他盡量往上跳，但就是搆不到。他一次又一次地嘗試，但每次都失敗了。", "最後，累壞了的狐狸不再跳了。他又看了葡萄一眼，說：「反正那些葡萄大概是酸的。我才不想要。」", "於是他轉身走開。他假裝自己從來都不想要那些葡萄。"]}, {"id": 5, "title_en": "The Lion and the Mouse", "title_zh": "獅子與老鼠", "level": "★★☆☆☆", "words": 150, "text": ["A big lion was sleeping in the forest. A little mouse ran across his nose. The lion woke up. He was angry. He grabbed the mouse with his big paw.", "\"Please let me go!\" said the mouse. \"Save me today. I promise I will help you one day.\" The lion laughed. \"You are so small. How can you help a lion?\" But the lion was kind. He let the mouse go.", "A few weeks later, some hunters caught the lion. He was stuck in a strong net. He gave a loud roar, but he could not escape. The little mouse heard him and ran to help.", "\"Don't worry, my friend!\" said the mouse. He bit the ropes with his sharp teeth. He bit one rope, then another. At last, the lion was free.", "\"You were right,\" said the lion. \"Even a small friend can be a great friend.\""], "newWords": [{"en": "paw", "zh": "爪子"}, {"en": "promise", "zh": "承諾"}, {"en": "hunter", "zh": "獵人"}, {"en": "net", "zh": "網子"}, {"en": "roar", "zh": "吼叫"}, {"en": "escape", "zh": "逃脫"}], "questions": [{"q": "Why did the lion catch the mouse?", "options": ["The mouse stole his food", "The mouse woke him up by running on his nose", "The mouse attacked him", "The mouse was in his way"], "answer": 1}, {"q": "What did the mouse promise the lion?", "options": ["To bring him food", "To help him one day", "To leave the forest", "To find him a friend"], "answer": 1}, {"q": "How did the lion get caught?", "options": ["He fell into a hole", "He was caught in a hunter’s net", "He was chased by another lion", "He was tricked by the mouse"], "answer": 1}, {"q": "How did the mouse save the lion?", "options": ["He called other animals for help", "He bit through the ropes", "He scared the hunters away", "He carried the lion out"], "answer": 1}], "moral_zh": "即使是弱小的朋友，有時也能發揮很大的力量，善待他人終有回報。", "writingPrompt": "請用 promise（承諾）或 help（幫助）造一個句子，說說朋友之間的互相幫忙。", "text_zh": ["一隻大獅子正在森林裡睡覺。一隻小老鼠跑過牠的鼻子。獅子醒了。牠很生氣。牠用大大的爪子抓住老鼠。", "「拜託放我走！」老鼠說。「今天放了我，我保證以後會幫你。」獅子笑了。「你這麼小，怎麼可能幫得了獅子？」但獅子心地很好，牠放老鼠走了。", "幾個星期後，一些獵人抓到了獅子。牠被困在一張堅固的網子裡。牠大聲吼叫，但無法逃脫。小老鼠聽到了，跑去幫忙。", "「別擔心，朋友！」老鼠說。牠用尖尖的牙齒咬繩子。牠咬斷一條，又咬斷一條。最後，獅子自由了。", "「你說得對，」獅子說。「就算是小小的朋友，也能成為很棒的朋友。」"]}, {"id": 6, "title_en": "The Town Mouse and the Country Mouse", "title_zh": "城市老鼠與鄉下老鼠", "level": "★★☆☆☆", "words": 180, "text": ["A country mouse invited his friend, a town mouse, to his house in the fields. He gave him simple food: corn, beans, and water.", "The town mouse looked at the plain food. \"How can you live like this?\" he said. \"Come to the city with me. I will show you real food!\" The country mouse said yes and went with him.", "In the city, the town mouse took his friend to a big, grand house. There was a long table full of cheese, cake, and bread. \"This is amazing!\" said the country mouse happily.", "Just as they started eating, a big cat jumped onto the table! Both mice ran fast. They hid behind a cabinet. Their hearts were beating fast.", "A little later, a big dog came. It was barking loudly. The two mice had to run and hide again. This happened again and again, all night long.", "At last, the country mouse said, \"I am going home. Your food is very good. But I would rather eat plain beans in peace than eat fine food in fear.\""], "newWords": [{"en": "invite", "zh": "邀請"}, {"en": "plain", "zh": "樸素的；平淡的"}, {"en": "grand", "zh": "宏偉的"}, {"en": "cabinet", "zh": "櫥櫃"}, {"en": "bark", "zh": "吠叫"}, {"en": "peace", "zh": "和平；平靜"}, {"en": "fear", "zh": "恐懼"}], "questions": [{"q": "What kind of food did the country mouse first offer?", "options": ["Cake and cheese", "Corn, beans, and water", "Meat and bread", "Ice cream"], "answer": 1}, {"q": "Why did the country mouse go to the city?", "options": ["He wanted to buy a house", "The town mouse invited him to try better food", "He was lost", "He wanted to meet a cat"], "answer": 1}, {"q": "What frightened the two mice in the city?", "options": ["A loud storm", "A cat and a dog", "Other mice", "The town mouse’s owner"], "answer": 1}, {"q": "Why did the country mouse decide to go home?", "options": ["He missed his family", "He preferred simple food in peace over fine food in fear", "He didn’t like cheese", "He was too tired to stay"], "answer": 1}], "moral_zh": "平靜簡單的生活，勝過在恐懼與不安中享受奢華。", "writingPrompt": "請用 peace（平靜）造一個句子，說說你喜歡怎樣的生活。", "text_zh": ["一隻鄉下老鼠邀請他的朋友，一隻城市老鼠，來他在田野裡的家。他給了朋友簡單的食物：玉米、豆子和水。", "城市老鼠看著這些樸素的食物。「你怎麼能過這種生活？」他說。「跟我到城市去吧。我讓你看看什麼是真正的美食！」鄉下老鼠答應了，跟著他去。", "到了城市，城市老鼠帶朋友去一棟又大又豪華的房子。桌上擺滿了起司、蛋糕和麵包。「這太棒了！」鄉下老鼠開心地說。", "就在他們開始吃東西時，一隻大貓跳上了桌子！兩隻老鼠拔腿就跑，躲到櫥櫃後面。牠們的心跳得好快。", "過了一會兒，一隻大狗跑來，大聲吠叫。兩隻老鼠又得再跑去躲起來。這樣的事一整晚不斷發生。", "最後，鄉下老鼠說：「我要回家了。你的食物很好吃。但比起提心吊膽地吃美食，我寧願安心地吃簡單的豆子。」"]}, {"id": 7, "title_en": "The Goose That Laid the Golden Eggs", "title_zh": "會生金蛋的鵝", "level": "★★☆☆☆", "words": 140, "text": ["Long ago, a poor farmer and his wife had a special goose. One morning, they found a shiny gold egg in its nest. They could not believe it!", "Every day after that, the goose laid one gold egg. The farmer sold the eggs. Slowly, he became rich. He bought a bigger house and nicer clothes.", "But the farmer became greedy. \"This goose lays one gold egg a day,\" he thought. \"There must be a lot of gold inside her. If I cut her open, I can get all the gold at once!\"", "His wife said it was a bad idea. But the farmer did not listen. He killed the goose and cut her open. But there was no gold inside. There were only normal organs, just like any other goose.", "The farmer lost his special goose forever. He also lost his daily gold egg. He learned that being greedy can destroy the best things in life."], "newWords": [{"en": "goose", "zh": "鵝"}, {"en": "nest", "zh": "巢"}, {"en": "greedy", "zh": "貪心的"}, {"en": "organ", "zh": "器官"}, {"en": "destroy", "zh": "摧毀"}, {"en": "rich", "zh": "有錢的"}], "questions": [{"q": "What did the farmer find in the goose’s nest?", "options": ["A silver coin", "A golden egg", "A letter", "A baby goose"], "answer": 1}, {"q": "How did the farmer become rich?", "options": ["He worked in the city", "He sold the golden eggs", "He found treasure", "He borrowed money"], "answer": 1}, {"q": "Why did the farmer kill the goose?", "options": ["He wanted to eat it", "He thought he could get all the gold at once", "It stopped laying eggs", "His wife told him to"], "answer": 1}, {"q": "What did the farmer find when he cut the goose open?", "options": ["A huge pile of gold", "Nothing but ordinary organs", "More golden eggs", "Another goose"], "answer": 1}], "moral_zh": "貪心可能會讓人失去原本擁有的美好事物。", "writingPrompt": "請用 greedy（貪心的）造一個句子。", "text_zh": ["很久以前，有一位窮農夫和他的太太養了一隻特別的鵝。有一天早上，他們在鵝窩裡發現一顆閃亮的金蛋。他們簡直不敢相信！", "從那天起，這隻鵝每天生一顆金蛋。農夫把金蛋賣掉，漸漸變得有錢。他買了更大的房子和更好的衣服。", "但農夫變得很貪心。「這隻鵝一天生一顆金蛋，」他心想，「牠肚子裡一定有很多黃金。如果我把牠剖開，就能一次拿到所有的黃金！」", "他的太太說這是個壞主意。但農夫不聽。他殺了那隻鵝，把牠剖開。但裡面沒有黃金，只有跟其他鵝一樣普通的內臟。", "農夫永遠失去了他特別的鵝，也失去了每天的金蛋。他學到了：貪心會毀掉生命中最美好的事物。"]}, {"id": 8, "title_en": "The North Wind and the Sun", "title_zh": "北風與太陽", "level": "★★☆☆☆", "words": 150, "text": ["One day, the North Wind and the Sun argued about who was stronger. They saw a traveler walking down the road. He was wearing a warm coat.", "\"Let's have a contest,\" said the Sun. \"Whoever can make that man take off his coat first is the stronger one.\" The North Wind happily agreed.", "The North Wind blew as hard as he could. Cold air rushed down the road. But the harder the wind blew, the tighter the man held his coat. He was determined not to lose it.", "At last, the North Wind gave up. He was tired and out of breath. Now it was the Sun's turn. The Sun smiled and shone down gently on the man.", "Soon the man felt hot. He wiped his forehead. A few minutes later, he happily took off his coat. \"Being gentle is often stronger than using force,\" said the Sun."], "newWords": [{"en": "argue", "zh": "爭論"}, {"en": "contest", "zh": "比賽"}, {"en": "determined", "zh": "下定決心的"}, {"en": "gently", "zh": "溫和地"}, {"en": "force", "zh": "力量；強迫"}, {"en": "wipe", "zh": "擦拭"}], "questions": [{"q": "What did the North Wind and the Sun argue about?", "options": ["Who was more beautiful", "Who was stronger", "Who was faster", "Who was kinder"], "answer": 1}, {"q": "What was the contest about?", "options": ["Who could make the traveler run", "Who could make the traveler take off his coat first", "Who could make it rain", "Who could travel farther"], "answer": 1}, {"q": "What happened when the North Wind blew hard?", "options": ["The traveler took off his coat immediately", "The traveler held his coat tighter", "The traveler fell down", "The traveler ran away"], "answer": 1}, {"q": "How did the Sun win the contest?", "options": ["By shining brightly and warmly", "By blowing gently", "By hiding behind clouds", "By making it rain"], "answer": 0}], "moral_zh": "溫和常常比強硬更有力量。", "writingPrompt": "請用 gently（溫和地）或 warm（溫暖的）造一個句子。", "text_zh": ["有一天，北風和太陽在爭論誰比較強。他們看見一位旅人正沿著路走。他穿著一件保暖的外套。", "「我們來比賽吧，」太陽說。「誰能先讓那個人脫下外套，誰就是比較強的。」北風開心地答應了。", "北風用盡全力吹。冷風沿著路呼嘯而過。但北風吹得越用力，那個人就把外套抓得越緊。他下定決心絕不讓外套被吹走。", "最後，北風放棄了。牠又累又喘不過氣。輪到太陽了。太陽微笑著，輕輕地照耀著這個人。", "不久，這個人覺得很熱。他擦了擦額頭。幾分鐘後，他開心地脫下外套。「溫柔往往比強硬更有力量，」太陽說。"]}, {"id": 9, "title_en": "Little Red Riding Hood", "title_zh": "小紅帽", "level": "★★★☆☆", "words": 230, "text": ["Once upon a time, there was a nice little girl. She always wore a red hood. So everyone called her Little Red Riding Hood. One day, her mom said, \"Grandma is sick. Please take this basket of bread and fruit to her house in the forest. Stay on the path. Don't talk to strangers.\"", "On her way through the forest, Little Red Riding Hood met a wolf. She did not know wolves could be dangerous. So she stopped to talk to him. \"Where are you going, little girl?\" the wolf asked with a sly smile. \"To my grandma's house,\" she said.", "The wolf ran fast on a shortcut. He got to grandma's house first. He locked grandma in a closet. Then he put on her nightclothes. He got into her bed and waited for the girl.", "When Little Red Riding Hood got there, she noticed something strange. \"Grandma, what big eyes you have!\" she said. \"The better to see you with,\" said the wolf. \"Grandma, what big ears you have!\" \"The better to hear you with.\" \"Grandma, what big teeth you have!\" \"The better to eat you with!\" the wolf shouted. He jumped out of the bed.", "Little Red Riding Hood screamed very loudly. A woodcutter was working nearby. He heard her scream and rushed into the house. He chased the wolf away. Then he helped grandma get out of the closet.", "\"From now on,\" said Little Red Riding Hood, \"I will always listen to my mom. I will never talk to strangers again.\""], "newWords": [{"en": "stranger", "zh": "陌生人"}, {"en": "sly", "zh": "狡猾的"}, {"en": "shortcut", "zh": "捷徑"}, {"en": "closet", "zh": "衣櫥；小房間"}, {"en": "notice", "zh": "注意到"}, {"en": "woodcutter", "zh": "樵夫"}, {"en": "rush", "zh": "衝；急忙"}], "questions": [{"q": "Why did Little Red Riding Hood go into the forest?", "options": ["To pick flowers", "To bring food to her sick grandmother", "To meet a wolf", "To find a shortcut home"], "answer": 1}, {"q": "What rule did her mother tell her?", "options": ["Come home before dark", "Stay on the path and don’t talk to strangers", "Never enter the forest", "Bring an umbrella"], "answer": 1}, {"q": "What did the wolf do at the grandmother’s house?", "options": ["He ate all the food", "He locked the grandmother in a closet and pretended to be her", "He fell asleep", "He ran away"], "answer": 1}, {"q": "Who saved Little Red Riding Hood and her grandmother?", "options": ["A hunter passing by", "A woodcutter working nearby", "Her mother", "A police officer"], "answer": 1}], "moral_zh": "不要輕易和陌生人交談，並且要記得聽從大人的叮嚀。", "writingPrompt": "請用 stranger（陌生人）造一個句子，說說和陌生人相處要注意什麼。", "text_zh": ["從前，有一個很可愛的小女孩。她總是戴著一頂紅色帽子。所以大家都叫她小紅帽。有一天，她媽媽說：「奶奶生病了。請把這籃麵包和水果送到她森林裡的家。要走在小路上，不要跟陌生人說話。」", "小紅帽走在森林的路上時，遇到了一隻狼。她不知道狼可能很危險，所以停下來跟牠說話。狼露出狡猾的笑容問：「小妹妹，妳要去哪裡呀？」「去我奶奶家，」她說。", "狼很快地抄近路跑走了。牠先到了奶奶家。牠把奶奶鎖進衣櫃裡。接著牠穿上奶奶的睡衣，躺進她的床上，等著小女孩來。", "小紅帽到了以後，她發現有些奇怪。「奶奶，妳的眼睛怎麼這麼大！」她說。「這樣才能看得更清楚呀，」狼說。「奶奶，妳的耳朵怎麼這麼大！」「這樣才能聽得更清楚呀。」「奶奶，妳的牙齒怎麼這麼大！」「這樣才能把妳吃掉呀！」狼大喊，從床上跳了起來。", "小紅帽大聲尖叫。附近有個樵夫正在工作。他聽到尖叫聲，衝進屋子裡。他把狼趕跑了。接著他幫奶奶從衣櫃裡出來。", "「從現在開始，」小紅帽說，「我會一直聽媽媽的話。我再也不會跟陌生人說話了。」"]}, {"id": 10, "title_en": "The Three Little Pigs", "title_zh": "三隻小豬", "level": "★★★☆☆", "words": 240, "text": ["Once there were three little pigs. They left home to build their own houses. The first pig was lazy. He built his house fast, out of straw. The second pig worked a little harder. He built his house out of sticks. The third pig worked very hard. He built a strong house out of bricks.", "One day, a hungry wolf came to the first pig's straw house. \"Little pig, little pig, let me come in!\" he called. \"Not by the hair on my chinny chin chin!\" said the pig. \"Then I'll huff, and I'll puff, and I'll blow your house in!\" The wolf took a big breath. He blew the straw house down.", "The first pig ran to his brother's stick house. But the wolf followed him. He blew that house down too! Both pigs ran as fast as they could. They ran to their brother's brick house.", "The wolf came and huffed and puffed with all his strength. But the brick house did not move at all. It was much too strong.", "The wolf was angry and hungry. He tried to climb down the chimney. But the clever third pig was ready. He had a pot of boiling water in the fireplace below. The wolf fell in and ran away. He never bothered the pigs again.", "From that day on, the three pigs lived safely together in the strong brick house. They learned that if you work hard, it will always pay off."], "newWords": [{"en": "straw", "zh": "稻草"}, {"en": "stick", "zh": "樹枝；木棍"}, {"en": "brick", "zh": "磚塊"}, {"en": "huff", "zh": "用力吹氣"}, {"en": "chimney", "zh": "煙囪"}, {"en": "boiling", "zh": "沸騰的"}, {"en": "pay off", "zh": "得到回報"}], "questions": [{"q": "What did the third pig build his house with?", "options": ["Straw", "Sticks", "Bricks", "Wood"], "answer": 2}, {"q": "What happened to the straw house?", "options": ["It burned down", "The wolf blew it down", "It fell in the rain", "Nothing happened"], "answer": 1}, {"q": "Why couldn’t the wolf blow down the third house?", "options": ["It was too small", "It was made of strong bricks", "The pig was too strong", "The wolf was tired"], "answer": 1}, {"q": "How did the pigs finally stop the wolf?", "options": ["They called the police", "They tricked him with boiling water in the fireplace", "They ran away forever", "They gave him food"], "answer": 1}], "moral_zh": "認真努力做好準備，最終會得到回報。", "writingPrompt": "請用 strong（強壯的）或 hard-working（努力工作的）造一個句子。", "text_zh": ["從前有三隻小豬。牠們離開家，去蓋自己的房子。第一隻豬很懶。牠很快就用稻草蓋了房子。第二隻豬比較努力一點。牠用樹枝蓋了房子。第三隻豬非常努力。牠用磚頭蓋了一間堅固的房子。", "有一天，一隻肚子餓的狼來到第一隻豬的稻草屋。「小豬，小豬，讓我進去！」牠喊道。「不要，就算用我下巴的一根毛也不要！」小豬說。「那我就用力吹氣，把你的房子吹倒！」狼深吸一口氣，把稻草屋吹垮了。", "第一隻豬跑到牠兄弟的樹枝屋。但狼跟了過去，也把那間房子吹垮了！兩隻豬用最快的速度跑走。牠們跑到兄弟的磚頭屋。", "狼來了，用盡全力猛吹。但磚頭房子動也不動。它實在太堅固了。", "狼又餓又生氣。牠想從煙囪爬下去。但聰明的第三隻豬早就準備好了。牠在下面的壁爐裡放了一鍋滾燙的熱水。狼掉了進去，逃走了。牠再也沒有回來騷擾這三隻豬。", "從那天起，三隻豬一起安全地住在堅固的磚頭房子裡。牠們學到了：只要努力工作，一定會有回報。"]}, {"id": 11, "title_en": "Goldilocks and the Three Bears", "title_zh": "金髮女孩與三隻熊", "level": "★★★☆☆", "words": 230, "text": ["Deep in the forest, there lived a family of three bears. There was a big daddy bear, a medium-size mommy bear, and a tiny baby bear. One morning, mommy bear made porridge. But it was too hot to eat. So the bears went for a walk while it cooled down.", "A little girl named Goldilocks was walking in the forest. She found the bears' cottage. She knocked on the door, but no one answered. So she walked right in. On the table, she saw three bowls of porridge. She tried the first bowl — too hot! She tried the second bowl — too cold! She tried the third bowl — just right! She ate it all up.", "Next, she saw three chairs. The big chair was too hard. The middle chair was too soft. The small chair was just right — until it broke under her weight!", "Goldilocks felt tired. She went upstairs and found three beds. The first bed was too hard. The second bed was too soft. But the third bed was just right. She fell fast asleep.", "When the three bears came home, they saw that someone had eaten their porridge. Someone had broken their chair. And someone was sleeping in the baby bear's bed! \"Someone is sleeping in my bed — and she's still here!\" the baby bear cried loudly.", "Goldilocks woke up. She saw the three bears. They gave her a big stare. She jumped out of the window in fright. She ran home through the forest. She never went back to the bears' cottage again."], "newWords": [{"en": "porridge", "zh": "粥；燕麥粥"}, {"en": "cottage", "zh": "小屋"}, {"en": "knock", "zh": "敲門"}, {"en": "weight", "zh": "重量"}, {"en": "stare", "zh": "盯著看"}, {"en": "fright", "zh": "驚嚇"}], "questions": [{"q": "Why did the bears leave their porridge and go for a walk?", "options": ["They were not hungry", "The porridge was too hot to eat", "They wanted to see Goldilocks", "It was a sunny day"], "answer": 1}, {"q": "Which bowl of porridge did Goldilocks like best?", "options": ["The father bear’s bowl", "The mother bear’s bowl", "The baby bear’s bowl", "She didn’t eat any"], "answer": 2}, {"q": "What happened to the small chair?", "options": ["It was too soft", "It broke under Goldilocks’s weight", "Nothing happened to it", "It was too hard"], "answer": 1}, {"q": "How did the story end?", "options": ["Goldilocks became friends with the bears", "Goldilocks jumped out of the window and ran home", "The bears invited her to stay", "Goldilocks fixed the chair"], "answer": 1}], "moral_zh": "未經同意進入別人家中、使用別人的東西是不對的。", "writingPrompt": "請用 just right（剛剛好）的概念，用 hot、cold 或 soft 造一個句子。", "text_zh": ["在森林深處，住著一家三隻熊。有一隻高大的熊爸爸、一隻中等身材的熊媽媽，還有一隻嬌小的小熊。有一天早上，熊媽媽煮了粥。但粥太燙了不能吃。所以熊一家人趁粥變涼的時候出去散步。", "一個叫金髮女孩的小女孩正在森林裡散步。她發現了熊家的小屋。她敲了敲門，但沒有人回答。所以她就直接走了進去。桌上放著三碗粥。她嚐了第一碗——太燙了！她嚐了第二碗——太冷了！她嚐了第三碗——剛剛好！她把它全部吃光了。", "接著，她看到三張椅子。大椅子太硬。中椅子太軟。小椅子剛剛好——直到它在她的重量下壞掉了！", "金髮女孩覺得累了。她上樓，發現了三張床。第一張床太硬。第二張床太軟。但第三張床剛剛好。她很快就睡著了。", "當三隻熊回到家，牠們發現有人吃了牠們的粥。有人弄壞了牠們的椅子。還有人正睡在小熊的床上！「有人睡在我的床上——她還在那裡！」小熊大聲哭喊。", "金髮女孩醒了過來。她看見三隻熊。牠們盯著她，狠狠地瞪了她一眼。她嚇得從窗戶跳了出去。她穿過森林跑回家。她再也沒有回到熊家的小屋。"]}, {"id": 12, "title_en": "The Ugly Duckling", "title_zh": "醜小鴨", "level": "★★★★☆", "words": 260, "text": ["One summer, on a farm, a mother duck watched her eggs hatch one by one. The little ducklings were soft and yellow. All of them, except the last one. He was big and gray. He looked different from his brothers and sisters.", "\"What an ugly duckling!\" the other animals on the farm said. Even his brothers and sisters laughed at him. They would not let him play with them. The poor duckling felt very sad and lonely.", "One day, his brothers and sisters teased him again and again. The ugly duckling ran away from the farm. He walked through fields and forests, all alone. In winter, the icy pond made him almost freeze. But a kind farmer saved him.", "Time passed, and spring came again. The duckling was grown up now. He saw three beautiful white swans. They were swimming gracefully on a lake. \"I want to see them, even if they laugh at me too,\" he thought sadly. He swam toward them.", "But something amazing happened. He looked down at his reflection in the water. He saw that he was not a gray, clumsy duckling anymore. He had grown into a beautiful white swan!", "The other swans welcomed him warmly. Children on the shore pointed at him. \"Look at that new swan — he is the most beautiful one of all!\" they said. The swan felt truly happy for the first time. He understood that being different does not mean you are less worthy."], "newWords": [{"en": "hatch", "zh": "孵化"}, {"en": "duckling", "zh": "小鴨"}, {"en": "tease", "zh": "嘲笑；取笑"}, {"en": "freeze", "zh": "結冰；凍僵"}, {"en": "gracefully", "zh": "優雅地"}, {"en": "reflection", "zh": "倒影；反射"}, {"en": "worthy", "zh": "有價值的"}], "questions": [{"q": "Why did the other animals call him “ugly”?", "options": ["He was mean to others", "He looked different from the other ducklings", "He could not swim", "He was too small"], "answer": 1}, {"q": "Why did the duckling run away from the farm?", "options": ["He wanted an adventure", "He could not bear being teased", "He was looking for food", "His mother told him to leave"], "answer": 1}, {"q": "What did the duckling discover about himself in the end?", "options": ["He was actually a duck after all", "He had turned into a beautiful swan", "He could fly higher than birds", "He was the mother’s favorite"], "answer": 1}, {"q": "What is the main message of this story?", "options": ["Ugly animals should hide", "Being different doesn’t mean being less worthy — you may just need time to grow", "Swans are better than ducks", "Winter is the best season"], "answer": 1}], "moral_zh": "外表不同不代表沒有價值，也許只是還沒展現出真正的自己。", "writingPrompt": "請用 different（不同的）造一個句子，說說每個人都有自己的特別之處。", "text_zh": ["有一年夏天，在一座農場裡，鴨媽媽看著她的蛋一顆一顆孵化。小鴨們都軟軟黃黃的。除了最後一隻。牠又大又灰。牠看起來跟兄弟姊妹很不一樣。", "「好醜的小鴨啊！」農場裡的其他動物說。就連他的兄弟姊妹也嘲笑他。牠們不讓他一起玩。這隻可憐的小鴨感到很難過、很孤單。", "有一天，他的兄弟姊妹一次又一次地嘲笑他。醜小鴨逃離了農場。他獨自走過田野和森林。冬天時，結冰的池塘讓他差點凍僵。幸好一位善良的農夫救了他。", "時間過去了，春天又來了。小鴨已經長大了。他看見三隻美麗的白天鵝。牠們正優雅地在湖面上游泳。「我想去看看牠們，就算牠們也會笑我，」他難過地想著。他朝牠們游了過去。", "但令人驚訝的事情發生了。他低頭看著自己在水中的倒影。他發現自己不再是那隻灰灰的、笨拙的小鴨了。他已經長成了一隻美麗的白天鵝！", "其他天鵝熱情地歡迎他。岸邊的孩子們指著他說：「快看那隻新來的天鵝——他是最美麗的一隻！」這隻天鵝第一次感到真正的快樂。他終於明白：與眾不同不代表比較差。"]}, {"id": 13, "title_en": "The Emperor's New Clothes", "title_zh": "國王的新衣", "level": "★★★★☆", "words": 250, "text": ["Long ago, there was an emperor. He loved new clothes. He loved clothes more than anything else. He spent all his money on clothes. He spent all his time on clothes too. He did not take care of his people.", "One day, two swindlers came to the palace. The swindlers were very clever and tricky. They said, \"We can weave the best cloth in the world.\" They said, \"This cloth has magic power.\" They said, \"Foolish people cannot see it.\" They said, \"People who are bad at their jobs cannot see it either.\" The emperor got very excited. He paid the swindlers a lot of gold. He told them to start weaving right away.", "The swindlers set up two empty looms. They pretended to weave cloth on the looms. But there was no thread at all. The emperor sent his ministers to check on the cloth. Each minister looked at the looms. Each minister saw nothing but empty looms. But every minister was scared. Every minister was scared to look foolish. So every minister said the cloth was beautiful.", "At last, the new clothes were ready. The swindlers pretended to dress the emperor. They put the invisible suit on him. Nobody could see any clothes at all. But nobody dared to say so. Even the emperor did not dare to say so.", "The emperor felt very proud of his new clothes. He walked through town in a big parade. All the people watched him walk by. All the people clapped for him. All the people said his clothes were beautiful. Nobody wanted to admit the truth.", "Then a little child in the crowd shouted out. The child said, \"He is not wearing anything at all!\" The crowd went quiet for a moment. Then everyone began to whisper the same words. The emperor understood the truth now. But he kept walking with his head held high. He wanted to finish the parade with dignity."], "newWords": [{"en": "emperor", "zh": "皇帝"}, {"en": "swindler", "zh": "騙子"}, {"en": "weave", "zh": "編織"}, {"en": "loom", "zh": "織布機"}, {"en": "minister", "zh": "大臣；部長"}, {"en": "invisible", "zh": "隱形的"}, {"en": "dignity", "zh": "尊嚴"}], "questions": [{"q": "What did the swindlers promise to make?", "options": ["Golden shoes", "Magic cloth that foolish people could not see", "A flying carpet", "A crown"], "answer": 1}, {"q": "Why did the ministers say the cloth was beautiful?", "options": ["They really saw beautiful cloth", "They were afraid of looking foolish", "They wanted more gold", "They liked the swindlers"], "answer": 1}, {"q": "Who finally told the truth?", "options": ["A minister", "The emperor himself", "A small child", "A swindler"], "answer": 2}, {"q": "What does this story teach us?", "options": ["Children should not speak in public", "It takes honesty and courage to say what is true, even when others stay silent", "Kings should wear simple clothes", "Weaving is a difficult skill"], "answer": 1}], "moral_zh": "有時候說出真相需要誠實與勇氣，即使大家都選擇沉默。", "writingPrompt": "請用 honest（誠實的）或 truth（真相）造一個句子。", "text_zh": ["很久以前，有一位國王。他很愛新衣服。他愛衣服勝過一切。他把所有的錢都花在衣服上。他把所有的時間也花在衣服上。他沒有好好照顧他的人民。", "有一天，兩個騙子來到皇宮。這兩個騙子非常聰明，也很狡猾。他們說：「我們能織出全世界最好的布。」他們說：「這種布有魔法。」他們說：「笨的人看不到它。」他們說：「不適合自己工作的人也看不到它。」國王聽了非常興奮。他付給騙子一大筆黃金。他叫他們馬上開始織布。", "騙子架起兩台空的織布機。他們假裝在織布機上織布。但其實根本沒有線。國王派大臣去看看布織得怎麼樣。每位大臣看著織布機。每位大臣看到的只是空空的織布機。但每位大臣都很害怕。每位大臣都怕自己看起來很笨。所以每位大臣都說這塊布很漂亮。", "終於，新衣做好了。騙子假裝幫國王穿上衣服。他們幫他穿上這件隱形的衣服。沒有人看得到任何衣服。但沒有人敢說出來。就連國王自己也不敢說出來。", "國王對他的新衣感到非常驕傲。他穿著新衣走過城鎮，參加一場盛大的遊行。所有的人都看著他走過去。所有的人都為他鼓掌。所有的人都說他的衣服很漂亮。沒有人想承認真相。", "這時，人群中一個小孩大聲喊了出來。小孩說：「他根本什麼都沒穿！」群眾安靜了一下子。接著大家開始小聲說著同樣的話。國王現在明白了真相。但他依然抬頭挺胸地繼續走。他想要有尊嚴地走完這場遊行。"]}];
const DAILY_STORIES = [{"day": 1, "title_zh": "書店裡的客人們", "text": "A new bookstore opened in town. Lots of people came to see it. An **adult** came in with his **child**. They looked at picture books. A **boy** and a **girl** stood by the comic books. They laughed a lot. A little **baby** slept in a stroller. A **couple** held hands. They picked a book together. \"Wow, you are a **genius**!\" said a **gentleman**. He was talking to a boy with a big science book. A **customer** asked, \"Do you have story books for kids?\" A **giant** sign on the wall said, \"Everyone can read here. Even a **fool** can get smart!\" The manager smiled at every **guest**. He was as kind as an **angel**.", "text_zh": "鎮上新開了一家書店。很多人跑來看。一位大人帶著他的小孩一起來。他們看圖畫書。一個男孩和一個女孩站在漫畫書旁邊，笑得很開心。一個小嬰兒在嬰兒車裡睡覺。一對情侶手牽手，一起挑書。「哇，你真是天才！」一位紳士說。他在跟一個拿著厚厚科學書的男孩說話。一位客人問：「你們有沒有給小孩看的故事書？」牆上一張大大的海報寫著：「大家都能來這裡看書。就算是傻瓜也能變聰明！」店經理對每一位客人微笑。他就像天使一樣親切。"}, {"day": 2, "title_zh": "王國裡的一天", "text": "There was a small kingdom by the sea. The **king** and his family lived in a big castle. The **prince** liked to ride horses. The **princess** liked to paint pictures. One day, a **hero** came to the castle gate. He was a **master** with a big sword. He wanted to be the **host** of a big festival for the **people**. \"Every **person** here should have fun,\" he said. An old **lady** and a young **man** walked by. They smiled at him. The king's **neighbor** was a nice farmer. He said yes to being the hero's **partner** for the festival. A little **kid** ran through the crowd. He was laughing and shouting.", "text_zh": "海邊有一個小王國。國王和他的家人住在一座大城堡裡。王子喜歡騎馬，公主喜歡畫畫。有一天，一位英雄來到城堡門口。他是個很厲害的劍術大師。他想幫大家辦一場盛大的慶典，當這場慶典的主人。「這裡的每個人都應該玩得開心，」他說。一位老太太和一位年輕男子走過，對他微笑。國王的鄰居是一位好心的農夫。他答應當這位英雄辦慶典的夥伴。一個小孩在人群裡跑來跑去，又笑又叫。"}, {"day": 3, "title_zh": "陌生人來訪", "text": "A **stranger** came to the festival. Nobody knew her. \"I am the **queen** from the next town,\" she said. A **teenager** ran to tell the princess. Soon, more **visitor**s came from other towns. A **woman** with white hair looked very wise. A **youth** next to her looked shy. The queen was very **beautiful**. But she could not see well. She was almost **blind**. Next to her was a **chubby** little dog and a **cute** cat. Her guard was **deaf** in one ear. He could not talk. He had been **dumb** since he was small. Even the town's **fat** baker came to say hi.", "text_zh": "一個陌生人來到慶典上。沒有人認識她。「我是隔壁鎮的女王，」她說。一個少年跑去告訴公主這個消息。很快地，其他鎮上也來了訪客。一位白髮的婦人看起來很聰明。她旁邊的一個年輕人看起來很害羞。這位女王長得很美，但她眼睛看不清楚，幾乎全盲。她旁邊有一隻圓滾滾的小狗和一隻可愛的貓。她的護衛一隻耳朵聾了，也不會說話，他從小就是啞巴。就連鎮上胖胖的麵包師傅也來打招呼。"}, {"day": 4, "title_zh": "派對上的每個人", "text": "That night, everyone went to a party. A **handsome** young man wore a **nice-looking** suit. He danced with a **tall** lady. An **old** grandpa sat by the door. His bags were too **heavy** to carry around. A **short** boy played games with his **skinny** sister. Next to them, a **slender** dancer moved so nicely. Her friend felt a little **over-weight**, so she just watched and smiled. A **thin**, **under-weight** cat walked under the tables. It looked for food. \"Don't call anyone **ugly**,\" the queen said kindly. \"Everyone is beautiful, **slim** or not.\"", "text_zh": "那天晚上，大家都去參加派對。一位帥氣的年輕男子穿著好看的西裝，跟一位高高的女士跳舞。一位老爺爺坐在門邊，因為他的袋子太重，提不動。一個矮矮的男孩跟他瘦瘦的妹妹一起玩遊戲。他們旁邊，一位苗條的舞者跳得很好看。她的朋友覺得自己有點胖，就只是在旁邊笑著看。一隻又瘦又輕的貓在桌子底下走來走去找東西吃。「不要說別人醜，」女王溫柔地說。「每個人都很美，不管瘦不瘦都一樣。」"}, {"day": 5, "title_zh": "個性大不同", "text": "The next day at school, students talked about the party. \"The queen is **young**, but she is very **active** and kind,\" one student said. Another student felt **angry**. His little brother was **careless** with his book. \"Stop being **childish**!\" he said. Then he felt bad. His brother was just **childlike** and liked to play. A **brave**, **confident** girl put up her hand. \"The queen is not **boring** at all!\" she said. \"She is very **considerate**. She is always **careful** with people's feelings.\" The teacher was **busy**, but she smiled. \"That is a good lesson,\" she said. \"Being **bad** to others is never as good as being kind.\"", "text_zh": "隔天在學校，學生們聊起那場派對。「女王很年輕，但她很活潑，也很善良，」一位學生說。另一位學生很生氣，因為他弟弟對書本很粗心。「不要那麼幼稚！」他說。然後他覺得不太好意思，因為弟弟只是像小孩一樣愛玩。一位勇敢又有自信的女孩舉手說：「女王一點都不無聊！她很體貼，總是很小心地顧慮別人的感受。」老師雖然很忙，還是笑了。「這是很好的一課，」她說。「對別人不好，永遠比不上善待別人。」"}, {"day": 6, "title_zh": "學校裡的怪奇同學", "text": "There were many interesting kids in the class. Tom was **cool** and calm. But sometimes he acted **crazy** for fun. Nobody thought he was **cruel**. He was just **curious** about everything. Mary was **diligent**. She studied every night. She was never **dishonest** about her homework. Some kids said an **evil** villain lived near the school. But that was just an **exciting**, **energetic** story the kids made up. A **famous** singer visited their school one time. Everyone got so **excited**. \"Don't be **foolish**,\" the teacher said with a **frank** smile. \"That story is not true.\"", "text_zh": "班上有很多有趣的同學。湯姆很酷，也很冷靜。但他有時候會為了好玩而發瘋耍寶。沒有人覺得他殘忍，他只是對什麼事都很好奇。瑪麗很勤奮，每天晚上都讀書。她從來不會在功課上說謊。有些同學說學校附近住著一個邪惡的壞人。但那只是孩子們編出來的刺激又活力十足的故事。有一次一位知名歌手來學校拜訪，大家都好興奮。「不要傻傻的，」老師坦率地笑著說。「那個故事不是真的。」"}, {"day": 7, "title_zh": "友善的教室", "text": "Their classroom was full of **friendly** faces. Sam was always **funny**. He had a **gentle** and **generous** heart. He made everyone **happy**. He was never **greedy** — he shared his lunch with new kids. Lily was **hard-working** and **honest**. But she stayed **humble** about her good grades. Jack talked in a **humorous** way. But he could be a bit **impolite** sometimes. \"You are so **intelligent**,\" the teacher told Amy. She was very **interested** in science. She always asked good questions.", "text_zh": "他們班上到處都是友善的臉孔。山姆一直都很搞笑。他心地溫柔又大方，讓大家都很開心。他從不小氣——他會把午餐分給新同學。莉莉很用功也很誠實。但對自己的好成績還是很謙虛。傑克說話很幽默，不過有時候會有點沒禮貌。「你好聰明，」老師對艾咪說。她對科學很有興趣，總是問很好的問題。"}, {"day": 8, "title_zh": "各種心情的一週", "text": "It was a strange week for feelings. Ben felt **jealous** when his friend won a prize. But he stayed **kind** and said \"congrats!\" Nora felt **lazy** on Monday. She felt a little **lonely** on Tuesday. But her **lovely** cat made her smile. \"Don't get **mad** at me!\" said her **naughty** little brother. He felt **nervous** about breaking a cup. Their mom was very **patient** and **polite**. She was even nice to a **poor** old man who knocked on the door. \"Being **rich** does not mean you should be **proud**,\" she told her kids softly.", "text_zh": "這一週的心情很奇怪。班看到朋友得獎時覺得嫉妒，但他還是很善良，跟朋友說恭喜。諾拉星期一覺得懶懶的，星期二又覺得有點孤單，但她可愛的貓咪讓她笑了出來。「不要對我生氣！」她調皮的弟弟說，他因為打破杯子而覺得緊張。他們的媽媽總是很有耐心、很有禮貌，就連對一位敲門的可憐老人也很親切。「有錢不代表你就該驕傲，」她溫柔地告訴孩子們。"}, {"day": 9, "title_zh": "誠實最重要", "text": "\"It is **rude** to laugh at others,\" the teacher said one **sad** morning. A **scared** student said he copied homework. He was **selfish** and too **shy** to ask for help. \"That was **silly** of me,\" he said. The teacher was not angry. She liked his **sincere** sorry. \"You are a **smart** student. Don't be **sneaky** or **stingy** with the truth next time,\" she said. \"I don't think you're **stupid** at all. A **successful** person is just an honest person.\" Even the most **talkative** kid in class stayed quiet and listened.", "text_zh": "「嘲笑別人是很沒禮貌的，」老師在一個難過的早上說。一位嚇壞的學生說他抄了作業。他很自私，也太害羞不敢開口求助。「我這樣做真的很傻，」他說。老師沒有生氣。她喜歡他真誠的道歉。「你是個聰明的學生。下次不要偷偷摸摸，也不要在說實話這件事上小氣，」她說。「我一點都不覺得你笨。一個成功的人，其實就是一個誠實的人。」就連班上最愛講話的同學也安靜下來，仔細聽著。"}, {"day": 10, "title_zh": "從心情到臉龐", "text": "By Friday, nobody felt **unhappy** anymore. The students had learned to be **wise**. In art class, they drew pictures of themselves. Ling drew a long **beard** on her grandpa. She also drew his round **chin**. Tim drew an **ear**, a big **eye**, and a smiling **face**. \"Don't forget the **hair**!\" the teacher laughed. Someone drew red **lip**s and an open **mouth**. You could see a **nose** and a little pink **tongue**. \"Be careful with the **tooth** — make it small and white,\" the art teacher said. She checked everyone's drawing one by one.", "text_zh": "到了星期五，已經沒有人不開心了。學生們學會了變得有智慧。在美術課上，他們畫自己的畫像。玲畫了爺爺長長的鬍子，還畫了他圓圓的下巴。提姆畫了一隻耳朵、一隻大眼睛和一張微笑的臉。「別忘了畫頭髮！」老師笑著說。有人畫了紅紅的嘴唇和張開的嘴巴，還畫出鼻子和一點粉紅色的舌頭。「小心畫牙齒，要畫得小小白白的，」美術老師說。她一個一個檢查大家的畫。"}, {"day": 11, "title_zh": "運動會上的意外", "text": "On sports day, something bad happened. A runner twisted his **ankle** and fell down. He hurt his **arm** and his **back**. \"Is your **body** okay?\" the teacher asked. \"I think the **bone** in my **finger** is fine. But my **foot** hurts,\" the boy said. He held his **hand** on his **head**. The nurse checked his **hip**, his **knee**, and his **leg**. \"Your **nail** looks fine too,\" she said. \"Let's get you some ice.\"", "text_zh": "運動會那天，發生了一件不好的事。一位跑者扭到腳踝，跌倒了。他傷到手臂和背部。「你身體還好嗎？」老師問。「我想我手指的骨頭沒事，但我的腳很痛，」男孩說。他用手扶著頭。護士檢查了他的臀部、膝蓋和腿。「你的指甲也沒問題，」她說。「我們來冰敷一下吧。」"}, {"day": 12, "title_zh": "護士室裡", "text": "More kids came to the nurse's office. One boy had a stiff **neck** and a sore **shoulder** from basketball. Another had dry **skin** and an itchy **throat**. \"My **thumb** and **toe** hurt from running,\" a girl said. She rubbed her **waist** and her **wrist** too. \"Take a deep breath,\" the nurse said. She listened to his **heart** and touched his **stomach** gently. \"Are you **comfortable** now? Do you feel **dizzy**?\" \"No,\" the boy said. \"I feel much more **healthy** now.\"", "text_zh": "更多學生來到保健室。一個男孩因為打籃球，脖子僵硬、肩膀痠痛。另一個人皮膚乾燥、喉嚨癢癢的。「我跑步跑到大拇指和腳趾都痛，」一位女孩說。她也揉了揉自己的腰和手腕。「深呼吸，」護士說。她聽了他的心跳，輕輕摸了摸他的肚子。「現在覺得舒服一點了嗎？會頭暈嗎？」「不會，」男孩說。「我現在覺得健康多了。」"}, {"day": 13, "title_zh": "感冒的一天", "text": "The next week, many kids got sick. A **painful** cough spread around the class. Some kids looked **pale**. \"I feel **sick** today,\" said a boy who was usually **strong**. Now he felt **weak** and **tired**. \"I don't feel **well** at all.\" The nurse checked his old **wound**. She said it was not **cancer**. It was just a bad **cold** or the **flu**. \"You also have a **headache** and a **stomachache**,\" she said. \"Go home and rest.\"", "text_zh": "接下來一週，很多孩子都生病了。班上流行起令人難受的咳嗽，有些孩子臉色蒼白。「我今天不舒服，」一位平常很強壯的男孩說。現在他覺得虛弱又疲倦。「我一點都不舒服。」護士檢查了他舊的傷口，說那不是癌症，只是嚴重的感冒或流感。「你還有頭痛和肚子痛，」她說。「回家休息吧。」"}, {"day": 14, "title_zh": "看醫生", "text": "At the clinic, the boy told the doctor about his **toothache** and dry **cough**. \"I also have a **fever** and some **pain** in my chest. My **sore throat** hurts too,\" he said. \"Don't worry, we can **cure** this. You will **recover** soon,\" the doctor said kindly. She thought about **life** and **death** the way every good doctor does. She cared a lot about **health**. She gave him some **medicine**. Outside, his **aunt** and his **brother** were waiting to take him home.", "text_zh": "在診所裡，男孩告訴醫生他牙痛又乾咳。「我還發燒，胸口有點痛，喉嚨也痛，」他說。「別擔心，這是可以治好的。你很快就會康復，」醫生和藹地說。她像每一位好醫生一樣，會想到生命與死亡，也非常在乎健康。她開了一些藥給他。外面，他的阿姨和哥哥正等著帶他回家。"}, {"day": 15, "title_zh": "家庭團聚", "text": "This weekend, the whole **family** got together. His **cousin** came. His **daughter** came too. Every **elder** in the **family** came. His **father** cooked a big meal. His **grandfather** and **grandmother** told old stories. His little **granddaughter** and **grandson** played outside. His **husband** helped his **mother** set the table. His **nephew** and **niece** ran around and laughed.", "text_zh": "這個週末，全家人聚在一起。他的表哥來了。他的女兒也來了。家裡每個長輩都來了。他爸爸煮了一頓大餐。爺爺和奶奶說了老故事。他的小孫女和孫子在外面玩。他的丈夫幫媽媽擺桌子。姪子和姪女到處跑來跑去，笑得很開心。"}, {"day": 16, "title_zh": "數一數家人", "text": "Every **parent** and **relative** came. Even his **sister** came. His **son** came too. His **uncle** and his **wife** came. \"It's great to **grow** up in a big family,\" someone said. \"We all **live** close to each other. My brother will **marry** her next spring. He will finally be **married**!\" Someone counted everyone at the table: \"**Zero** empty seats, **one** big table, **two** long benches.\"", "text_zh": "每一位家長和親戚都到了。連他姊妹也來了。他兒子也來了。叔叔和太太都來了。「能在大家庭裡長大真好，」有人說。「我們都住得很近。我哥哥明年春天要結婚了。他終於要結婚了！」有人開始數桌上的人：「零個空位，一張大桌子，兩條長板凳。」"}, {"day": 17, "title_zh": "數字遊戲", "text": "After dinner, the kids played a number game. \"**Three**, **four**, **five**, **six**, **seven**, **eight**, **nine**, **ten**!\" they shouted while jumping rope. The youngest girl counted slower. \"**Eleven**... **twelve**... **thirteen**... **fourteen**... **fifteen**!\" Everyone clapped. She didn't make one mistake.", "text_zh": "晚餐後，小朋友玩數數字遊戲。他們一邊跳繩一邊喊：「三、四、五、六、七、八、九、十！」年紀最小的女生數得比較慢。「十一……十二……十三……十四……十五！」大家都拍手。她一個都沒數錯。"}, {"day": 18, "title_zh": "數到一百", "text": "\"Let's count higher!\" the teacher said. \"**Sixteen**, **seventeen**, **eighteen**, **nineteen**, **twenty**...\" The class counted together. Then they counted by tens. \"**Thirty**, **forty**, **fifty**, **sixty**, **seventy**, **eighty**, **ninety**, one **hundred**!\" Everyone clapped. They counted all the way to one hundred with no mistakes.", "text_zh": "「我們來數大一點的數字！」老師說。「十六、十七、十八、十九、二十……」全班一起數。接著他們十個十個地數。「三十、四十、五十、六十、七十、八十、九十、一百！」大家都拍手。他們一路數到一百，都沒有數錯。"}, {"day": 19, "title_zh": "第一名是誰？", "text": "At the year-end contest, they sold over a **thousand** tickets. Almost a **million** people watched online. \"Who got **first** place?\" someone asked. \"I got **second** place. My sister got **third** place,\" said Amy. \"This was my **last** try,\" she said. She had **a few** tears and **a little** smile. \"I tried **a lot**. But **any** result was fine with me.\" **Both** sisters hugged. \"There are **few** losers today. There is **less** worry than last year,\" the coach said, feeling proud.", "text_zh": "在年終比賽中，他們賣出超過一千張票。將近一百萬人在網路上看。「誰得到第一名？」有人問。「我得到第二名。我妹妹得到第三名，」艾咪說。「這是我最後一次比賽了，」她說。她流了一點眼淚，也笑了一下。「我很努力了。不管結果怎樣我都可以接受。」兩姊妹抱在一起。「今天很少人是輸家。大家的擔心也比去年少，」教練說，感到很驕傲。"}, {"day": 20, "title_zh": "從數字到時間", "text": "\"How **little** money is left for prizes?\" the coach asked. He checked the **number**s. \"We have **several** boxes left,\" a helper said. He counted the **total**. Outside, the sky changed. It went from **dawn** to **morning**. Then it was **noon**, then **afternoon**, then **evening**. By **night**, only the cleaners worked. They worked all the way to **midnight**. \"See you on **Monday**,\" they said. They waved goodbye on **Tuesday** morning.", "text_zh": "「還剩多少獎金？」教練問。他檢查了數字。「我們還剩幾箱，」一位幫手說。他算了總數。外面，天空變了。從黎明變成早上。接著是中午，再來是下午，然後是傍晚。到了晚上，只剩清潔人員在工作。他們一直工作到半夜。「星期一見，」他們說。他們在星期二早上互相揮手道別。"}, {"day": 21, "title_zh": "行事曆上的一週", "text": "The school schedule was busy. They had tests on **Wednesday** and **Thursday**. There were club activities on **Friday** and **Saturday**. **Sunday** was the only rest day of the **week**. \"I like **weekday**s more than the **weekend**,\" one student said. \"I get bored at home.\" The teacher wrote the plan for the **month** on the board. It started with **January**, then **February**, **March**, and **April**.", "text_zh": "學校的行程排得很滿。星期三和星期四他們有考試。星期五和星期六有社團活動。星期天是這一週唯一的休息日。「我比較喜歡平日，不喜歡週末，」一位學生說。「我在家會覺得無聊。」老師把這個月的計畫寫在黑板上。從一月開始，接著是二月、三月、四月。"}, {"day": 22, "title_zh": "十二個月與四季", "text": "The plan went on through **May**, **June**, **July**, **August**, **September**, **October**, **November**, and **December**. That's a whole year! Each **season** brings something new. Flowers come in **spring**. Sunshine comes in **summer**. Leaves fall in **autumn**. Snow comes in **winter**. \"My favorite season changes every year,\" the teacher laughed. She showed a calendar with all twelve months.", "text_zh": "計畫一路排到五月、六月、七月、八月、九月、十月、十一月、十二月。這就是一整年！每個季節都帶來新的東西。春天有花開。夏天有陽光。秋天樹葉會掉。冬天會下雪。「我最喜歡的季節每年都不一樣，」老師笑著說。她拿出一本有十二個月的月曆。"}, {"day": 23, "title_zh": "時鐘與手錶", "text": "In the morning, an **alarm clock** rang loudly. Tom looked at the **calendar** on the wall. Then he checked the **clock** in the kitchen. He also checked the **watch** on his wrist. His sister used a **stopwatch** when she ran. \"It's **half** past seven,\" said their mother. \"You have one **hour** and thirty **minute**s before school. Wait a **moment** — it's really eight **o’clock**! It's ten **past** the **quarter** already! Every **second** counts!\"", "text_zh": "早上，鬧鐘大聲響了。湯姆看了牆上的日曆。接著他看了廚房裡的時鐘。他也看了手腕上的手錶。他妹妹跑步時用了碼錶。「現在七點半，」媽媽說。「你還有一小時三十分鐘可以準備上學。等一下——現在其實是八點了！已經過一刻鐘又十分了！每一秒都很重要！」"}, {"day": 24, "title_zh": "早到還是晚到？", "text": "\"What **time** is it now?\" Tom asked. He ran down the stairs. \"I told you **ago**, and you're **already** late!\" his mother said. His **current** habit was to wake up **early**. But that changed. Now he was always **late**. He was never on time, not like his **last** term. \"There's always a **next** time,\" she said. \"**Now**, hurry! You **once** told me you'd never be late again. You can explain **later**.\" Tom thought about the **future**. He promised he would leave **soon** every day from now on.", "text_zh": "「現在幾點了？」湯姆問。他跑下樓梯。「我剛剛就說過了，你已經遲到了！」媽媽說。他本來習慣早起。但現在變了。現在他總是遲到。他從不準時，不像上學期那樣。「總是會有下一次，」她說。「現在，快點！你曾經跟我說過不會再遲到了。你可以晚一點再解釋。」湯姆想著未來。他答應以後每天都會早點出門。"}, {"day": 25, "title_zh": "存錢筒的秘密", "text": "\"What are you doing **today**?\" Mia asked. \"**Tonight** I have homework, and I have a test **tomorrow**,\" said her friend. \"This whole **week** is busy, even the **weekend**. This whole **year** feels busy too!\" \"**Yesterday** was much easier,\" Mia laughed. \"I need a **daily** plan.\" That evening, she opened her piggy bank. She found an old **bill**, some **cash**, one **cent**, a little **change**, and a shiny **coin**.", "text_zh": "「你今天要做什麼？」米亞問。「今晚我有功課，明天還有考試，」她朋友說。「這整個星期都很忙，連週末也是。這一整年也覺得很忙！」「昨天輕鬆多了，」米亞笑著說。「我需要一個每天的計畫。」那天晚上，她打開撲滿。她發現一張舊鈔票、一些現金、一分錢、一點零錢，還有一個閃亮的硬幣。"}, {"day": 26, "title_zh": "跟媽媽借錢", "text": "\"I have a **credit card** now too,\" Mia said. \"But I still like counting real **dollar**s and **money**.\" She looked at the **price** of a new backpack. \"Can I **borrow** some money to **buy** it? The shop won't **charge** extra. It doesn't **cost** much,\" she said. \"I will **earn** it back and **pay** you. I promise. I won't **spend** it on anything else. It's very **cheap**!\" \"Okay, I will **lend** you the money this one time,\" said her mother.", "text_zh": "「我現在也有信用卡了，」米亞說。「但我還是喜歡數真正的鈔票和錢。」她看了一個新背包的價格。「我可以跟你借點錢買嗎？店家不會多收費。也不會太貴，」她說。「我會賺錢還你。我保證。我不會拿去買別的東西。真的很便宜！」「好吧，這次我就借你錢，」媽媽說。"}, {"day": 27, "title_zh": "水果攤前", "text": "At the market, **fruit** was not **expensive** at all. Mia bought **fruit** for her family. She got a red **apple**, a yellow **banana**, some purple **grape**s, and a green **guava**. She got a sour **lemon** and a sweet **mango**. She got a juicy **orange** and a soft **papaya**. She got a fuzzy **peach** and a crunchy **pear**. \"Don't forget the **pineapple**!\" her mother called.", "text_zh": "在市場裡，水果一點也不貴。米亞為家人買了水果。她買了一顆紅蘋果、一根黃香蕉、一些紫葡萄和一顆綠芭樂。她買了一顆酸檸檬和一顆甜芒果。她買了一顆多汁的柳橙和一顆軟軟的木瓜。她買了一顆毛毛的桃子和一顆脆脆的梨子。「別忘了鳳梨！」媽媽喊道。"}, {"day": 28, "title_zh": "菜市場買菜", "text": "Next, they bought more fruit. They got sweet **strawberry**, orange **tangerine**, and red **tomato**. They also got a big **watermelon**. Then Mia's mother picked out **vegetable**s. She got green **bean**s and fresh **cabbage**. She got orange **carrot**s and yellow **corn**. She got crunchy **lettuce** and crunchy **nut**s. She got a strong **onion** and a big **potato**.", "text_zh": "接著，他們又買了更多水果。他們買了甜甜的草莓、橘子和紅番茄。他們也買了一顆大西瓜。接著米亞的媽媽挑了些蔬菜。她買了青豆和新鮮的高麗菜。她買了紅蘿蔔和玉米。她買了脆脆的萵苣和脆脆的堅果。她買了一顆味道濃的洋蔥和一顆大馬鈴薯。"}, {"day": 29, "title_zh": "準備晚餐", "text": "Mom and Mia went shopping for dinner. They picked a small **pumpkin** and some **meat**. They got **beef** and soft **bread**. They also bought a sweet **bun** and a box of **cereal**. They chose fresh **chicken** and frozen **dumpling**s. \"Don't forget the **egg**s,\" Dad said. Dad does not like **fast food**. He likes fresh **fish** and **flour** for baking. He likes simple home **food** the best.", "text_zh": "媽媽和米亞去買晚餐要用的東西。他們選了一顆小南瓜和一些肉。他們買了牛肉和軟軟的麵包。他們也買了一個甜甜的小圓麵包和一盒穀片。他們挑了新鮮的雞肉和冷凍水餃。「別忘了買雞蛋，」爸爸說。爸爸不喜歡速食。他喜歡新鮮的魚和做麵包用的麵粉。他最喜歡簡單的家常菜。"}, {"day": 30, "title_zh": "廚房裡的晚餐", "text": "That night, they made a big dinner. They cooked golden **fries** and sliced **ham**. There was a big **hamburger** and a warm **hot dog**. Her brother made **instant noodle**s. Her mom cooked real **noodle**s too. They also had a cheese **pizza**. There was **pork** and hot **rice**. Mia liked the fresh **salad**. Dad made a big **sandwich**. They also had some **seafood** and grilled **shrimp**.", "text_zh": "那天晚上，他們煮了一頓豐盛的晚餐。他們煎了金黃色的薯條，還切了火腿。有一個大大的漢堡和一份溫熱的熱狗。哥哥煮了泡麵。媽媽也煮了真正的麵條。他們還吃了起司披薩。有豬肉和熱騰騰的飯。米亞喜歡新鮮的沙拉。爸爸做了一個大三明治。他們也吃了一些海鮮和烤蝦。"}, {"day": 31, "title_zh": "餐桌上的話題", "text": "Dad cut his **steak** and said, \"This **soup** smells so good. The **spaghetti** looks great too.\" Mia's little sister only ate **tofu**. \"We did not eat **breakfast** or **brunch** today,\" Mom said. \"Let's enjoy this big **dinner**.\" \"I liked **lunch** better,\" Mia said. \"Every **meal** is important. Even a small **snack** or a late **supper** matters.\" Dad drank a cold **beer**. Mom drank hot **coffee**.", "text_zh": "爸爸切著他的牛排說：「這湯聞起來好香，義大利麵看起來也很棒。」米亞的妹妹只吃豆腐。「我們今天沒吃早餐，也沒吃早午餐，」媽媽說。「我們好好享受這頓晚餐吧。」「我比較喜歡午餐，」米亞說。「每一餐都很重要，就連一份小點心或宵夜也是。」爸爸喝了一杯冰啤酒。媽媽喝了熱咖啡。"}, {"day": 32, "title_zh": "飲料時間", "text": "After dinner, everyone picked a **drink**. Dad liked cold **cola**. Mom liked her **drink** with **ice**. Mia chose orange **juice**. But her brother spilled the **liquid** on the table. Grandma drank warm **milk**. Her cousin made a chocolate **milk shake**. \"I will just have **soda**,\" said Uncle Ben. \"Any **soft drink** is fine.\" Grandpa liked hot **tea**. The baby only drank **water**. For a treat, Mom got a **cake** and some **candy**.", "text_zh": "晚餐後，每個人都選了一杯飲料。爸爸喜歡冰可樂。媽媽喜歡加冰塊的飲料。米亞選了柳橙汁。但她哥哥把液體灑在桌上了。奶奶喝溫牛奶。表姊調了一杯巧克力奶昔。「我就喝汽水好了，」班叔叔說。「任何軟性飲料都可以。」爺爺喜歡熱茶。寶寶只喝水。作為獎勵，媽媽拿出了蛋糕和一些糖果。"}, {"day": 33, "title_zh": "甜點時光", "text": "For dessert, there was a treat with **cheese**, **chocolate**, and crunchy **cookie**s. \"This is my favorite **dessert**,\" Mia said. She picked a sweet **doughnut** and some **ice cream**. There was also a **moon cake** for Mid-Autumn Festival. Mom made a warm apple **pie**. They had salty **popcorn** too. Mia ate crispy **toast** with **butter**, **ketchup**, or **cream**.", "text_zh": "甜點時間，有一款用起司、巧克力和酥脆餅乾做成的點心。「這是我最喜歡的甜點，」米亞說。她選了一個甜甜圈和一些冰淇淋。中秋節還有月餅。媽媽做了溫熱的蘋果派。他們也吃了鹹鹹的爆米花。米亞吃了酥脆的吐司，配奶油、番茄醬或奶油醬。"}, {"day": 34, "title_zh": "調味料的秘密", "text": "In the kitchen, Grandma showed Mia her secret things. There was sweet **jam**, cooking **oil**, and spicy **pepper**. She also had dark **soy sauce**. \"Just a little **salt** and **sugar**,\" she said. \"Plus one drop of **vinegar**.\" \"Are you **hungry**?\" she asked. \"Not **full** yet, but a little **thirsty**,\" Mia said. \"This soup is a bit **bitter**,\" her brother said. \"But it is still **delicious** and **hot**.\"", "text_zh": "在廚房裡，奶奶讓米亞看她的秘密食材。有甜甜的果醬、食用油，還有辣辣的胡椒。她還有深色的醬油。「只要一點點鹽和糖，」她說。「再加一滴醋。」「妳餓了嗎？」她問。「還沒很飽，但有點口渴，」米亞說。「這湯有一點苦，」哥哥說。「但還是很好喝、很燙。」"}, {"day": 35, "title_zh": "阿嬤的烘焙課", "text": "\"This cake is a little **sour**,\" Mia said. \"But it is still **sweet** and **yummy**.\" Grandma loved to **bake** bread. She also liked to **boil** soup. But she was careful not to **burn** anything. \"To **cook** well, first you must **eat** with your eyes,\" she said. She let Mia **order** food from a **menu**. She taught Mia about a good **diet**. \"Now **spread** the butter like this,\" Grandma said. \"Then **slice** the bread like this.\"", "text_zh": "「這個蛋糕有點酸，」米亞說。「但還是甜甜的、很好吃。」奶奶很喜歡烤麵包。她也喜歡煮湯。但她很小心，絕不把東西燒焦。「要煮得好吃，要先用眼睛看，」她說。她讓米亞從菜單上點食物。她教米亞怎麼吃得健康。「現在，把奶油這樣塗開，」奶奶說。「然後把麵包這樣切片。」"}, {"day": 36, "title_zh": "餐具大集合", "text": "To make the table look nice, they used many things. They put out a big **bowl** and wooden **chopsticks**. There was a clean **cup** and a pretty **dish**. They also had a shiny **fork** and a tall **glass**. A sharp **knife** and a soft **napkin** were on the table too. There was a round **plate**, a small **spoon**, and a paper **straw**. Mia's new **blouse** and warm **coat** stayed clean the whole time.", "text_zh": "為了讓餐桌看起來漂亮，他們用了很多東西。他們擺出一個大碗和一雙木筷子。桌上有乾淨的杯子和漂亮的碟子。他們也有閃亮的叉子和高高的玻璃杯。桌上還有鋒利的刀和柔軟的餐巾。有一個圓盤子、一支小湯匙，還有一根紙吸管。米亞的新上衣和保暖外套整個過程都很乾淨。"}, {"day": 37, "title_zh": "衣櫃大整理", "text": "The next day, Mia cleaned her closet. She found a flowery **dress** and a blue **jacket**. She also found old **jeans** and comfy **pajamas**. There were long **pants** and a yellow **raincoat**. She found a white **shirt** and her favorite **T-shirt**. There were denim **shorts** and a pretty **skirt**. She also found a formal **suit** and a warm **sweater**. Last, she found her old **swimsuit**.", "text_zh": "隔天，米亞整理了她的衣櫃。她找到一件花洋裝和一件藍色夾克。她也找到舊牛仔褲和舒服的睡衣。有一條長褲和一件黃色雨衣。她找到一件白襯衫和她最愛的T恤。有牛仔短褲和一件漂亮的裙子。她也找到一套正式西裝和一件保暖毛衣。最後，她找到她的舊泳裝。"}, {"day": 38, "title_zh": "更多衣物與配件", "text": "She also found her school **uniform**. There was some plain **underwear** and a soft **vest**. In a small box, she found a leather **belt**. There was a spare **button** and a red **cap**. She saw an old **comb** and a **contact lens** case. There were tiny **earrings** and a wool **glove**. She also found a cloth **handkerchief**, a blue **mask**, and a silver **necklace**.", "text_zh": "她還找到了她的校服。有一些素面內衣和一件柔軟的背心。在一個小盒子裡，她找到一條皮帶。有一顆備用鈕扣和一頂紅色帽子。她看到一把舊梳子和一個隱形眼鏡盒。有一對小耳環和一隻羊毛手套。她也找到一條布手帕、一個藍色口罩，還有一條銀項鍊。"}, {"day": 39, "title_zh": "口袋裡的東西", "text": "In her jacket **pocket**, Mia found a small **purse**. There was a gold **ring** and a soft **scarf**. She also found her favorite **shoes** and comfy **slippers**. She saw sporty **sneakers** and warm **socks**. There was even Dad's **tie** and his folded **umbrella**. She found his leather **wallet** too. \"There is a **hole** in this old sock,\" she laughed. \"And there is a **spot** on this shirt too!\"", "text_zh": "在外套口袋裡，米亞發現了一個小錢包。裡面有一枚金戒指和一條柔軟的圍巾。她也找到了她最愛的鞋子和舒服的拖鞋。她看到運動風的球鞋和保暖的襪子。裡面甚至還有爸爸的領帶和他摺疊的傘。她也找到他的皮夾。「這隻舊襪子破了一個洞，」她笑著說。「這件襯衫上也有一個污漬！」"}, {"day": 40, "title_zh": "衣物的材質", "text": "Mia sorted all her **clothes** by material. Some were soft **cotton**. One shiny dress looked like it had **diamond**s on it. But it was really just **gold** and **silver** thread. \"Don't **iron** it too hot,\" Mom warned. \"What will you **wear** tomorrow?\" \"Maybe something **black**, or **blue**,\" Mia said. She looked at her closet full of color. There was **brown**, every **color** of **gray**, and a fresh **green** sweater.", "text_zh": "米亞把所有衣服依材質分類。有些是柔軟的棉質。有一件閃亮的洋裝看起來好像有鑽石。但其實只是金線和銀線。「不要用太燙的溫度熨燙，」媽媽提醒她。「妳明天要穿什麼？」「也許黑色的，或藍色的，」米亞說。她看著她那滿是各種顏色的衣櫃。有棕色、各種灰色，還有一件清爽的綠色毛衣。"}, {"day": 41, "title_zh": "彩色的運動用品袋", "text": "Mia also had a bag full of sports things. It had every color: **orange**, **pink**, **purple**, **red**, **white**, and **yellow**. Inside was a **badminton** racket and a **ball**. There was a **baseball** glove and a **basketball**. She also had a **dodge ball** and a **football**. Last, there was a **frisbee**.", "text_zh": "米亞還有一個裝滿運動用品的袋子。裡面有各種顏色：橘色、粉紅色、紫色、紅色、白色和黃色。裡面有一支羽球拍和一顆球。有一副棒球手套和一顆籃球。她也有一顆躲避球和一顆美式足球。最後，還有一個飛盤。"}, {"day": 42, "title_zh": "運動會的項目", "text": "At the sports fair, there was **golf** and a fast **race**. There was also **soccer** and **softball**. Many other **sports** were there too. Some students played **table tennis** or **tennis**. Others played **volleyball**. In the evening, families like to **barbecue** and try **bowling**. \"Let's **camp** in the mountains this weekend,\" said Mia's father. \"We can **climb** a small hill. Then we can **dance** by the fire.\"", "text_zh": "在運動會上，有高爾夫球和一場快速賽跑。也有足球和壘球。還有很多其他運動。有些學生打桌球或網球。其他人打排球。晚上，大家喜歡烤肉和玩保齡球。「這個週末我們去山上露營吧，」米亞的爸爸說。「我們可以爬一座小山。然後我們可以在營火旁跳舞。」"}, {"day": 43, "title_zh": "假日休閒清單", "text": "It was the weekend. Everyone picked a hobby. Grandpa liked to **draw**. Dad liked to **exercise**. He liked to **fish** by the river too. Mom liked to **hike**. She liked to **jog** every morning. Then she had a **picnic**. Mia's brother liked to **roller blade**. He also liked to **roller skate**. Their cousin liked many things. He liked to **run** and **sail**. He liked to **sing** and **skate**. He liked to **ski** in winter.", "text_zh": "週末到了。每個人都選了一個嗜好。爺爺喜歡畫畫。爸爸喜歡運動。他也喜歡在河邊釣魚。媽媽喜歡健行。她每天早上都慢跑。然後她會去野餐。米亞的哥哥喜歡溜直排輪。他也喜歡溜滑輪鞋。他們的表哥喜歡很多東西。他喜歡跑步和航行。他喜歡唱歌和溜冰。他冬天喜歡滑雪。"}, {"day": 44, "title_zh": "興趣的收藏", "text": "Mia collected lots of things. She got a **stamp** from every country she visited. She loved to **surf**. She loved to **swim** too. She loved to **travel**. Every **trip** gave her a new **hobby** story. Her friends liked different things. Some friends had a **band**. Some friends played **card** games. Some friends watched **cartoon**s. Some friends played **chess**. Some friends read **comic**s. Some friends liked a **computer game**. Her little sister just liked to hold her favorite **doll**.", "text_zh": "米亞收集了很多東西。她去過的每個國家都會拿一張郵票。她喜歡衝浪。她也喜歡游泳。她喜歡旅行。每一趟旅行都變成一個新的嗜好故事。她的朋友們喜歡不同的東西。有的朋友組了一個樂團。有的朋友玩紙牌遊戲。有的朋友看卡通。有的朋友下棋。有的朋友看漫畫。有的朋友喜歡電腦遊戲。她的妹妹只喜歡抱著她最愛的娃娃。"}, {"day": 45, "title_zh": "音樂與電影之夜", "text": "That night, the family watched a school **drama**. It had a loud **drum**. It was also a short **film**. Mia's uncle played the **flute** at **game** night. Grandpa played the **guitar**. It was everyone's favorite **instrument**. \"Let's watch a **movie** instead,\" said Mom. She played some soft **music**. Dad read a **novel**. Mia liked to **paint**. She also liked to play the **piano**. She hummed her favorite **pop music**.", "text_zh": "那天晚上，全家人看了一齣校園話劇。裡面有很大聲的鼓聲。它也是一部短片。米亞的叔叔在遊戲之夜吹長笛。爺爺彈吉他。那是大家最喜歡的樂器。「我們來看電影吧，」媽媽說。她播放了一些輕柔的音樂。爸爸讀了一本小說。米亞喜歡畫畫。她也喜歡彈鋼琴。她哼著她最愛的流行音樂。"}, {"day": 46, "title_zh": "遊戲之夜", "text": "They played a **puzzle** game in their **apartment**. They sang a **song** together. \"Let's make two **team**s!\" said Dad. He set up a small **tent** in the living room. It looked like a fort. Mia's brother brought his favorite **toy**. He brought a small **trumpet**. He also brought a toy **violin**. Nobody wanted to **lose**. Nobody wanted to be the **loser**. Everyone wanted to **win**. In the end, everyone felt like a **winner**. Even the family dog became a big **fan** of the game.", "text_zh": "他們在公寓裡玩拼圖遊戲。他們一起唱歌。「我們分成兩隊吧！」爸爸說。他在客廳搭了一個小帳篷。看起來像個堡壘。米亞的哥哥帶了他最愛的玩具。他帶了一支小喇叭。他也帶了一把玩具小提琴。沒有人想輸。沒有人想當輸家。每個人都想贏。最後，每個人都覺得自己是贏家。連家裡的狗都變成了這個遊戲的頭號粉絲。"}, {"day": 47, "title_zh": "從公寓到房子", "text": "The next day, they went to see a new apartment. It was in a tall **building**. \"I still like our own **house** better,\" said Mia. \"**Home** is home.\" The apartment had a small **basement**. It had a clean **bathroom**. It had two **bedroom**s. It had a bright **dining room**. Outside was a wooden **fence**. There was also a **garage**. There was a nice **garden** too. Inside, a long **hall** led to the **kitchen**. It also led to a cozy **living room**.", "text_zh": "隔天，他們去看一間新公寓。它在一棟高樓裡。「我還是比較喜歡我們自己的房子，」米亞說。「家就是家。」這間公寓有一個小地下室。它有一間乾淨的浴室。它有兩間臥室。它有一間明亮的餐廳。外面有一道木頭圍籬。還有一個車庫。也有一座漂亮的花園。裡面，一條長走廊通往廚房。它也通往一間舒適的客廳。"}, {"day": 48, "title_zh": "房子的每個角落", "text": "Every **room** had a **balcony**. From there, you could see the **yard**. The **ceiling** was very high. A heavy **door** led **downstairs**. The **floor** was made of wood. It shone in the light. At the front **gate**, you could see the red **roof**. Some **stairs** led **upstairs**. They passed a white **wall**. They passed a big **window** too.", "text_zh": "每個房間都有一個陽台。從那裡可以看到院子。天花板非常高。一扇厚重的門通往樓下。地板是木頭做的。它在燈光下閃閃發亮。在前面的大門，可以看到紅色的屋頂。一段樓梯通往樓上。它經過一面白牆。它也經過一扇大窗戶。"}, {"day": 49, "title_zh": "挑選家具", "text": "The family looked at **furniture** for the new place. They saw a soft **armchair**. They saw a big **bath**tub. They saw a comfy **bed**. They saw a garden **bench**. They saw a wooden **bookcase**. They saw four **chair**s. They saw a walk-in **closet**. They saw a long **couch**. They saw a flower **curtain**. They saw a study **desk**. They saw a **drawer** for socks. They saw a shiny **faucet** in the kitchen.", "text_zh": "一家人為新家挑選家具。他們看了一張柔軟的扶手椅。他們看了一個大浴缸。他們看了一張舒服的床。他們看了一張花園長椅。他們看了一個木頭書櫃。他們看了四張椅子。他們看了一個走入式衣櫃。他們看了一張長沙發。他們看了一條花窗簾。他們看了一張書桌。他們看了一個放襪子的抽屜。他們看了廚房裡一個閃亮的水龍頭。"}, {"day": 50, "title_zh": "臥室佈置", "text": "In the bedroom, they put in a small **lamp**. It gave good reading **light**. They added a tall **mirror**. They added a wooden **shelf**. They added a kitchen **sink**. They added a comfy **sofa**. They added a round **table**. They added a deep **tub** for baths. On the bed was a warm **blanket**. Next to it was a soft **carpet**. In the closet was a metal **hanger**. On the bed was a fluffy **pillow**. There was also a clean **sheet**.", "text_zh": "在臥室裡，他們放了一盞小檯燈。它能提供不錯的閱讀燈光。他們加了一面高高的鏡子。他們加了一個木頭層架。他們加了一個廚房水槽。他們加了一張舒服的沙發。他們加了一張圓桌。他們加了一個洗澡用的深浴缸。床上有一條溫暖的毯子。旁邊有一塊柔軟的地毯。衣櫃裡有一個金屬衣架。床上有一個蓬鬆的枕頭。還有一條乾淨的床單。"}, {"day": 51, "title_zh": "浴室與電器", "text": "In the bathroom, there was a new **toothbrush**. There was a bar of **soap**. There was a fresh **towel**. The apartment also had an **air conditioner**. It had a small **camera** by the door. It had a fast **computer**. It had a wooden **dresser**. It had a clothes **dryer**. It had a cooling **fan**. It had a bright **flashlight**. It had a **freezer**. It had a warm **heater**. It had a washing **machine**.", "text_zh": "在浴室裡，有一支新牙刷。有一塊肥皂。有一條乾淨的毛巾。這間公寓還有一台冷氣機。門邊有一台小攝影機。有一台快速的電腦。有一個木頭梳妝台。有一台烘衣機。有一台涼風扇。有一支明亮的手電筒。有一台冷凍櫃。有一台暖氣機。還有一台洗衣機。"}, {"day": 52, "title_zh": "廚房電器全開", "text": "In the kitchen, there was a big **oven**. There was an old **radio**. There was a full **refrigerator**. There was a loud **speaker**. There was a hot **stove**. There was a **telephone** on the wall. There was a large **television**. There was a **video** player too. In the office corner was a **printer**. Nearby was a woven **basket**. There was a red **brick**. There was a water **bucket**. There was also a tall **candle**.", "text_zh": "廚房裡有一個大烤箱。有一台舊收音機。有一台裝滿食物的冰箱。有一個大聲的喇叭。有一個熱熱的爐子。牆上有一支電話。有一台大電視。也有一台放影機。辦公室角落有一台印表機。附近有一個編織籃子。有一塊紅磚。有一個水桶。還有一支高高的蠟燭。"}, {"day": 53, "title_zh": "修理工具箱", "text": "Dad opened his toolbox. He had a heavy **hammer** for **housework**. He had a spare **key**. He had a rubber **mat**. He had a sharp **needle**. He had a frying **pan**. He had a ceramic **teapot**. He had a spare **umbrella**. \"We also need a new **toilet**,\" he said. \"We need a **trash can** too. We ne
