ang'e was a **young**, beautiful woman. She worked for the Jade Emperor in Heaven. One day, she made a mistake, and it made him **angry**. He sent her down to live on Earth with ordinary people. Time began to **pass**, and she **became** a lovely young woman again. A kind hunter named Hou Yi fell in love with her.", "One day, something terrible was about to **happen**. Ten suns began to **rise** into the sky at the same time. They burned the land below. Hou Yi used his bow to **shoot** down nine of the suns and saved everyone. That was more than **enough** to make him a hero, so the people made him their king. Soon, he married Chang'e.", "Later, Hou Yi got a magic pill. It could give him great **power** and let him live forever. Before he could take it, Chang'e found it. She worried the power might hurt him, so she decided to take it herself. Hou Yi got angry and chased after her. She had no choice but to **jump** out of a high window. She did not **fall**. Instead, she floated gently up into the sky and flew all the way to the moon. She still lives there today, but she was never **successful** in coming home again.", "She often wondered if her lonely life on the moon would ever **become** happy again. She still dreamed that one day she might see Hou Yi once more."], "text_zh": ["嫦娥曾是一位年輕美麗的女子，在天庭為玉皇大帝工作。有一天，她犯了一個錯，惹得玉帝很生氣，把她送到凡間，和普通人一起生活。時間漸漸過去，她又變成了一位美麗的年輕女子。一位善良的獵人后羿，愛上了她。", "有一天，可怕的事就要發生了。十個太陽同時升上天空，把大地烤得又乾又熱。后羿用弓箭射下了九個太陽，救了大家。這已經足夠讓他成為英雄，百姓便推舉他當國王。不久後，他娶了嫦娥。", "後來，后羿得到一顆神奇的仙丹，它能給他強大的力量，讓他長生不老。還沒等他吃下仙丹，嫦娥就先發現了它。她擔心這股力量會傷害后羿，於是決定自己把仙丹吃掉。后羿生氣地追著她，她別無選擇，只能跳出高高的窗外。她並沒有掉下去，反而輕輕飄上天空，一路飛到了月亮上。她至今仍住在那裡，卻始終沒能成功回到人間。", "她常常想，自己在月亮上孤單的生活，是否有一天會變得幸福。她仍然夢想著，有一天能再見后羿一面。"]}, {"id": 42, "title_en": "The Little Thief in the Pantry", "title_zh": "儲藏室裡的小小偷", "author": null, "words": [{"w": "smile", "pos": "v.", "m": "微笑"}, {"w": "treat", "pos": "v.", "m": "對待"}, {"w": "above", "pos": "prep.", "m": "在……上方"}, {"w": "catch", "pos": "v.", "m": "捉捕"}, {"w": "birthday", "pos": "n.", "m": "生日"}, {"w": "lip", "pos": "n.", "m": "嘴唇"}, {"w": "hurry", "pos": "v.", "m": "趕緊；匆忙"}, {"w": "lead", "pos": "v.", "m": "帶領；領導"}, {"w": "cheese", "pos": "n.", "m": "起司"}, {"w": "straight", "pos": "adv.", "m": "直接地"}, {"w": "cook", "pos": "n.", "m": "廚師"}, {"w": "kill", "pos": "v.", "m": "殺死"}], "reference_words": [{"w": "thief", "pos": "n.", "m": "小偷"}, {"w": "pantry", "pos": "n.", "m": "食品儲藏室"}, {"w": "sneak", "pos": "v.", "m": "偷偷地走；悄悄前往"}, {"w": "shelf", "pos": "n.", "m": "架子"}, {"w": "lick", "pos": "v.", "m": "舔"}, {"w": "click", "pos": "n.", "m": "(門閂起的)喀嗒聲"}], "text": ["One day, a little mouse gave his mother a big **smile** and said, \"The people in this house **treat** us so well! Look at all the food they leave for us in the pantry!\" His mother told him to stay safe. She said he must never go **above** ground alone, because people would try to **catch** him.", "One afternoon, while his mother slept, a curious young mouse named Graywhiskers snuck into the pantry anyway. He found a pretty cake made for someone's **birthday**. He licked his **lip** and could not help taking one small bite. Then he ran home in a **hurry**.", "The next day, Graywhiskers snuck back again. This time, he got trapped inside a little wooden **cheese** box—click! He walked **straight** into trouble. The family **cook** found him and brought him to a young girl named Ethel. She had to decide if she would **kill** him or let him go. But when the cook was not looking, kind Ethel quietly set Graywhiskers free. After that day, the grateful little mouse always listened closely to his mother's warnings.", "Because of that lucky escape, Graywhiskers always tried to **lead** the other young mice away from danger."], "text_zh": ["有一天，一隻小老鼠對媽媽露出一個大大的微笑，說：「這家人對我們真好！你看他們在儲藏室裡留了這麼多食物給我們！」媽媽提醒牠要小心，絕對不能自己跑到地面上去，因為人類一定會想抓住牠。", "有一天下午，趁著媽媽睡著，一隻好奇的小老鼠——名叫灰鬍鬚——還是偷偷溜進了儲藏室。牠發現一個為某人生日準備的漂亮蛋糕。牠舔了舔嘴唇，忍不住咬了一小口，接著匆匆忙忙地跑回家。", "隔天，灰鬍鬚又偷偷溜了進去。這次，牠被困在一個小小的木頭起司盒裡——喀嗒一聲！牠這下直接惹上了大麻煩。家裡的廚師發現了牠，把牠帶到一個叫愛瑟兒的小女孩面前。她得決定要殺了牠，還是放牠走。但趁廚師沒注意的時候，善良的愛瑟兒悄悄放走了灰鬍鬚。從那天起，這隻心懷感激的小老鼠，總是仔細聽媽媽的每一句提醒。", "因為那次幸運的逃脫，灰鬍鬚後來總是努力帶領其他年輕的老鼠們遠離危險。"]}];

 "名詞": {tip:"名詞：可當主詞或受詞，常搭配 a/an、the、this/that 或所有格。",

 "片語": {tip:"片語：整體當作一個詞使用。", patterns:["請把這個片語放進一個完整句子中使用。"]},

function posPattern(pos){ return POS_PATTERNS[pos] || {tip:"請試著用這個字造一個完整的句子。", patterns:["___"]}; }

/* ---------- 學習排程：每週一~六各 13 個新字，週日複習 + 閱讀 ---------- */
const CHUNK = 13;
const VOCAB_DAYS_PER_WEEK = 6;
const TOTAL_WEEKS = 26;

function buildSchedule(){
  const schedule = [];
  let vi = 0;
  let storyCounter = 0; // 0-based index into DAILY_STORIES, increments once per vocab day
  for(let week=1; week<=TOTAL_WEEKS; week++){
    const weekWords = [];
    for(let d=1; d<=VOCAB_DAYS_PER_WEEK; d++){
      let chunk = [];
      let dailyStory = null;
      if(vi < VOCAB.length){
        chunk = VOCAB.slice(vi, vi+CHUNK);
        vi += CHUNK;
        dailyStory = DAILY_STORIES[storyCounter] || null;
        storyCounter++;
      }
      schedule.push({type:'vocab', week, weekday:d, words:chunk, dailyStory, label:`第 ${week} 週．第 ${d} 天`});
      weekWords.push(...chunk);
    }
    const story = STORIES[(week-1) % STORIES.length];
    schedule.push({type:'review', week, weekday:7, words:weekWords, story, label:`第 ${week} 週．複習日`});
  }
  return schedule;
}
const SCHEDULE = buildSchedule();

/* ---------- 小工具 ---------- */
function $(sel, root){ return (root||document).querySelector(sel); }
function $all(sel, root){ return Array.from((root||document).querySelectorAll(sel)); }
function el(tag, attrs, children){
  const e = document.createElement(tag);
  if(attrs) for(const k in attrs){
    if(k==='class') e.className = attrs[k];
    else if(k==='html') e.innerHTML = attrs[k];
    else if(k.startsWith('on') && typeof attrs[k]==='function') e.addEventListener(k.slice(2), attrs[k]);
    else e.setAttribute(k, attrs[k]);
  }
  (children||[]).forEach(c=>{ if(c==null) return; e.appendChild(typeof c==='string'?document.createTextNode(c):c); });
  return e;
}
function shuffle(arr){ const a=arr.slice(); for(let i=a.length-1;i>0;i--){ const j=Math.floor(Math.random()*(i+1)); [a[i],a[j]]=[a[j],a[i]]; } return a; }

// 不然使用者原本如果滾到清單很下面才點進去，畫面會停在原本的捲動位置，還要自己往上拉才看得到標題。

}

function escapeHtml(s){
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}
function escapeAttr(s){
  return String(s).replace(/&/g,'&amp;').replace(/"/g,'&quot;');

/* ---------- 文章：逐字點擊發音 ＋ 選取畫底線 ---------- */
// STATE.underlines[paraKey] = [wordIdx, ...] 記錄這個段落裡哪些「字」被畫了底線（依單字索引，不是字元位置）。
function isUnderlined(paraKey, idx){
  const arr = STATE.underlines[paraKey];
  return !!arr && arr.indexOf(idx) !== -1;
}
// 切換某個段落裡 [startIdx, endIdx] 這段字的底線標記：如果整段都已經畫了底線就取消，否則就補上整段。
function toggleUnderlineRange(paraKey, startIdx, endIdx){
  const cur = STATE.underlines[paraKey] ? STATE.underlines[paraKey].slice() : [];
  const idxs = [];
  for(let i=startIdx;i<=endIdx;i++) idxs.push(i);
  const allAlready = idxs.every(i=> cur.indexOf(i)!==-1);
  let next;
  if(allAlready){
    next = cur.filter(i=> idxs.indexOf(i)===-1);
  } else {
    next = cur.slice();
    idxs.forEach(i=>{ if(next.indexOf(i)===-1) next.push(i); });
  }
  next.sort((a,b)=>a-b);
  if(next.length){ STATE.underlines[paraKey] = next; } else { delete STATE.underlines[paraKey]; }
}
// 把一段文章文字轉成 HTML：每個英文字都包成可點擊發音的元素（**word** 標記只用來去掉星號，
// 不再另外加螢光背景——使用者說會自己用選取畫底線的方式標記，所以這裡統一處理，不特別上色），
// 並疊加使用者用滑鼠選取畫出的底線標記（依 paraKey 這個段落的專屬 key 存取 STATE.underlines）。
function buildParaHtml(text, paraKey){
  // 注意：非文字／非底線收尾的第三組一定要排除 "*"，不然 "**" 標記會被這組先吃掉，
  // 讓後面配對的粗體規則永遠對不到開頭，導致一整段（甚至到下一組 **）被誤判成同一個詞。
  const re = /\*\*([^*]+)\*\*|([A-Za-z']+)|([^A-Za-z'*]+)|(\*)/g;
  let out = '';
  let widx = 0;
  let m;
  while((m = re.exec(text))){
    const w = m[1]!=null ? m[1] : m[2];
    if(w!=null){
      const underlined = isUnderlined(paraKey, widx);
      const weakFlagged = isWeakFlagged('article', paraKey+':'+widx);
      const cls = 'word-click'+(underlined?' underlined':'')+(weakFlagged?' weak-word-flagged':'');
      out += `<span class="${cls}" data-word="${escapeAttr(w)}" data-para="${escapeAttr(paraKey)}" data-widx="${widx}">${escapeHtml(w)}</span>`;
      widx++;
    } else {
      out += escapeHtml(m[3]!=null ? m[3] : m[4]);
    }
  }
  return out;
}
// 在 VOCAB（2000 單字總表）裡找這個字對應的詞性／中文意思（不分大小寫比對）；
// 文章裡有些字本來就不在單字表裡（介係詞、專有名詞等），找不到就回傳空字串，複習測驗時會改用「自我勾選」的方式。
function findVocabMeaning(word){
  const lower = String(word).toLowerCase();
  const hit = VOCAB.find(v=> v.w.toLowerCase()===lower);
  return hit ? {pos:hit.pos, m:hit.m} : {pos:'', m:''};
}

/* ---------- 課外單字（不在 2000 單字表裡、但文章中被標記為不熟的字）---------- */
// 用免費的 MyMemory 翻譯服務查詢單一英文字的中文意思（不需要 API 金鑰，僅供輕量使用）。
// 查詢失敗（沒有網路、服務暫時掛掉等）就丟出錯誤，呼叫端會標記成 status:'error' 讓使用者可以手動重試。
function translateWordApi(word){
  const url = 'https://api.mymemory.translated.net/get?q='+encodeURIComponent(word)+'&langpair=en|zh-TW';
  return fetch(url).then(res=>{
    if(!res.ok) throw new Error('HTTP '+res.status);
    return res.json();
  }).then(data=>{
    const t = data && data.responseData && data.responseData.translatedText;
    if(!t || /INVALID|MYMEMORY WARNING/i.test(String(t))) throw new Error('no translation');
    return String(t).trim();
  });
}
// 把某個字加進「課外單字」清單（如果還沒加過），並非同步查詢中文意思。
// 同一個字（不分大小寫）只會查一次翻譯、只會在課外單字分頁出現一筆，即使在好幾個地方都被標記不熟。
function addExtraWord(word){
  const lower = String(word).toLowerCase();
  let entry = STATE.extraWords[lower];
  if(entry && (entry.status==='ready' || entry.status==='loading')) return entry;
  entry = {w:word, m:'', pos:'', status:'loading', edited:false, addedAt:new Date().toISOString()};
  STATE.extraWords[lower] = entry;
  fetchExtraWordTranslation(lower, word);
  return entry;
}
function fetchExtraWordTranslation(lower, word){
  translateWordApi(word).then(m=>{
    const entry = STATE.extraWords[lower];
    if(!entry) return; // 使用者可能在翻譯查詢完成前就把它刪掉了
    entry.m = m;
    entry.status = 'ready';
    // 同步更新所有引用到這個字的「不熟單字」項目，讓複習測驗可以直接用真的中文意思出選擇題。
    Object.keys(STATE.weakWords).forEach(k=>{
      const w = STATE.weakWords[k];
      if(w.source==='article' && String(w.w).toLowerCase()===lower && !w.m){ w.m = m; }
    });
    scheduleCloudSave();
    render();
  }).catch(()=>{
    const entry = STATE.extraWords[lower];
    if(!entry) return;
    entry.status = 'error';
    render();
  });
}
// 文章裡任何一個字都可以直接標記「不熟」，不再限定只有重點單字／參考單字才能標記。
// key 用「段落key:字的索引」組成，跟畫底線共用同一套 data-para/data-widx 定位方式。
function toggleArticleWeakWord(target){
  const paraKey = target.getAttribute('data-para');
  const widx = target.getAttribute('data-widx');
  const word = target.getAttribute('data-word');
  if(!paraKey || widx==null || !word) return;
  const key = paraKey+':'+widx;
  if(isWeakFlagged('article', key)){
    unflagWeak('article', key);
  } else {
    const meta = findVocabMeaning(word);
    if(meta.m){
      flagWeak('article', key, {w:word, pos:meta.pos, m:meta.m});
    } else {
      // 不在 2000 單字表裡：一邊用「自我勾選」的方式先讓測驗可以用，一邊加進課外單字清單自動查中文意思，
      // 查到之後（見 fetchExtraWordTranslation）這裡的 m 會被自動補上，測驗就會自動升級成真的選擇題。
      flagWeak('article', key, {w:word, pos:'', m:''});
      addExtraWord(word);
    }
  }
  render();
}
// 底線拖曳選字：不依賴瀏覽器自己的 window.getSelection()（實測發現雙擊過一次之後，瀏覽器會把
// 「選字最小單位」記成「整個詞／句子」，緊接著的拖曳選字會被瀏覽器自己誤判成選了一大段，不可靠），
// 改成完全自己追蹤滑鼠位置：mousedown 記下起點是哪個字，mouseup 時看放開時在哪個字上面，
// 兩者之間的字就是要畫底線的範圍，準確且不受瀏覽器內部選字狀態影響。
let wordClickSuppressed = false;
let storyDragStart = null;   // {paraKey, widx, x, y} 記下 mousedown 當時是哪個字
let storyLastHoveredWord = null; // 記下滑鼠拖曳過程中最後經過的 .word-click 元素，讓放開時稍微超出字的範圍也抓得到
function handleStoryMouseDown(e){
  const target = e.target.closest && e.target.closest('.word-click');
  storyDragStart = target ? {
    paraKey: target.getAttribute('data-para'),
    widx: parseInt(target.getAttribute('data-widx'),10),
    x: e.clientX, y: e.clientY
  } : {paraKey:null, widx:NaN, x:e.clientX, y:e.clientY};
  storyLastHoveredWord = target || null;
  // 我們自己用 mousemove/mouseup 追蹤拖曳範圍，不需要瀏覽器原生的文字選取反白；
  // 阻止原生選字可以避免拖曳過程中瀏覽器自己的選字反白造成排版跳動、連帶讓座標對應到錯的字。
  if(target) e.preventDefault();
}
function handleStoryMouseMove(e){
  const target = e.target.closest && e.target.closest('.word-click');
  if(target) storyLastHoveredWord = target;
}
function handleStoryMouseUp(e){
  const start = storyDragStart;
  storyDragStart = null;
  // 保險：清掉瀏覽器拖曳過程中自己產生的原生選字反白，我們自己算範圍，不需要瀏覽器的選字結果。
  const sel = window.getSelection();
  if(sel && !sel.isCollapsed) sel.removeAllRanges();
  if(!start || !start.paraKey) return;
  const moved = Math.abs(e.clientX-start.x)>4 || Math.abs(e.clientY-start.y)>4;
  if(!moved) return; // 沒有真的拖曳，交給 click／dblclick 處理
  const endTarget = (e.target.closest && e.target.closest('.word-click')) || storyLastHoveredWord;
  if(!endTarget) return;
  const endParaKey = endTarget.getAttribute('data-para');
  if(endParaKey !== start.paraKey) return; // 跨段落拖曳不處理，避免混亂
  let startIdx = start.widx;
  let endIdx = parseInt(endTarget.getAttribute('data-widx'),10);
  if(isNaN(startIdx) || isNaN(endIdx)) return;
  if(startIdx>endIdx){ const t=startIdx; startIdx=endIdx; endIdx=t; }
  toggleUnderlineRange(start.paraKey, startIdx, endIdx);
  wordClickSuppressed = true;
  render();
}
// 點一下文章裡的字就唸出這個字；用短暫延遲判斷是不是雙擊，如果是雙擊就交給 handleWordDblClick 處理，不要唸兩次。
// （拖曳選字畫底線之後放開滑鼠也會觸發 click，用 wordClickSuppressed 擋掉，避免誤唸。）
let wordClickTimer = null;
function handleWordClick(e){
  if(wordClickSuppressed){ wordClickSuppressed = false; return; }
  const target = e.target.closest && e.target.closest('.word-click');
  if(!target) return;
  if(wordClickTimer){ clearTimeout(wordClickTimer); wordClickTimer = null; return; }
  wordClickTimer = setTimeout(()=>{
    wordClickTimer = null;
    const word = target.getAttribute('data-word');
    if(word) speakText(word, {}, null);
  }, 260);
}
// 快速點兩下文章裡的某個字：把這個字標記為「不熟」（不限定要不要是重點單字），加進「⭐ 不熟單字複習」清單；
// 已經標記過的字再點兩下就取消標記。
function handleWordDblClick(e){
  const target = e.target.closest && e.target.closest('.word-click');
  if(!target) return;
  if(wordClickTimer){ clearTimeout(wordClickTimer); wordClickTimer = null; }
  const sel = window.getSelection();
  if(sel) sel.removeAllRanges();
  toggleArticleWeakWord(target);
}
function initStoryTextInteractions(){
  document.addEventListener('mousedown', handleStoryMouseDown);
  document.addEventListener('mousemove', handleStoryMouseMove);
  document.addEventListener('mouseup', handleStoryMouseUp);
  document.addEventListener('click', handleWordClick);
  document.addEventListener('dblclick', handleWordDblClick);
}
// Builds a "顯示中文翻譯" toggle button + hidden translation block.
// zhContent can be a single string (daily story) or an array of paragraph strings (classic story).
function buildTranslationToggle(zhContent){

/* ---------- 朗讀（用瀏覽器內建的語音合成，不需要任何 AI 服務或網路連線） ---------- */
const TTS_RATE_KEY = 'vocabAppTtsRate_v1';
const TTS_VOICE_KEY = 'vocabAppTtsVoiceURI_v1';
function getTtsRate(){
  try{ const v = parseFloat(localStorage.getItem(TTS_RATE_KEY)); return isNaN(v) ? 0.85 : v; }catch(e){ return 0.85; }
}
function setTtsRate(r){
  try{ localStorage.setItem(TTS_RATE_KEY, String(r)); }catch(e){}
}
function getTtsVoiceURI(){
  try{ return localStorage.getItem(TTS_VOICE_KEY)||''; }catch(e){ return ''; }
}
function setTtsVoiceURI(uri){
  try{ if(uri) localStorage.setItem(TTS_VOICE_KEY, uri); else localStorage.removeItem(TTS_VOICE_KEY); }catch(e){}
}
function getTtsVoice(){
  try{
    const uri = getTtsVoiceURI();
    if(!uri || !('speechSynthesis' in window)) return null;
    return window.speechSynthesis.getVoices().find(v=>v.voiceURI===uri) || null;
  }catch(e){ return null; }
}

let activeSpeakBtn = null;
function setSpeakBtnPlaying(btn, playing){
  if(!btn) return;
  btn.classList.toggle('playing', playing);
  btn.textContent = playing ? '⏹' : '🔊';
}
function speakText(text, opts, btn){
  opts = opts || {};
  if(!('speechSynthesis' in window)){
    alert('抱歉，這個瀏覽器不支援語音朗讀功能，建議換成 Chrome、Edge 或 Safari 最新版試試看。');
    return;
  }
  try{
    window.speechSynthesis.cancel(); // 先停掉正在念的內容，避免疊在一起
    if(activeSpeakBtn) setSpeakBtnPlaying(activeSpeakBtn, false);
    const utter = new SpeechSynthesisUtterance(text);
    utter.lang = opts.lang || 'en-US';
    utter.rate = getTtsRate();
    const voice = getTtsVoice();
    if(voice) utter.voice = voice;
    const clearActive = ()=>{ setSpeakBtnPlaying(btn, false); if(activeSpeakBtn===btn) activeSpeakBtn=null; };
    utter.onend = clearActive;
    utter.onerror = clearActive;
    activeSpeakBtn = btn;
    setSpeakBtnPlaying(btn, true);
    window.speechSynthesis.speak(utter);
  }catch(e){ setSpeakBtnPlaying(btn, false); }
}
function stopSpeaking(){
  try{ if('speechSynthesis' in window) window.speechSynthesis.cancel(); }catch(e){}
  if(activeSpeakBtn){ setSpeakBtnPlaying(activeSpeakBtn, false); activeSpeakBtn=null; }
}
// 去除 **粗體** 標記與多餘符號，取得純英文朗讀用文字。
function plainTextFor(text){
  return (text||'').replace(/\*\*(.+?)\*\*/g, '$1');
}
// 小小的喇叭按鈕：點一下開始朗讀，朗讀中再點一次（按鈕會變成 ⏹）就停止。
function buildSpeakBtn(text, opts){
  opts = opts || {};
  const btn = el('button',{class:'speak-btn'+(opts.small?' small':''), title:'朗讀（再點一次可停止）'},['🔊']);
  btn.addEventListener('click', (e)=>{
    if(e) e.stopPropagation();
    if(btn.classList.contains('playing')){
      stopSpeaking();
    } else {
      speakText(text, opts, btn);
    }
  });
  return btn;
}
// 填入語音選單（只列出英文語音），並套用之前儲存的選擇。語音清單常常是非同步載入的，
// 所以除了頁面載入時呼叫一次，也要監聽 voiceschanged 事件再填一次。
function populateVoiceSelect(){
  const sel = document.getElementById('ttsVoiceSelect');
  if(!sel || !('speechSynthesis' in window)) return;
  const voices = window.speechSynthesis.getVoices().filter(v=>/^en/i.test(v.lang));
  if(!voices.length) return;
  const current = getTtsVoiceURI();
  sel.innerHTML = '';
  sel.appendChild(el('option',{value:''},['系統預設']));
  voices.forEach(v=>{
    const opt = el('option',{value:v.voiceURI},[v.name+'（'+v.lang+'）']);
    if(v.voiceURI===current) opt.setAttribute('selected','selected');
    sel.appendChild(opt);
  });
}
// 拖動語速滑桿時，稍微停一下（放開拖曳後 400ms）才自動唸一小段測試句，
// 避免拖曳途中每個中間值都唸一次、聲音疊在一起。
let ttsRatePreviewTimer = null;
function initTtsControls(){
  const rateRange = document.getElementById('ttsRateRange');
  const rateValue = document.getElementById('ttsRateValue');
  const rateTestBtn = document.getElementById('ttsRateTestBtn');

    rateRange.addEventListener('input', ()=>{
      const r = parseFloat(rateRange.value)||0.85;
      setTtsRate(r);
      if(rateValue) rateValue.textContent = r.toFixed(2);
      clearTimeout(ttsRatePreviewTimer);
      ttsRatePreviewTimer = setTimeout(()=>{

  }
  if(voiceSel){
    voiceSel.addEventListener('change', ()=>{ setTtsVoiceURI(voiceSel.value); });
  }
  if(stopBtn){
    stopBtn.addEventListener('click', ()=> stopSpeaking());
  }
  if('speechSynthesis' in window){
    populateVoiceSelect();
    window.speechSynthesis.addEventListener('voiceschanged', populateVoiceSelect);
  }
}

/* ---------- 不熟單字標記（跨每日故事／經典故事／世界故事集，統一存進 STATE.weakWords） ---------- */
function weakKey(source, key){ return source+':'+key; }
function isWeakFlagged(source, key){ return !!STATE.weakWords[weakKey(source,key)]; }
function flagWeak(source, key, wordData){
  const k = weakKey(source, key);
  const existing = STATE.weakWords[k];
  STATE.weakWords[k] = {source, w:wordData.w, pos:wordData.pos||'', m:wordData.m, streak: existing ? existing.streak : 0};
}
function unflagWeak(source, key){
  delete STATE.weakWords[weakKey(source, key)];
}
// 小小的星星按鈕：標記／取消標記「不熟」。標記過的字會出現在「每日故事」分頁的「⭐ 不熟單字複習」清單裡。
function buildWeakToggleBtn(source, key, wordData){
  const flagged = isWeakFlagged(source, key);
  return el('button',{class:'weak-btn'+(flagged?' flagged':''), title: flagged?'已標記不熟（點一下取消標記）':'標記為不熟單字，加入複習清單', onclick:(e)=>{
    if(e) e.stopPropagation();
    if(isWeakFlagged(source, key)){ unflagWeak(source, key); }
    else { flagWeak(source, key, wordData); }
    render();
  }},[flagged?'⭐':'☆']);
}

// 是否正在「每日故事」分頁顯示不熟單字的複習測驗（false＝顯示清單卡片）
let weakReviewOpen = false;

// 「每日故事」分頁頂端的卡片：列出目前所有標記為不熟的單字（跨三個分頁），
// 顯示每個字目前的複習進度（連續答對次數／2），並提供「開始複習測驗」按鈕。
function buildWeakWordsReviewCard(){

  card.appendChild(el('h3',{},['⭐ 不熟單字複習']));

    return card;
  }
  card.appendChild(el('p',{class:'muted'},[`目前共標記了 ${entries.length} 個不熟單字，複習測驗連續答對 2 次即可畢業（自動從清單移除）。這裡先不顯示中文意思，進去測驗時再幫你核對答案。`]));

  card.appendChild(el('button',{class:'btn primary', style:'margin-top:10px;', onclick:()=>{ weakReviewOpen=true; render(); scrollToTop(); }},['開始複習測驗 →']));

}

// 不熟單字的複習測驗：單字 → 中文意思的選擇題，最多抽 10 題。
// 答對就讓該字的 streak +1，streak 達到 2 即從 STATE.weakWords 畢業移除；答錯則 streak 歸零。
function buildWeakReviewQuiz(){
  const card = el('div',{class:'card highlight'});
  card.appendChild(el('div',{class:'row space-between'},[
    el('h3',{},['⭐ 不熟單字複習測驗']),
    el('button',{class:'btn small', onclick:()=>{ weakReviewOpen=false; render(); scrollToTop(); }},['← 返回清單']),
  ]));
  const entries = Object.keys(STATE.weakWords).map(k=>({key:k, ...STATE.weakWords[k]}));
  if(entries.length===0){
    card.appendChild(el('p',{class:'muted'},['目前沒有標記任何不熟單字，先去每日故事／經典故事／世界故事集裡標記幾個吧！']));
    return card;
  }
  const quizEntries = shuffle(entries).slice(0, Math.min(10, entries.length));
  const answers = {};
  const form = el('div',{class:'quiz-form'});
  quizEntries.forEach((en, idx)=>{
    const qDiv = el('div',{class:'quiz-q'});
    const optDiv = el('div',{class:'quiz-options'});
    if(en.m){
      // 單字表裡有對應的中文意思：出選擇題，自動判斷對錯。
      let distractors = shuffle(VOCAB.filter(v=> v.m!==en.m && (!en.pos || v.pos===en.pos))).slice(0,3);
      if(distractors.length<3){ distractors = shuffle(VOCAB.filter(v=>v.m!==en.m)).slice(0,3); }
      const options = shuffle([{id:'correct', m:en.m}, ...distractors.map((d,i)=>({id:'d'+i, m:d.m}))]);
      qDiv.appendChild(el('div',{class:'quiz-question'},[`${idx+1}. ${en.w}${en.pos?(' ('+en.pos+')'):''} 是什麼意思？`]));
      options.forEach(o=>{
        const label = el('label',{class:'quiz-opt'});
        const radio = el('input',{type:'radio', name:'wq'+idx});
        radio.addEventListener('change', ()=>{ answers[en.key] = o.id; });
        label.appendChild(radio);
        label.appendChild(document.createTextNode(' '+o.m));
        optDiv.appendChild(label);
      });
    } else {
      // 這個字是直接從文章裡標記的、不在單字表裡，沒有現成的中文意思可以出選擇題，
      // 改成「聽發音＋自己勾選記住了沒」的方式，一樣算進答對／答錯與連續次數。
      const qHeader = el('div',{class:'quiz-question row gap'},[
        document.createTextNode(`${idx+1}. ${en.w}（這個字不在單字表裡，先聽聽看再自己判斷）`),
      ]);
      qHeader.appendChild(buildSpeakBtn(en.w, {small:true}));
      qDiv.appendChild(qHeader);
      [['correct','✅ 我記住這個字的意思了'],['wrong','😵 還是不太熟']].forEach(pair=>{
        const label = el('label',{class:'quiz-opt'});
        const radio = el('input',{type:'radio', name:'wq'+idx});
        radio.addEventListener('change', ()=>{ answers[en.key] = pair[0]; });
        label.appendChild(radio);
        label.appendChild(document.createTextNode(' '+pair[1]));
        optDiv.appendChild(label);
      });
    }
    qDiv.appendChild(optDiv);
    form.appendChild(qDiv);
  });
  card.appendChild(form);
  const resultBox = el('div',{class:'quiz-result'});
  card.appendChild(resultBox);
  card.appendChild(el('button',{class:'btn primary', onclick:()=>{
    let correct=0, graduated=0;
    quizEntries.forEach(en=>{
      const entry = STATE.weakWords[en.key];
      if(!entry) return;
      if(answers[en.key]==='correct'){
        correct++;
        entry.streak = (entry.streak||0)+1;
        if(entry.streak>=2){ delete STATE.weakWords[en.key]; graduated++; }
      } else {
        entry.streak = 0;
      }
    });
    resultBox.innerHTML='';
    resultBox.appendChild(el('p',{class: correct===quizEntries.length?'good':'muted'},[`得分：${correct} / ${quizEntries.length}`]));
    if(graduated>0){
      resultBox.appendChild(el('p',{class:'good'},[`🎓 有 ${graduated} 個單字已經連續答對 2 次，畢業啦！`]));
    }
    scheduleCloudSave();
    showCelebration({
      title: graduated>0 ? '太棒了，又有單字畢業了！' : (correct===quizEntries.length?'全部答對！':'測驗完成！'),
      message: graduated>0 ? `這次有 ${graduated} 個字連續答對 2 次，系統已經幫你畫掉了。` : undefined,
      detail: `這次答對 ${correct} / ${quizEntries.length} 題`
    });
  }},['送出測驗']));
  return card;
}

/* ---------- 課外單字分頁：收集文章裡標記為不熟、但不在 2000 單字表裡的字，並附上（自動查詢的）中文意思 ---------- */
function renderExtraWords(root){
  root.appendChild(el('div',{class:'card'},[
    el('h2',{},['📓 課外單字']),
    el('p',{class:'muted'},['在「每日故事」「經典故事」「世界故事集」的文章裡點兩下標記不熟的字，如果這個字不在 2000 單字表裡，就會自動出現在這裡，並用免費翻譯服務幫你查一個中文意思參考。翻譯不一定 100% 準確，你可以直接在下面修改成更好的說法，改完會自動存檔。']),
  ]));
  const entries = Object.keys(STATE.extraWords)
    .map(lower=>({lower, ...STATE.extraWords[lower]}))
    .sort((a,b)=> (b.addedAt||'').localeCompare(a.addedAt||''));
  const card = el('div',{class:'card'});
  if(entries.length===0){
    card.appendChild(el('p',{class:'muted'},['目前還沒有課外單字。去文章裡雙擊（快速點兩下）你不熟的字試試看吧！']));
    root.appendChild(card);
    return;
  }
  card.appendChild(el('p',{class:'muted small'},[`共 ${entries.length} 個課外單字。`]));
  entries.forEach(en=>{
    const row = el('div',{class:'card', style:'margin-bottom:10px;'});
    const head = el('div',{class:'row gap wrap', style:'align-items:center;'},[
      el('span',{class:'en big'},[en.w]),
    ]);
    head.appendChild(buildSpeakBtn(en.w, {small:true}));
    const delBtn = el('button',{class:'btn small', title:'從課外單字移除'},['🗑 移除']);
    delBtn.addEventListener('click', ()=>{
      delete STATE.extraWords[en.lower];
      scheduleCloudSave();
      render();
    });
    head.appendChild(delBtn);
    row.appendChild(head);
    if(en.status==='loading'){
      row.appendChild(el('p',{class:'muted small'},['🔄 正在自動查詢中文意思…']));
    } else if(en.status==='error'){
      const errWrap = el('p',{class:'bad small'},['⚠️ 自動查詢失敗（可能是網路問題），']);
      const retryBtn = el('button',{class:'btn small', style:'margin-left:6px;'},['點我重試']);
      retryBtn.addEventListener('click', ()=>{
        const entry = STATE.extraWords[en.lower];
        if(entry){ entry.status='loading'; render(); fetchExtraWordTranslation(en.lower, entry.w); }
      });
      errWrap.appendChild(retryBtn);
      row.appendChild(errWrap);
      row.appendChild(el('p',{class:'muted small'},['或是直接在下面自己輸入中文意思：']));
    }
    const meaningInput = el('input',{type:'text', class:'input-text', style:'width:100%;box-sizing:border-box;margin-top:6px;', placeholder:'中文意思（可自己輸入或修改）'});
    meaningInput.value = en.m || '';
    meaningInput.addEventListener('change', ()=>{
      const entry = STATE.extraWords[en.lower];
      if(!entry) return;
      entry.m = meaningInput.value.trim();
      entry.status = 'ready';
      entry.edited = true;
      Object.keys(STATE.weakWords).forEach(k=>{
        const w = STATE.weakWords[k];
        if(w.source==='article' && String(w.w).toLowerCase()===en.lower){ w.m = entry.m; }
      });
      scheduleCloudSave();
    });
    row.appendChild(meaningInput);
    card.appendChild(row);
  });
  root.appendChild(card);
}

/* ---------- 複製到剪貼簿（給「造句練習」用來自己貼去問 AI，本系統不直接呼叫任何 AI API） ---------- */
function copyToClipboard(text, done){
  function fallback(){
    let ok = false;
    try{
      const ta = document.createElement('textarea');
      ta.value = text;
      ta.style.position = 'fixed';
      ta.style.left = '-9999px';
      ta.style.top = '0';
      document.body.appendChild(ta);
      ta.focus(); ta.select();
      ok = document.execCommand('copy');
      document.body.removeChild(ta);
    }catch(e){ ok = false; }
    done(ok);
  }
  if(navigator.clipboard && navigator.clipboard.writeText){
    navigator.clipboard.writeText(text).then(()=>done(true)).catch(fallback);
  } else {
    fallback();
  }
}

// Builds a compact "造句練習" widget for one word: pattern hint + textarea (auto-saved
// into `store[key]`) + a "複製，貼去問 AI" button that copies a ready-to-paste grading
// request to the clipboard, so the user can paste it into any AI chat site themselves.
function buildSentenceWidget(w, store, key, opts){
  opts = opts || {};
  const pat = posPattern(w.pos);
  const card = el('div',{class:'card'});
  const meta = w.pos ? (' ('+w.pos+') '+w.m) : (' － '+w.m);
  const rightBtns = el('div',{class:'row gap', style:'gap:6px;'},[buildSpeakBtn(w.w, {small:true})]);
  if(opts.weakSource){
    rightBtns.appendChild(buildWeakToggleBtn(opts.weakSource, key, {w:w.w, pos:w.pos, m:w.m}));
  }
  card.appendChild(el('div',{class:'row space-between'},[
    el('div',{},[el('span',{class:'en big'},[w.w]), el('span',{class:'muted'},[meta])]),
    rightBtns,
  ]));
  card.appendChild(el('div',{class:'hint'},[pat.tip]));
  if(opts.showPatternList){
    const patList = el('ul',{class:'pattern-list'});
    pat.patterns.forEach(p=> patList.appendChild(el('li',{},[p])));
    card.appendChild(patList);
  }
  const ta = el('textarea',{class:'sentence-input', placeholder:'請用「'+w.w+'」寫一個完整的英文句子...', rows:'2'});
  ta.value = store[key]||'';
  ta.addEventListener('input', ()=>{ store[key]=ta.value; scheduleCloudSave(); });
  card.appendChild(ta);

  const statusMsg = el('p',{class:'muted small', style:'margin:6px 0 0;'},['']);
  const preview = el('div',{class:'ai-box', style:'display:none;'});
  card.appendChild(el('button',{class:'btn small', style:'margin-top:8px', onclick:()=>{
    if(!ta.value.trim()){ alert('請先寫一個句子，才能複製提問內容喔！'); return; }
    const promptText = `請幫我看看這句英文的文法對不對：\n\n單字：${w.w}（${w.pos}，意思：${w.m}）\n句子：「${ta.value.trim()}」\n\n如果有錯，請給我修改後的正確版本，並簡單說明為什麼要這樣改；如果本來就正確，也請給我一個更道地的說法參考。`;
    copyToClipboard(promptText, (ok)=>{
      statusMsg.textContent = ok ? '✅ 已複製！可以貼到 Claude.ai 或其他 AI 聊天視窗詢問。' : '⚠️ 自動複製失敗，請手動選取下方文字複製。';
      statusMsg.className = ok ? 'good small' : 'bad small';
      preview.textContent = promptText;
      preview.style.display = 'block';
    });
  }},['📋 複製，貼去問 AI']));
  card.appendChild(statusMsg);
  card.appendChild(preview);
  return card;
}

/* ---------- 雲端同步（選用：透過 Google Apps Script 網頁應用程式存到 Google 試算表） ---------- */
// 這個系統本身沒有後端，預設進度只存在記憶體裡（重新整理就消失）。
// 使用者可以在「使用說明」頁貼上自己部署的 Apps Script 網頁應用程式網址，
// 之後每次操作系統就會自動（debounce）把整個 STATE 存成 JSON 存進試算表；
// 開啟頁面時也會先嘗試從試算表讀回最新進度。網址本身存在 localStorage（僅存在使用者自己的瀏覽器裡）。
const SHEET_URL_KEY = 'vocabAppSheetUrl_v1';
function getSheetUrl(){
  try{ return (localStorage.getItem(SHEET_URL_KEY)||'').trim(); }catch(e){ return ''; }
}
function setSheetUrl(url){
  try{
    if(url) localStorage.setItem(SHEET_URL_KEY, url);
    else localStorage.removeItem(SHEET_URL_KEY);
  }catch(e){ /* 私密瀏覽模式等情況下 localStorage 可能無法使用，安靜失敗即可 */ }
}

let cloudSyncState = {status:'idle', text:'☁️ 尚未設定雲端同步'};
function setCloudSyncState(status, text){
  cloudSyncState = {status, text};
  const indEl = document.getElementById('cloudSyncIndicator');
  if(indEl){
    indEl.textContent = text;
    indEl.className = 'sync-indicator sync-'+status;
  }
  const guideEl = document.getElementById('cloudSyncGuideStatus');
  if(guideEl){
    guideEl.textContent = text;
    guideEl.className = (status==='error' ? 'bad small' : (status==='success' ? 'good small' : 'muted small'));
  }
}
// 雲端同步網址是存在「這個瀏覽器＋這個網址（origin）」的 localStorage 裡的，不會跟著檔案內容走。
// 如果同一份檔案被放到不同網址（例如先在本機打開測試，後來又上傳到 GitHub Pages），或是換了瀏覽器／裝置，
// 就會變成「尚未設定雲端同步」，因為 localStorage 沒有跟著搬過去。
// 使用說明頁面照之前的要求不放完整設定教學，但還是需要有地方能重新貼網址，所以點一下最上面的同步狀態文字，
// 就會跳出一個小視窗讓你貼上（或更新）Google Apps Script 網頁應用程式網址，貼上後會立刻嘗試連線同步。
// 用自己畫的小視窗（不是 window.prompt()）讓使用者貼上／更新雲端同步網址：
// 有些瀏覽器（尤其學校管理的 Chromebook 之類的環境）會直接封鎖 window.prompt() 這種原生對話框，
// 點了完全沒反應也不會有任何錯誤訊息，換成自己畫的畫面就不會有這個問題。
function showCloudSyncModal(){
  const existing = document.getElementById('cloudSyncModal');
  if(existing) existing.remove();
  const overlay = el('div',{id:'cloudSyncModal', class:'celebrate-overlay'});
  const card = el('div',{class:'celebrate-card', style:'text-align:left;'});
  card.appendChild(el('h2',{style:'text-align:center;margin-top:0;'},['☁️ 雲端同步設定']));
  card.appendChild(el('p',{class:'muted'},['貼上你的 Google Apps Script 網頁應用程式網址（.../exec），就可以在不同瀏覽器／裝置之間同步進度；欄位清空後按「儲存」可以取消同步。']));
  const input = el('input',{type:'text', class:'input-text', style:'width:100%;box-sizing:border-box;margin-bottom:8px;', placeholder:'https://script.google.com/macros/s/xxx/exec'});
  input.value = getSheetUrl();
  card.appendChild(input);
  const statusLine = el('p',{class:'muted small', style:'min-height:18px;'},['']);
  card.appendChild(statusLine);
  const btnRow = el('div',{class:'row gap'});
  const saveBtn = el('button',{class:'btn primary'},['儲存']);
  saveBtn.addEventListener('click', ()=>{
    const trimmed = (input.value||'').trim();
    setSheetUrl(trimmed);
    if(trimmed){
      statusLine.textContent = '正在連線同步…';
      saveBtn.disabled = true;
      loadFromCloud(trimmed).finally(()=>{
        skipNextAutoSave = true;
        render();
        overlay.remove();
      });
    } else {
      setCloudSyncState('idle', '☁️ 尚未設定雲端同步');
      overlay.remove();
    }
  });
  const cancelBtn = el('button',{class:'btn'},['取消']);
  cancelBtn.addEventListener('click', ()=> overlay.remove());
  btnRow.appendChild(saveBtn);
  btnRow.appendChild(cancelBtn);
  card.appendChild(btnRow);

  // 如果目前已經設定好雲端同步網址，額外提供「複製個人同步連結」：把目前這個網址設定成 ?sync= 參數，

  // 不用每次手動貼一次。提醒：這個連結只適合傳給自己，傳給別人會變成大家同步到同一份試算表、互相覆蓋進度。
  const currentUrl = getSheetUrl();
  if(currentUrl){
    const linkWrap = el('div',{style:'margin-top:14px;padding-top:12px;border-top:1px solid var(--line);'});
    linkWrap.appendChild(el('p',{class:'muted small'},['想在自己的其他裝置或瀏覽器（例如用 LINE 傳給自己的手機）打開就自動接上同一份雲端進度嗎？可以複製下面這個「個人同步連結」，只適合傳給自己，傳給別人會變成同步到同一份進度、互相覆蓋。']));
    const copyBtn = el('button',{class:'btn small'},['📋 複製我的個人同步連結']);
    copyBtn.addEventListener('click', ()=>{
      const personalLink = location.origin + location.pathname + '?sync=' + encodeURIComponent(currentUrl);
      copyToClipboard(personalLink, (ok)=>{

  }

  overlay.appendChild(card);
  overlay.addEventListener('click', (e)=>{ if(e.target===overlay) overlay.remove(); });
  document.body.appendChild(overlay);

function initCloudSyncIndicatorClick(){
  const ind = document.getElementById('cloudSyncIndicator');
  if(!ind) return;

  ind.title = '點一下可以設定或更新雲端同步網址';

let cloudSaveTimer = null;
function scheduleCloudSave(){
  const url = getSheetUrl();
  if(!url) return; // 沒設定雲端同步，什麼都不做
  setCloudSyncState('pending', '☁️ 已變更，準備同步…');
  clearTimeout(cloudSaveTimer);
  cloudSaveTimer = setTimeout(()=>{ cloudSaveTimer=null; saveToCloud(url); }, 1500);
}

function saveToCloud(url, opts){
  opts = opts || {};
  setCloudSyncState('saving', '☁️ 同步中…');
  return fetch(url, {
    method:'POST',
    headers:{'Content-Type':'text/plain;charset=utf-8'}, // 避免瀏覽器送出 CORS 預檢請求，Apps Script 才收得到
    body: JSON.stringify(STATE),
    keepalive: !!opts.keepalive
  }).then(res=>{
    if(!res.ok) throw new Error('HTTP '+res.status);
    return res.text();
  }).then(()=>{
    setCloudSyncState('success', '☁️ 已同步雲端資料庫');
  }).catch(()=>{
    setCloudSyncState('error', '⚠️ 同步失敗，請檢查網路連線或網址設定（下次操作會自動重試）');
  });
}

function loadFromCloud(url, opts){
  opts = opts || {};
  const attempt = opts.attempt || 1;
  setCloudSyncState('pending', attempt>1 ? '☁️ 連線不穩，正在重試…' : '☁️ 正在從雲端載入進度…');
  return fetch(url).then(res=>{
    if(!res.ok) throw new Error('HTTP '+res.status);
    return res.text();
  }).then(text=>{
    text = (text||'').trim();
    if(!text){
      setCloudSyncState('idle', '☁️ 雲端試算表目前是空的，將從新進度開始');
      return false;
    }
    let data;
    try{ data = JSON.parse(text); }catch(e){ throw new Error('bad json'); }
    if(data && typeof data==='object' && data.version){
      STATE = Object.assign(DEFAULT_STATE(), data);
      setCloudSyncState('success', '☁️ 已同步雲端資料庫');
      return true;
    }
    setCloudSyncState('idle', '☁️ 雲端試算表目前是空的，將從新進度開始');
    return false;
  }).catch(()=>{
    // 手機網路或 Google 伺服器偶爾會反應較慢／不穩，先自動重試一次，
    // 避免單純的網路小狀況就顯示嚇人的錯誤訊息。
    if(attempt < 3){
      return new Promise(resolve=>{
        setTimeout(()=>{ resolve(loadFromCloud(url, {attempt: attempt+1})); }, 2000);
      });
    }
    setCloudSyncState('error', '⚠️ 暫時無法連線雲端試算表，可能是網路不穩，點這裡可以重新整理網址並重試');
    return false;
  });
}

function buildQuizCard(day){
  const card = el('div',{class:'card'});
  card.appendChild(el('h3',{},['小測驗（單字 → 中文意思）']));
  const words = day.words;
  const quizWords = words.length>10 ? shuffle(words).slice(0,10) : words;
  const form = el('div',{class:'quiz-form'});
  const answers = {};
  quizWords.forEach((w,idx)=>{
    const distractors = shuffle(VOCAB.filter(v=>v.id!==w.id && v.pos===w.pos)).slice(0,3);
    let options = shuffle([w, ...distractors]);
    if(options.length<4){ options = shuffle([w, ...shuffle(VOCAB.filter(v=>v.id!==w.id)).slice(0,3)]); }
    const qDiv = el('div',{class:'quiz-q'});
    qDiv.appendChild(el('div',{class:'quiz-question'},[`${idx+1}. ${w.w} (${w.pos}) 是什麼意思？`]));
    const optDiv = el('div',{class:'quiz-options'});
    options.forEach(o=>{
      const id = 'q'+day.week+'_'+day.weekday+'_'+w.id+'_'+o.id;
      const label = el('label',{class:'quiz-opt'});
      const radio = el('input',{type:'radio', name:'q'+w.id});
      radio.addEventListener('change', ()=>{ answers[w.id]=o.id; });
      label.appendChild(radio);
      label.appendChild(document.createTextNode(' '+o.m));
      optDiv.appendChild(label);
    });
    qDiv.appendChild(optDiv);
    form.appendChild(qDiv);
  });
  card.appendChild(form);
  const resultBox = el('div',{class:'quiz-result'});
  card.appendChild(resultBox);
  card.appendChild(el('button',{class:'btn primary', onclick:()=>{
    let correct=0;
    quizWords.forEach(w=>{ if(answers[w.id]===w.id) correct++; });
    resultBox.innerHTML='';
    resultBox.appendChild(el('p',{class: correct===quizWords.length?'good':'muted'},[`得分：${correct} / ${quizWords.length}`]));
    const key = STATE.currentDay;
    const prev = STATE.quizBest[key];
    if(!prev || correct>prev.score){ STATE.quizBest[key] = {score:correct, total:quizWords.length}; }
    quizWords.forEach(w=>{ if(answers[w.id]===w.id){ STATE.wordStatus[w.id] = Math.max(STATE.wordStatus[w.id]||0, 2);} });
    showCelebration({
      title: correct===quizWords.length ? '滿分！太厲害了！' : '測驗完成！',
      message: correct===quizWords.length ? '全部答對，這些單字你已經很熟悉了！' : undefined,
      detail: `這次答對 ${correct} / ${quizWords.length} 題`
    });
  }},['送出測驗']));
  return card;
}

  writeCard.appendChild(el('h3',{},['✍️ 延伸造句']));
  writeCard.appendChild(el('p',{class:'hint'},[s.writingPrompt]));
  const ta = el('textarea',{class:'sentence-input', rows:'3', placeholder:'寫下你的句子...'});
  const prog0 = STATE.storyProgress[s.id]||{};
  ta.value = prog0.writing||'';
  ta.addEventListener('input', ()=>{ const p=STATE.storyProgress[s.id]||{}; p.writing=ta.value; STATE.storyProgress[s.id]=p; scheduleCloudSave(); });

  root.appendChild(writeCard);
}

/* ---------- Storybook vocab（另一本《國中生必讀世界經典英文故事集》42 篇故事的重點單字表） ---------- */
let storybookOpenId = null;
let sbFlashIndex = 0;
let sbFlashFlipped = false;

function renderStorybook(root){
  if(storybookOpenId==null){
    root.appendChild(el('div',{class:'card'},[
      el('h2',{},['📗 世界故事集']),
      el('p',{class:'muted'},['這裡是另一套延伸閱讀：取材自你另一本《國中生必讀世界經典英文故事集》全書 42 篇故事的主題與重點單字，改寫成適合國中程度的原創短篇故事＋中文翻譯，並整理出對應的單字表（單字、詞性、中文意思）。這裡的故事內文和翻譯都是重新原創撰寫，並非原書的文字或翻譯；如果想看原書的完整內容、課本練習題與官方翻譯，還是要翻閱你自己的書。']),
      el('p',{class:'muted'},['這是「新」的學習選項，和原本的「每日故事」「經典故事」是各自獨立、並存的內容，不會互相取代或影響彼此的進度。'])
    ]));
    root.appendChild(weakReviewOpen ? buildWeakReviewQuiz() : buildWeakWordsReviewCard());
    const grid = el('div',{class:'grid'});
    STORYBOOK.forEach(s=>{
      const prog = STATE.storybookProgress[s.id]||{};
      const card = el('div',{class:'card story-card'});
      card.appendChild(el('h3',{},['Story '+s.id+'　'+s.title_en]));
      card.appendChild(el('p',{class:'muted'},[s.title_zh + (s.author? '　｜　'+s.author : '')]));
      card.appendChild(el('p',{class:'muted'},['重點單字 '+s.words.length+' 個'+((s.reference_words&&s.reference_words.length)? '　＋參考單字 '+s.reference_words.length+' 個':'')+(prog.read?'　✅ 已複習':'')]));
      card.appendChild(el('button',{class:'btn', onclick:()=>{storybookOpenId=s.id; sbFlashIndex=0; sbFlashFlipped=false; render(); scrollToTop();}},['查看故事 →']));
      grid.appendChild(card);
    });
    root.appendChild(grid);
    return;
  }

  const s = STORYBOOK.find(x=>x.id===storybookOpenId);
  root.appendChild(el('button',{class:'btn small', onclick:()=>{storybookOpenId=null; render(); scrollToTop();}},['← 回故事列表']));

  const header = el('div',{class:'card'});
  header.appendChild(el('h2',{},['Story '+s.id+'　'+s.title_en]));
  header.appendChild(el('p',{class:'muted'},[s.title_zh + (s.author? '　｜　'+s.author : '')]));
  header.appendChild(el('p',{class:'hint'},['✍️ 這篇是我們依照這篇故事的主題與重點單字改寫的原創簡化版故事，方便你直接在這裡閱讀＋對照中文翻譯；如果想看原書完整的內文、練習題與官方翻譯，請翻閱你自己的書。']));
  root.appendChild(header);

  if(s.text && s.text.length){
    const storyCard = el('div',{class:'card highlight'});
    storyCard.appendChild(el('div',{class:'row space-between'},[
      el('h3',{},['📖 故事']),
      buildSpeakBtn(plainTextFor(s.text.join(' '))),
    ]));
    storyCard.appendChild(el('p',{class:'muted small'},['文章裡每個字都可以單獨點一下發音；選取一段文字可以畫底線標記重點，再選一次取消；快速點兩下某個字可以直接標記「不熟」，再點兩下取消。']));
    s.text.forEach((p, idx)=>{
      const pEl = el('p',{class:'story-p'});
      pEl.innerHTML = buildParaHtml(p, 'storybook:'+s.id+':'+idx);
      storyCard.appendChild(pEl);
    });
    if(s.text_zh){
      storyCard.appendChild(buildTranslationToggle(s.text_zh));
    }
    root.appendChild(storyCard);
  }

  if(s.words.length){
    sbFlashIndex = Math.min(sbFlashIndex, s.words.length-1);
    const card = el('div',{class:'card center'});
    card.appendChild(el('h3',{},['單字卡　'+(sbFlashIndex+1)+' / '+s.words.length]));
    const w = s.words[sbFlashIndex];
    const flash = el('div',{class:'flashcard'+(sbFlashFlipped?' flipped':'')});
    flash.appendChild(el('div',{class:'flash-front'},[el('div',{class:'fw'},[w.w]), el('div',{class:'fpos'},[w.pos]), buildSpeakBtn(w.w)]));
    flash.appendChild(el('div',{class:'flash-back'},[el('div',{class:'fm'},[w.m])]));
    flash.addEventListener('click', ()=>{ sbFlashFlipped=!sbFlashFlipped; render(); });
    card.appendChild(flash);
    card.appendChild(el('div',{class:'row gap center'},[
      el('button',{class:'btn small', onclick:(e)=>{e.stopPropagation(); sbFlashIndex=(sbFlashIndex-1+s.words.length)%s.words.length; sbFlashFlipped=false; render();}},['◀ 上一個']),
      el('button',{class:'btn small', onclick:(e)=>{e.stopPropagation(); sbFlashIndex=(sbFlashIndex+1)%s.words.length; sbFlashFlipped=false; render();}},['下一個 ▶']),
    ]));
    root.appendChild(card);
  }

  const listCard = el('div',{class:'card'});
  listCard.appendChild(el('h3',{},['📌 重點單字']));
  const table = el('table',{class:'vocab-table'});
  table.appendChild(el('tr',{},[el('th',{},['英文']), el('th',{},['詞性']), el('th',{},['中文意思']), el('th',{},['朗讀']), el('th',{},['不熟'])]));
  s.words.forEach((w, idx)=>{
    table.appendChild(el('tr',{},[
      el('td',{class:'en'},[w.w]), el('td',{},[w.pos]), el('td',{},[w.m]),
      el('td',{},[buildSpeakBtn(w.w, {small:true})]),
      el('td',{},[buildWeakToggleBtn('storybook', s.id+'_'+idx, {w:w.w, pos:w.pos, m:w.m})])
    ]));
  });
  listCard.appendChild(table);
  root.appendChild(listCard);

  root.appendChild(buildStorybookSentenceCard(s));

  if(s.reference_words && s.reference_words.length){
    const refCard = el('div',{class:'card'});
    refCard.appendChild(el('h3',{},['🔖 參考單字']));
    refCard.appendChild(el('p',{class:'muted'},['書中額外補充的詞彙，非本課要求熟記的重點單字。']));
    const rGrid = el('div',{class:'vocab-tags'});
    s.reference_words.forEach((w, idx)=> rGrid.appendChild(el('span',{class:'tag'},[
      w.w+' － '+w.m+' ',
      buildSpeakBtn(w.w, {small:true}),
      buildWeakToggleBtn('storybookRef', s.id+'_ref_'+idx, {w:w.w, pos:w.pos, m:w.m})
    ])));
    refCard.appendChild(rGrid);
    root.appendChild(refCard);

    const refSentenceWrap = el('div',{class:'card'});
    refSentenceWrap.appendChild(el('h3',{},['✍️ 參考單字造句練習']));
    refSentenceWrap.appendChild(el('p',{class:'muted'},['參考單字也可以練習造句，寫完一樣可以複製提問文字，貼去問 AI。']));
    root.appendChild(refSentenceWrap);
    s.reference_words.forEach((w, idx)=>{
      const key = s.id+'_ref_'+idx;
      root.appendChild(buildSentenceWidget(w, STATE.storybookRefSentences, key, {weakSource:'storybookRef'}));
    });
  }

  const doneCard = el('div',{class:'card center'});
  const isDone = !!(STATE.storybookProgress[s.id]||{}).read;
  doneCard.appendChild(el('button',{class: isDone?'btn ok':'btn primary', onclick:()=>{
    const p = STATE.storybookProgress[s.id]||{};
    const wasDone = !!p.read;
    p.read = !p.read;
    STATE.storybookProgress[s.id] = p;
    if(!wasDone && p.read){
      showCelebration({title:'複習完成！', detail:'Story '+s.id+'　'+s.title_zh});
    }
    render();
  }},[isDone? '✅ 已標記複習完成（點我取消）':'標記這篇單字已複習完成']));
  root.appendChild(doneCard);
}

// Builds a "造句練習" card for a storybook story: one compact widget per core word,
// with a sentence pattern hint, textarea, and a "複製，貼去問 AI" button.
function buildStorybookSentenceCard(s){
  const wrap = el('div',{class:'card'});
  wrap.appendChild(el('h3',{},['✍️ 造句練習']));
  wrap.appendChild(el('p',{class:'muted'},['挑幾個這篇故事的重點單字，練習自己寫一句完整的英文句子；寫完可以複製提問文字，貼去問 AI。']));
  s.words.forEach((w, idx)=>{
    const key = s.id+'_'+idx;
    wrap.appendChild(buildSentenceWidget(w, STATE.storybookSentences, key, {weakSource:'storybook'}));
  });
  return wrap;
}

// （例如用 LINE 傳給自己的手機），讓進度不用每次手動重新設定就能自動接上同一份雲端試算表。
// 注意：這個網址參數只是「自動幫你填好雲端同步設定」，不是把進度存在網址裡——如果把這個連結
// 分享給別人，對方也會連到同一份雲端試算表，兩個人的進度會互相覆蓋，所以只適合傳給自己用。
function seedSheetUrlFromQueryIfPresent(){
  try{
    const params = new URLSearchParams(location.search);
    const fromQuery = (params.get('sync')||'').trim();
    if(fromQuery) setSheetUrl(fromQuery);
  }catch(e){ /* 忽略網址參數解析失敗，不影響原本已存的雲端同步設定 */ }
}

/* ---------- Init ---------- */
function startApp(){
  initTtsControls();
  initStoryTextInteractions();
  initCloudSyncIndicatorClick();
  seedSheetUrlFromQueryIfPresent();
  window.addEventListener('hashchange', ()=>{ render(); scrollToTop(); });
  // 每次「打開」這個網頁（重新整理、從書籤／主畫面圖示開啟等）都固定先顯示世界故事集，
  // 不要沿用瀏覽器網址列殘留的上次分頁 hash（例如上次逛到「每日故事」，網址列殘留 #vocab，
  // 下次直接用書籤打開就會變成優先顯示每日故事，不是使用者要的「打開後預設看到世界故事集」）。
  // 注意：這裡故意用 history.replaceState 而不是直接改 location.hash——直接改 location.hash
  // 會立刻觸發一次 hashchange → render()，如果這時候雲端進度都還沒載入完成，那次 render() 用的
  // 會是空的預設進度，還會被 scheduleCloudSave() 排入 1.5 秒後自動存檔；萬一雲端試算表（Google
  // Apps Script）剛好慢啟動、要 1.5 秒以上才讀回真實進度，這個空進度就可能搶先蓋掉雲端已存的資料，
  // 造成「雲端同步失效、進度被清空」的問題。用 replaceState 只改網址列文字，不會觸發任何 render。
  try{ history.replaceState(null, '', location.pathname + location.search + '#storybook'); }
  catch(e){ location.hash = '#storybook'; }
  window.addEventListener('beforeunload', ()=>{
    const url = getSheetUrl();
    if(url && cloudSaveTimer){
      clearTimeout(cloudSaveTimer);
      cloudSaveTimer = null;
      saveToCloud(url, {keepalive:true});
    }
  });
  const url = getSheetUrl();
  if(url){
    loadFromCloud(url).finally(()=>{ skipNextAutoSave = true; render(); });
  } else {
    render();
  }
}

/* ---------- 開啟密碼 ---------- */
// 簡單的用戶端密碼鎖：只是避免公開網址被隨意打開，不是真正的帳號安全機制。
const APP_PASSWORD = '0813';
const UNLOCK_KEY = 'vocabAppUnlocked_v1';
function initLock(){
  const lockScreen = document.getElementById('lockScreen');
  const appRoot = document.getElementById('appRoot');
  function showApp(){
    if(lockScreen) lockScreen.style.display = 'none';
    if(appRoot) appRoot.style.display = '';
    startApp();
  }
  let unlocked = false;
  try{ unlocked = sessionStorage.getItem(UNLOCK_KEY) === '1'; }catch(e){}
  if(unlocked){ showApp(); return; }

  const input = document.getElementById('lockPasswordInput');
  const btn = document.getElementById('lockSubmitBtn');
  const err = document.getElementById('lockError');
  function tryUnlock(){
    if((input.value||'') === APP_PASSWORD){
      try{ sessionStorage.setItem(UNLOCK_KEY, '1'); }catch(e){}
      showApp();
    } else {
      if(err) err.style.display = 'block';
      if(input){ input.value=''; input.focus(); }
    }
  }
  if(btn) btn.addEventListener('click', tryUnlock);
  if(input){
    input.addEventListener('keydown', (e)=>{ if(e.key==='Enter') tryUnlock(); });
    input.focus();
  }
}
document.addEventListener('DOMContentLoaded', initLock);
})();
