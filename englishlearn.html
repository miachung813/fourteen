, "m": "森林"}, {"w": "soon", "pos": "adv.", "m": "很快地；不久地"}, {"w": "beautiful", "pos": "adj.", "m": "美麗的；漂亮的"}, {"w": "marry", "pos": "v.", "m": "結婚；嫁娶"}, {"w": "wife", "pos": "n.", "m": "妻子"}, {"w": "path", "pos": "n.", "m": "路徑；小路"}, {"w": "white", "pos": "adj.", "m": "白色的"}, {"w": "return", "pos": "v.", "m": "返回"}, {"w": "nothing", "pos": "pron.", "m": "沒有東西"}, {"w": "glad", "pos": "adj.", "m": "高興的；愉快的"}], "reference_words": [{"w": "middle-aged", "pos": "adj.", "m": "中年的"}, {"w": "heaven", "pos": "n.", "m": "天堂"}, {"w": "clearing", "pos": "n.", "m": "（森林中的）空地"}, {"w": "journey", "pos": "n.", "m": "旅程"}], "text": ["**Once** upon a time, a happy **child** set out walking down a long **path** through a green **forest**, meeting all kinds of friendly companions along the way. **Soon** he grew into a boy, still walking, still curious about everything he saw.", "The path led him through his whole life. He became a young man and fell in love with a **beautiful** young woman; they decided to **marry** and continued walking hand in hand, she now his **wife**. Later, children of their own joined them on the path, dressed sometimes in **white**, laughing as they walked together as a family.", "As the traveler grew old, his steps grew slower, but he was never afraid, because kind companions always walked beside him. When at last the path came to its end and it was time to **return** to where he began, he felt he had lost **nothing** at all — only gained a lifetime of memories — and he was quietly **glad** for every step of the journey."], "text_zh": ["**從前**，有一個快樂的**孩子**，沿著一條穿過綠色**森林**的長**路**往前走，一路上遇見了各式各樣友善的旅伴。**很快**地，他長成了一個男孩，仍然繼續走著，對眼前所見的一切都充滿好奇。", "這條路帶著他走過了他的一生。他長成了一個年輕人，愛上了一位**美麗**的年輕女子；他們決定**結婚**，然後手牽著手繼續往前走，她如今成了他的**妻子**。後來，他們自己的孩子也加入了這條路，有時穿著**白色**的衣裳，一家人一起笑著走著。", "隨著這位旅人漸漸老去，他的腳步變慢了，但他從不害怕，因為總有和善的旅伴陪在他身邊。當這條路終於走到盡頭，該是**回到**起點的時候，他覺得自己什麼也**沒有**失去——只得到了滿滿一生的回憶——他安靜地為這趟旅程的每一步感到**欣慰**。"]}, {"id": 11, "title_en": "What Stumped the Blue Jays", "title_zh": "冠藍鴉的難題", "author": "Mark Twain（馬克．吐溫）", "words": [{"w": "roof", "pos": "n.", "m": "屋頂"}, {"w": "floor", "pos": "n.", "m": "地板"}, {"w": "store", "pos": "v.", "m": "貯存；存放"}, {"w": "hole", "pos": "n.", "m": "洞"}, {"w": "another", "pos": "adj.", "m": "另一個"}, {"w": "still", "pos": "adv.", "m": "仍然；依舊"}, {"w": "black", "pos": "n.", "m": "黑暗；黑色"}, {"w": "gather", "pos": "v.", "m": "採集；摘取"}, {"w": "curious", "pos": "adj.", "m": "好奇的"}, {"w": "front", "pos": "adj.", "m": "前面的"}, {"w": "pile", "pos": "n.", "m": "堆"}, {"w": "guy", "pos": "n.", "m": "傢伙；人"}], "reference_words": [{"w": "acorn", "pos": "n.", "m": "橡子"}, {"w": "entire", "pos": "adj.", "m": "全部的；整個"}], "text": ["Near an old, empty house, some blue jays discovered a small **hole** in the **roof** where you could look right down through an empty **floor** and see all the way to the ground below. One jay decided this hole must be a **store** room, and he began dropping acorns into it, one by **one**.", "He worked all day, dropping in **another** and **another** acorn, but the hole never seemed to fill up **still**. Confused, he flew off to call his friends. Soon a whole **black**-feathered crowd had **gathered** around the roof, all of them **curious** about this strange hole that would not fill.", "They took turns at the **front** of the line, each dropping acorns down and shaking their heads. Finally, an old owl looked through a window and explained with a laugh: the hole led straight through the whole empty house! There was no floor at all inside. Realizing they had wasted a whole **pile** of acorns for nothing, the jays flew off laughing at themselves, calling each other silly old **guys**."], "text_zh": ["在一間老舊的空屋附近，幾隻藍樫鳥發現**屋頂**上有一個小**洞**，從那裡望下去可以直接穿過一層空蕩蕩的**地板**，一路看到下面的地面。一隻樫鳥認定這個洞一定是個**儲藏**室，於是牠開始把橡實一顆接**一**顆地丟進洞裡。", "牠忙了一整天，一顆接**一顆**丟進**另**一顆橡實，但那個洞看起來**始終**沒有被填滿。牠感到很困惑，便飛去找朋友來幫忙。很快地，一整群長著**黑**色羽毛的同伴聚集到屋頂上，大家都對這個怎麼填都填不滿的怪洞感到**好奇**。", "牠們輪流站到隊伍**最前面**，一隻接一隻把橡實丟下去，然後搖搖頭。最後，一隻老貓頭鷹從窗戶望進去，笑著解釋道：這個洞根本直通整棟空屋！裡面其實完全沒有地板。樫鳥們發現自己白白浪費了一大**堆**橡實，全都笑著飛走了，還互相嘲笑對方是傻**傢伙**。"]}, {"id": 12, "title_en": "The Man in the Moon", "title_zh": "月球人", "author": "American folklore（美國民間傳說）", "words": [{"w": "lonely", "pos": "adj.", "m": "孤單的；寂寞的"}, {"w": "jealous", "pos": "adj.", "m": "嫉妒的"}, {"w": "rise", "pos": "v.", "m": "升起"}, {"w": "slide", "pos": "v.", "m": "滑動；滑行"}, {"w": "dizzy", "pos": "adj.", "m": "暈眩的"}, {"w": "bowl", "pos": "n.", "m": "碗"}, {"w": "bite", "pos": "n.", "m": "一口的量"}, {"w": "tongue", "pos": "n.", "m": "舌頭"}, {"w": "police officer", "pos": "n.", "m": "警官"}, {"w": "honest", "pos": "adj.", "m": "誠實的"}, {"w": "balloon", "pos": "n.", "m": "氣球"}, {"w": "offer", "pos": "v.", "m": "提供；給予"}], "reference_words": [{"w": "heaven", "pos": "n.", "m": "天堂"}, {"w": "moonbeam", "pos": "n.", "m": "月光"}, {"w": "porridge", "pos": "n.", "m": "粥"}, {"w": "astronomer", "pos": "n.", "m": "天文學家"}, {"w": "recognize", "pos": "v.", "m": "認出；識別"}], "text": ["Long ago, a **lonely** old man lived all by himself on the moon. Every night he looked down at Earth and felt a little **jealous**, watching children laugh and play together while he had no one to talk to.", "One evening, feeling brave, the man let himself **slide** all the way down a moonbeam to Earth. He landed feeling terribly **dizzy** and hungry, so he sat down at once and grabbed a **bowl** of hot porridge. He took such a big **bite** so quickly that he burned his **tongue** and had to fan his mouth.", "A kind, **honest** **police officer** walking by saw the strange visitor and **offered** to help him find his way home. He even gave the man a bright red **balloon** to hold so he would not feel so alone on the walk back. The man floated home holding the balloon, and from that night on, whenever children look up and see his kind, round face in the sky, they know the man in the moon is never really lonely again.", "Every night since, he watches the sun **rise** and set from his home in the sky."], "text_zh": ["很久很久以前，一位**孤單**的老人獨自住在月亮上。每天晚上，他俯瞰著地球，心裡總是有點**嫉妒**，看著孩子們一起歡笑玩耍，自己卻沒有人可以說話。", "有一天晚上，他鼓起勇氣，順著一道月光一路**滑**下地球。降落時他覺得**頭暈**又飢餓，於是立刻坐下來，端起一**碗**熱粥。他一口**咬**得太急太大口，燙到了自己的**舌頭**，只好搧著嘴散熱。", "一位**誠實**善良的**警察**路過，看見這位奇怪的訪客，主動提議幫他找路回家。他還送了老人一顆鮮紅色的**氣球**拿在手上，讓他在回家的路上不那麼孤單。老人抱著氣球飄回了家，從那天晚上起，每當孩子們抬頭看見天上那張圓潤和善的臉，就知道月亮上的老人再也不孤單了。", "從那之後，他每晚都在天上的家裡看著太陽**升起**又落下。"]}, {"id": 13, "title_en": "The Happy Family", "title_zh": "快樂家庭", "author": "Hans Christian Andersen（安徒生）", "words": [{"w": "feed", "pos": "v.", "m": "餵食"}, {"w": "snail", "pos": "n.", "m": "蝸牛"}, {"w": "silver", "pos": "adj.", "m": "銀（製）的"}, {"w": "dish", "pos": "n.", "m": "盤子"}, {"w": "nearby", "pos": "adv.", "m": "附近"}, {"w": "couple", "pos": "n.", "m": "夫妻；情侶"}, {"w": "rush", "pos": "v.", "m": "急忙；匆忙"}, {"w": "hill", "pos": "n.", "m": "土丘；小山坡"}, {"w": "fly", "pos": "n.", "m": "蒼蠅"}, {"w": "wedding", "pos": "n.", "m": "婚禮"}, {"w": "pair", "pos": "n.", "m": "一對（伴侶）"}, {"w": "rule", "pos": "v.", "m": "統治；治理"}], "reference_words": [{"w": "duke", "pos": "n.", "m": "公爵"}, {"w": "honor", "pos": "n.", "m": "榮譽"}, {"w": "slug", "pos": "n.", "m": "蛞蝓"}], "text": ["Under a large burdock leaf lived a family of **snails**. Every morning, a kind old woman came out to **feed** the plants nearby, and the snail family believed she did it only for them, since they were, in their own eyes, the most important family in the world.", "\"The whole garden was made just for us,\" the father snail said proudly, sitting **nearby** his little ones on a shiny **silver** leaf. Once, a **couple** of storks flew low and landed close by, and the young snails watched, hoping to see something exciting happen on the **hill** behind their leaf.", "The storks did not stay long — they had to **fly** off to attend a grand **wedding** in a faraway pond, where hundreds of animals had gathered in **pairs**. The snail parents, unbothered, simply repeated their family **rule** once again: as long as they had each other and their leaf, they needed nothing else, and they were, without question, the happiest family of all.", "No one in the family ever needed to **rush**, since every leaf and every little **dish** of morning dew was already exactly enough for them."], "text_zh": ["在一片牛蒡大葉子底下，住著一家**蝸牛**。每天早上，一位善良的老婦人都會出來**餵養**附近的植物，蝸牛一家便認定她這麼做全是為了牠們，因為在牠們自己眼中，牠們是全世界最重要的家庭。", "「整座花園根本就是為我們而造的，」蝸牛爸爸驕傲地說，牠正和孩子們一起坐在**附近**一片閃亮的**銀色**葉子上。有一次，一**對**鸛鳥低空飛過，降落在不遠處，年幼的蝸牛們看著，期待著葉子後方那座**小山**上會發生什麼有趣的事。", "鸛鳥並沒有停留太久——牠們得**飛**去參加一場盛大的**婚禮**，地點在遙遠的一座池塘，上百隻動物成**雙成對**聚集在那裡。蝸牛父母毫不在意，只是又重複了一次牠們家的**規矩**：只要牠們彼此相伴、擁有這片葉子，就什麼都不需要了，牠們無疑是全世界最幸福的一家。", "這家人從來不需要**匆忙**趕路，因為每一片葉子、每一**份**清晨的露水，對他們來說早就已經足夠了。"]}, {"id": 14, "title_en": "The Old Woman Who Lived in a Shoe", "title_zh": "鞋子裡的老太太", "author": "Nursery rhyme（童謠）", "words": [{"w": "husband", "pos": "n.", "m": "丈夫"}, {"w": "spot", "pos": "v.", "m": "看見；瞥見"}, {"w": "huge", "pos": "adj.", "m": "巨大的"}, {"w": "suggest", "pos": "v.", "m": "建議"}, {"w": "magic", "pos": "n.", "m": "魔法"}, {"w": "painful", "pos": "adj.", "m": "痛苦的"}, {"w": "bow", "pos": "n.", "m": "弓"}, {"w": "victory", "pos": "n.", "m": "勝利"}], "reference_words": [{"w": "smash", "pos": "v.", "m": "擊毀；打碎"}, {"w": "witch", "pos": "n.", "m": "女巫"}, {"w": "powerful", "pos": "adj.", "m": "強大的"}, {"w": "arrow", "pos": "n.", "m": "箭"}], "text": ["There once was an old woman who lived with her **husband** and all their children inside a **huge** old shoe. It stood in a **spot** at the edge of the village, and every day it grew noisier and more crowded.", "One day, when a monster began to trouble the village, everyone was worried. The old woman's husband **suggested** that they ask the young village archer for help. \"He knows a bit of **magic** with his bow,\" he said, \"maybe he can save us.\"", "The **painful** truth was that the monster was very strong, but the archer's arrows were guided by an old **magic** spell, and with steady hands he raised his **bow** and shot true. The whole village celebrated his **victory**, and the old woman finally had one quiet, peaceful night in her big shoe with all her children safe beside her."], "text_zh": ["從前有位老婦人，和她的**丈夫**與所有孩子一起住在一隻巨大的舊鞋子裡。這隻鞋子座落在村莊邊緣的一個**角落**，而且一天比一天更吵鬧、更擁擠。", "有一天，一隻怪物開始騷擾村莊，大家都很擔心。老婦人的**丈夫建議**大家去請村裡的年輕弓箭手幫忙。「他會一點**魔法**弓術，」他說，「說不定他能救大家。」", "**痛苦**的事實是，那隻怪物非常強大，但弓箭手的箭矢受到一道古老**魔法**咒語的指引，他穩住雙手，拉起**弓**，一箭命中。全村都為他的**勝利**歡呼慶祝，老婦人終於在她的大鞋子裡度過了一個安穩平靜的夜晚，所有孩子都平安地陪在她身邊。"]}, {"id": 15, "title_en": "The Adventures of Aladdin", "title_zh": "阿拉丁歷險記", "author": "One Thousand and One Nights（一千零一夜）", "words": [{"w": "adventure", "pos": "n.", "m": "歷險；冒險"}, {"w": "stranger", "pos": "n.", "m": "陌生人"}, {"w": "cover", "pos": "n.", "m": "遮蓋物"}, {"w": "lamp", "pos": "n.", "m": "（油）燈"}, {"w": "rub", "pos": "v.", "m": "摩擦；揉搓"}, {"w": "command", "pos": "n.", "m": "命令"}, {"w": "princess", "pos": "n.", "m": "公主"}, {"w": "diamond", "pos": "n.", "m": "鑽石"}, {"w": "instant", "pos": "n.", "m": "一剎那"}, {"w": "action", "pos": "n.", "m": "行動；行為"}, {"w": "servant", "pos": "n.", "m": "（尤指舊時的）僕人"}, {"w": "desire", "pos": "v.", "m": "渴望；要求"}], "reference_words": [{"w": "genie", "pos": "n.", "m": "精靈"}, {"w": "palace", "pos": "n.", "m": "宮殿；皇宮"}, {"w": "undo", "pos": "v.", "m": "取消"}, {"w": "vanish", "pos": "v.", "m": "消失"}], "text": ["Aladdin was a poor boy who loved **adventure**. One day a **stranger** claiming to be his long-lost uncle led him to a hidden cave that opened to **cover** a deep hole in the ground, promising him treasure if he brought back a certain old **lamp**.", "Inside, Aladdin found the lamp along with jewels shining like **diamonds**. When he **rubbed** the lamp to clean it, a powerful genie suddenly appeared, ready to obey every **command** Aladdin gave him.", "With the genie's help, Aladdin built a splendid palace and won the heart of a **princess**. In an **instant**, his whole life had changed. He never forgot to treat the genie's **servant**-like loyalty with respect, and he learned that with a little courage, almost any **desire** could come true, and he took quick **action** to make sure his family and the princess lived happily ever after."], "text_zh": ["阿拉丁是個熱愛**冒險**的窮小子。有一天，一位自稱是他失散多年叔叔的**陌生人**帶他來到一個隱密的洞穴，洞穴入口**蓋**住了一個深深的地洞，那人答應說，只要阿拉丁把裡面一盞舊**油燈**帶出來，就能得到寶藏。", "在洞裡，阿拉丁找到了那盞燈，還有閃閃發亮如**鑽石**般的珠寶。當他**摩擦**油燈想把它擦乾淨時，一位強大的精靈突然出現，準備聽從阿拉丁下的每一個**命令**。", "在精靈的幫助下，阿拉丁蓋起了一座華麗的宮殿，也贏得了一位**公主**的芳心。一**瞬間**，他的整個人生都變了。他從未忘記要以尊重對待這位如同**僕人**般忠誠的精靈，他也學到了：只要有一點勇氣，幾乎任何**願望**都可能成真，於是他立刻採取**行動**，努力讓自己的家人和公主從此過著幸福快樂的生活。"]}, {"id": 16, "title_en": "The Traveling Companion", "title_zh": "旅伴", "author": "Hans Christian Andersen（安徒生）", "words": [{"w": "church", "pos": "n.", "m": "教堂"}, {"w": "rest", "pos": "v.", "m": "休息"}, {"w": "dead", "pos": "adj.", "m": "死掉的"}, {"w": "travel", "pos": "v.", "m": "旅行"}, {"w": "castle", "pos": "n.", "m": "城堡"}, {"w": "princess", "pos": "n.", "m": "公主"}, {"w": "marry", "pos": "v.", "m": "結婚；嫁娶"}, {"w": "question", "pos": "n.", "m": "問題"}], "reference_words": [{"w": "companion", "pos": "n.", "m": "同伴"}, {"w": "debt", "pos": "n.", "m": "債務；借款"}, {"w": "troll", "pos": "n.", "m": "（北歐傳說中的）巨人"}], "text": ["A kind young man once gave the last of his money to bury a stranger who had **died** with debts, so that people would stop being cruel to the man's body outside the **church**. Soon after, another traveler offered to **travel** with him and share his journey.", "The two companions set out together, and the young man decided to try to win the heart of a beautiful but dangerous **princess** who lived in a distant **castle** — many men had tried to **marry** her and failed, losing their lives because they could not answer her impossible **question**.", "With his companion's quiet, magical help, the young man was able to answer every question the princess asked and break the curse that controlled her. At last, they were free to **rest**, and only then did the young man learn that his loyal companion was the very spirit of the man he had once helped bury, returning the favor at last.", "Long after the young man had helped bury that **dead** stranger, he never imagined the kind act would one day save his own life."], "text_zh": ["曾經有一位善良的年輕人，把身上剩下的錢全都用來安葬一位欠債而**過世**的陌生人，好讓大家不再對死者的遺體不敬，事情發生在一間**教堂**外。不久後，另一位旅人主動提議要與他結伴**旅行**，一起踏上這趟旅程。", "兩人一起出發，年輕人決定試著贏得一位美麗卻十分危險的**公主**的芳心，她住在一座遙遠的**城堡**裡——許多人曾試著娶她為妻，卻都因為答不出她那些不可能的**問題**而落得性命不保。", "在同伴悄悄運用魔法幫忙下，年輕人成功答對了公主的每一個問題，破解了控制她的詛咒。兩人終於能夠好好**休息**，就在這時，年輕人才知道，這位忠誠的同伴，其實正是他當初出手幫忙安葬的那個人的靈魂，特地回來報答他的恩情。", "在年輕人幫忙安葬那位已經**過世**的陌生人許久之後，他從沒想過，這個善舉有一天會救了自己一命。"]}, {"id": 17, "title_en": "The Five Boons of Life", "title_zh": "人生的五種恩賜", "author": "Mark Twain（馬克．吐溫）", "words": [{"w": "beginning", "pos": "n.", "m": "開始"}, {"w": "pleasure", "pos": "n.", "m": "歡樂；樂趣"}, {"w": "experience", "pos": "v.", "m": "體驗；經歷"}, {"w": "select", "pos": "v.", "m": "挑選"}, {"w": "easily", "pos": "adv.", "m": "輕易地"}, {"w": "lie", "pos": "n.", "m": "謊言"}, {"w": "final", "pos": "adj.", "m": "最後的"}, {"w": "horrible", "pos": "adj.", "m": "悲慘的；糟糕的"}, {"w": "full", "pos": "adj.", "m": "滿的；充滿的"}, {"w": "empty", "pos": "adj.", "m": "空蕩蕩的"}, {"w": "praise", "pos": "v.", "m": "讚揚"}, {"w": "precious", "pos": "adj.", "m": "珍貴的"}], "reference_words": [{"w": "boon", "pos": "n.", "m": "恩賜"}, {"w": "fairy", "pos": "n.", "m": "仙女"}, {"w": "disappoint", "pos": "v.", "m": "使失望"}, {"w": "in rags", "pos": "phr.", "m": "衣衫襤褸"}, {"w": "reply", "pos": "v.", "m": "回答；回覆"}], "text": ["At the **beginning** of a young man's life, a fairy appeared and told him he could **select** one gift among five: Fame, Love, Riches, **Pleasure**, or Death. Sure that he could **easily** figure out life's greatest treasure later, he chose Pleasure first.", "Pleasure brought him only shallow **experience** and left his heart **empty**. He tried Fame next, but people's **praise** felt hollow and did not last. He tried Love, and even Riches, but each gift, one after another, turned out to be a **horrible** disappointment in the end, **full** of regret rather than joy.", "Finally, as an old man near his **final** days, he understood the **precious** truth: Death, the one gift he never chose, was actually the greatest gift of all, because it was the one true rest waiting quietly for everyone at the end of every road, free from every disappointment life could bring.", "Looking back, he realized every earlier choice had been built on a small **lie** he told himself about what truly mattered."], "text_zh": ["在一個年輕人生命的**開端**，一位仙子出現，告訴他可以從五樣禮物中**挑選**一樣：名聲、愛情、財富、**享樂**，或死亡。他自信之後能**輕易**弄懂人生最珍貴的寶物是什麼，於是先選了享樂。", "享樂只帶給他膚淺的**體驗**，讓他的內心變得**空虛**。接著他選了名聲，但眾人的**讚美**顯得空洞、無法長久。他也試過愛情，甚至財富，但這一樣接一樣的禮物，到頭來都成了**可怕**的失望，心裡**充滿**的不是喜悅，而是遺憾。", "最後，當這位老人步入生命**最後**的日子，他終於明白了那個**珍貴**的真相：死亡，這份他從未選擇過的禮物，其實才是所有禮物中最偉大的一個，因為那是每一條路的盡頭，靜靜等著每一個人的真正休息之地，讓人得以擺脫人生中的一切失望。", "回顧一生，他才明白，先前的每一個選擇，都建立在他對自己所說的一個小小**謊言**之上，誤以為那才是真正重要的事。"]}, {"id": 18, "title_en": "The Frog in the Well", "title_zh": "井底之蛙", "author": "Chinese fable（中國寓言）", "words": [{"w": "frog", "pos": "n.", "m": "青蛙"}, {"w": "well", "pos": "n.", "m": "水井"}, {"w": "bottom", "pos": "n.", "m": "底部"}, {"w": "deep", "pos": "adj.", "m": "深的"}, {"w": "outside", "pos": "adj.", "m": "外面的"}, {"w": "cry", "pos": "v.", "m": "大叫"}, {"w": "low", "pos": "adj.", "m": "低矮的"}, {"w": "valley", "pos": "n.", "m": "山谷"}, {"w": "spot", "pos": "v.", "m": "看到；瞥見"}, {"w": "tiny", "pos": "adj.", "m": "微小的"}, {"w": "pond", "pos": "n.", "m": "池塘"}, {"w": "return", "pos": "v.", "m": "返回"}], "reference_words": [{"w": "surprising", "pos": "adj.", "m": "驚人的"}], "text": ["A little **frog** had lived at the **bottom** of an old **well** his whole life, and he believed the small circle of sky above him was the entire world. \"Nothing exists **outside** my well,\" he would proudly **cry** out to anyone who visited.", "One day, a sea turtle passing by looked down into the **low**, narrow well and tried to describe the ocean — how wide it was, how it stretched farther than any **valley** or **pond** the frog could imagine, with waves as tall as mountains.", "The frog could not understand something so big; to him it sounded impossible, coming from such a **tiny** **spot** in the world compared to the turtle's home. He simply shook his head and told the turtle to **return** to the sea and leave his well alone, forever content with his own small, narrow view of the world.", "The frog simply could not imagine any place as **deep**, or as wide, as what the turtle described."], "text_zh": ["一隻小**青蛙**一輩子都住在一口老**井**的**底部**，牠一直相信自己頭頂上那一小圈天空就是整個世界。「我這口井**以外**什麼都不存在，」牠總是驕傲地對每個來訪的人這樣**大聲宣稱**。", "有一天，一隻路過的海龜低頭望進這口**低矮**狹窄的井裡，試著向青蛙描述大海有多麼遼闊——遠遠超過牠所能想像的任何山谷或**池塘**，海浪甚至高得像山一樣。", "青蛙無法理解這麼巨大的事物；對牠來說，這聽起來根本不可能，尤其相較於海龜住的地方，牠自己所在只是一個**極小**的**角落**。牠只是搖搖頭，叫海龜**回**大海去，別來打擾牠的井，牠依然滿足於自己那狹小又有限的世界觀。", "青蛙實在無法想像有任何地方，會像海龜所描述的那樣**深**、那樣遼闊。"]}, {"id": 19, "title_en": "The Legend of the White Snake", "title_zh": "白蛇傳", "author": "Chinese legend（中國民間傳說）", "words": [{"w": "snake", "pos": "n.", "m": "蛇"}, {"w": "thousand", "pos": "n.", "m": "千"}, {"w": "sight", "pos": "n.", "m": "看見；目睹"}, {"w": "couple", "pos": "n.", "m": "夫妻；情侶"}, {"w": "charge", "pos": "v.", "m": "索價；收費"}, {"w": "Dragon-boat Festival", "pos": "n.", "m": "端午節"}, {"w": "truth", "pos": "n.", "m": "事實；真相"}, {"w": "cup", "pos": "n.", "m": "一杯（的量）"}, {"w": "lock", "pos": "v.", "m": "鎖上"}, {"w": "safety", "pos": "n.", "m": "安全"}, {"w": "trap", "pos": "v.", "m": "使困住"}, {"w": "free", "pos": "adj.", "m": "自由的"}], "reference_words": [{"w": "monk", "pos": "n.", "m": "僧侶"}, {"w": "wine", "pos": "n.", "m": "酒"}, {"w": "legend", "pos": "n.", "m": "傳說"}], "text": ["Long ago in China, a white **snake** spirit had practiced magic for a **thousand** years until she could take the form of a beautiful woman. At **first** **sight**, she fell in love with a kind young scholar, and they soon became a happy **couple**.", "But an old monk grew suspicious of her true nature and took **charge** of protecting the scholar, warning him again and again that his wife was hiding a dangerous secret. During the **Dragon-boat Festival**, the monk convinced the scholar to test the **truth** by offering his wife a special **cup** of wine.", "When she drank it, she could not hold her human form, and for a moment her true shape appeared, frightening her husband terribly. Desperate to protect her family's **safety**, she tried everything to prove her love, but the monk eventually managed to **trap** her beneath an ancient pagoda. Even so, she never stopped hoping that one day she would be **free** again.", "Even **lock**ed beneath the stone pagoda, she never stopped believing she would be free again one day."], "text_zh": ["很久很久以前，在中國，一位白蛇精修煉了**上千**年的法力，終於能化為一位美麗的女子。**一見**面，她就愛上了一位善良的年輕書生，兩人很快成了一對恩愛的**夫妻**。", "然而，一位老和尚對她的真實身分起了疑心，主動**負責**保護這位書生，一再警告他，他的妻子隱藏著一個危險的秘密。在**端午節**這天，和尚說服書生用一**杯**特別的酒來試探**真相**。", "當她喝下那杯酒後，再也無法維持人形，片刻間現出了原形，把丈夫嚇壞了。為了拚命保護家人的**安全**，她想盡辦法證明自己的真心，但和尚最終還是把她**困**在了一座古老的寶塔之下。即使如此，她從未放棄希望，相信總有一天自己能夠重獲**自由**。", "即使被**鎖**在那座石塔之下，她仍然沒有放棄，相信自己終有一天能重獲自由。"]}, {"id": 20, "title_en": "The Crystal Ball", "title_zh": "水晶球", "author": "Brothers Grimm（格林兄弟）", "words": [{"w": "nest", "pos": "n.", "m": "巢；窩"}, {"w": "whale", "pos": "n.", "m": "鯨魚"}, {"w": "rat", "pos": "n.", "m": "老鼠"}, {"w": "princess", "pos": "n.", "m": "公主"}, {"w": "grandmother", "pos": "n.", "m": "（外）祖母"}, {"w": "guard", "pos": "v.", "m": "守衛；保護"}, {"w": "sharp", "pos": "adj.", "m": "銳利的"}, {"w": "sword", "pos": "n.", "m": "刀；劍"}, {"w": "wound", "pos": "n.", "m": "傷；傷口"}, {"w": "rise", "pos": "v.", "m": "浮起；升起"}, {"w": "victory", "pos": "n.", "m": "勝利"}, {"w": "kingdom", "pos": "n.", "m": "王國"}], "reference_words": [{"w": "crystal", "pos": "n.", "m": "水晶"}, {"w": "stepmother", "pos": "n.", "m": "後母"}, {"w": "witch", "pos": "n.", "m": "女巫"}, {"w": "grant", "pos": "v.", "m": "給予"}, {"w": "bull", "pos": "n.", "m": "公牛"}, {"w": "yolk", "pos": "n.", "m": "蛋黃"}], "text": ["Three brothers set out to break a witch's curse that had trapped a beautiful **princess** and turned her **grandmother**'s **kingdom** to stone. The oldest two brothers grew greedy along the way and were themselves turned into a **whale** and a wandering black bird, leaving only the youngest to continue the quest.", "The youngest brother reached a castle **guarded** by fierce dragons, but with a sharp mind and a **sharp** magic **sword**, he fought his way past every danger. He suffered a small **wound**, but nothing could stop him from reaching the crystal ball that held the secret to breaking the curse.", "Deep in a hidden **nest**-like chamber, a **rat** helped him find the last hidden key. With the crystal ball finally in his hands, the spell broke at once — the princess, her grandmother, and the whole kingdom **rose** back to life, and the young man's **victory** freed his brothers as well, restoring them all to their true forms.", "Only when the crystal ball finally shattered could the whole kingdom **rise** back into its true form."], "text_zh": ["三兄弟出發，要打破一個女巫的詛咒——這道詛咒困住了一位美麗的**公主**，也讓她**祖母**的**王國**變成了石頭。大哥和二哥在途中變得貪心，先後被變成了一頭**鯨魚**和一隻四處遊蕩的黑鳥，只剩下最小的弟弟繼續完成這趟任務。", "小弟來到一座由兇猛巨龍**看守**的城堡，但憑著機智和一把鋒利的魔法**劍**，他一路奮戰、突破重重危險。他受了一點小**傷**，但沒有什麼能阻止他找到那顆藏著破除詛咒祕密的水晶球。", "在一個深藏、如**巢穴**般的密室裡，一隻**老鼠**幫他找到了最後一把藏起來的鑰匙。當水晶球終於握在他手中，詛咒立刻解除——公主、她的祖母，以及整個王國都重新**復**活了，這位年輕人的**勝利**也解救了他的兩位哥哥，讓他們都恢復了原本的樣子。", "直到水晶球終於破碎的那一刻，整個王國才得以**重新甦醒**，恢復原本的模樣。"]}, {"id": 21, "title_en": "After Twenty Years", "title_zh": "二十年後", "author": "O. Henry（歐．亨利）", "words": [{"w": "continue", "pos": "v.", "m": "繼續"}, {"w": "minute", "pos": "n.", "m": "分鐘"}, {"w": "later", "pos": "adv.", "m": "晚一點；稍後"}, {"w": "west", "pos": "n.", "m": "（美國）西部"}, {"w": "end", "pos": "n.", "m": "盡頭；尾端"}, {"w": "cry", "pos": "v.", "m": "喊；叫"}, {"w": "note", "pos": "n.", "m": "紙條；字條"}, {"w": "open", "pos": "v.", "m": "打開"}, {"w": "police officer", "pos": "n.", "m": "警察"}, {"w": "outside", "pos": "prep.", "m": "在……外面"}, {"w": "light", "pos": "v.", "m": "點燃"}, {"w": "white", "pos": "adj.", "m": "白色的"}], "reference_words": [{"w": "luck", "pos": "n.", "m": "運氣"}, {"w": "closed", "pos": "adj.", "m": "關閉的"}, {"w": "cigar", "pos": "n.", "m": "雪茄"}, {"w": "scar", "pos": "n.", "m": "傷疤"}, {"w": "well-dressed", "pos": "adj.", "m": "衣著講究的"}], "text": ["Twenty years ago, two close friends had promised to meet again at the same restaurant door, no matter what happened in life. Now, standing under a **light** in the **west** side of the city, one of the friends waited, checking his watch **minute** after minute.", "A **police officer** walking his beat that night stopped to talk to the man **outside** the closed shop, and the man explained he had traveled a long way just to keep this old promise, unwilling to **end** it early even if his friend never showed up.", "**Later**, another man dressed all in **white** and a long coat finally arrived and greeted him warmly — but as they walked under a brighter light together, he suddenly excused himself. Moments after, a plainclothes officer approached instead, holding a short **note**: his old friend had recognized him as a wanted man the whole time, but could not bear to arrest him himself, so he had sent someone else and slipped quietly away, unable to hide his tears as he did.", "As he walked away, unable to stop his tears, he knew their old friendship could not simply **continue** as before; he quietly let himself **cry**, wondering if that door would ever **open** for them again."], "text_zh": ["二十年前，兩位要好的朋友曾約定，無論日後人生如何變化，都要在同一間餐廳門口再次相見。此刻，在城市**西邊**一盞**燈**下，其中一位朋友站在那裡等待，一**分鐘**一分鐘地看著手錶。", "當晚一位巡邏的**警察**走過來，和站在打烊商店**外**的這名男子攀談了幾句，男子解釋自己特地遠道而來，就是為了信守這個多年前的舊約定，即使朋友最後沒有出現，他也不願提早**結束**這場等待。", "**後來**，另一位穿著**白色**大衣的男子終於抵達，熱情地和他打招呼——但當兩人一起走到更明亮的燈光下時，他卻突然找藉口先行離開。片刻之後，一位便衣警探走了過來，手裡拿著一張短**紙條**：原來他的老朋友早就認出他是通緝犯，卻始終無法親手逮捕他，只好派別人來，自己則悄悄離開，離開時忍不住流下了眼淚。", "他一邊走一邊忍不住流淚，明白他們的老交情再也無法像以前一樣**繼續**下去；他悄悄讓自己**哭**了出來，心裡想著，這扇門是否還會為他們再次**打開**。"]}, {"id": 22, "title_en": "The Green Door", "title_zh": "綠色大門", "author": "O. Henry（歐．亨利）", "words": [{"w": "salesman", "pos": "n.", "m": "銷售員"}, {"w": "sidewalk", "pos": "n.", "m": "人行道"}, {"w": "blank", "pos": "adj.", "m": "空白的"}, {"w": "behind", "pos": "prep.", "m": "在……後面"}, {"w": "hall", "pos": "n.", "m": "走廊"}, {"w": "pretty", "pos": "adj.", "m": "漂亮的"}, {"w": "pale", "pos": "adj.", "m": "（臉色或膚色）蒼白的"}, {"w": "couch", "pos": "n.", "m": "長沙發；躺椅"}, {"w": "supper", "pos": "n.", "m": "晚餐"}, {"w": "state", "pos": "n.", "m": "狀態；情況"}, {"w": "sleepy", "pos": "adj.", "m": "睏的；想睡的"}, {"w": "pause", "pos": "v.", "m": "停頓；暫停"}], "reference_words": [{"w": "adventurer", "pos": "n.", "m": "冒險家"}, {"w": "fate", "pos": "n.", "m": "命運"}, {"w": "somehow", "pos": "adv.", "m": "不知怎地；不知為何"}, {"w": "dim", "pos": "adj.", "m": "光線昏暗的"}, {"w": "fan", "pos": "v.", "m": "搧風"}, {"w": "awake", "pos": "adj.", "m": "醒來的；清醒的"}], "text": ["A young **salesman** was walking down a busy **sidewalk** one evening when a stranger pressed a small, **blank** card into his hand with only three words written on it: \"The Green Door.\" Curious, he decided to follow the mysterious clue.", "**Behind** an old building, he found a green door leading up a dark **hall**. Nervous but excited, he knocked and slowly opened it, discovering a thin, **pretty** young woman lying **pale** on a small **couch**, clearly very hungry, with almost no **supper** to eat.", "The young man quickly bought her food and helped her without asking for anything in return. Later, when he tried to find that same green door again to check on her, he learned that no such door existed on that street at all — every doorway there led somewhere ordinary. He could never explain the mystery, but he was **glad** he had chosen to follow the sign that evening rather than staying **sleepy** and walking straight past.", "He could never quite **state** exactly why that green door had vanished, but he never regretted the **pause** he took to follow it that one evening."], "text_zh": ["一位年輕的**推銷員**在一個傍晚走在熱鬧的**人行道**上，一位陌生人把一張**空白**的小卡片塞進他手裡，上面只寫著三個字：「綠色大門」。他好奇心大起，決定跟著這個神祕的線索走。", "在一棟老舊建築物**後方**，他找到了一扇綠色大門，門後是一條通往樓上的昏暗**走廊**。他既緊張又興奮地敲了敲門，慢慢推開，發現一位纖瘦、**清秀**的年輕女子臉色**蒼白**地躺在一張小**沙發**上，顯然餓壞了，幾乎沒有**晚餐**可吃。", "年輕人立刻買了食物給她，不求任何回報地幫助了她。後來，當他想再找到那扇綠色大門去看看她時，卻發現那條街上根本沒有那樣一扇門——那裡所有的門都通往再普通不過的地方。他始終無法解釋這個謎團，但他**很慶幸**自己那天傍晚選擇跟隨那個線索，而不是**昏昏欲睡**地直接走過去。", "他始終無法明確**說明**那扇綠色大門為何消失，但他從不後悔那天傍晚自己**停下腳步**去追隨它。"]}, {"id": 23, "title_en": "The Last Leaf", "title_zh": "最後一葉", "author": "O. Henry（歐．亨利）", "words": [{"w": "lady", "pos": "n.", "m": "小姐；女士"}, {"w": "painter", "pos": "n.", "m": "畫家"}, {"w": "count", "pos": "v.", "m": "數；計算"}, {"w": "backward", "pos": "adv.", "m": "向後地"}, {"w": "believe", "pos": "v.", "m": "相信"}, {"w": "hang", "pos": "v.", "m": "懸掛"}, {"w": "death", "pos": "n.", "m": "死亡"}, {"w": "freezing", "pos": "adj.", "m": "極冷的"}], "reference_words": [{"w": "wildly", "pos": "adv.", "m": "狂亂地；瘋狂地"}], "text": ["A young **lady** named Johnsy became very sick and began to **believe** something strange: she was convinced that when the last leaf **hanging** on the ivy vine outside her window finally fell, she too would die. Her friend and an old, unsuccessful **painter** who lived downstairs both worried deeply about her.", "Every day, Johnsy would silently **count** the leaves, watching one after another fall in the cold autumn wind, her hope disappearing **backward** with each one. She truly believed her own **death** was tied to that last leaf.", "One terribly stormy, **freezing** night, the old painter secretly went outside and carefully painted a single perfect leaf on the wall, so real that it looked alive even after the storm. Seeing the leaf still hanging there the next morning gave Johnsy new hope, and she slowly recovered — but sadly, the kind old painter caught a serious illness that night from the cold and passed away, having created his one true masterpiece to save a life other than his own."], "text_zh": ["一位名叫強西的年輕**女子**病得很重，心裡開始**相信**一件奇怪的事：她認定，當窗外常春藤上最後一片葉子掉落時，自己也會跟著死去。她的朋友，以及住在樓下、一直不太成功的老**畫家**，都非常擔心她。", "強西每天都靜靜地**數著**葉子，看著它們在秋天的寒風中一片接一片地落下，她的希望也隨之一點一點地**倒退**消失。她真心相信，自己的**死亡**與那最後一片葉子緊緊相繫。", "在一個暴風雨肆虐、**寒冷刺骨**的夜晚，老畫家悄悄跑到外頭，仔細地在牆上畫了一片完美的葉子，逼真到即使暴風雨過後，看起來依然像是活著一樣。隔天早上，看見那片葉子依然**掛**在那裡，讓強西重新燃起希望，並漸漸康復——但可惜的是，這位善良的老畫家那晚在寒冷中染上重病，最終過世了，他用生命完成了自己真正的傑作，救的卻不是自己的性命。"]}, {"id": 24, "title_en": "The Shadow", "title_zh": "影子", "author": "Hans Christian Andersen（安徒生）", "words": [{"w": "ground", "pos": "n.", "m": "地面；地板"}, {"w": "dark", "pos": "adj.", "m": "黑暗的"}, {"w": "believe", "pos": "v.", "m": "相信"}, {"w": "child", "pos": "n.", "m": "小孩；兒童"}, {"w": "answer", "pos": "v./n.", "m": "回答；答案"}, {"w": "stand", "pos": "v.", "m": "站起來；站立"}, {"w": "face", "pos": "v.", "m": "面向；正對"}, {"w": "dry", "pos": "v.", "m": "擦乾；使變乾"}, {"w": "grass", "pos": "n.", "m": "草；青草"}, {"w": "laugh", "pos": "v.", "m": "笑；大笑"}, {"w": "shine", "pos": "v.", "m": "照耀；發光"}, {"w": "belong", "pos": "v.", "m": "應在（某處）"}], "reference_words": [{"w": "shadow", "pos": "n.", "m": "影子"}, {"w": "angel", "pos": "n.", "m": "天使"}, {"w": "tear", "pos": "n.", "m": "眼淚；淚水"}, {"w": "field", "pos": "n.", "m": "（一大片廣闊的）地"}, {"w": "add", "pos": "v.", "m": "補充說"}], "text": ["A scholar once had a **shadow** that, strangely, walked away on its own one night and never came back. Years **later**, a strange, well-dressed traveler visited the scholar and quietly confessed that he was, in fact, that very shadow, now able to **stand** and act just like a real **person**.", "The shadow had grown rich and powerful in the world by cleverly learning everyone's secrets while staying hidden in the **dark**. He no longer wished to **belong** below anyone; instead, he wanted the poor scholar to become his own shadow instead, following him and calling him master.", "The scholar refused, saying he could never **believe** such a thing was right, no matter how the shadow tried to convince him. But the clever shadow's lies shone so brightly in front of a foreign princess that everyone began to trust him instead of the honest scholar. In the end, people could no longer tell where the truth stood — and the scholar, ignored by everyone, quietly faded from memory like **grass** fading on **dry** **ground**, while the shadow only smiled a cold smile, its **face** giving away nothing at all.", "As a **child**, the scholar had once been able to **answer** every hard question with confidence, and he could still remember how the sunlight used to **shine** on the grass while he would **laugh** freely with old friends — a simple happiness the shadow could never truly take from him."], "text_zh": ["曾經有位學者的**影子**，在某個晚上很奇怪地自己走掉了，再也沒有回來。**多年後**，一位打扮體面的陌生旅人來拜訪這位學者，悄悄坦承自己其實就是那個影子，如今已經能夠像真正的**人**一樣**站立**、行動。", "這個影子靠著躲在**黑暗**中偷偷刺探每個人的秘密，在這個世上變得又有錢又有權勢。牠再也不想屈居人下、**依附**於任何人；相反地，牠希望這位貧窮的學者反過來成為牠的影子，跟隨牠、稱牠為主人。", "學者拒絕了，說他無論如何都**無法相信**這樣做是對的，不管影子怎麼勸說。但這個狡猾的影子在一位外國公主面前把謊話說得如此動聽，讓大家漸漸都相信了牠，而不再相信誠實的學者。到最後，人們再也分不清真相究竟站在哪一邊——學者被所有人遺忘，就像枯**乾**的**地面**上漸漸枯萎的**草**一樣悄然消逝，而那個影子只是冷冷一笑，牠的**臉**上什麼也看不出來。", "在還是個**孩子**的時候，這位學者曾經能夠自信地**回答**每一個困難的問題，他仍然記得陽光如何**照耀**在草地上，那時他總能和老朋友們開懷**大笑**——這是一種單純的快樂，無論影子多麼強大，都無法真正從他身上奪走。"]}, {"id": 25, "title_en": "Faithful John", "title_zh": "忠心的約翰", "author": "Brothers Grimm", "words": [{"w": "king", "pos": "n.", "m": "國王"}, {"w": "trip", "pos": "n.", "m": "旅行；旅程"}, {"w": "dangerous", "pos": "adj.", "m": "危險的"}, {"w": "mind", "pos": "v.", "m": "介意；在意"}, {"w": "right", "pos": "adj.", "m": "對的；正確的"}, {"w": "horse", "pos": "n.", "m": "馬"}, {"w": "ride", "pos": "v.", "m": "騎乘"}, {"w": "twice", "pos": "adv.", "m": "兩次；兩回"}, {"w": "hurt", "pos": "v.", "m": "傷害"}, {"w": "scared", "pos": "adj.", "m": "害怕的"}, {"w": "surprise", "pos": "n.", "m": "驚喜"}, {"w": "again", "pos": "adv.", "m": "再一次"}], "reference_words": [{"w": "marry", "pos": "v.", "m": "結婚；嫁娶"}, {"w": "faraway", "pos": "adj.", "m": "遙遠的"}, {"w": "stone", "pos": "n.", "m": "石頭"}, {"w": "wine", "pos": "n.", "m": "(葡萄)酒"}, {"w": "poison", "pos": "n.", "m": "毒藥"}, {"w": "wedding", "pos": "n.", "m": "婚禮"}, {"w": "blood", "pos": "n.", "m": "血"}, {"w": "statue", "pos": "n.", "m": "雕像"}, {"w": "alive", "pos": "adj.", "m": "活著的"}], "text": ["A **king** wanted to **marry** a beautiful girl who lived in a **dangerous**, faraway kingdom, but he did not **mind** the long, risky **trip** it would take. His loyal servant, Faithful John, promised to keep him safe no matter what happened along the way.", "On the journey, John overheard three birds warning that the king would face terrible **danger** unless someone stopped it — but the person who did so, if he ever told anyone why, would instantly turn to **stone**. John quietly saved the king from **danger** again and again without a word of explanation, even when the king began to think something was very **wrong**.", "Finally, to save the king's new bride's life, John had to do something that looked so **scared** and shocking that the king, in anger, ordered him punished. Only then did John explain everything — and the moment he finished speaking, he turned to stone exactly as the birds had warned. Heartbroken, the king kept the statue close for years, until one day, to his great **surprise**, a bit of his own blood brought John back to life **again**, proving that true loyalty was worth more than **right** or wrong judged too quickly.", "Faithful John had once saved the king from being **hurt** while **riding** his favorite **horse**, and he would gladly have risked it **twice** as often to keep the king safe.", "Even a short **ride** on horseback could turn dangerous, so John never once let the king out of his sight."], "text_zh": ["一位**國王**想要**娶**一位住在**危險**遙遠國度的美麗女孩為妻，他絲毫**不介意**這趟漫長又充滿風險的**旅程**。他忠心的僕人「忠心的約翰」答應無論路上發生什麼事，都會保護國王的安全。", "旅途中，約翰無意間聽見三隻鳥警告說，國王將面臨可怕的**危險**，除非有人阻止——但如果出手相救的人把原因說出來，就會立刻變成**石頭**。約翰一次又一次悄悄地救了國王脫離**危險**，卻始終一句解釋都沒有，甚至讓國王開始覺得事情有些**不對勁**。", "最後，為了救國王新娘的性命，約翰做出了一件看起來十分令人**驚恐**、令人震驚的事，國王一怒之下下令要懲罰他。直到這時，約翰才把一切解釋清楚——話一說完，他立刻如三隻鳥所警告的那樣變成了石頭。國王心碎不已，多年來都把這尊雕像留在身邊，直到有一天，**出乎意料**地，他自己的一滴血竟讓約翰**重新**復活，證明了真正的忠誠，遠比匆促判斷是**對**是錯更加珍貴。", "忠心的約翰曾經在國王**騎**著他最喜愛的**馬**時，救他免於**受傷**，即使要冒**兩倍**的風險，他也心甘情願，只求國王平安無事。", "即使只是騎馬短短**騎乘**一小段路，也可能變得危險，所以約翰從未讓國王離開他的視線。"]}, {"id": 26, "title_en": "The Star-Child", "title_zh": "星星之子", "author": "Oscar Wilde", "words": [{"w": "raise", "pos": "v.", "m": "養育"}, {"w": "snake", "pos": "n.", "m": "蛇"}, {"w": "frog", "pos": "n.", "m": "青蛙"}, {"w": "handsome", "pos": "adj.", "m": "俊美的；好看的"}, {"w": "realize", "pos": "v.", "m": "了解；意識到"}, {"w": "seek", "pos": "v.", "m": "尋找"}, {"w": "guard", "pos": "n.", "m": "侍衛；警衛"}, {"w": "beat", "pos": "v.", "m": "打；揍"}, {"w": "fox", "pos": "n.", "m": "狐狸"}, {"w": "free", "pos": "v.", "m": "釋放"}, {"w": "direct", "pos": "v.", "m": "引導；指路"}, {"w": "prince", "pos": "n.", "m": "王子"}], "reference_words": [{"w": "instead", "pos": "adv.", "m": "反而；卻"}, {"w": "vain", "pos": "adj.", "m": "自負的；虛榮的"}, {"w": "beggar", "pos": "n.", "m": "乞丐"}, {"w": "kindness", "pos": "n.", "m": "仁慈；好意"}], "text": ["A poor woodcutter once **raised** an abandoned baby he found in the snow, believing the boy was the child of a falling star. As the boy grew into a **handsome** young man, he became so proud and vain that he was cruel to everyone, including a poor beggar woman he did not **realize** was his real mother.", "One day, his real mother came looking for him, but he cruelly turned her away, comparing her to a **snake** and a **frog**. As punishment for his cruelty, his handsome face suddenly became as ugly as a **fox**'s, and everyone in the village who once admired him now turned away in fear.", "Ashamed, the boy set out to **seek** his mother and beg for forgiveness. Along the way, he showed real kindness for the first time — helping a trapped **fox**, sharing his food, and even trying to **direct** lost travelers safely home. Only after he had learned true kindness in his heart did his handsome face return, and a wise old **guard** at the city gate finally welcomed him back as a changed **prince** worthy of respect.", "His own heart used to **beat** with pride and cruelty, but real kindness finally set that cold pride **free**."], "text_zh": ["一位貧窮的樵夫曾經在雪地裡撿到一個棄嬰，並把他**扶養**長大，相信這孩子是一顆流星的孩子。這男孩長成了一位**俊美**的年輕人，卻也變得驕傲自負，對每個人都很殘忍，包括一位他沒**認出**是自己親生母親的貧窮乞丐婦人。", "有一天，他的親生母親前來找他，他卻殘忍地把她趕走，還把她比作**蛇**和**青蛙**。作為對他殘忍行為的懲罰，他俊美的臉龐瞬間變得像**狐狸**一樣醜陋，村裡曾經仰慕他的每個人如今都因害怕而轉身離去。", "羞愧不已的他，出發去**尋找**母親，懇求她的原諒。一路上，他第一次展現出真正的善良——幫助一隻受困的**狐狸**、分享自己的食物，甚至試著**指引**迷路的旅人安全返家。直到他真心學會了善良，他俊美的臉龐才恢復原狀，城門口一位睿智的老**守衛**終於歡迎他歸來，稱他是一位已然改變、值得尊敬的**王子**。", "他的心曾經因為驕傲與殘忍而**跳動**，但真正的善良終於讓那份冰冷的驕傲獲得了**釋放**。"]}, {"id": 27, "title_en": "The Red Shoes", "title_zh": "紅舞鞋", "author": "Andersen", "words": [{"w": "shoe", "pos": "n.", "m": "鞋子"}, {"w": "parent", "pos": "n.", "m": "雙親之一"}, {"w": "dress", "pos": "n.", "m": "連衣裙"}, {"w": "pick", "pos": "v.", "m": "挑選"}, {"w": "notice", "pos": "v.", "m": "注意；發現"}, {"w": "wear", "pos": "v.", "m": "穿戴"}, {"w": "strange", "pos": "adj.", "m": "奇怪的；不尋常的"}, {"w": "dance", "pos": "v.", "m": "跳舞"}, {"w": "road", "pos": "n.", "m": "道路"}, {"w": "town", "pos": "n.", "m": "城鎮"}, {"w": "door", "pos": "n.", "m": "門"}, {"w": "pray", "pos": "v.", "m": "禱告"}], "reference_words": [{"w": "priest", "pos": "n.", "m": "牧師"}, {"w": "wooden", "pos": "adj.", "m": "木頭的"}, {"w": "angel", "pos": "n.", "m": "天使"}], "text": ["A poor orphan girl had never owned a pair of **shoes** until a kind rich woman, acting like a **parent** to her, bought her a new **dress** and let her **pick** out anything she wanted from the shoemaker's shop. The girl instantly chose a beautiful pair of red shoes.", "Everyone began to **notice** how much the girl loved to **wear** her red shoes, even to church, which people thought was **strange**. One day, unable to resist, she wore them again and began to **dance** — but this time, the shoes would not let her stop, no matter how tired she became.", "The shoes danced her down every **road** and through every **town**, never stopping at any **door**, no matter how she begged for help. Exhausted, frightened, and finally sorry for how vain she had been, she found her way to a small chapel to **pray** for forgiveness — and only then, at last, did the red shoes finally let her rest."], "text_zh": ["一個貧窮的孤兒女孩從來沒有一雙**鞋子**，直到一位善良的富有婦人像**父母**一樣照顧她，替她買了一件新**洋裝**，還讓她在鞋店裡**挑選**任何自己喜歡的鞋子。女孩立刻選了一雙美麗的紅鞋。", "大家漸漸**注意到**這女孩有多喜歡**穿**她的紅鞋，甚至穿去教堂，大家都覺得這樣很**奇怪**。有一天，她忍不住又穿上了紅鞋，開始**跳起舞**來——但這一次，不管她多麼疲累，那雙鞋都不讓她停下來。", "紅鞋帶著她跳過每一條**路**、穿過每一座**城鎮**，無論她如何在每一扇**門**前苦苦哀求，都沒有停下來。筋疲力盡、驚恐萬分，終於為自己曾經的虛榮感到後悔的她，找到了一間小教堂，跪下來**祈禱**請求原諒——直到那一刻，紅鞋才終於讓她得以休息。"]}, {"id": 28, "title_en": "Paul Bunyan", "title_zh": "保羅‧班揚", "author": "American folklore", "words": [{"w": "forest", "pos": "n.", "m": "森林"}, {"w": "deep", "pos": "adj.", "m": "深的"}, {"w": "ordinary", "pos": "adj.", "m": "平常的；一般的"}, {"w": "baby", "pos": "n.", "m": "寶寶；嬰兒"}, {"w": "ox", "pos": "n.", "m": "牛；公牛"}, {"w": "hole", "pos": "n.", "m": "洞"}, {"w": "ground", "pos": "n.", "m": "地面；地板"}, {"w": "rope", "pos": "n.", "m": "繩子"}, {"w": "hire", "pos": "v.", "m": "僱用"}, {"w": "worker", "pos": "n.", "m": "工人；員工"}, {"w": "swing", "pos": "v.", "m": "擺動；揮舞"}, {"w": "disappear", "pos": "v.", "m": "消失；不見"}], "reference_words": [{"w": "nowadays", "pos": "adv.", "m": "現在；當今"}, {"w": "lumberjack", "pos": "n.", "m": "伐木工人"}, {"w": "fur", "pos": "n.", "m": "(動物的)毛"}, {"w": "straighten", "pos": "v.", "m": "把……變直"}, {"w": "lumber", "pos": "n.", "m": "木材"}, {"w": "ax", "pos": "n.", "m": "斧頭"}, {"w": "earthquake", "pos": "n.", "m": "地震"}], "text": ["Paul Bunyan was born a giant **baby** in the middle of a great **forest**, and even as an infant he was already taller and stronger than any **ordinary** grown man. He grew up loving the outdoors, especially digging **deep** **holes** in the **ground** just for fun.", "One winter, Paul found a giant blue **ox** calf freezing in the snow and raised it as his best friend, naming him Babe. Paul used a long **rope** tied between Babe and a crooked road to straighten it out with one mighty pull, and the huge holes Babe's hooves left behind eventually filled with water to become great lakes.", "As Paul grew older, he decided to **hire** a whole team of loyal **workers** to help him clear forests and build farms across the land, though he made sure never to cut down more trees than the land could spare. Babe would **swing** logs around like toys, and together the two friends worked so fast that whole forests seemed to **disappear** and reappear as farmland overnight, leaving behind the very landscape of North America as we know it today."], "text_zh": ["保羅‧班揚一出生就是個巨嬰，誕生在一片廣大的**森林**中央，即使還是嬰兒，他已經比任何**普通**成年男子都要高大強壯。他從小就熱愛戶外活動，特別喜歡純粹為了好玩而在**地面**上挖**深****洞**。", "有一年冬天，保羅發現一頭巨大的藍色**牛**寶寶在雪地裡快凍僵了，便把牠當作最好的朋友撫養長大，取名叫貝比。保羅用一條長**繩子**綁在貝比和一條彎曲的道路之間，用力一拉就把路拉直了，而貝比蹄印留下的巨大坑洞後來注滿了水，變成了廣大的湖泊。", "保羅長大後，決定**僱用**一整批忠心的**工人**，幫他一起開墾森林、建造農場，不過他總是小心留意，絕不砍伐超過土地所能負荷的樹木。貝比會像玩玩具一樣**揮動**原木，兩位好朋友合作得如此迅速，整片森林彷彿一夜之間**消失**又化作農地重新出現，最終造就了我們今天所知的北美大陸地貌。"]}, {"id": 29, "title_en": "The Patient Cat", "title_zh": "耐心的小花貓", "author": null, "words": [{"w": "hungry", "pos": "adj.", "m": "飢餓的"}, {"w": "yard", "pos": "n.", "m": "院子"}, {"w": "summer", "pos": "n.", "m": "夏天"}, {"w": "blue", "pos": "adj.", "m": "藍色的"}, {"w": "during", "pos": "prep.", "m": "在……期間"}, {"w": "catch", "pos": "v.", "m": "抓；捕捉"}, {"w": "wash", "pos": "v.", "m": "清洗"}, {"w": "thin", "pos": "adj.", "m": "瘦的"}, {"w": "smile", "pos": "v.", "m": "微笑；笑"}, {"w": "decide", "pos": "v.", "m": "決定"}, {"w": "moment", "pos": "n.", "m": "片刻；極短的時間"}, {"w": "straight", "pos": "adv.", "m": "直接"}], "reference_words": [{"w": "patient", "pos": "adj.", "m": "有耐心的"}, {"w": "spotted", "pos": "adj.", "m": "有斑點的；有花紋的"}, {"w": "nest", "pos": "n.", "m": "巢；窩"}, {"w": "empty", "pos": "adj.", "m": "空的"}, {"w": "tiny", "pos": "adj.", "m": "極小的"}, {"w": "worm", "pos": "n.", "m": "蟲"}, {"w": "add", "pos": "v.", "m": "補充說"}, {"w": "meow", "pos": "interj.", "m": "貓叫聲"}], "text": ["A spotted cat felt **hungry** one day, so she climbed a tree in a quiet **yard** to search for food. At the top, she found a bird's nest that was still empty, and she **decided** to wait patiently there through the whole **summer** for eggs to hatch.", "**During** that long wait, she stayed busy — she would **catch** small bugs to eat, **wash** herself clean in the sun, and take long naps. When she finally checked again, she found five tiny, **blue** eggs, but they looked so **thin** and small that she decided to wait a little longer for the baby birds to grow fatter.", "She **smiled**, sure she had made a wise **decision**, and did not waste another **moment** worrying. But when she went **straight** back to the nest after waiting even longer, she found it completely empty — the birds had already grown up and flown away without a single thank-you, leaving the very patient, very hungry cat with nothing at all to show for her long, careful wait."], "text_zh": ["一隻有斑點的貓咪有一天覺得很**餓**，於是牠爬上一座安靜**院子**裡的樹，想找找看有沒有食物。在樹頂，牠發現了一個還空著的鳥巢，牠決定耐心地在那裡等上整個**夏天**，等待蛋孵化。", "在漫長的等待**期間**，牠也沒閒著——牠會**抓**些小蟲子吃、在陽光下把自己**洗**乾淨，還會睡上長長的午覺。當牠終於再次檢查鳥巢時，發現了五顆**藍**色的小蛋，但看起來實在太**瘦**小了，於是牠決定再多等一陣子，讓小鳥長得胖一點。", "牠**微笑**著，確信自己做了個明智的**決定**，一**刻**也不浪費地繼續等待。但當牠等了更久之後**直接**回到鳥巢時，卻發現裡面已經完全空了——那些小鳥早就長大飛走了，連一句感謝都沒有，只留下這隻十分耐心、也十分飢餓的貓咪，白白等了一場。"]}, {"id": 30, "title_en": "A Piece of Steak", "title_zh": "一塊牛排", "author": "Jack London", "words": [{"w": "steak", "pos": "n.", "m": "牛排"}, {"w": "evening", "pos": "n.", "m": "晚上；傍晚"}, {"w": "bread", "pos": "n.", "m": "麵包"}, {"w": "rent", "pos": "n.", "m": "租金"}, {"w": "clap", "pos": "v.", "m": "拍手；鼓掌"}, {"w": "precious", "pos": "adj.", "m": "珍貴的；寶貴的"}, {"w": "round", "pos": "n.", "m": "回合"}, {"w": "mat", "pos": "n.", "m": "墊子"}, {"w": "beat", "pos": "v.", "m": "(接連地)擊打"}, {"w": "chin", "pos": "n.", "m": "下巴"}, {"w": "recover", "pos": "v.", "m": "恢復；康復"}, {"w": "power", "pos": "n.", "m": "力氣；力量"}], "reference_words": [{"w": "boxer", "pos": "n.", "m": "拳擊手"}, {"w": "gravy", "pos": "n.", "m": "肉汁"}, {"w": "punch", "pos": "v.", "m": "用力猛擊"}, {"w": "tire", "pos": "v.", "m": "(使)感到疲累"}, {"w": "gloved", "pos": "adj.", "m": "戴著手套的"}, {"w": "fist", "pos": "n.", "m": "拳頭"}], "text": ["An aging **boxer** named Tom needed to fight a much younger, stronger man that **evening** just to earn enough money for **bread** and pay the **rent** for his small family. Before he left, his wife made him a simple meal and wished him luck.", "When the fight began, the crowd **clapped** loudly for the younger fighter. Tom knew every **round** would be a struggle, so he saved his **precious** energy, standing steady on the **mat** and waiting patiently for his chance instead of rushing in.", "By the final rounds, Tom's opponent grew tired, and Tom managed to land a hard punch on his **chin**, knocking him down — but the young man **recovered** just in time. Sadly, Tom's own strength and **power** ran out first; his mind drifted to the simple meal he never got to fully enjoy before the fight, and in the end, exhausted, he **beat** himself more than his opponent ever could.", "That night, thinking back on the simple **steak** dinner he never got to fully enjoy, Tom realized money and pride mattered far less than the family waiting for him at home."], "text_zh": ["一位年邁的**拳擊手**湯姆，那天**傍晚**必須和一個更年輕、更強壯的對手比賽，只為了賺夠錢買**麵包**、付**房租**，養活他的小家庭。出門前，妻子為他做了一頓簡單的餐點，並祝他好運。", "比賽開始後，觀眾為那位年輕拳擊手大聲**鼓掌**。湯姆知道每一**回合**都會很艱難，於是他保留著自己**寶貴**的體力，穩穩站在**擂台**上，耐心等待機會，而不是貿然出手。", "到了最後幾回合，湯姆的對手開始疲累，湯姆終於一記重拳擊中對方的**下巴**，把他擊倒——但年輕人**恢復**得剛剛好，及時站了起來。可惜的是，湯姆自己的體力和**力氣**先耗盡了；他的思緒飄回那頓還沒能好好享用的簡單餐點，最後，筋疲力盡的他，被打敗的與其說是對手，不如說是自己。", "那天晚上，回想起自己一直沒能好好享用的那頓簡單**牛排**晚餐，湯姆明白了，比起金錢和面子，在家等他的家人才更加重要。"]}, {"id": 31, "title_en": "The Pendulum", "title_zh": "鐘擺", "author": "O. Henry", "words": [{"w": "kiss", "pos": "n.", "m": "親吻"}, {"w": "unhappy", "pos": "adj.", "m": "不開心的"}, {"w": "answer", "pos": "v.", "m": "回答"}, {"w": "guy", "pos": "n.", "m": "人；傢伙"}, {"w": "surprise", "pos": "n.", "m": "驚喜"}, {"w": "train", "pos": "n.", "m": "火車"}, {"w": "tomorrow", "pos": "adv.", "m": "明天"}, {"w": "touch", "pos": "v.", "m": "碰觸"}, {"w": "imagine", "pos": "v.", "m": "想像"}, {"w": "change", "pos": "n.", "m": "改變；變化"}, {"w": "treat", "pos": "v.", "m": "對待"}, {"w": "clock", "pos": "n.", "m": "時鐘"}], "reference_words": [{"w": "pendulum", "pos": "n.", "m": "鐘擺"}, {"w": "relax", "pos": "v.", "m": "放鬆"}, {"w": "pool", "pos": "n.", "m": "撞球"}, {"w": "suddenly", "pos": "adv.", "m": "突然地"}], "text": ["Every evening, John's wife Katy would greet him at the door with a **kiss**. One night, though, he came home to find her gone, leaving only a note saying his mother was sick and she had taken the **train** home, promising to write **tomorrow**.", "John was shocked — he and Katy had never spent a night apart before. In an **unhappy**, worried way, he tried to reach her but could not, and he began to **imagine** all kinds of terrible things. He sat quietly, unable even to **touch** his own hat by the door as he usually did before going out to play pool with friends.", "Sitting alone, John finally realized how much he had taken Katy for granted, and he promised to **treat** her better from now on, watching the **clock** tick by slowly. Just then, the door opened — it had all been a simple mix-up, and Katy was safely home. When she asked her usual question, \"Now, where are you going?\", John simply **answered**, \"Nowhere at all,\" and stayed happily by her side, a **changed** **guy** at last.", "When Katy finally walked back through the door, John felt nothing but pure **surprise** and relief."], "text_zh": ["每天傍晚，約翰的妻子凱蒂都會在門口用一個**吻**迎接他。然而某天晚上，他回到家卻發現凱蒂不見了，只留下一張紙條，說婆婆生病了，她搭**火車**回家去了，並答應**明天**寫信回來。", "約翰嚇了一跳——他和凱蒂從來沒有分開過夜。他**難過**又擔心，試著聯絡她卻怎麼也聯絡不上，開始**想像**各種可怕的情況。他靜靜坐著，甚至連平常出門和朋友打撞球前都會**碰**一下的帽子，也提不起勁去碰了。", "獨自坐著的約翰終於明白，自己過去有多麼把凱蒂的付出視為理所當然，他答應從此要好好**對待**她，看著**時鐘**滴答滴答地慢慢走過。就在這時，門開了——原來一切只是一場誤會，凱蒂平安到家了。當她照往常一樣問：「你現在又要去哪裡呀？」約翰只是**回答**：「哪裡都不去，」便開心地留在她身邊，成了一個煥然一新的**男人**。", "當凱蒂終於從門口走回來時，約翰心裡只剩下滿滿的**驚喜**與如釋重負。"]}, {"id": 32, "title_en": "The Riverman", "title_zh": "河工", "author": "Stewart Edward White", "words": [{"w": "match", "pos": "n.", "m": "比賽；競賽"}, {"w": "pile", "pos": "n.", "m": "堆；疊"}, {"w": "roll", "pos": "v.", "m": "(使)滾動"}, {"w": "even", "pos": "adj.", "m": "勢均力敵的；相等的"}, {"w": "trip", "pos": "v.", "m": "(使)絆倒"}, {"w": "dishonest", "pos": "adj.", "m": "不誠實的；不老實的"}, {"w": "jam", "pos": "n.", "m": "積聚；堵塞"}, {"w": "interest", "pos": "v.", "m": "使感興趣"}, {"w": "jump", "pos": "v.", "m": "跳；跳躍"}, {"w": "pull", "pos": "v.", "m": "拉；拖"}, {"w": "pause", "pos": "n.", "m": "暫停；中斷"}, {"w": "brave", "pos": "adj.", "m": "勇敢的"}], "reference_words": [{"w": "boom", "pos": "n.", "m": "帆柱；橫桿"}, {"w": "floating", "pos": "adj.", "m": "浮起的；漂浮的"}, {"w": "play", "pos": "n.", "m": "打法"}, {"w": "lumber", "pos": "n.", "m": "木材"}, {"w": "crush", "pos": "v.", "m": "擠壓；壓扁"}, {"w": "crew", "pos": "n.", "m": "(團隊裡的)全體人員"}], "text": ["Two young rivermen, Jimmy and Dickey, were famous for their birling **matches** — standing on a floating log and trying to **roll** their rival off into the river. On the day of the big log **jam**, everyone gathered on the timber **pile** by the river to watch, since the two men were considered an almost **even** match.", "Partway through their contest, Dickey seemed to **trip** on purpose, and Jimmy later learned that Dickey had played **dishonest** tricks like that before, which only made him more **interested** in getting his own fair revenge someday.", "The next year, at another river **jam**, disaster suddenly struck: logs began crushing together, and Dickey was about to be caught between them. Without hesitation, Jimmy **jumped** onto a nearby log and **pulled** Dickey to safety, not stopping for even a **pause** to think of his own risk. Everyone praised his **brave** act, but Jimmy only said with a grin that he had simply saved Dickey for their next fair match."], "text_zh": ["兩位年輕的河工，吉米和迪基，以他們的滾木**比賽**聞名——兩人站在一根漂浮的原木上，設法把對方滾進河裡。在那場盛大的原木**堆積**日，大家都聚集在河邊的木材**堆**旁圍觀，因為這兩人被公認是勢均力敵的對手。", "比賽進行到一半，迪基似乎故意**絆倒**了對方，吉米後來得知，迪基以前也耍過這種**不老實**的把戲，這反而讓他更**有興趣**想找機會公平地報這個仇。", "隔年，在另一次河上原木**堵塞**的現場，突然發生了意外：原木開始互相擠壓，迪基眼看就要被夾在中間。吉米二話不說，**跳**上附近一根原木，把迪基**拉**到安全的地方，甚至沒有一絲**猶豫**去顧慮自己的安危。大家都稱讚他這個**勇敢**的舉動，但吉米只是笑著說，他只是想把迪基留到下次公平對決而已。"]}, {"id": 33, "title_en": "The Aged Mother", "title_zh": "年邁的母親", "author": "Japanese literature", "words": [{"w": "alone", "pos": "adv.", "m": "獨自地"}, {"w": "humble", "pos": "adj.", "m": "不起眼的；簡陋的"}, {"w": "base", "pos": "n.", "m": "底部"}, {"w": "order", "pos": "v.", "m": "命令"}, {"w": "painful", "pos": "adj.", "m": "痛苦的"}, {"w": "straight", "pos": "adj.", "m": "筆直的"}, {"w": "path", "pos": "n.", "m": "路徑；小路"}, {"w": "pile", "pos": "n.", "m": "堆"}, {"w": "command", "pos": "v.", "m": "下令"}, {"w": "rope", "pos": "n.", "m": "繩子"}, {"w": "frighten", "pos": "v.", "m": "使害怕；使驚恐"}, {"w": "success", "pos": "n.", "m": "成功"}], "reference_words": [{"w": "aged", "pos": "adj.", "m": "年邁的；上了年紀的"}, {"w": "journey", "pos": "n.", "m": "路途；旅程"}, {"w": "twig", "pos": "n.", "m": "小樹枝；細枝"}, {"w": "ash", "pos": "n.", "m": "灰燼"}, {"w": "saying", "pos": "n.", "m": "諺語"}, {"w": "wisdom", "pos": "n.", "m": "智慧"}], "text": ["A poor farmer lived **alone** with his aged mother in a **humble** little home at the **base** of a tall mountain, under the harsh **command** of a cruel local ruler who **ordered** that all old people be left on the mountain to die.", "Though it was **painful**, the farmer did not dare disobey. He carried his mother up a winding **path**, but she quietly dropped small **piles** of twigs along the way to mark a **straight** trail home for her son, worried he would get lost without her.", "When the farmer realized what she had done even at the edge of death, he was so moved that he decided to hide her safely at home instead, tying a **rope** around some ash to disguise his choice. Though the news might have **frightened** him at first, his clever plan was such a **success** that it eventually convinced the ruler to end the cruel law altogether, allowing old people to live safely with their families once more."], "text_zh": ["一位貧窮的農夫獨自和年邁的母親住在一座高山**山腳**下一間**簡陋**的小屋裡，當地一位殘暴的統治者下達嚴厲的**命令**，**命令**所有老人都要被留在山上等死。", "雖然這件事讓他**痛苦**萬分，農夫卻不敢違抗命令。他揹著母親走上一條蜿蜒的山**路**，母親卻在路上悄悄留下一小**堆**一小堆的樹枝，替兒子標出一條**筆直**的回家路，因為她擔心兒子沒有她會迷路。", "當農夫發現，母親即使在生死關頭仍在替他著想時，他深受感動，決定改把母親悄悄藏在家中，還用一條**繩子**捆著一些灰燼來掩飾自己的做法。雖然這消息一開始可能讓他有些**害怕**，但他這番聰明的計畫最終大獲**成功**，也說服了統治者徹底廢除了這條殘忍的法令，讓老人們得以再次安穩地與家人一起生活。"]}, {"id": 34, "title_en": "A Kidnapped Santa Claus", "title_zh": "被綁架的聖誕老人", "author": "L. Frank Baum", "words": [{"w": "castle", "pos": "n.", "m": "城堡"}, {"w": "valley", "pos": "n.", "m": "山谷"}, {"w": "hurt", "pos": "v.", "m": "傷害"}, {"w": "eve", "pos": "n.", "m": "前夕"}, {"w": "quick", "pos": "adj.", "m": "快的"}, {"w": "quiet", "pos": "adj.", "m": "安靜的"}, {"w": "rope", "pos": "n.", "m": "繩子"}, {"w": "tie", "pos": "v.", "m": "綁；捆"}, {"w": "mean", "pos": "adj.", "m": "兇惡的；殘暴的"}, {"w": "chance", "pos": "n.", "m": "機會"}, {"w": "wish", "pos": "v.", "m": "祝福；但願"}, {"w": "fail", "pos": "v.", "m": "失敗"}], "reference_words": [{"w": "cave", "pos": "n.", "m": "洞穴"}, {"w": "sleigh", "pos": "n.", "m": "雪橇"}, {"w": "upset", "pos": "adj.", "m": "煩躁的；難過的"}], "text": ["Santa Claus lived happily in a **castle** in a cheerful **valley**, but a group of jealous monsters living nearby wanted to **hurt** him because he made children so happy every Christmas **Eve**.", "On a **quick**, **quiet** night, the monsters threw a **rope** around Santa and used it to **tie** him up before his sleigh could leave. They were not usually **mean** creatures, but they felt this was their only **chance** to be noticed, so they kept him trapped in a mountain cave.", "One kind monster, sorry for what they had done, decided to **wish** Santa well instead of keeping him prisoner, and secretly set him free. Santa never got angry about it — he simply thanked the monster and hurried back to his sleigh, determined not to **fail** the children waiting for their gifts, and from then on, that one kind monster was always welcome to visit the workshop in the valley."], "text_zh": ["聖誕老公公原本快樂地住在一座歡笑山**谷**中的**城堡**裡，然而附近一群嫉妒他的怪物，因為他每年聖誕**夜**都能讓孩子們這麼開心，便想**傷害**他。", "在一個**迅速**又**安靜**的夜晚，怪物們用一條**繩子**套住聖誕老公公，並用它把他**綁**了起來，讓他的雪橇來不及離開。牠們其實並不是特別**兇惡**的生物，只是覺得這是牠們唯一能被注意到的**機會**，於是把他困在山洞裡。", "其中一隻善良的怪物，對自己所做的事感到抱歉，決定改為**祝福**聖誕老公公，而不是繼續囚禁他，於是悄悄放他自由。聖誕老公公一點也沒有生氣——他只是向那隻怪物道謝，便匆匆趕回雪橇上，下定決心絕不能**辜負**正在等待禮物的孩子們，從那之後，那隻善良的怪物永遠都受歡迎，可以隨時來山谷裡的工作坊拜訪。"]}, {"id": 35, "title_en": "The Snowman", "title_zh": "雪人", "author": "Andersen", "words": [{"w": "snowman", "pos": "n.", "m": "雪人"}, {"w": "sky", "pos": "n.", "m": "天空"}, {"w": "circle", "pos": "n.", "m": "圓形；圓圈"}, {"w": "summer", "pos": "n.", "m": "夏天"}, {"w": "behind", "pos": "prep.", "m": "在……後面"}, {"w": "stove", "pos": "n.", "m": "暖爐；火爐"}, {"w": "through", "pos": "prep.", "m": "穿過；通過"}, {"w": "near", "pos": "prep.", "m": "接近"}, {"w": "weather", "pos": "n.", "m": "天氣"}, {"w": "begin", "pos": "v.", "m": "開始"}, {"w": "poor", "pos": "adj.", "m": "可憐的"}, {"w": "over", "pos": "adj.", "m": "結束了的"}], "reference_words": [{"w": "set", "pos": "v.", "m": "(太陽)落下"}, {"w": "melt", "pos": "v.", "m": "融化"}, {"w": "puddle", "pos": "n.", "m": "水漥"}], "text": ["A little dog and his family built a **snowman** and stood him proudly under the open **sky**, right where he could look up and wonder about two strange, glowing **circles** he saw appear — one during the day, and a colder, whiter one at night.", "All through the **summer** — or rather, that first cold night — the snowman noticed a warm little house standing **behind** the yard, with a cozy **stove** glowing **through** the window. He told the family dog that he loved standing **near** the fence, watching that warm light, more than almost anything.", "As the **weather** slowly began to **begin** warming up, day by day, the **poor**, curious snowman melted a little more each time he stared too long and too closely at that fire he could never actually touch. By the time spring was **over**, the snowman was nothing but a small puddle — the dog realized, a little sadly, that the snowman had truly lost his heart to that warm stove, wanting only what he could never safely have."], "text_zh": ["一隻小狗和牠的家人一起堆了一個**雪人**，驕傲地把牠立在露天的**天空**下，讓雪人剛好可以抬頭望著兩個奇怪、發著光的**圓形**——一個白天出現，另一個在夜裡出現，顏色更白也更冷。", "整個**夏天**——或者說，是那第一個寒冷的夜晚——雪人注意到院子**後面**有一棟溫暖的小屋，一台舒適的**暖爐**透**過**窗戶發著光。牠告訴這家的狗，牠最喜歡的事，就是站在籬笆**附近**看著那道溫暖的燈光，勝過幾乎任何其他事。", "隨著**天氣**一天天漸漸**開始**回暖，這個**可憐**又好奇的雪人，每次盯著那團自己永遠碰不到的火焰看得太久、靠得太近，就會融化一點點。等到春天**結束**時，雪人已經只剩下一小灘水——小狗這才有點難過地明白，雪人是真的把心交給了那台溫暖的暖爐，牠想要的，正是自己永遠無法安全擁有的東西。"]}, {"id": 36, "title_en": "The Last Dream of the Old Oak", "title_zh": "老橡樹的最後一個夢", "author": "Andersen", "words": [{"w": "giant", "pos": "adj.", "m": "巨大的"}, {"w": "shore", "pos": "n.", "m": "海岸；湖岸"}, {"w": "sleep", "pos": "v.", "m": "睡覺"}, {"w": "bright", "pos": "adj.", "m": "明亮的"}, {"w": "count", "pos": "v.", "m": "計算"}, {"w": "repeat", "pos": "v.", "m": "重複"}, {"w": "single", "pos": "adj.", "m": "單一的"}, {"w": "memory", "pos": "n.", "m": "回憶"}, {"w": "rise", "pos": "v.", "m": "上升；升起"}, {"w": "feeling", "pos": "n.", "m": "感覺；感受"}, {"w": "storm", "pos": "n.", "m": "暴風雨"}, {"w": "die", "pos": "v.", "m": "死亡"}], "reference_words": [{"w": "oak", "pos": "n.", "m": "橡樹"}, {"w": "mayfly", "pos": "n.", "m": "蜉蝣"}, {"w": "root", "pos": "n.", "m": "根"}, {"w": "heaven", "pos": "n.", "m": "天堂"}], "text": ["An enormous, ancient oak tree stood proudly on the **shore** by the sea, three hundred sixty-five years old and full of memories. Every summer, tiny mayflies would dance happily around it, and every winter, the great tree would quietly go to **sleep**.", "One **bright** summer day, the old oak spoke to a mayfly, **feeling** sorry that its whole life lasted only a **single** day. But the little mayfly answered happily that it did not **count** time the same way — each moment felt full and wonderful, and it never regretted its **short** but joyful life.", "That winter, in a peaceful dream, the old oak felt its roots **rise** free from the ground, floating higher and higher as if it could finally fly, gathering every happy **memory** it had ever known. Sadly, that very night, a terrible **storm** hit the coast for real, and the powerful wind finally pulled the ancient tree down for good — but because it had spent its last night reliving every joyful memory, the old oak, like the mayfly before it, felt truly at peace as it passed away.", "That ancient, **giant** oak tree had learned to **repeat** its happiest memories every single winter, and when it finally began to **die**, it did so peacefully, at ease with the wonderful life it had lived."], "text_zh": ["一棵巨大的古老橡樹驕傲地矗立在海**岸**邊，已經三百六十五歲，充滿了無數回憶。每到夏天，小小的蜉蝣總會開心地圍著牠飛舞，每到冬天，這棵大樹就會靜靜地進入**冬眠**。", "一個**晴朗**的夏日，老橡樹對一隻蜉蝣說話，替牠感到惋惜，因為蜉蝣的一生竟然只有**短短**一天。但這隻小蜉蝣卻開心地回答，牠並不是用同樣的方式**計算**時間——每一刻對牠而言都豐富又美好，牠從不後悔自己雖然短暫、卻十分快樂的一生。", "那年冬天，在一個平靜的夢裡，老橡樹感覺到自己的樹根從地面**升**起，掙脫束縛，越飛越高，彷彿終於能夠飛翔，把牠所擁有過的每一份快樂**回憶**都收集了起來。可惜的是，就在那天晚上，一場猛烈的**暴風雨**真的侵襲了海岸，強風終於把這棵古老的大樹徹底吹倒——但因為牠在生命的最後一夜，重新活過了每一段快樂的回憶，這棵老橡樹，就像那隻蜉蝣一樣，在離世時感到了真正的平靜。", "這棵古老的**巨大**橡樹，學會了在每個冬天**重複**回味自己最快樂的回憶，當它終於開始**凋零**時，它走得十分平靜，對自己曾經擁有過的美好一生感到心滿意足。"]}, {"id": 37, "title_en": "All Gold Canyon", "title_zh": "黃金谷", "author": "Jack London", "words": [{"w": "narrow", "pos": "adj.", "m": "狹窄的"}, {"w": "stream", "pos": "n.", "m": "溪流；小河"}, {"w": "pool", "pos": "n.", "m": "水池；水潭"}, {"w": "satisfy", "pos": "v.", "m": "使滿意、滿足"}, {"w": "edge", "pos": "n.", "m": "邊緣"}, {"w": "foot", "pos": "n.", "m": "呎；英尺"}, {"w": "strike", "pos": "v.", "m": "開採到(天然資源)"}, {"w": "yell", "pos": "v.", "m": "吶喊；吼叫"}, {"w": "sense", "pos": "v.", "m": "察覺；感覺到"}, {"w": "instant", "pos": "n.", "m": "瞬間；片刻"}, {"w": "dead", "pos": "adj.", "m": "死亡的；離世的"}, {"w": "wound", "pos": "n.", "m": "傷口"}], "reference_words": [{"w": "canyon", "pos": "n.", "m": "峽谷"}, {"w": "hillside", "pos": "n.", "m": "山坡"}, {"w": "quartz", "pos": "n.", "m": "石英"}, {"w": "dirt", "pos": "n.", "m": "泥土；髒土"}, {"w": "chunk", "pos": "n.", "m": "(黃金、木材等的)大塊、厚片"}, {"w": "sharp", "pos": "adj.", "m": "劇烈的"}, {"w": "grab", "pos": "v.", "m": "抓住"}, {"w": "afterward", "pos": "adv.", "m": "之後；後來"}], "text": ["A hopeful gold miner named Bill found a **narrow** canyon with a small **stream** and a quiet **pool**, and something about the ground there **satisfied** him at once — he was sure gold was hidden somewhere nearby.", "For several days, Bill dug along the **edge** of the hillside, moving only a few **feet** at a time. Eventually he managed to **strike** real gold, and he **yelled** with joy so loudly that his voice echoed across the whole canyon.", "But Bill soon **sensed** danger — another greedy man had secretly been watching him, planning to steal the gold for himself. In the fight that followed, Bill was left with a small **wound**, but he ended up victorious, and the other man was found lying **dead** at the bottom of the hole he had dug to attack Bill from above. Shaken but unharmed, Bill quietly collected every last bit of his gold and finally left the canyon he now proudly called \"All Gold Canyon.\"", "By the time he reached the edge of the pool, digging just one more careful **foot** down, Bill felt completely **satisfied**, sure that in an **instant** his search for gold was finally over.", "Nothing could **satisfy** Bill more than finally holding real gold in his own two hands."], "text_zh": ["一位滿懷希望的採金人比爾，發現了一座**狹窄**的峽谷，裡面有一條小**溪**和一座安靜的**水潭**，那裡的地面讓他一眼就感到十分**滿意**——他確信附近一定藏著黃金。", "接連好幾天，比爾沿著山坡的**邊緣**一點一點地挖，每次只前進幾**呎**。最後，他終於**挖到**了真正的黃金，他開心地大**吼**了一聲，聲音在整個峽谷裡迴盪。", "但比爾很快就**察覺**到了危險——另一個貪心的人一直在暗中觀察他，計畫把黃金據為己有。在隨後的搏鬥中，比爾身上留下了一道小小的**傷口**，但最終他贏得了勝利，而那個人則**倒斃**在他為了從上方偷襲比爾而挖的洞底。雖然受到驚嚇但毫髮無傷的比爾，靜靜地收集起每一點黃金，最後離開了這座他如今驕傲地稱為「黃金谷」的峽谷。", "當他挖到水池邊緣、再仔細往下多挖一**呎**時，比爾感到十分**滿足**，確信自己尋找黃金的旅程，在這一**瞬間**終於畫下了句點。", "沒有什麼比親手捧著真正的黃金更能讓比爾感到**滿足**了。"]}, {"id": 38, "title_en": "Winter Bamboo", "title_zh": "孟宗竹的故事", "author": "Chinese legend", "words": [{"w": "village", "pos": "n.", "m": "村莊；村落"}, {"w": "wish", "pos": "n.", "m": "願望；希望"}, {"w": "cook", "pos": "v.", "m": "烹煮；做菜"}, {"w": "soup", "pos": "n.", "m": "湯"}, {"w": "season", "pos": "n.", "m": "季節"}, {"w": "forest", "pos": "n.", "m": "森林"}, {"w": "trouble", "pos": "v.", "m": "使煩惱；使苦惱"}, {"w": "hard", "pos": "adj.", "m": "堅硬的"}, {"w": "tear", "pos": "n.", "m": "眼淚"}, {"w": "wet", "pos": "adj.", "m": "濕的"}, {"w": "joy", "pos": "n.", "m": "歡樂；喜悅"}, {"w": "continue", "pos": "v.", "m": "持續；繼續"}], "reference_words": [{"w": "bamboo", "pos": "n.", "m": "竹子"}, {"w": "god", "pos": "n.", "m": "神"}], "text": ["In a small **village**, a boy named Meng Tsung lived with his mother, and his greatest **wish** was always to see her smile. He was very good at helping her **cook**, though their family was poor and could rarely afford much more than a simple bowl of **soup**.", "One cold winter **season**, his mother grew seriously sick, and Meng Tsung became deeply worried — the family's usual **forest** had no bamboo shoots at all during winter, and that only made his **trouble** even worse, since bamboo soup was the one thing his mother craved.", "Kneeling on the **hard**, frozen ground, Meng Tsung cried real **tears** of worry, and where they fell, the ground grew strangely **wet** and warm. To his great **joy**, tender green bamboo shoots suddenly began pushing up through the snow right where he had cried. He gathered them at once, cooked his mother's soup, and she recovered completely — and to this day, this rare kind of winter bamboo **continues** to grow, named after the boy whose love was strong enough to change the season itself."], "text_zh": ["在一個小**村莊**裡，住著一個名叫孟宗的男孩，和他的母親相依為命，他最大的**心願**，就是希望媽媽能夠開心地笑。他很會幫忙**煮**飯，雖然家裡很窮，往往連一碗簡單的**湯**都難得一喝。", "一個寒冷的冬**季**，母親病得很重，孟宗心裡非常擔憂——家附近的**竹林**在冬天完全沒有竹筍，這讓他的**煩惱**變得更加沉重，因為竹筍湯正是母親最想喝的東西。", "孟宗跪在**堅硬**冰冷的地面上，流下了滿是擔憂的**眼淚**，淚水落下的地方，地面竟奇異地變得**濕潤**又溫暖起來。讓他無比**欣喜**的是，翠綠的竹筍竟然從他哭泣的地方破雪而出。他立刻採了回去，煮了湯給母親喝，母親也完全康復了——直到今天，這種罕見的冬筍依然**持續**生長著，人們以這個孝心足以改變季節的男孩之名，稱它為「孟宗竹」。"]}, {"id": 39, "title_en": "The Friday Everything Changed", "title_zh": "星期五，一切都改變了", "author": "Anne Hart", "words": [{"w": "pump", "pos": "n.", "m": "(打水或打氣的)幫浦"}, {"w": "railway", "pos": "n.", "m": "鐵路；鐵道"}, {"w": "mean", "pos": "v.", "m": "意味；意指"}, {"w": "bucket", "pos": "n.", "m": "桶子"}, {"w": "silence", "pos": "n.", "m": "安靜；沉默"}, {"w": "pause", "pos": "n.", "m": "停頓；暫停"}, {"w": "precious", "pos": "adj.", "m": "寶貴的；珍貴的"}, {"w": "softball", "pos": "n.", "m": "壘球"}, {"w": "hit", "pos": "v.", "m": "擊；打"}, {"w": "swing", "pos": "v.", "m": "揮動；揮舞"}, {"w": "leave", "pos": "v.", "m": "離開"}, {"w": "final", "pos": "adj.", "m": "最後的"}], "reference_words": [{"w": "seatmate", "pos": "n.", "m": "鄰坐者"}, {"w": "recess", "pos": "n.", "m": "下課；課間休息"}, {"w": "state", "pos": "v.", "m": "說出；聲明"}], "text": ["At a small country school with no running water, two boys were chosen each week to walk to the **railway** station and **pump** water into a heavy **bucket**, carrying it back for everyone to drink. It was considered an important, grown-up job, one that no girl was ever asked to do.", "One Friday, a classmate named Alma bravely raised her hand and asked the teacher, Miss Ralston, why girls could never be water carriers too. The whole room fell into surprised **silence**, and after a long **pause**, Miss Ralston simply said she would think about it and answer the following week.", "The two boys, upset at the idea of losing their **precious** job, tried to make life difficult for Alma and the other girls, even keeping them from playing **softball** at recess. But the next Friday, Miss Ralston surprised everyone again: she walked onto the softball field herself, **swung** the bat, **hit** the ball out of sight, and calmly announced that from then on, girls would take their **final** turn carrying water too, proving that things could truly change for the better.", "The two boys had not **mean**t to be so unkind, but losing their **swing** at carrying the water bucket made them act their worst, until they finally learned to simply **leave** their old, unfair habits behind."], "text_zh": ["在一所沒有自來水的鄉下小學裡，每週都會選出兩位男孩走到**火車站**去打**幫浦**抽水，扛著沉重的水**桶**回來給大家喝。這被視為一份重要、成熟的工作，從來沒有女孩被要求做過。", "某個星期五，一位名叫艾瑪的同學鼓起勇氣舉手，問老師拉爾斯頓小姐，為什麼女生永遠不能當抬水的人。全班頓時陷入驚訝的**沉默**，經過一段長長的**停頓**，拉爾斯頓小姐只說她會考慮一下，下週再回答。", "那兩個男孩因為擔心失去這份**珍貴**的工作而心生不滿，甚至讓艾瑪和其他女孩無法在下課時間打**壘球**。但到了下一個星期五，拉爾斯頓小姐再次讓大家大吃一驚：她親自走進壘球場，**揮**動球棒，把球**擊**得不見蹤影，並平靜地宣布，從此以後，女生也可以輪到**最後**一次抬水的機會，證明了事情真的可以變得更好。", "那兩個男孩並不是真的**存心**要那麼不友善，只是失去揮動水桶的機會讓他們表現得很差，直到他們終於學會，把過去那些不公平的舊習慣**拋下**。"]}, {"id": 40, "title_en": "One Thousand Dollars", "title_zh": "一千美元", "author": "O. Henry", "words": [{"w": "lawyer", "pos": "n.", "m": "律師"}, {"w": "hospital", "pos": "n.", "m": "醫院"}, {"w": "servant", "pos": "n.", "m": "(尤指舊時的)僕人"}, {"w": "report", "pos": "v.", "m": "回報；報告"}, {"w": "taxi", "pos": "n.", "m": "計程車"}, {"w": "rather", "pos": "adv.", "m": "相當"}, {"w": "surprised", "pos": "adj.", "m": "感到驚訝的"}, {"w": "gentle", "pos": "adj.", "m": "溫柔的；溫和的"}, {"w": "secret", "pos": "adj.", "m": "祕密的；不讓人知道的"}, {"w": "character", "pos": "n.", "m": "品格"}, {"w": "selfish", "pos": "adj.", "m": "自私的"}, {"w": "pocket", "pos": "n.", "m": "口袋"}], "reference_words": [{"w": "carefree", "pos": "adj.", "m": "無憂無慮的"}, {"w": "allowance", "pos": "n.", "m": "零用錢"}, {"w": "will", "pos": "n.", "m": "遺囑"}, {"w": "spending", "pos": "n.", "m": "花費；開銷"}, {"w": "instead", "pos": "adv.", "m": "反而；卻"}, {"w": "reveal", "pos": "v.", "m": "揭露；提示"}, {"w": "wisely", "pos": "adv.", "m": "有智慧地"}, {"w": "whistle", "pos": "v.", "m": "吹口哨"}, {"w": "confess", "pos": "v.", "m": "坦承；承認"}, {"w": "deserve", "pos": "v.", "m": "應得；值得"}], "text": ["Robert Gillian had always lived a carefree life thanks to his rich uncle's money, but everything changed the day his uncle passed away. At his uncle's **lawyer**'s office, Gillian learned that almost all the fortune had been left to a scientist and a **hospital**, while the family's loyal **servants** each received only a small ring and ten dollars.", "Gillian himself received only one thousand dollars, and strangely, he was required to **report** exactly how he spent it back to the lawyer. Confused and a little **surprised**, he hopped into a **taxi** and went to visit Miss Hayden, a **gentle** young woman his uncle had once cared for.", "There, in a **secret** moment, Gillian gave her all one thousand dollars, quietly revealing genuine feelings for her, though she gently turned him down. Back at the lawyer's office, it turned out his uncle's will had one final hidden **secret**: if Gillian showed good **character** with the money, he would inherit fifty thousand dollars more; if he was **selfish** and wasted it, the fortune would go to Miss Hayden instead. Without saying a word about giving the money away, Gillian simply tore up his own honest report and put the pieces in his **pocket**, choosing to protect her secretly **rather** than claim the reward for himself."], "text_zh": ["羅伯特‧吉利安一直過著無憂無慮的生活，全靠他富有的叔叔給的錢，但叔叔過世那天，一切都變了。在叔叔的**律師**事務所裡，吉利安得知，幾乎所有財產都留給了一位科學家和一間**醫院**，家中忠心的**僕人們**每人卻只得到一枚戒指和十美元。", "吉利安自己只得到一千美元，而且很奇怪的是，他還被要求把這筆錢的花費詳細**回報**給律師。他感到既困惑又有點**驚訝**，跳上一輛**計程車**，去拜訪海登小姐——一位叔叔生前曾經照顧過的**溫柔**年輕女子。", "在那裡，吉利安在一個**祕密**的時刻，把整整一千美元都給了她，悄悄流露出對她真實的情感，儘管她溫柔地婉拒了他。回到律師事務所後，才發現叔叔的遺囑其實還藏著最後一個**祕密**：如果吉利安花這筆錢時展現出良好的**品格**，就能再繼承五萬美元；但如果他表現得**自私**、把錢浪費掉，這筆錢就會轉給海登小姐。吉利安隻字不提自己把錢送人的事，只是把自己那份誠實的報告撕碎，放進**口袋**裡，選擇悄悄保護她，而不是為自己爭取那筆獎金。"]}, {"id": 41, "title_en": "The Story of Chang'e", "title_zh": "嫦娥奔月", "author": "Chinese legend", "words": [{"w": "young", "pos": "adj.", "m": "年輕的；幼小的"}, {"w": "angry", "pos": "adj.", "m": "生氣的"}, {"w": "pass", "pos": "v.", "m": "(時間)過去；流逝"}, {"w": "become", "pos": "v.", "m": "成為；變成"}, {"w": "happen", "pos": "v.", "m": "發生"}, {"w": "rise", "pos": "v.", "m": "升起；上升"}, {"w": "shoot", "pos": "v.", "m": "射(箭)；射中"}, {"w": "enough", "pos": "pron.", "m": "足夠的"}, {"w": "power", "pos": "n.", "m": "能力；本領"}, {"w": "jump", "pos": "v.", "m": "跳；跳躍"}, {"w": "fall", "pos": "v.", "m": "落下；跌落"}, {"w": "successful", "pos": "adj.", "m": "成功的"}], "reference_words": [{"w": "hunter", "pos": "n.", "m": "獵人"}, {"w": "luckily", "pos": "adv.", "m": "幸運地"}, {"w": "forever", "pos": "adv.", "m": "永遠"}, {"w": "palace", "pos": "n.", "m": "宮殿"}, {"w": "instead", "pos": "adv.", "m": "反而；作為替代"}], "text": ["Chang'e was a **young**, beautiful woman who worked for the Jade Emperor in Heaven, until one mistake made him ** /* ======================= 國中英文 2000 單字 × 經典故事閱讀 學習系統 ======================= */
(function(){
"use strict";

/* ---------- 句型提示（依詞性） ---------- */
const POS_PATTERNS = {
 "名詞": {tip:"名詞：可當主詞或受詞，常搭配 a/an、the、this/that 或所有格。",
   patterns:["This is a/an ___.", "I have a/an ___.", "I like ___(s).", "There is/are ___ over there."]},
 "動詞": {tip:"動詞：依主詞單複數變化(第三人稱單數+ s)，注意時態。",
   patterns:["I ___ every day.", "She ___s after school.", "Do you ___ on weekends?", "Please ___ now."]},
 "形容詞": {tip:"形容詞：放在 be 動詞後，或名詞前面修飾名詞。",
   patterns:["S + be動詞 + ___.", "This/That ___ book is interesting.", "I feel ___ because..."]},
 "副詞": {tip:"副詞：修飾動詞、形容詞或整句，頻率副詞常放在一般動詞前。",

 "介系詞": {tip:"介系詞：後面加名詞或代名詞，說明時間、地點或方式。",
   patterns:["S + V + ___ + the park/school.", "The book is ___ the table."]},
 "連接詞": {tip:"連接詞：連接兩個句子或子句。",
