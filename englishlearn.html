ed a metal **wok**. We need a plastic **tube**.\" He wanted to **build** a small shed.", "text_zh": "爸爸打開他的工具箱。他有一把用來做家務的重槌子。他有一把備用鑰匙。他有一塊橡膠墊。他有一根尖銳的針。他有一個平底鍋。他有一個陶瓷茶壺。他有一把備用雨傘。「我們還需要一個新馬桶，」他說。「我們也需要一個垃圾桶。我們需要一個金屬炒鍋。我們需要一根塑膠管。」他想蓋一間小工具間。"}, {"day": 54, "title_zh": "打掃新家", "text": "Everyone helped **clean** the new place. Mia wanted to **decorate** her room. Her mom wanted to **design** the kitchen herself. Dad had to **fix** a broken chair. He also had to **repair** the leaky faucet. \"I'll **sweep** the floor,\" said Mia. \"You **wash** the windows.\" Outside, the **street** was quiet. It was close to an **elementary school**. It was close to a **junior high school**. It was close to a **kindergarten**. It was close to their new **school**. It was close to a **senior high school** too.", "text_zh": "大家一起幫忙打掃新家。米亞想佈置自己的房間。媽媽想自己設計廚房。爸爸得修好一張壞掉的椅子。他也得修理漏水的水龍頭。「我來掃地，」米亞說。「你去擦窗戶。」外面的街道很安靜。附近有一所小學。附近有一所國中。附近有一間幼稚園。附近有他們的新學校。附近也有一所高中。"}, {"day": 55, "title_zh": "校園巡禮", "text": "Not far from home was a **university**. It had a huge **campus**. Mia's new **classroom** was bright and clean. A friendly **guard** stood at the gate. The school had a big **gym**. It had a fun **playground**. It had a quiet **library**. On the playground was a **seesaw**. There was also a tall **slide**. Inside her classroom was a wooden **board**. There was a **blackboard** too. There was a shelf of **book**s. There was a box of **chalk**.", "text_zh": "離家不遠有一所大學。它有一個很大的校園。米亞的新教室又明亮又乾淨。一位友善的警衛站在校門口。學校裡有一個大體育館。有一個好玩的遊樂場。有一間安靜的圖書館。遊樂場上有一座蹺蹺板。也有一座高高的溜滑梯。她的教室裡有一塊木板。也有一塊黑板。有一個放書的書架。有一盒粉筆。"}, {"day": 56, "title_zh": "文具盒裡的驚喜", "text": "Mia's pencil box had many things. It had colorful **crayon**s. It had a small **diary**. It had a thick **dictionary**. It had a white **envelope**. It had a pink **eraser**. It had her reading **glasses**. It had a bottle of **glue**. It had a pen with black **ink**. It had an old **letter**. It had a fun **magazine**. It had a folded **map**. It had a yellow **marker**. It had a new **notebook**.", "text_zh": "米亞的鉛筆盒裡有很多東西。有彩色蠟筆。有一本小日記本。有一本厚厚的字典。有一個白色信封。有一顆粉紅色橡皮擦。有她的閱讀眼鏡。有一瓶膠水。有一支黑色墨水的筆。有一封舊信。有一本有趣的雜誌。有一張摺起來的地圖。有一支黃色麥克筆。有一本新筆記本。"}, {"day": 57, "title_zh": "打開課本", "text": "Mia got out her **backpack**. Inside was her **textbook**. She opened it to a new **page**. She found a piece of **paper** too. She grabbed her **pen** and her **pencil**. Both were inside her **pencil box**. She saw a nice **picture** on the page. Her friend sent her a **postcard**. It came with a birthday **present**! She used a **ruler** to draw a line. Then she tore one **sheet** from her **workbook**. She put everything back in her **backpack**.", "text_zh": "米亞拿出她的背包。裡面有她的課本。她翻到新的一頁。她也找到一張紙。她拿出她的原子筆和鉛筆。兩個都放在鉛筆盒裡。她在那一頁看到一張好看的照片。她朋友寄給她一張明信片。裡面還有生日禮物！她用尺畫了一條線。然後她從練習本撕下一張紙。她把東西都放回背包。"}, {"day": 58, "title_zh": "選課單", "text": "Mia has a new **course** list this year. She takes **art** class. She takes **Chinese** class too. She likes **English** best. She also studies **geography**. She learns about **history**. Next year, she will study **biology**. She will also study **chemistry**. And she will study **physics** too. \"I like learning a new **language**,\" she said. She thinks **law** is interesting. She has **math** class every day. She has **music** class too.", "text_zh": "米亞今年有新的課表。她上美術課。她也上國文課。她最喜歡英文。她也學地理。她學歷史。明年，她會學生物。她也會學化學。還會學物理。「我喜歡學新的語言，」她說。她覺得法律很有趣。她每天都有數學課。她也有音樂課。"}, {"day": 59, "title_zh": "教室裡的角色", "text": "Mia also has **science** class. She has **social science** class too. Mia is a **cheerleader** for the sports team. Her friend Ken is the **class leader**. Every **classmate** is a **friend** too. The **principal** came to say hi to new **student**s. Their **teacher** was kind. She said, \"Please **answer** when I **ask** a question.\" She said, \"Please **behave** in class.\" Then she began to **explain** the first lesson.", "text_zh": "米亞也要上科學課。她也要上社會課。米亞是啦啦隊長。她朋友肯是班長。每個同學都是朋友。校長來跟新生打招呼。他們老師人很好。她說：「我問問題的時候，請回答。」她說：「上課要守規矩。」然後她開始講解第一課。"}, {"day": 60, "title_zh": "上課的規矩", "text": "The teacher wants us to **learn** well. She said we must **listen** carefully. She will **mark** every test. She hopes everyone can **pass**. \"**Practice** every day,\" she said. She also said, \"You must **prepare** before class.\" \"**Pronounce** each word clearly,\" she told us. \"I will not **punish** you for a mistake.\" She asked us to **read** out loud. She asked us to **repeat** new words. She asked us to **review** old words. \"Please **say** it again,\" she told a shy boy. She wants him to **speak** loudly.", "text_zh": "老師希望我們學得好。她說我們必須仔細聆聽。她會批改每一次測驗。她希望大家都能及格。「每天練習，」她說。她也說：「上課前要先預習。」「每個字都要發音清楚，」她告訴我們。「唸錯了我也不會處罰你。」她要我們大聲朗讀。她要我們跟著唸新單字。她要我們複習舊單字。「請再說一次，」她對一個害羞的男孩說。她希望他大聲說出來。"}, {"day": 61, "title_zh": "拼字與寫作課", "text": "The teacher asked, \"Can you **spell** this word?\" One boy said, \"I **study** every night.\" He wanted to **talk** about the story. He had a short **conversation** with his friend. \"I love to **teach** this lesson,\" the teacher smiled. She asked students to **draw** a picture. Then she asked them to **underline** the main idea. \"Do you **understand**?\" Everyone nodded. They began to **write** their answers. They got ready for the **exam**. \"Here is one **example**,\" she said. She gave the class an **exercise** to try. The **final** bell rang.", "text_zh": "老師問：「你會拼這個字嗎？」一個男孩說：「我每天晚上都讀書。」他想聊聊這個故事。他跟朋友有一段簡短的對話。「我很喜歡教這一課，」老師微笑著說。她請學生們畫一張圖。然後請他們把重點畫底線。「你們懂了嗎？」大家點點頭。他們開始寫下答案。他們準備好迎接考試。「這是一個例子，」她說。她給全班一個練習題試試看。下課鐘響了。"}, {"day": 62, "title_zh": "考卷發下來了", "text": "Mia asked, \"What **grade** did you get?\" She was worried about her **homework**. \"I studied hard, but this **knowledge** felt new,\" she said. She thought about the last **lesson**. It was a long **poem** with a hard **problem**. \"I couldn't answer every **question** in the **quiz**,\" she sighed. Her teacher keeps a **record** of every **score**. \"Don't worry,\" said her friend. \"Even a **story** is like a **test**. You just need more **vocabulary**.\"", "text_zh": "米亞問：「你考得怎麼樣？」她擔心自己的功課。「我很用功，但這個知識好陌生，」她說。她想起上一課。那是一首長詩，裡面有一個很難的問題。「這次小考我沒能答完每一題，」她嘆氣說。她的老師會記錄每一次的分數。「別擔心，」她朋友說。「就連一個故事也像一種測驗。你只是需要更多單字。」"}, {"day": 63, "title_zh": "座位在哪裡？", "text": "It was a new **semester**. Mia needed to find her **position** in the classroom. \"Is my seat in the **back**, or **forward** near the front?\" she asked. \"Walk **backward** two steps, then look **front**,\" said her friend. \"Your desk is on the **left**. It's in the **middle** row, not the **right** side.\" On the wall was a compass. It showed **east**, **west**, **south**, and **north**. An arrow pointed to the top of the map.", "text_zh": "新學期開始了。米亞得找到自己在教室裡的位置。「我的座位在後面，還是靠前面？」她問。「往後走兩步，然後往前看，」她朋友說。「妳的桌子在左邊。是中間那一排，不是右邊。」牆上有一個指南針。上面標示著東、西、南、北。箭頭指向地圖的上方。"}, {"day": 64, "title_zh": "社區地圖", "text": "At the **top** of the street was a warm **bakery**. Next to it was a busy **bank**. Down the road was a sunny **beach**. There was also a nice **bookstore**. Next to it was a big **buffet**. Near the school was a **cafeteria**. On the corner was an old **church**. Beside it was a handy **convenience store**. There was also a fun **culture center**. Further on was a tall **department store**. Next to it was a small **drugstore**. At the end was a busy **factory**.", "text_zh": "街的頂端有一間溫暖的麵包店。旁邊是一間忙碌的銀行。往下走是一片陽光普照的海灘。還有一間不錯的書店。旁邊是一間大型自助餐廳。學校附近有一間餐廳。轉角處有一座老教堂。旁邊是一間方便的便利商店。還有一間好玩的文化中心。再往前是一間高大的百貨公司。旁邊是一間小藥局。最後面是一間忙碌的工廠。"}, {"day": 65, "title_zh": "街上的商店", "text": "Mia's family often ate at a **fast food restaurant**. It was near the **fire station**. Down the road was a pretty **flower shop**. Next to it was a big **hospital**. There was also a tall **hotel**. On weekends, they went to the **mall**. Or they went to the **market**. \"Where's the **men’s room**?\" Dad asked. Mom checked the **women’s room**. Next door was a **movie theater**. Beside it was a quiet **museum**. There was also a busy **office**. And a green **park**.", "text_zh": "米亞一家人常在速食餐廳吃飯。那間店在消防局附近。沿路往下有一間漂亮的花店。旁邊是一間大醫院。還有一間高高的飯店。週末，他們會去購物中心。或是去市場。「男廁在哪裡？」爸爸問。媽媽去確認女廁的位置。隔壁是一間電影院。旁邊是一間安靜的博物館。還有一間忙碌的辦公室。還有一座綠色的公園。"}, {"day": 66, "title_zh": "更多地方", "text": "Behind the park was a blue swimming **pool**. Next to it was a **post office**. There was also a **police station**. \"Is there a **restroom** near this **restaurant**?\" Mia asked. She loved to visit every little **shop**. She really liked the **stationery store**. She also liked the toy **store**. On Saturdays, they went to the **supermarket**. They also went to an old **temple**. Then a big **theater**. They saw some famous **waterfalls**. Last, they went to the **zoo**.", "text_zh": "公園後面有一座藍色的游泳池。旁邊是一間郵局。還有一間警察局。「這間餐廳附近有洗手間嗎？」米亞問。她喜歡逛每一間小店。她很喜歡那間文具店。她也喜歡那間玩具店。星期六，他們會去超市。他們也會去一座古老的寺廟。然後去一間大戲院。他們看了幾座有名的瀑布。最後，他們去了動物園。"}, {"day": 67, "title_zh": "城市與鄉村", "text": "Mia's grandfather asked, \"Do you like the **city** or the **country**?\" \"I like **downtown**,\" Mia laughed. \"But you like the **farm**.\" \"Every **place** has something special,\" he said. \"I love our small **town**.\" \"I love its quiet **village** too.\" \"This **local** market is nice,\" he said. \"But that **international** airport is exciting too!\" Just then, an **airplane** flew overhead. An **ambulance** rushed by. A boy rode his **bicycle** near the lake. A small **boat** floated on the water.", "text_zh": "米亞的爺爺問：「你喜歡城市還是鄉下？」「我喜歡市中心，」米亞笑著說。「但你喜歡農場。」「每個地方都有特別的地方，」他說。「我喜歡我們的小鎮。」「我也喜歡它安靜的村莊。」「這個當地的市場很不錯，」他說。「但那座國際機場也很令人興奮！」就在這時，一架飛機從頭頂飛過。一輛救護車呼嘯而過。一個男孩在湖邊騎腳踏車。一艘小船漂在水面上。"}, {"day": 68, "title_zh": "各種交通工具", "text": "On the road, Mia saw a yellow school **bus**. She also saw a shiny **car**. She heard a loud **helicopter** in the sky. A green **jeep** passed by. It passed a **motorcycle** and a small **scooter**. Out at sea, a big **ship** looked strong. It looked as strong as a **tank**. \"Let's take a **taxi** to the **train**,\" said Dad. He waved down a **truck** driver for directions. At the **airlines** counter, they checked their tickets. They were at the **airport**.", "text_zh": "在路上，米亞看到一輛黃色校車。她也看到一輛閃亮的汽車。她聽到天空中有一架吵鬧的直升機。一輛綠色吉普車開過去。它超過了一輛摩托車和一輛小型機車。在海上，一艘大船看起來很堅固。它像坦克一樣堅固。「我們搭計程車去搭火車吧，」爸爸說。他招手向一位卡車司機問路。在航空公司櫃台，他們核對了機票。他們人在機場。"}, {"day": 69, "title_zh": "從公車站到月台", "text": "They waited at the **bus stop**. Then they walked to the **parking lot**. It was near the train **station**. At the **train station**, they crossed a **block**. Then they crossed a tall **bridge**. \"Oh no, a **flat tire**!\" said a driver on the **highway**. Mia's family walked over an **overpass**. They were careful, like a good **passenger** should be. They followed a quiet **path** to the **platform**. It was close to the old **railroad**.", "text_zh": "他們在公車站等車。接著他們走到停車場。那裡靠近火車站。到了火車站，他們穿過一個街區。接著他們走過一座高高的橋。「糟了，爆胎了！」高速公路上一位司機說。米亞一家人走過一座天橋。他們很小心，就像一個好乘客該有的樣子。他們沿著一條安靜的小路走到月台。那裡靠近那條老舊的鐵路。"}, {"day": 70, "title_zh": "交通規則", "text": "Along the **railway**, there was a clean **sidewalk**. There was also a busy **subway** station. \"Watch the **traffic**!\" Dad said. He guided them through the **underpass**. A bicycle's **wheel** spun fast. They watched it **arrive**. \"Don't **cross** here,\" the guard warned. He watched cars **drive** by. He watched birds **fly** above. He watched a plane **land** nearby. \"Let's **ride** the bus,\" said Mom. \"Or maybe **sail** on a boat instead.\"", "text_zh": "沿著鐵路，有一條乾淨的人行道。還有一座忙碌的地鐵站。「小心來車！」爸爸說。他帶著他們穿過地下道。一輛腳踏車的輪子快速轉動。他們看著它抵達。「不要在這裡穿越馬路，」警衛提醒。他看著車子開過去。他看著鳥兒在上方飛。他看著一架飛機在附近降落。「我們搭公車吧，」媽媽說。「或是改搭船好了。」"}, {"day": 71, "title_zh": "量身高體重", "text": "Mia went to the clinic. She had to **turn** left down the hall. \"Don't walk too **fast**,\" said the nurse. \"Don't walk too **slow** either.\" The nurse measured Mia's height in **centimeter**s. She measured Dad's height in **foot**. She weighed a toy in **gram**s. She measured a pencil in **inch**es. She read Mia's weight in **kilogram**s. She measured the walk home in **kilometer**s. She measured water in **liter**s. She measured the wall in **meter**s. She measured a road in **mile**s. She measured a bag of rice in **pound**s.", "text_zh": "米亞去診所。她要沿著走廊往左轉。「不要走太快，」護士說。「也不要走太慢。」護士用公分量米亞的身高。她用英呎量爸爸的身高。她用公克秤一個玩具。她用英吋量一支鉛筆。她用公斤讀出米亞的體重。她用公里量走回家的路。她用公升量水。她用公尺量牆壁。她用英哩量一條路。她用磅秤一袋米。"}, {"day": 72, "title_zh": "數學課的形狀", "text": "In math class, they measured a garden in **yard**s. \"Draw a **circle**,\" said the teacher. She made a **dot** in the middle. \"Now draw a straight **line**. Make a sharp **point**.\" The students drew a **rectangle**. They sat in a neat **row**. They looked at every **shape**. They saw a **square**. They saw a **triangle**. They saw an **angle** where two lines meet. \"This shape is **big**,\" said one kid. \"But that hole is very **deep**.\"", "text_zh": "數學課時，他們用碼量了一座花園。「畫一個圓，」老師說。她在中間畫了一個點。「現在畫一條直線。畫一個尖尖的點。」學生們畫了一個長方形。他們整齊地坐成一排。他們看了每一種形狀。他們看到一個正方形。他們看到一個三角形。他們看到兩條線相交的角。「這個形狀很大，」一個小孩說。「但那個洞很深。」"}, {"day": 73, "title_zh": "遠近大小", "text": "\"That mountain looks **distant**,\" said Mia. \"I need **extra** time to walk there.\" \"It's too **far** for today.\" The hill was **high**. But the valley below was **large**. \"This bag feels **light**,\" she said. The path felt **little** compared to yesterday's **long** hike. \"The road looks **low** here.\" At its **maximum** height, the trail became **medium** wide. A **minus** sign showed how far below sea level it once was. Then the trail got **narrow**.", "text_zh": "「那座山看起來好遠，」米亞說。「我需要多一點時間才能走到。」「今天去太遠了。」那座山丘很高。但下面的山谷很大。「這個袋子摸起來很輕，」她說。這段路感覺很短，比起昨天的長途健行。「這裡的路看起來比較低。」在它最高的地方，步道變成中等寬度。一個負號顯示這裡以前比海平面低多少。接著步道變得很窄。"}, {"day": 74, "title_zh": "加加減減", "text": "In math, positive numbers use a **plus** sign. \"This pencil is too **short**,\" said Mia. She compared it to a **small** eraser. \"Draw a **straight** line. Don't draw a **tiny** one,\" said the teacher. She pointed at a **wide**, **round** table. On the table sat a **bottle**. There was a **cup**. There was a **dozen** eggs. There was a tall **glass**. There was a **loaf** of bread. There was a **pack** of pencils.", "text_zh": "數學課時，正數用加號表示。「這支鉛筆太短了，」米亞說。她拿它跟一顆小橡皮擦比。「畫一條直線。不要畫得太小，」老師說。她指著一張又寬又圓的桌子。桌上放著一個瓶子。有一個杯子。有一打雞蛋。有一個高玻璃杯。有一條吐司。有一包鉛筆。"}, {"day": 75, "title_zh": "包裹與重量", "text": "A **package** came to the door. Inside was a **pair** of shoes. There was also a **piece** of cake. \"What **size** is it?\" Mia asked. She checked its **height**. She measured the **distance** to her room. She checked the **weight** of the box. \"Let's **measure** the total **amount**,\" said Dad. Inside was a red envelope for **Chinese New Year**. There was a card for **New Year’s Eve**. There was a card for **Double Tenth Day**. There was a card for the **Dragon-boat Festival**.", "text_zh": "一個包裹送到門口。裡面有一雙鞋子。還有一塊蛋糕。「這是什麼尺寸？」米亞問。她檢查了它的高度。她量了到房間的距離。她查看了箱子的重量。「我們來量一下總重量，」爸爸說。裡面還有一個過農曆新年的紅包。有一張除夕的卡片。有一張雙十節的卡片。有一張端午節的卡片。"}, {"day": 76, "title_zh": "節慶月曆", "text": "The calendar was full of festivals. There was the **Lantern Festival**. There was the **Moon Festival**. There was **Teacher’s Day**. Later in the year came **Christmas**. Then came **Easter**. Then came spooky **Halloween**. After that came **New Year’s Day**. There was **Mother’s Day**. There was **Father’s Day**. There was **Thanksgiving**. There was sweet **Valentine’s Day**. \"Every **culture** has its own special **custom**,\" said the teacher.", "text_zh": "月曆上排滿了節日。有元宵節。有中秋節。有教師節。年底時有聖誕節。接著有復活節。還有嚇人的萬聖節。之後有元旦。有母親節。有父親節。有感恩節。還有甜蜜的情人節。「每種文化都有自己特別的習俗，」老師說。"}, {"day": 77, "title_zh": "假期回憶", "text": "\"I love every **festival** and **holiday**,\" said Mia. She lit a red paper **lantern**. \"This summer **vacation** gave me a great **memory**.\" Her family liked to **celebrate** together. At the show, they saw a talented **actor**. They saw a graceful **actress**. They saw a creative **artist**. Backstage, an **assistant** helped a **baby sitter** watch the little kids. A **barber** cut the show's **boss**'s hair.", "text_zh": "「我喜歡每一個節日和假期，」米亞說。她點亮了一盞紅色紙燈籠。「這個暑假給了我很棒的回憶。」她的家人喜歡一起慶祝。在表演上，他們看到一位有才華的男演員。他們看到一位優雅的女演員。他們看到一位有創意的藝術家。後台，一位助理幫忙保母照顧小朋友。一位理髮師幫節目的老闆剪頭髮。"}, {"day": 78, "title_zh": "職業博覽會", "text": "At the career fair, Mia met many workers. She met a busy **businessman**. She met a friendly shop **clerk**. She met a skilled **cook**. She met a kind **dentist**. She met a wise **diplomat**. She met a helpful **doctor**. She met a careful **driver**. She met a clever **engineer**. She met a hard-working **farmer**. She met a patient **fisherman**. She met a fun **guide**. She met a talented **hair dresser**. She met a busy **housewife**.", "text_zh": "在職業博覽會上，米亞認識了許多工作者。她認識了一位忙碌的商人。她認識了一位友善的店員。她認識了一位技術好的廚師。她認識了一位親切的牙醫。她認識了一位聰明的外交官。她認識了一位樂於助人的醫生。她認識了一位小心的司機。她認識了一位聰明的工程師。她認識了一位辛勤的農夫。她認識了一位有耐心的漁夫。她認識了一位有趣的導遊。她認識了一位有才華的美髮師。她認識了一位忙碌的家庭主婦。"}, {"day": 79, "title_zh": "更多職業", "text": "There was also a skilled **hunter**. There was a curious **journalist**. There was a fair **judge**. There was a smart **lawyer**. A **magician** did tricks. The **mailman** brought letters nearby. A busy **manager** talked to a **mechanic**. A tall **model** posed for photos. A talented **musician** played music. A caring **nurse** helped a child. A creative **painter** worked on a wall painting. A brave **police officer** walked by.", "text_zh": "還有一位技術好的獵人。有一位好奇的記者。有一位公正的法官。有一位聰明的律師。一位魔術師表演戲法。郵差在附近送信。一位忙碌的經理和一位技師在說話。一位高的模特兒在拍照。一位有才華的音樂家在演奏音樂。一位貼心的護士在照顧小孩。一位有創意的畫家在畫壁畫。一位勇敢的警察走了過去。"}, {"day": 80, "title_zh": "各行各業", "text": "Even the **president** came to visit. A kind **priest** greeted him. A **reporter** talked to a **sailor**. She also talked to a friendly **salesman**. Nearby, a curious **scientist** talked with a busy **secretary**. An old story told of a loyal **servant**. It also told of a proud **shopkeeper**. A famous **singer** performed. A strong **soldier** cheered for her. A helpful **waiter** cheered too. A smiling **waitress** cheered too.", "text_zh": "就連總統也來訪。一位親切的神父迎接他。一位記者訪問了一位水手。她也訪問了一位友善的業務員。附近，一位好奇的科學家和一位忙碌的秘書聊天。一個古老的故事講了一位忠誠的僕人。也講了一位驕傲的店主。一位知名歌手登台表演。一位強壯的軍人為她歡呼。一位樂於助人的服務生也歡呼。一位微笑的女服務生也歡呼。"}, {"day": 81, "title_zh": "開公司", "text": "A famous **writer** signed books next to a food **vendor**. \"I want to start a **business**,\" said Mia's uncle. He dreamed of his own **company**. \"You need to **employ** good workers,\" said Dad. \"You need to **hire** the right team.\" Outside, they checked the **weather**. It looked **clear** in the morning. It turned **cloudy** by noon. \"It feels **cold**, but not too **cool**,\" said Mia. \"At least it's **dry**, not **foggy**.\"", "text_zh": "一位知名作家在一個食物攤販旁簽書。「我想開一家公司，」米亞的叔叔說。他夢想擁有自己的公司。「你要雇用好員工，」爸爸說。「你要請對的團隊。」外面，他們查看了天氣。早上看起來很晴朗。到了中午轉陰。「感覺很冷，但沒有到涼爽，」米亞說。「至少是乾燥的，沒有起霧。」"}, {"day": 82, "title_zh": "天氣播報", "text": "The weather report warned about **freezing** mornings. It also warned about **hot** afternoons. That's strange, but true! It felt **humid**. It looked **rainy**. It might turn **snowy** by night. \"It could get **stormy**,\" said the reporter. \"But this weekend looks **sunny** and **warm**.\" Roads were **wet** near the coast. It was **windy** too. Thick **fog** rolled in. Then **lightning** flashed. Then a bright **rainbow** appeared.", "text_zh": "氣象報告說早上會結凍。也說下午會很熱。這很奇怪，但是真的！感覺很潮濕。看起來快下雨了。晚上可能會變成下雪。「可能會有暴風雨，」氣象主播說。「不過這個週末看起來晴朗又溫暖。」海岸附近的路面濕滑。風也很大。濃霧飄了進來。閃電閃過。接著出現了一道明亮的彩虹。"}, {"day": 83, "title_zh": "颱風天", "text": "That afternoon, a sudden **shower** started. In the mountains, it turned into heavy **snow**. \"This **storm** is loud,\" said Mia. \"Listen to that **thunder**!\" She worried about the coming **typhoon**. The **wind** began to **blow** hard. Cold **rain** started to fall. By morning, the sun began to **shine** again. \"**Nature** can change fast,\" said Dad. \"This is part of our **natural** world.\" He breathed the fresh **air** outside. He talked about how our **climate** changes every year.", "text_zh": "那天下午，突然下起了一場陣雨。在山區，它變成了大雪。「這場暴風雨好吵，」米亞說。「聽聽那個雷聲！」她擔心即將來的颱風。風開始用力吹。冰冷的雨開始下。到了早上，太陽又開始露臉。「大自然變化得很快，」爸爸說。「這是我們自然世界的一部分。」他呼吸了外面的新鮮空氣。他聊到我們的氣候每年是怎麼變化的。"}, {"day": 84, "title_zh": "露營夜觀星", "text": "That night, everyone looked up at the **cloud**s. \"The **temperature** dropped ten **degree**s,\" said Dad. He looked at the sky. They talked about the **earth**. They talked about the recent **earthquake** on the news. They looked at the bright **moon**. They looked at the wide **sky**. \"Look at the **sun** setting,\" said Mom. \"See how many **star**s are out.\" Their camp was in a quiet **area**. It was near a river **bank**. It was near a sandy **beach** by the **coast**.", "text_zh": "那天晚上，大家都抬頭看著雲。「氣溫下降了十度，」爸爸說。他看著天空。他們聊到地球。他們聊到新聞上最近的地震。他們看著明亮的月亮。他們看著寬廣的天空。「看太陽下山了，」媽媽說。「看看出現了多少顆星星。」他們的營地在一個安靜的地區。它靠近河岸。它靠近海邊的一片沙灘。"}, {"day": 85, "title_zh": "地理課本", "text": "Today we learned about geography. We learned about a hot **desert**. We learned about our **environment** too. There is a big **forest** with tall trees. Look at that small **hill**! A quiet **island** sits in the water. A calm **lake** is next to it. A tall **mountain** touches the sky. The blue **ocean** is very big. There is a flat **plain** with no hills. A little **pond** has ducks in it. We swim in a **pool** at school. A long **river** flows to the sea. At the end, we saw the open **sea**.", "text_zh": "今天我們上了地理課。我們學到炎熱的沙漠。我們也學到我們的環境。有一座大森林，樹很高。你看那座小山丘！安靜的小島躺在水裡。旁邊有一座平靜的湖。高高的山碰到天空。藍藍的海洋好大。有一片平坦的平原，沒有山。小池塘裡有鴨子。我們在學校的游泳池游泳。長長的河流流向大海。最後，我們看到了遼闊的大海。"}, {"day": 86, "title_zh": "山谷裡的動物", "text": "There is a deep **valley** near our house. A little **spring** comes out of the ground. It makes a small **stream**. The water runs into the **woods**. Many **animal**s live in the woods. A big **bear** sleeps in a cave. A lazy **cat** naps in the sun. A **chicken** walks around and clucks. A brown **cow** eats grass. A shy **deer** hides behind a tree. We even found old **dinosaur** bones! A happy **dog** runs by. A slow **donkey** walks behind it.", "text_zh": "我們家附近有一座深深的山谷。一道小泉水從地上冒出來。它變成一條小溪。水流進了樹林。樹林裡住著很多動物。一隻大熊在山洞裡睡覺。一隻懶貓在曬太陽。一隻雞走來走去咕咕叫。一頭棕色的牛在吃草。一隻害羞的鹿躲在樹後面。我們還找到了恐龍的骨頭！一隻開心的狗跑過去。一隻慢吞吞的驢子跟在後面走。"}, {"day": 87, "title_zh": "農場巡禮", "text": "Mia went to the farm today. She saw a **duck** swim in the pond. She saw an **eagle** fly high in the sky. She saw a big **elephant** too. A smart **fox** watched a little **frog** jump. A **goat** ate some grass. A white **goose** walked by. A **hen** clucked next to her babies. A fat **hippo** rested in the mud. A brown **horse** ran across the field. A **kangaroo** jumped very high. A soft **kitten** played with string. A sleepy **koala** sat in a tree.", "text_zh": "米亞今天去了農場。她看到一隻鴨子在池塘裡游泳。她看到一隻老鷹在天上飛得很高。她也看到一頭大象。一隻聰明的狐狸看著一隻小青蛙跳來跳去。一隻山羊在吃草。一隻白鵝走過去。一隻母雞在小雞旁邊咕咕叫。一隻胖胖的河馬在泥巴裡休息。一匹棕色的馬在田裡奔跑。一隻袋鼠跳得好高。一隻軟軟的小貓在玩線。一隻愛睏的無尾熊坐在樹上。"}, {"day": 88, "title_zh": "動物園裡的驚喜", "text": "At the zoo, Mia saw a baby **lamb** next to its mom. A big **lion** roared close by. A funny **monkey** swung on a branch. At a shop, they sold a furry **monster** costume. A tiny **mouse** ran past a big **ox**. A black and white **panda** ate some bamboo. A colorful **parrot** sat near it. Mia has her own **pet**. Her pet is a **pig**! She also loves the **pigeon**s outside. She wants a new **puppy** too. And she loves her soft **rabbit** best of all.", "text_zh": "在動物園，米亞看到一隻小羊緊緊跟著媽媽。一隻大獅子在附近吼叫。一隻好笑的猴子在樹枝上盪來盪去。有間店賣毛茸茸的怪物裝。一隻小老鼠跑過一頭大公牛旁邊。一隻黑白色的貓熊在吃竹子。一隻五顏六色的鸚鵡坐在旁邊。米亞自己也有寵物。她的寵物是一隻豬！她也很喜歡外面的鴿子。她還想要一隻新的小狗。她最愛的是她軟綿綿的兔子。"}, {"day": 89, "title_zh": "更多動物朋友", "text": "A small **rat** hid by a fluffy **sheep**. A pretty **swan** swam past them. A brave **tiger** watched a big **turkey**. A lonely **wolf** howled far away. Near them stood a striped **zebra**. Then Mia looked at a tiny **insect** world. A busy **ant** carried some food. A little **bat** flew at night. A **bee** buzzed around a flower. A **bird** sang a happy song. And a small **bug** crawled on a leaf.", "text_zh": "一隻小老鼠躲在一隻毛茸茸的綿羊旁邊。一隻漂亮的天鵝從旁邊游過去。一隻勇敢的老虎看著一隻大火雞。一隻孤單的狼在遠處嚎叫。旁邊站著一隻有條紋的斑馬。接著米亞看了看小小的昆蟲世界。一隻忙碌的螞蟻在搬食物。一隻小蝙蝠在夜裡飛。一隻蜜蜂在花朵旁邊嗡嗡叫。一隻鳥唱著開心的歌。還有一隻小蟲子在葉子上爬。"}, {"day": 90, "title_zh": "昆蟲觀察日記", "text": "In the garden, a pretty **butterfly** landed on a flower. Nearby, a **cockroach** ran under a leaf. Mia thought about a **dragon** flying in the sky. A **mosquito** buzzed by her ear. A slow **snail** moved across the ground. A **snake** hid from a big **spider**. A little **worm** dug into the dirt. Later, at the beach, they saw a **crab** walk sideways. A happy **dolphin** jumped out of the water. A silver **fish** swam by. A fast **shark** swam far away. And a tiny **shrimp** hid in the sand.", "text_zh": "在花園裡，一隻漂亮的蝴蝶停在花上。旁邊，一隻蟑螂跑到葉子底下。米亞想像一條龍在天上飛。一隻蚊子在她耳邊嗡嗡叫。一隻慢慢的蝸牛在地上爬。一條蛇躲著一隻大蜘蛛。一隻小蟲鑽進了泥土裡。後來，在海邊，他們看到一隻螃蟹橫著走。一隻開心的海豚跳出水面。一條銀色的魚游過去。一條快速的鯊魚游得好遠。還有一隻小蝦躲在沙子裡。"}, {"day": 91, "title_zh": "海邊的生物", "text": "In the sea, a slow **turtle** swam next to a huge **whale**. On the beach, a dog started to **bark** at a crab. The crab tried to **bite** the dog! The dog had to **swallow** its fear. \"Look at **this** shell,\" said Mia. \"And look at **that** starfish!\" She picked up a tiny **tail** and a broken **wing**. \"**These** shells are **my** favorite,\" she said. \"But **those** shells over there are **our** best find today.\"", "text_zh": "在海裡，一隻慢吞吞的海龜游在一隻巨大的鯨魚旁邊。在沙灘上，一隻狗開始對螃蟹吠叫。螃蟹想要咬那隻狗！那隻狗嚇得不敢出聲。「看看這個貝殼，」米亞說。「還有那隻海星！」她撿起一條小尾巴和一片破掉的翅膀。「這些貝殼是我最喜歡的，」她說。「不過那邊那些貝殼才是我們今天最棒的收穫。」"}, {"day": 92, "title_zh": "沙灘上的對話", "text": "\"Is this **your** bucket?\" Mia asked a boy. \"Yes,\" he said. \"That is **his** shovel. The red towel is **her** towel.\" \"The dog wants **its** ball,\" said Mia. \"That must be **their** favorite toy.\" \"**I** love the beach,\" said Mia. \"Come with **me**!\" \"This towel is **my** towel. Actually, it's **mine**,\" she laughed, drying **myself** off. \"What about **you**?\" she asked. \"Is **your** sandcastle done? Is it **yours**?\"", "text_zh": "「這是你的水桶嗎？」米亞問一個男孩。「對啊，」他說。「那是他的鏟子。紅色那條毛巾是她的。」「這隻狗想要牠的球，」米亞說。「那一定是牠們最愛的玩具。」「我好喜歡海灘，」米亞說。「跟我一起來吧！」「這條毛巾是我的毛巾。其實，它是我的，」她笑著說，一邊把自己擦乾。「你呢？」她問。「你的沙堡蓋好了嗎？那是你的嗎？」"}, {"day": 93, "title_zh": "沙堡比賽", "text": "\"Did you build this by **yourself**?\" Mom asked the kids. \"**Yourselves** did a great job!\" **He** smiled big. His friend helped **him**, and it was **his** own idea. He built it all by **himself**. **She** clapped too. The flag on top was **her** flag, and it was really **hers**. She put it up **herself**. \"Look at **it**!\" said Mia. \"**Its** tower is so tall! It stands there all by **itself**.\"", "text_zh": "「這是你自己蓋的嗎？」媽媽問小朋友們。「你們做得真好！」他開心地笑了。他朋友幫了他，這是他自己的點子。他自己一個人蓋完了。她也拍手了。塔頂上的旗子是她的旗子，真的是她自己的。她自己把旗子插上去。「你看它！」米亞說。「它的塔好高！它自己一個人站在那裡。」"}, {"day": 94, "title_zh": "全家人一起玩", "text": "\"**We** should build one too!\" said Mia. \"**Us** kids can do it,\" she told her parents. They smiled at **our** work. We did it all by **ourselves**. This sandcastle was **ours** now. Meanwhile, **they** built a smaller castle. In fact, **them** finished first. The shovel became **their** shared tool. It was really **theirs**. They felt proud of **themselves**. \"**All** of you did great,\" said Dad. \"Maybe **another** round tomorrow? Is there **any** sand left?\"", "text_zh": "「我們也應該蓋一座！」米亞說。「我們這些小孩可以做到，」她跟爸媽說。爸媽看著我們一起做很開心。我們靠自己完成的。這座沙堡現在是我們的了。同時，他們蓋了一座比較小的城堡。其實，他們先做完的。那把鏟子變成他們共用的工具。真的是他們的東西。他們都為自己感到驕傲。「你們大家都做得很好，」爸爸說。「明天要不要再蓋一次？還有剩下的沙子嗎？」"}, {"day": 95, "title_zh": "每個人都來幫忙", "text": "\"**Anyone** want to help?\" Mia called out. \"I will do **anything**!\" said her brother. \"**Both** of you can dig,\" said Dad. \"**Each** person gets a job. **Everyone** should help. Then **everything** will get done fast.\" \"**Many** hands make it easy,\" said Mom, but **nobody** wanted the messy **part**. \"**Nothing** is too hard if **some** of us try,\" said Mia. \"**Someone** should get water. We also want **something** cold to drink.\"", "text_zh": "「有誰想幫忙嗎？」米亞喊道。「什麼我都願意做！」她哥哥說。「你們兩個可以去挖沙，」爸爸說。「每個人都有工作。大家都應該幫忙。這樣每件事都能快點做完。」「人多好辦事，」媽媽說，不過沒有人想做那個髒兮兮的部分。「只要有人願意試，沒有什麼事情太難，」米亞說。「該有人去打水了。我們也想要一點冰涼的飲料。」"}, {"day": 96, "title_zh": "十萬個為什麼", "text": "Mia's little cousin asked lots of questions. \"**How** do you build a sandcastle? **What** tools do you need? **Which** bucket is best? **Who** taught you? **Whose** shovel is that? **When** should we start, and **where** should we dig?\" \"I'm not sure **whether** we have time,\" said Mia, \"**while** the tide comes in. **Why** do you ask so many questions?\" she laughed. \"Let me tell you **about** the sea. Look **above** the waves and **across** the bay.\"", "text_zh": "米亞的小表弟問了好多問題。「你要怎麼蓋沙堡？需要什麼工具？哪一個水桶最好？是誰教你的？那把鏟子是誰的？我們該什麼時候開始，該在哪裡挖？」「我不確定我們是否有時間，」米亞說，「因為潮水正在漲。你為什麼問這麼多問題？」她笑著說。「我來跟你說說大海的事。看看浪的上面，還有海灣的對面。」"}, {"day": 97, "title_zh": "海灘地圖", "text": "\"The path goes **after** the rocks. It runs right **against** the cliff. Then it goes **along** the beach,\" said the guide. He walked **among** the people. \"We are **at** the north end. We are **before** the lighthouse and **behind** the sand hills. We are **below** the tall cliff and **beside** the old pier. We are right **between** two rocks and **beyond** the last one. Walk **by** the flag, then go **down** to the water.\"", "text_zh": "「這條路經過那些岩石之後，」導遊說。「它緊貼著懸崖，然後沿著海灘走。」他走在人群中間。「我們在北邊的盡頭。我們在燈塔前面，也在沙丘後面。我們在高高的懸崖下面，在老碼頭旁邊。我們就在兩塊岩石中間，最後一塊的再過去一點。走過旗子那裡，然後往水邊走下去。」"}, {"day": 98, "title_zh": "尋寶遊戲", "text": "\"**During** the game, look everywhere **except** the deep water,\" said the guide. \"This game is **for** everyone. It's made **from** an old map.\" The treasure was **in** a box. It was **in back of** the big rock. It was **in front of** the small cave, **inside** a hole. They had to walk **into** the cave first. \"It looks **like** gold,\" said Mia. \"Let's search **near** the sand. Look under a pile **of** rocks **off** the path.\"", "text_zh": "「尋寶的時候，除了深水區都要找，」導遊說。「這個遊戲是給大家玩的，是根據一張舊地圖做的。」寶藏放在一個箱子裡。箱子在那塊大岩石的後面。它在那個小山洞的前面，在一個洞裡面。他們得先走進洞裡才行。「看起來像金子，」米亞說。「我們去沙灘附近找找。看看步道旁邊一堆石頭底下。」"}, {"day": 99, "title_zh": "終於找到寶藏", "text": "Mia found the treasure! \"It's right **on** the sand!\" she yelled. \"It's **out of** the water, **outside** the cave!\" \"Look **over** there, **next to** that shell!\" \"We looked **since** morning.\" \"We looked for more **than** an hour.\" \"We walked **through** the whole beach.\" \"We went all the way **to** the end.\" \"We walked **toward** the cliff.\" \"We looked **under** the rocks.\" \"We searched **until** now.\" \"We even climbed **up** the hill!\"", "text_zh": "米亞找到寶藏了！「就在沙灘上！」她大喊。「就在水外面，山洞外面！」「看那邊，就在那個貝殼旁邊！」「我們從早上就開始找了。」「我們找了超過一個小時。」「我們走遍了整片海灘。」「我們一直走到最後面。」「我們朝著懸崖走去。」「我們找遍了岩石下面。」「我們一直找到現在。」「我們甚至爬上了那座小山！」"}, {"day": 100, "title_zh": "慶祝晚會", "text": "That night, they had a party **with** music. They danced **without** stopping. \"You did great, **and** you never gave up, **because** you tried hard,\" said Dad. \"**Besides**, it was so much fun!\" \"**But** we are tired now.\" \"**However**, **if** we rest now, we can dance more later, **or** we can just stop,\" said Mom. Mia laughed **since** she felt so happy — happier **than** ever. \"**Therefore**, let's keep dancing!\" \"**Though** it's late, let's dance a little more!\"", "text_zh": "那天晚上，他們開了一個有音樂的派對。他們跳舞跳個不停。「你們表現得很棒，而且你們沒有放棄，因為你們很努力，」爸爸說。「而且，這真的很好玩！」「不過我們現在累了。」「不過，如果我們現在休息，等一下可以再跳，或者我們也可以就這樣停下來，」媽媽說。米亞笑了，因為她覺得好開心——比以前都開心。「所以，我們繼續跳舞吧！」「雖然已經很晚了，我們再多跳一下吧！」"}, {"day": 101, "title_zh": "車禍新聞", "text": "On the news, there was a car **accident** on the highway. \"What **action** should the city take?\" asked a reporter. He talked about the rescue **activity**. There was a new safety **advertisement** on TV. It gave good **advice** to drivers. \"At my **age**, I understand the **aim** of these rules,\" said an old man. A loud **alarm** went off nearby. In a photo **album**, a young **American** driver showed his **anger** about the traffic. An **army** truck stopped to help. A bus full of **Asian** tourists also stopped.", "text_zh": "新聞上報導了一起高速公路上的車禍。「政府應該採取什麼行動？」一位記者問。他說到救援活動的事。電視上有一則新的安全廣告。它給了駕駛人很好的建議。「以我這個年紀，我懂這些規定的目的，」一位老先生說。附近突然響起一陣警報聲。在一本相簿裡，一位年輕的美國司機表達了他對塞車的憤怒。一輛軍用卡車停下來幫忙。一輛載滿亞洲遊客的巴士也停了下來。"}, {"day": 102, "title_zh": "生日派對計畫", "text": "Mia's family planned a birthday party. They paid close **attention** to every detail. They bought one big **balloon**. They hired a **band** to play music. They set up a photo **base**. \"What **beauty**!\" said a **beginner** helper. It was the **beginning** of the job. They hung a **bell** by the door. It was for the **birthday** girl. Mia wrote a note on a **blank** card. She didn't need **blood** or a glitter **bomb** — just love from the **bottom** of her heart.", "text_zh": "米亞一家人在計畫一場生日派對。他們每個細節都非常注意。他們買了一顆大氣球。他們請了一支樂隊來演奏音樂。他們設了一個拍照用的台座。「太美了！」一位新手幫手說。那時工作才剛開始。他們在門邊掛了一個鈴鐺。那是為壽星準備的。米亞在一張空白卡片上寫了一段話。她不需要流血，也不需要亮片炸彈，只需要發自內心的愛。"}, {"day": 103, "title_zh": "生日禮物盒", "text": "Presents came in all shapes. One was a wrapped **box**. Someone brought a small tree **branch** for fun. There was a **bundle** of balloons tied with **cable**. Someone brought a bird in a **cage**. Someone brought a **can** of Mia's favorite juice. \"Like a ship's **captain**, I will guard this treasure **case**!\" joked Dad. The cake looked like a **castle**. \"What's the **cause** of all this fun?\" laughed Grandma. She took a photo with her **cellphone**. She stood at the **center** of the room. She felt young again — like a whole **century** had passed since her last party.", "text_zh": "禮物有各種形狀。一個是包好的盒子。有人帶來一根小樹枝，好玩用的。有一束用繩子綁起來的氣球。有人帶了一隻裝在籠子裡的鳥。有人帶了一罐米亞最愛的果汁。「就像船長一樣，我要來看守這個寶箱！」爸爸開玩笑說。蛋糕做成城堡的樣子。「這麼多樂趣是從哪來的？」奶奶笑著說。她用手機拍了一張照片。她站在房間正中央。她覺得自己又年輕了——好像距離上次派對已經過了一整個世紀。"}, {"day": 104, "title_zh": "派對遊戲時間", "text": "\"Who wants a **chance** to play a game?\" asked Mia. They watched cartoons on a **channel**. Everyone dressed like their favorite **character**. Dad made a **chart** to plan the games. The room filled with **cheer**. \"This is like my **childhood**,\" said Mom with a smile. Mia had a tough **choice** to make about party gifts. \"Let's start a board game **club**,\" said her friend. He acted like a **coach** giving a **command**. Everyone gave their **congratulation**s. Mom even brought a small party **contract** with fun rules. She taped it to the **corner** of the wall.", "text_zh": "「誰想要有機會玩個遊戲？」米亞問。他們看了一個頻道上的卡通。每個人都打扮成自己最喜歡的角色。爸爸畫了一張表格來安排遊戲。房間裡充滿了歡呼聲。「這讓我想起我的童年，」媽媽微笑著說。米亞在選派對禮物時遇到了一個難題。「我們來成立一個桌遊社吧，」她朋友說。他像教練一樣下達指令。大家互相道賀。媽媽甚至帶來一份寫著好玩規則的小派對合約。她把合約貼在牆角。"}, {"day": 105, "title_zh": "勇敢面對挑戰", "text": "During the games, Mia needed **courage**. She had to play in a small game **court**. \"That's not fair — that's a **crime**!\" someone joked. A small **crowd** came to watch. The path to the finish line had a tricky **curve**. One runner caused **damage** to a chair. It was a small **danger** for other players. \"Let's have a quick **debate** about the rules,\" said Dad. The group made a fair **decision**. Each game had its own **department**. It matched each guest's **desire**. \"What's the **difference** between this game and the last one?\" asked Mia. But she found no real **difficulty** at all.", "text_zh": "遊戲進行時，米亞需要鼓起勇氣。她要在一個小小的比賽場地上比賽。「這不公平——這根本是犯罪！」有人開玩笑說。一小群人聚過來看。通往終點的路上有一個難走的彎道。一位跑者撞壞了一張椅子。這對其他玩家來說是個小危險。「我們來針對規則快速討論一下，」爸爸說。大家做出了公平的決定。每個遊戲都有自己的部門。配合每位客人的喜好。「這個遊戲跟上一個有什麼不同？」米亞問。不過她完全沒感覺到什麼困難。"}, {"day": 106, "title_zh": "夢想的方向", "text": "\"What **direction** should I take in life?\" Mia asked during a family **discussion**. \"Follow your **dream**,\" said Dad. \"It's your **duty** to try your best. Try even at the **edge** of failing.\" Grandpa believed in **education** a lot. He said success needs **effort**. Mia sent him an **e-mail** about her **emotion**s. She said fear is like an **enemy**. It steals her **energy**. \"Like an old **engine**, you just need one push,\" he wrote back. \"Push through the **entrance**, and start again.\"", "text_zh": "「我人生該往哪個方向走？」米亞在一次家庭討論中問。「跟隨你的夢想，」爸爸說。「盡全力去做是你的責任。就算快要失敗也要試試看。」爺爺很相信教育的力量。他說成功需要努力。米亞寫了一封電子郵件給他，說到她的心情。她說恐懼就像一個敵人。它偷走了她的能量。「就像一台老引擎，你只需要推它一把，」他回信說。「推過入口，就能重新開始。」"}, {"day": 107, "title_zh": "誠實面對失敗", "text": "Mia made an **error** on her project. \"The night before, the **eve** of the big **event**, I still made mistakes,\" she said. She didn't make an **excuse**. \"There's no easy **exit** from hard work,\" said her teacher. \"This is part of the learning **experience**. It's a **fact** — everyone makes mistakes. It's not your **fault** to feel **fear**.\" There was no extra **fee** to try again. \"I understand your **feeling**,\" said the teacher. She opened a **file** on her desk. Her voice was warm as **fire**.", "text_zh": "米亞在她的專題上犯了一個錯誤。「就在大日子前一晚，我還是犯了錯，」她說。她沒有找藉口。「努力工作沒有輕鬆的出路，」她的老師說。「這是學習經驗的一部分。這是事實——每個人都會犯錯。因為害怕而不安不是你的錯。」再試一次不用多付費用。「我懂你的感受，」老師說。她打開桌上的一份檔案。她的語氣溫暖得像火一樣。"}, {"day": 108, "title_zh": "校慶園遊會", "text": "At school, they had a **flag** ceremony. Then their class took a **flight** to the science fair. A **foreigner** student brought a pretty **flower** as a gift. \"**Freedom** and **friendship** bring real **fun**,\" said the principal. Some volunteers picked up **garbage**. Others checked the **gas** heater. A student made a funny **gesture**. Someone told a **ghost** story. Then came a surprise **gift**. Reaching this **goal** felt great for the whole class.", "text_zh": "在學校，他們舉行了升旗典禮。接著全班搭機前往科展。一位外國學生帶來一朵漂亮的花當禮物。「自由與友誼帶來真正的樂趣，」校長說。有些志工去撿垃圾。其他人去檢查瓦斯暖爐。一位學生做了一個好笑的手勢。有人講了一個鬼故事。接著出現一份驚喜禮物。達成這個目標讓全班都覺得很棒。"}, {"day": 109, "title_zh": "公民課討論", "text": "In civics class, they talked about the **government**. Then they went outside. They sat on the **grass** and the **ground** in a **group**. \"A **gun** is dangerous,\" said the teacher. She taught safety **habit**s. A student showed off his new **haircut**. \"This topic makes my **heat** rise!\" joked a classmate. \"**Honesty** matters,\" the teacher said. Her voice was sweet as **honey**. \"Every **human** needs **humor**. It helps balance our **hunger** for knowledge.\"", "text_zh": "在公民課上，他們討論了政府的議題。接著他們到外面去。他們一起坐在草地和地面上，分成一組。「槍枝是很危險的，」老師說。她教大家安全的習慣。一位學生炫耀他的新髮型。「這個話題讓我火氣都上來了！」一位同學開玩笑說。「誠實很重要，」老師說。她的語氣像蜂蜜一樣甜。「每個人都需要一點幽默感。它能平衡我們對知識的渴望。」"}, {"day": 110, "title_zh": "上網找資料", "text": "For homework, Mia had an **idea**. She would look things up online. She learned the **importance** of checking things first. She learned to check **income** sources. She learned to check **influence** before trusting **information**. \"I have real **interest** in this,\" she said. She searched the **Internet**. She read an **interview**. She replied to an **invitation**. She checked every **item** on her list. A **Japanese** friend told a funny **joke**. It filled the room with **joy**.", "text_zh": "為了做功課，米亞有了一個點子。她想要上網查資料。她學到要先確認事情的重要性。她學到要查收入來源。她學到在相信資訊之前要先看影響力。「我對這個真的很有興趣，」她說。她搜尋了網路。她讀了一篇訪談。她回覆了一則邀請。她核對了清單上的每一項。一位日本朋友講了一個好笑的笑話。它讓整個房間充滿了歡笑。"}, {"day": 111, "title_zh": "各國文化報告", "text": "Mia's report covered many topics. It talked about what **kind** of **kingdom** existed long ago. It talked about how a **Korean** friend described her culture. \"There's a **lack** of details here,\" said the **leader** of her group. She turned a **leaf** of her notes. \"Let's add more **level** of detail,\" she said. She lifted the **lid** of a folder. She shared a **link** with the group. She grabbed papers from her **locker**. Her group sent a **mail**. They followed good **manner**s. But they still had a **mass** of work to do.", "text_zh": "米亞的報告涵蓋了很多主題。它談到很久以前存在過什麼樣的王國。它談到一位韓國朋友如何描述她的文化。「這裡少了一些細節，」她小組的組長說。她翻了一頁自己的筆記。「我們多加一點細節吧，」她說。她掀開了一個資料夾的蓋子。她跟大家分享了一個連結。她從置物櫃裡拿出文件。她的小組寄出了一封信。他們都很有禮貌。不過他們還有一大堆工作要做。"}, {"day": 112, "title_zh": "解決問題的方法", "text": "\"What's the **matter**?\" asked the teacher at their **meeting**. Each **member** shared a **message**. It was about a **metal** part in the science kit. \"There's a better **method**,\" said one student. He thought about it on the **metro** ride home. \"Keep an open **mind**,\" said the teacher. \"A **mistake** is just one step.\" \"It's like the **motion** in a **movement**.\" Someone joked their notes were covered in **mud**. It looked like a bird's messy **nest**.", "text_zh": "「怎麼了？」老師在他們的會議上問。每位成員都分享了一則訊息。是關於科學實驗箱裡一個金屬零件的事。「有一個更好的方法，」一位學生說。他在搭地鐵回家的路上想著這件事。「保持開放的心態，」老師說。「一個錯誤只是一個步驟。」「這就像一個動作裡的一次移動。」有人開玩笑說他們的筆記沾滿了泥巴。看起來就像鳥兒亂糟糟的巢一樣。"}, {"day": 113, "title_zh": "班級新聞台", "text": "Mia wrote **news** for the school **newspaper**. It was a class project. \"Please stop the **noise**,\" said the teacher. She wrote a **note** about it. The plan needed careful **operation**. Everyone gave their **opinion**. \"Here is my **order**,\" said the class leader. She planned a small **party**. The games had a fun **pattern**. It brought **peace** to a busy **period**. They took one big **photo**. They also needed a **pile** of decorations.", "text_zh": "米亞為校刊寫了新聞。這是一個班級專題。老師說：「請不要吵。」她寫了一張筆記。這個計畫需要小心進行。大家都說出自己的意見。班長說：「這是我的命令。」她計畫了一個小派對。遊戲有好玩的模式。這讓忙碌的一段時間變得平靜。他們拍了一張大合照。他們還需要一堆裝飾品。"}, {"day": 114, "title_zh": "科展籌備", "text": "Mia got ready for the science fair. She used a **pin** to hold her poster. She made a **planet** model with a **pipe**. Another **player** helped her. \"Careful, this is fake **poison**,\" she said. She talked about **pollution**. She talked about **population** growing fast. She used white **powder** for her volcano. A small battery gave it **power**. She felt **pressure** before the deadline. She hoped to win a **prize**. Her **production** was almost done. It was part of the whole **program**.", "text_zh": "米亞準備科展。她用大頭針固定海報。她用管子做了一個行星模型。另一位隊員幫她的忙。她說：「小心，這是假的毒藥。」她說到污染的問題。她也說到人口成長太快。她用白色粉末做火山。一顆小電池給它動力。截止日期快到了，她感到壓力。她希望能得獎。她的作品快完成了。這是整個計畫的一部分。"}, {"day": 115, "title_zh": "科展成果發表", "text": "Mia's **project** showed great **progress**. \"This **project** had a clear **purpose**,\" she told the judges. She gave a **reason** for each **report**. The **result** was amazing. She built a working **robot** made of **rock**s! \"My **role** was to design it,\" she said. The idea started from a simple **root**. She used a **rope** for one part. She added a paper **rose** to decorate it. \"Follow the **rule**s,\" the judge said with a smile.", "text_zh": "米亞的專題有很大的進步。她告訴評審：「這個專題有清楚的目的。」她為每份報告說明原因。結果非常驚人。她做了一個用石頭做成的機器人，而且真的會動！她說：「我的角色是負責設計。」這個點子是從一個簡單的根本想法開始的。她用了一條繩子裝飾一部分。她還加了一朵紙玫瑰。評審微笑著說：「要遵守規則。」"}, {"day": 116, "title_zh": "科展安全規則", "text": "\"**Safety** first,\" said the judge. He checked the **sale** table near the booths. \"This is just a **sample**,\" said Mia. She stood near a box of **sand**. Everyone liked the **scene**. It had painted **scenery** on a big **screen**. \"I'll tell you a **secret**,\" she whispered. She gave a **seat** to a judge. In one **section**, she showed a tiny **seed**. She explained her **sense** of design in one simple **sentence**.", "text_zh": "評審說：「安全第一。」他檢查了攤位旁邊的銷售桌。米亞說：「這只是一個樣品。」她站在一箱沙子旁邊。大家都很喜歡這個場景。大螢幕上有彩繪的佈景。她小聲說：「我要告訴你一個秘密。」她請一位評審坐下。在其中一個展區，她展示了一顆小種子。她用一句簡單的句子說明她的設計想法。"}, {"day": 117, "title_zh": "頒獎典禮", "text": "The awards **service** began. There was a special **set** of trophies. Judges sat by the **shore** of the school pond. They sat on one **side** of the stage. \"What a nice **sight**,\" someone whispered. It was quiet, in **silence**, before the winners were called. \"Your **skill** deserves this,\" said the judge with a **smile**. \"This shows the value of **society**,\" he said. He praised Mia's **soul** for hard work. There was **space** for one more **speech**. She gave it with great **speed**.", "text_zh": "頒獎典禮開始了。有一組特別的獎盃。評審們坐在學校池塘的岸邊。他們坐在舞台的一側。有人小聲說：「好美的景象。」大家安靜下來，等著宣布得獎者。評審帶著笑容說：「你的技術值得這個獎。」他說：「這展現了社會的價值。」他稱讚米亞努力的心。還有時間讓她再說一段演說。她講得又快又順。"}, {"day": 118, "title_zh": "得獎感言", "text": "Mia started her speech with true **spirit**. She was in a **state** of excitement, like rising **steam**. \"Every **step** mattered,\" she said. \"It started from the first **stone** of an idea.\" She told the whole **story**. \"It's like a **string** joining each part,\" she said. \"In my own **style**, I explored this **subject**.\" \"I found **success**,\" she said. Her project even had a moving **swing** as a **symbol**. It showed how the whole **system** worked.", "text_zh": "米亞懷著真誠的精神開始她的演說。她處在興奮的狀態，就像升起的蒸氣一樣。她說：「每一步都很重要。」「它是從一個點子的第一塊石頭開始的。」她說出了整個故事。她說：「這就像一條線把每個部分串起來。」「用我自己的風格，我探索了這個主題。」她說：「我找到了成功。」她的專題還有一個會動的鞦韆當作象徵。它展示了整個系統怎麼運作。"}, {"day": 119, "title_zh": "才藝表演", "text": "After the ceremony, a **Taiwanese** dance group showed great **talent**. Someone wiped away a happy **tear**. \"This **term** has been great,\" said the host. A performer dressed as a \"**thief**\" did a funny **thing** on stage. She shared one clever **thought**. Each guest needed a **ticket**. Staff gave a small **tip** to helpers. The show's **title** appeared on the screen. It was made with a digital **tool**. The **topic** was a tall paper **tower**.", "text_zh": "典禮結束後，一個台灣舞蹈團表演了精湛的才藝。有人擦掉了開心的眼淚。主持人說：「這個學期真的很棒。」一位打扮成「小偷」的表演者在台上做了一件好笑的事。她分享了一個聰明的點子。每位客人都需要一張票。工作人員給幫忙的人一點小費。節目的標題出現在螢幕上。它是用數位工具做出來的。主題是一座高高的紙塔。"}, {"day": 120, "title_zh": "跳蚤市場", "text": "The school held a **trade** fair. It was a fun **tradition**. \"Don't throw this in the **trash**,\" said a student. She was holding her handmade **treasure**. \"Here's a **treat** for you,\" she said. She gave out candy shaped like a **tree**. Someone tried a card **trick**. It caused a little **trouble**. \"Tell me the **truth**,\" laughed a friend. She looked through a paper **tunnel** shaped like the **universe**. \"This has real **value**,\" said a judge. He gave her a small **victory** trophy.", "text_zh": "學校舉辦了一場交換市集。這是一個有趣的傳統。一位學生說：「不要把這個丟進垃圾桶。」她手上拿著自己做的寶貝。她說：「這是給你的獎品。」她送出做成樹形的糖果。有人玩了一個紙牌魔術。結果造成了一點小麻煩。一位朋友笑著說：「跟我說實話。」她從一個做成宇宙形狀的紙隧道往裡看。評審說：「這個真的很有價值。」他頒給她一座小小的勝利獎盃。"}, {"day": 121, "title_zh": "婚禮的回憶", "text": "That night, Mia's aunt told a story. She kept an old **voice**mail from her **wedding** day. It was about the **war** and how she found her own **way** to a happy **wedding**. \"This **wood** box has the **word**s from that day,\" she said. She loved this **memory**. She also kept an old fishing **net**. She lives by one **principle**: always **feel** thankful. Always **hear**, **listen**, and **look** for the good things in life.", "text_zh": "那天晚上，米亞的阿姨說了一個故事。她保留了結婚那天的一則語音留言。內容是關於戰爭，還有她如何找到自己的方式走向一場幸福的婚禮。她說：「這個木盒裡裝著那天說過的話。」她很珍惜這段回憶。她也留著一張舊漁網。她一直遵守一個原則：永遠心懷感激。永遠去聽、去聆聽，並在生活中尋找美好的事物。"}, {"day": 122, "title_zh": "五感的感受", "text": "\"**See** how the sky changes,\" said Mia. She taught her cousin about the five senses. \"**Smell** this flower, listen to the **sound** of the waves, **taste** this fruit, and **watch** the birds fly.\" \"**Check** your work before you **complete** it,\" said the teacher. She helped students **end** and **finish** their projects. \"If you **succeed** today, you can **survive** any challenge tomorrow. It will **affect** your whole future,\" she said. \"**Believe** in yourself.\"", "text_zh": "米亞說：「看看天空怎麼變化。」她在教表弟認識五感。「聞聞這朵花，聽聽海浪的聲音，嚐嚐這個水果，看看鳥兒飛翔。」老師說：「完成之前先檢查一下。」她幫學生們結束並完成他們的專題。她說：「如果你今天成功了，明天不管遇到什麼挑戰都能撐過去。這會影響你的整個未來。」「要相信自己。」"}, {"day": 123, "title_zh": "誤會與原諒", "text": "\"Don't **blame** your friend. Don't let small things **bother** you,\" said Mom. \"Never **confuse** kindness with weakness — **consider** how much you've grown.\" It takes time to **develop** patience. It also takes time to **divide** big problems into small ones. \"When you **doubt** yourself, take it with **ease**,\" she said. \"Don't feel **embarrass**ed. Just **forgive** and **forget**. Don't let mistakes **frighten** you.\" That night, the family began to **gather** for dinner.", "text_zh": "媽媽說：「不要責怪你的朋友。不要讓小事困擾你。」「不要把善良跟軟弱搞混——想想你已經成長了多少。」培養耐心需要時間。把大問題拆成小問題也需要時間。她說：「當你懷疑自己的時候，放輕鬆一點。」「不要覺得尷尬。原諒並忘記就好。不要讓錯誤嚇到你。」那天晚上，全家人開始聚在一起吃晚餐。"}, {"day": 124, "title_zh": "晚餐後的心事", "text": "\"I **guess** everyone has hard days,\" said Mia. \"I don't **hate** anyone. But sometimes I **hope** things were easier.\" \"**Imagine** a better tomorrow. Let it **inspire** you,\" said Grandpa. \"You **know** I **like** — even **love** — watching you grow.\" \"I don't **mind** the hard parts,\" said Mia. \"I just **need** support.\" \"I **notice** your effort. I **realize** how far you've come. Don't **regret** trying,\" he said warmly.", "text_zh": "米亞說：「我猜每個人都有難過的日子。」「我不恨任何人。但有時候我希望事情能簡單一點。」爺爺說：「想像一個更好的明天。讓它激勵你。」「你知道我喜歡，甚至可以說是愛，看著你長大。」米亞說：「我不介意辛苦的部分。」「我只是需要一些支持。」他溫暖地說：「我注意到你的努力。我也體會到你走了多遠。不要後悔曾經嘗試過。」"}, {"day": 125, "title_zh": "睡前的心願", "text": "Before bed, Mia liked to **remember** the good parts of her day. She would **remind** herself to be thankful. \"I want to **surprise** you,\" said Dad. \"I **think** you deserve it.\" \"I don't **want** much,\" she said. \"I just **wish** upon a star. I want to stop feeling like I **worry** too much.\" \"**Bless** you for trying so hard,\" said Mom. The next morning, Mia would **act** fast. She would **bathe** quickly and **beat** the clock. She would **blow** dry her hair. Then she would take a small **bow** before school.", "text_zh": "睡前，米亞喜歡回想這一天美好的部分。她會提醒自己要心存感激。爸爸說：「我想給你一個驚喜。」「我覺得你值得擁有。」她說：「我不需要太多。」「我只想對著星星許願。我想不要再覺得自己擔心太多。」媽媽說：「你這麼努力，值得被祝福。」隔天早上，米亞會動作很快。她會快速洗澡，搶在時間之前完成。她會把頭髮吹乾。然後在上學前小小鞠一個躬。"}, {"day": 126, "title_zh": "打掃房間", "text": "On Saturday, Mia had to **break** from playing. She had to clean her room. She would **bring** a bucket. She would **brush** the floor. She would **carry** the trash bag outside. Her cat liked to **catch** bugs. It liked to **chase** her broom too. \"Don't **cheat** and skip a corner,\" said Mom. Mia had to **choose** where to start. Then she would **clap** the dust off her hands. She would **close** the window and let fresh air **come** in. \"I'll **control** the mess,\" she said. \"I'll **collect** every toy,\" she said proudly.", "text_zh": "星期六，米亞得暫停玩耍。她得打掃房間。她會拿一個水桶。她會刷洗地板。她會把垃圾袋提到外面。她的貓喜歡抓蟲子。牠也喜歡追著她的掃把跑。媽媽說：「不要偷懶跳過一個角落。」米亞得決定從哪裡開始。然後她會拍掉手上的灰塵。她會關上窗戶，讓新鮮空氣進來。她說：「我會把混亂控制好。」她驕傲地說：「我會把每個玩具都收起來。」"}, {"day": 127, "title_zh": "檢查作業", "text": "Mia cleaned her room. Then she checked her homework. The next day, her teacher looked at it. \"I will write a **comment** here,\" said the teacher. She marked every **correct** answer. \"Did you **copy** this from a friend?\" she asked. \"No, I did it myself. I **count** every step,\" Mia said. \"**Cover** your eyes if it looks hard,\" the teacher joked. \"Don't **cry**!\" Mia had a lot to do. She had to **cut** out some shapes. She had to **dial** her friend's phone number. She had to **dig** through her notes to **define** one word. She had to **deliver** her report on time. She tried not to **drop** her books. Later, the class would **elect** a new leader.", "text_zh": "米亞打掃完房間，接著檢查作業。隔天，老師看了她的作業。老師說：「我要寫一個評語。」老師把每個正確答案都做記號。老師問：「這是抄朋友的嗎？」「不是，是我自己做的。我自己數每一個步驟，」米亞說。老師開玩笑說：「如果覺得難，就摀住眼睛。不要哭！」米亞還有很多事要做。她要剪一些形狀。她要打電話給朋友。她要翻筆記，找出一個字的定義。她要準時交報告。她小心不要掉書。之後，班上要選出一位新班長。"}, {"day": 128, "title_zh": "進入新教室", "text": "Mia walked to a new classroom. She was ready to **enter** the room. Rules **exist** for good reasons, she thought. \"Please **feed** the class fish,\" said the teacher. \"Don't **fight** with your classmates. **Follow** the schedule every day.\" At lunch, they wanted to **fry** an egg together. \"Let's **go** now,\" said a friend. She wanted to **greet** the new student. \"You will **grow** more confident here,\" the teacher said with a smile. She was ready to **guide** him. They helped him **hang** his coat on a hook. They wanted to **help** him feel at home. Nobody wanted to **hit** a wrong note on his first day.", "text_zh": "米亞走到一間新教室。她準備好要走進教室。她心想，規矩的存在都是有原因的。老師說：「請餵班上的魚。」「不要跟同學打架。每天都要照著課表走。」午餐時間，他們想要一起煎蛋。一位朋友說：「我們走吧。」她想跟新同學打招呼。老師微笑著說：「你在這裡會變得更有自信。」她準備好要引導他。他們幫他把外套掛在掛鉤上。他們想幫他快點適應。第一天，沒有人希望出差錯。"}, {"day": 129, "title_zh": "體育課趣事", "text": "In gym class, students had to **hold** a rope. They had to **hop** on one foot. They had to **hunt** for hidden treasure. \"Don't **hurry**,\" said the coach. He watched them **jump** and **kick** the ball. One boy dared to **knock** on the shed door. \"This joke will **kill** the fun,\" he laughed. A player blew a **kiss** to the crowd. Everyone began to **laugh**. \"**Lay** the mats down first,\" said the coach. Then he let them **leave**. A dog nearby tried to **lick** their snacks.", "text_zh": "體育課上，學生要握住繩子。他們要單腳跳。他們要假裝尋寶。教練說：「不要急。」他看著他們跳、踢球。有個男生大膽地敲了敲器材室的門。他笑著說：「這個玩笑會破壞大家的興致。」一位選手向觀眾飛吻。大家都笑了。教練說：「先把墊子鋪好。」然後才讓他們離開。附近一隻狗想舔他們的點心。"}, {"day": 130, "title_zh": "整理置物櫃", "text": "Back in class, Mia had a big box to **lift**. She had to **list** her missing things. She had to **lock** her locker. \"Let's **make** a plan,\" she said. She was ready to **meet** her study group. \"I don't want to **miss** anything,\" she said. She tried not to **mix** up her notes. \"I will **move** these books,\" she said with a **nod**. She wanted to **offer** her help. \"**Open** the door, please,\" she said. Then you should **pack** your bag. Then we can **park** our bikes outside.", "text_zh": "回到教室，米亞有一個很重的箱子要抬。她要列出遺失物品的清單。她要鎖上置物櫃。她說：「我們來訂個計畫。」她準備好去見讀書小組。她說：「我不想漏掉任何東西。」她努力不把筆記搞混。她點頭說：「我來搬這些書。」她想要主動幫忙。她說：「請開門。」然後你要把書包收好。然後我們可以把腳踏車停在外面。"}, {"day": 131, "title_zh": "美術課手作", "text": "In art class, Mia had paper shapes to **paste**. She had to **pause** and think. She had to **pick** the right colors. \"Let's **plant** an idea here,\" said the teacher. She showed them how to **print** a design. \"You can **pull** this string,\" she said. \"It will **produce** a nice effect.\" She taught them to **protect** their work. \"**Push** gently,\" she said. \"Then **put** it here.\" \"Let's **recycle** old paper,\" she said. \"We should **revise** our plan.\" They had to hurry before the glue began to **rise**.", "text_zh": "美術課上，米亞有紙做的形狀要貼上去。她要停下來想一想。她要挑選合適的顏色。老師說：「我們在這裡種下一個點子。」她示範怎麼印出圖案。她說：「你可以拉這條線。」「這樣會做出好看的效果。」她教大家保護自己的作品。她說：「輕輕地推。」「然後放在這裡。」她說：「我們來回收舊紙張。」「我們應該修改一下計畫。」他們得趕在膠水變乾之前做完。"}, {"day": 132, "title_zh": "傳球遊戲", "text": "In PE class, they had a ball to **roll**. They had to **rub** their hands to stay warm. They had to **run** across the field. \"Don't **rob** the other team of their turn,\" said the coach. \"Take a **rest** first,\" he said. \"Then we will **shake** hands.\" \"Ready, **shoot**!\" someone would **shout**. Then they would **shut** the goal tight. \"No one may **smoke** here,\" said a **sign** on the wall. \"**Stand** still,\" said the coach. \"Don't **steal** the ball!\"", "text_zh": "體育課上，他們有一顆球要滾。他們要搓手取暖。他們要跑過整個場地。教練說：「不要搶走另一隊的機會。」他說：「先休息一下。」「然後我們來握手。」有人會喊：「預備，射門！」接著他們會把球門守緊。牆上的告示牌寫著：「這裡禁止吸菸。」教練說：「站好。」「不要搶球！」"}, {"day": 133, "title_zh": "投票選班代", "text": "During class, they wanted to **strike** up a talk. They took turns to **take** a chance. Everyone would **tell** their own idea. They could **throw** out new ideas. They could **touch** on new topics too. \"**Type** your name here,\" said the leader. \"This will **use** your **vote**.\" After that, they would **walk** outside. They would **wave** to their friends. They would **hug** their classmates. They would **yell** with excitement. Someone had to **mop** the floor before they left.", "text_zh": "上課時，他們想展開一場討論。他們輪流發言。每個人都要說出自己的想法。他們可以提出新的點子。他們也可以談到新的話題。班長說：「在這裡打上你的名字。」「這樣就會用掉你的一票。」之後，他們會走到外面。他們會向朋友揮手。他們會擁抱同學。他們會興奮地大喊。有人得在離開前先拖地。"}, {"day": 134, "title_zh": "接受新提議", "text": "The class had to **accept** a new plan. They wanted to **add** more activities. \"I **admire** your idea,\" said the teacher. She was ready to **advise** the group. Everyone had to **agree**. They had to **allow** time for questions. \"I must **apologize** for being late,\" said the leader. New problems began to **appear**. \"I **appreciate** your patience,\" she said. Some students began to **argue**. \"Let's **arrange** a better schedule,\" she said. \"Don't **assume** it will be easy. Don't let a small problem **attack** our teamwork.\"", "text_zh": "班上要接受一項新計畫。他們想增加更多活動。老師說：「我很佩服你的想法。」她準備給小組一些建議。每個人都要同意。他們要留時間讓大家提問。班長說：「我因為遲到要道歉。」新的問題開始出現。她說：「我很感激你們的耐心。」有些學生開始爭論。她說：「我們來安排一個更好的時間表。」「不要假設事情會很簡單。不要讓一個小問題破壞我們的團隊合作。」"}, {"day": 135, "title_zh": "面對困難", "text": "\"We must **avoid** more delays,\" said the leader. She hoped the plan would **become** simple. \"Let's **begin** again.\" This project seemed to **belong** to the whole class. They planned to **broadcast** the results. She hoped clapping would **burst** out. \"I will **call** a short meeting,\" she said. She tried to stay **calm**. \"Let's **cancel** the extra task,\" she said. \"I **care** about finishing on time.\" \"Are you **certain**?\" a friend asked. \"Let's **check** the schedule,\" she said. \"Let's **compare** it with last year.\"", "text_zh": "班長說：「我們一定要避免更多延誤。」她希望計畫能變簡單一點。「我們重新開始吧。」這個專題感覺屬於全班。他們計畫要轉播結果。她希望能引來一陣掌聲。她說：「我來召集一個簡短的會議。」她努力保持冷靜。她說：「我們取消那項額外的任務吧。」「我在乎能不能準時完成。」一位朋友問：「你確定嗎？」她說：「我們來查一下時間表。」「跟去年的比較一下。」"}, {"day": 136, "title_zh": "解決班級問題", "text": "\"Don't **complain**,\" said the teacher. She showed **concern** for the class. \"Let's **continue** and **create** a better plan.\" They picked a **date** for the event. They learned to **deal** with problems together. \"We must **decide** soon,\" she said. She hoped stress would **decrease**. \"You can **depend** on your team,\" she said. She was ready to **describe** the plan. She wanted to **detect** any problems early. She hoped small problems would **die** out fast. \"I will **direct** the next meeting.\"", "text_zh": "老師說：「不要抱怨。」她對班上表現出關心。「我們繼續下去，訂出一個更好的計畫。」他們選定了活動的日期。他們一起學會如何處理問題。她說：「我們必須盡快做決定。」她希望壓力能減少一些。她說：「你可以依靠你的團隊。」她準備好描述這個計畫。她想早點察覺任何問題。她希望小問題能很快消失。「我來主持下一次會議。」"}, {"day": 137, "title_zh": "找出問題根源", "text": "Slowly, the confusion began to **disappear**. \"Let's **discover** the real problem,\" said the teacher. \"Let's **discuss** it together.\" They would **download** the notes. She wanted to **emphasize** the deadline. \"I **enjoy** this challenge,\" said one student. Another girl said she used to **envy** her classmate's good grades. \"This should **excite** you, not scare you,\" said the teacher. \"I **expect** great things. Let me **explain** my plan. Let me **express** my full plan. Some ideas may **fall** through. We will **fill** the gaps together.\"", "text_zh": "漸漸地，那些困惑開始消失。老師說：「我們來找出真正的問題。」「我們一起討論吧。」他們會下載筆記。她想強調截止日期的重要性。一位學生說：「我很喜歡這個挑戰。」另一位女生說她曾經嫉妒同學的好成績。老師說：「這應該讓你興奮，而不是害怕。」「我對你們期待很高。讓我解釋我的計畫。讓我說出我完整的計畫。有些想法可能行不通。我們會一起把空缺補起來。」"}, {"day": 138, "title_zh": "尋找解決方法", "text": "\"Let's **find** a better way,\" said Mia. \"Does this plan **fit** everyone?\" They needed to **focus**. They needed to **form** small groups. \"**Get** your notebooks and **give** your best effort,\" said the teacher. She was ready to **handle** any problem. She was ready for what might **happen**. \"Don't **hide** your worries,\" she said. \"That will only **hurt** the team.\" \"Let's **improve** our plan,\" she said. \"Let's **include** everyone's ideas. Please don't **ignore** anyone's opinion.\"", "text_zh": "米亞說：「我們來找一個更好的方法。」「這個計畫適合每一個人嗎？」他們需要專心。他們需要分成小組。老師說：「拿出你們的筆記本，全力以赴。」她準備好處理任何問題。她準備好面對任何可能發生的事。她說：「不要隱藏你的擔憂。」「那只會傷害整個團隊。」她說：「我們來改善我們的計畫。」「我們把每個人的想法都納入。請不要忽視任何人的意見。」"}, {"day": 139, "title_zh": "老師的叮嚀", "text": "\"Effort will **increase** your chances,\" said the teacher. \"I must **insist** you don't **interrupt** each other.\" She began to **introduce** a new idea. She wanted to **invent** it herself. She would **invite** everyone to try it. \"Let's **join** hands,\" she said. \"Let a fair **judge** decide who will **keep** the schedule.\" \"Someone must **lead** the group.\" \"**Let** everyone speak,\" she said. \"Don't **lie** about your progress.\" \"Don't **limit** your own effort.\"", "text_zh": "老師說：「努力會增加你成功的機會。」「我必須堅持，你們不能互相打斷。」她開始介紹一個新的想法。她想自己發明這個想法。她會邀請大家一起嘗試。她說：「我們攜手合作。」「讓一位公正的裁判來決定，誰負責掌握進度。」「要有人來帶領小組。」她說：「讓每個人都能發言。」「不要對自己的進度說謊。」「不要限制自己的努力。」"}, {"day": 140, "title_zh": "誠實面對成績", "text": "\"Let's **list** every task,\" said the teacher. \"Let's **match** each student to a job.\" \"What does this grade **mean**?\" a student asked. \"I **notice** your hard work,\" the teacher replied. \"Always **obey** the rules. Don't **omit** any steps. You must **own** your mistakes.\" \"I'll **plan** better next time,\" said Mia. \"I will never **pollute** our teamwork with excuses.\" \"I **praise** your honesty,\" said the teacher. \"I **pray** you'll keep this spirit. You should **prepare** well. I **promise** to help you.\"", "text_zh": "老師說：「我們把每一項任務列出來。」「我們把每位學生分配到一項工作。」一位學生問：「這個成績代表什麼意思？」老師回答：「我注意到你的努力了。」「永遠要遵守規則。不要漏掉任何一個步驟。你要為自己的錯誤負責。」米亞說：「下次我會計畫得更好。」「我絕不會用藉口污染我們的團隊合作。」老師說：「我很讚賞你的誠實。」「我祈禱你能保持這種精神。你要做好準備。我保證會幫助你。」"}, {"day": 141, "title_zh": "解決紛爭", "text": "The teacher wants to **provide** help. Two boys had a big fight. \"Don't **quit** now,\" she said. \"**Raise** your hand if you need help.\" The two boys could not **reach** an agreement. One boy wanted to **receive** an apology. But the other boy would **refuse** to say sorry. He would **reject** every idea. \"You don't need to **rent** a new desk,\" said the teacher. \"Just **respect** each other, and **return** the toy you took.\" \"Don't **ruin** your friendship,\" she said. She wanted to **solve** the problem. She wanted to **satisfy** both boys.", "text_zh": "老師想幫忙解決問題。兩個男生大吵一架。「先別放棄，」她說。「有問題就舉手。」兩個男生沒辦法達成共識。一個男生想要對方道歉。可是另一個男生不肯說對不起。他每個想法都拒絕。「你不用租新書桌，」老師說。「只要互相尊重，把你拿走的玩具還回去就好。」「不要毀掉你們的友情，」她說。她想解決這個問題。她想讓兩個人都滿意。"}, {"day": 142, "title_zh": "整理作品集", "text": "Mia wants to **save** her best work. \"Let's **search** your folder,\" said the teacher. \"It might **seem** hard, but just **select** three pieces.\" Some kids will **sell** old projects at the school fair. Other kids will **send** samples to a contest. \"I like to **serve** as a helper,\" said Mia. \"I will **share** my notes with you.\" She got ready to **show** her folder to the class. \"Don't **sleep** on this,\" said the teacher. \"You should **start** early, **stay** focused, and not **stop** until you finish.\"", "text_zh": "米亞想保存她最好的作品。「我們一起翻找你的資料夾吧，」老師說。「現在可能覺得很難，但先選出三件作品就好。」有些同學會在園遊會上賣掉舊作品。有些同學會把作品樣本寄去比賽。「我很樂意當幫手，」米亞說。「我會把我的筆記分享給你。」她準備好要把資料夾拿給全班看。「不要拖到最後，」老師說。「早點開始，保持專心，沒做完不要停。」"}, {"day": 143, "title_zh": "感謝與信任", "text": "\"I **suggest** we thank our teacher,\" said Mia. \"Let's **support** her and **thank** her for everything.\" \"I **treat** her like family,\" said a classmate. \"I **trust** her advice.\" \"I will **try** my best,\" said Mia. \"I will **upload** our photos, and I will **visit** her office to say thanks.\" \"Let's not **wait** too long,\" she said. \"We need to **wake** up early tomorrow.\" \"Don't **waste** this chance.\" \"We **welcome** any help,\" said the teacher. \"We are **able** to do this together.\"", "text_zh": "「我建議我們謝謝老師，」米亞說。「我們一起支持她，感謝她做的一切。」「我把她當成家人，」一位同學說。「我信任她的建議。」「我會盡力，」米亞說。「我會上傳我們的照片，也會去她辦公室當面道謝。」「我們別等太久了，」她說。「明天要早點起床。」「不要浪費這個機會。」「我們歡迎任何幫忙，」老師說。「我們一起，一定做得到。」"}, {"day": 144, "title_zh": "缺席的同學", "text": "One student was **absent** today. \"I'm **afraid** he is sick,\" said the teacher. \"He and his brother look **alike**,\" said Mia. \"Good thing they are both **alive** and healthy.\" The class read about **ancient** history. A few kids looked **asleep**. \"Extra notes are **available** for him,\" said the teacher. She kept the lesson **basic** and clear. Outside, the sky was **bright**. The road was **broad**. The topic felt almost **classical**. It was full of **colorful**, **common** stories from long ago.", "text_zh": "今天有一個同學缺席。「他可能生病了，」老師說。「他跟他哥哥長得很像，」米亞說。「還好兩個人都活得健健康康的。」班上讀了古代的歷史。有幾個同學看起來快睡著了。「我幫他準備了額外的筆記，」老師說。她把課上得很簡單，也很清楚。外面的天空很晴朗。那條路很寬。這個主題感覺很經典。裡面充滿了色彩豐富、大家都聽過的老故事。"}, {"day": 145, "title_zh": "打掃教室", "text": "\"The classroom clean-up is **complete**,\" said Mia. \"This new shelf is very **convenient**.\" \"Is my answer **correct**?\" she asked. The room felt a little **crowded**. \"That old wire looks **dangerous**,\" said the teacher. \"That corner is too **dark**.\" Luckily, no plant was **dead** yet. \"That old vase is very **dear** to me,\" said the teacher. \"Every classroom is **different**,\" said Mia. \"Some are **difficult** to keep clean. Some are just **dirty**.\" Mia worked **double** hard to make it **easy** for everyone.", "text_zh": "「教室整理完成了，」米亞說。「這個新架子真的很方便。」「我的答案對嗎？」她問。教室裡感覺有點擁擠。「那條舊電線看起來很危險，」老師說。「那個角落太暗了。」還好，還沒有植物枯死。「那個舊花瓶對我來說很珍貴，」老師說。「每間教室都不一樣，」米亞說。「有些很難保持乾淨。有些就是很髒。」米亞加倍努力，讓大家都能輕鬆一點。"}, {"day": 146, "title_zh": "更新教室設備", "text": "\"The school put in a new **electric** fan,\" said the teacher. \"There is **enough** space now.\" \"It feels more **equal** for everyone.\" \"This new light is **excellent**,\" said Mia. \"It's even **fantastic**!\" \"It's only **fair** that we all help decorate.\" The room looked **fashionable** with new curtains. They were Mia's **favorite** color. A **foreign** student wanted a more **formal** display. \"Our **former** classroom was too plain,\" said a classmate. \"Now it feels **free** and **fresh**.\"", "text_zh": "「學校裝了一台新的電風扇，」老師說。「現在空間夠了。」「感覺對大家也比較公平。」「這盞新燈好棒，」米亞說。「甚至可以說很棒！」「大家一起幫忙佈置也是應該的。」新窗簾讓教室看起來很時髦。那是米亞最喜歡的顏色。一位外國學生想要一個更正式的展示。「我們以前的教室太單調了，」一位同學說。「現在感覺自由又清新。」"}, {"day": 147, "title_zh": "溫馨的教室", "text": "\"I'm so **glad** we finished,\" said Mia. \"It was **hard** work.\" \"You were so **helpful**,\" said the teacher. A new student felt **homesick**, but she smiled at the change. \"That old chair looked **horrible** before,\" said Mia. \"It's **important** to make school feel like home.\" \"It's not **impossible**,\" said the teacher. She praised their **independent** work. \"This was **instant** teamwork,\" she said. \"Truly **interesting** to watch.\" She loved their **latest** idea, even if it got a little **loud**. \"We are so **lucky** to have you all.\"", "text_zh": "「我好高興我們終於做完了，」米亞說。「這是很辛苦的工作。」「你幫了很大的忙，」老師說。有個新同學想家，但看到這個改變還是笑了。「那張舊椅子以前看起來好可怕，」米亞說。「讓學校感覺像家一樣很重要。」「這不是不可能的，」老師說。她稱讚他們獨立完成的作品。「這真是立刻就完成的團隊合作，」她說。「看著真的很有趣。」她很喜歡他們最新的點子，就算聲音有點吵。「我們真幸運能有你們大家。」"}, {"day": 148, "title_zh": "教室裡的驚喜", "text": "\"A student did a **magic** trick,\" said Mia. \"That was a **major** part of today's fun.\" \"It was truly **marvelous**!\" said the teacher. A **minor** mistake made everyone laugh. \"This feels so **modern**,\" said Mia. She loved the new posters. They felt like a **national** treasure. \"It's **necessary** to celebrate small wins,\" said the teacher. She kept a **negative** mood away. The room got a little **noisy**, but that was okay. \"This isn't an **ordinary** day,\" she smiled. It felt like they had traveled **overseas**. The room felt **peaceful** and almost **perfect**.", "text_zh": "「有個同學表演了魔術，」米亞說。「那是今天最好玩的部分。」「真的很神奇！」老師說。有個小小的失誤讓大家都笑了。「這感覺好現代，」米亞說。她很喜歡新海報。感覺就像國寶一樣。「慶祝這些小小的成功很重要，」老師說。她不讓負面情緒出現。教室裡有點吵，不過沒關係。「今天不是普通的一天，」她笑著說。感覺就像出國旅行一樣。教室的氣氛很平靜，幾乎完美。"}, {"day": 149, "title_zh": "個人心得分享", "text": "\"This was my **personal** favorite project,\" said Mia. It became very **popular** with her classmates. \"I feel **positive** about our teamwork,\" she said. \"Anything is **possible** when we work together.\" This memory was **precious** to her. \"This **present** moment matters most,\" said the teacher. Some students wanted a **private** corner to think. They wanted to get away from **public** noise. \"Let's stay **quiet** for a moment,\" she said. This kind of teamwork was **rare**. \"Are you **ready**?\" she asked. \"This is **real** progress.\" \"I hope it becomes **regular**.\"", "text_zh": "「這是我個人最喜歡的專題，」米亞說。這個專題在同學間變得很受歡迎。「我對我們的團隊合作感覺很正向，」她說。「只要一起合作，什麼都有可能。」這段回憶對她來說很珍貴。「當下這一刻最重要，」老師說。有些同學想要一個私人的角落來思考。他們想離開吵鬧的公共空間。「我們安靜一下吧，」她說。這樣的團隊合作很難得。「你準備好了嗎？」她問。「這是真正的進步。」「我希望它能變成常態。」"}, {"day": 150, "title_zh": "負責任的態度", "text": "\"Being **responsible** feels **right**,\" said Mia. \"I feel **safe** here.\" \"We are all on the **same** team.\" \"I was **scared** at first,\" she said. She also had a **secondary** worry about her grades. \"This is a **serious** goal,\" said the teacher. \"So stay **sharp**.\" The class went **silent**. Every idea was **similar**, but each one was still **single** and special. \"You have all become so **skillful**,\" she said. A few kids looked **sleepy** by the end of the day.", "text_zh": "「負責任的感覺是對的，」米亞說。「我在這裡覺得很安全。」「我們都是同一隊的。」「一開始我很害怕，」她說。她心裡也有一個次要的煩惱，就是成績。「這是一個很重要的目標，」老師說。「所以要保持警覺。」全班安靜了下來。每個想法都很相似，但每一個都還是獨一無二。「你們都變得好熟練，」她說。到了一天結束時，有幾個同學看起來昏昏欲睡。"}, {"day": 151, "title_zh": "說再見的時刻", "text": "\"I'm **sorry** the term is ending,\" said the teacher. \"This was a **special** year.\" \"Sometimes it felt **strange**, with **sudden** surprises.\" \"You were a **super** class,\" she said. She looked **surprised** by how much they had grown. \"It wasn't always easy,\" she said. \"Some days felt **terrible**, but most were **terrific**.\" The class photo book was **thick** now. The classroom stayed **tidy** because of their **traditional** end-of-year cleaning. \"You made this classroom **unique**.\" \"You made it **useful** for the next class, too.\"", "text_zh": "「這學期要結束了，我覺得好捨不得，」老師說。「這是特別的一年。」「有時候覺得很奇怪，還有一些突然的驚喜。」「你們是超棒的一班，」她說。她對他們成長這麼多感到很驚訝。「不是每件事都很容易，」她說。「有些日子很糟糕，但大多數日子都很棒。」班級相簿現在已經很厚了。教室也因為他們傳統的期末大掃除而保持整潔。「你們讓這間教室變得獨一無二。」「你們也讓它對下一屆很有用。」"}, {"day": 152, "title_zh": "最後的叮嚀", "text": "\"Your hard work was truly **valuable**,\" said the teacher. She praised their **social** teamwork. They were **wild** sometimes, but always careful. \"This was a **wonderful** year,\" she said. \"You didn't take one **wrong** step.\" \"I will **always** remember this,\" said Mia. \"Will I **ever** forget it?\" \"**Never**!\" \"We **often** laughed together.\" \"But we **seldom** argued.\" \"**Sometimes** it was hard,\" said the teacher. \"But we **usually** found a way.\" \"**Actually**, this was the best class I've ever had.\"", "text_zh": "「你們的努力真的很寶貴，」老師說。她稱讚他們的團隊合作。你們有時候很調皮，但一直都很小心。「這是很棒的一年，」她說。「你們沒有走錯一步。」「我會永遠記得這一切，」米亞說。「我會忘記嗎？」「絕對不會！」「我們常常一起大笑。」「但我們很少吵架。」「有時候很辛苦，」老師說。「但我們通常都能找到辦法。」「其實，這是我教過最棒的一班。」"}, {"day": 153, "title_zh": "畢業前的叮囑", "text": "\"Let's meet **again** next year,\" said Mia. \"Even after everyone moves **away**.\" \"I **almost** cried today,\" she said, \"**especially** at the end.\" \"**Even** small memories matter,\" said the teacher. \"**Finally**, I want to say thank you.\" \"I could **hardly** believe how fast this year went.\" \"I have at **least** one worry about the future.\" \"I **really** loved this class,\" said Mia. \"**So** did I,\" said the teacher. \"Let's **still** stay in touch, **then** meet up.\" \"We grew up **together**.\"", "text_zh": "「我們明年再見面吧，」米亞說。「就算大家以後都搬走了。」「我今天差點哭出來，」她說，「尤其是在最後的時候。」「就連小小的回憶也很重要，」老師說。「最後，我想說聲謝謝。」「我幾乎不敢相信這一年過得這麼快。」「我對未來還是有一點點擔心。」「我真的很愛這個班級，」米亞說。「我也是，」老師說。「我們要保持聯絡，之後再約出來見面。」「我們是一起長大的。」"}, {"day": 154, "title_zh": "畢業快樂", "text": "\"We've met **twice** this week,\" said Mia. \"I'm **very** happy it's not over **yet**.\" She cheered **aloud**. \"Even if you move **abroad**, keep looking **ahead**,\" said the teacher. \"I will think of you **everywhere**.\" \"I will think of you **anywhere**.\" \"You will be **somewhere** in my heart.\" \"It doesn't matter **either** in Taiwan **nor** far away.\" \"You will always be my class.\"", "text_zh": "「這禮拜我們已經見過兩次面了，」米亞說。「我好高興這一切還沒結束。」她大聲歡呼。「就算你搬到國外，也要繼續往前看，」老師說。「我會在每個地方想著你。」「我會在任何地方想著你。」「你會一直在我心裡的某個角落。」「不管是在台灣還是在遙遠的地方，都沒關係。」「你永遠都是我的學生。」"}];
const STORYBOOK = [{"id": 1, "title_en": "The Garden of Paradise", "title_zh": "天國花園", "author": "Hans Christian Andersen（安徒生）", "words": [{"w": "garden", "pos": "n.", "m": "花園"}, {"w": "prince", "pos": "n.", "m": "王子"}, {"w": "rain", "pos": "v.", "m": "下雨"}, {"w": "wind", "pos": "n.", "m": "風"}, {"w": "beautiful", "pos": "adj.", "m": "美麗的；漂亮的"}, {"w": "stay", "pos": "v.", "m": "留下；停留"}, {"w": "kiss", "pos": "v.", "m": "親吻"}, {"w": "fail", "pos": "v.", "m": "失敗"}, {"w": "rule", "pos": "n.", "m": "規則"}, {"w": "become", "pos": "v.", "m": "變成；變得"}, {"w": "dark", "pos": "adj.", "m": "黑暗的"}, {"w": "dream", "pos": "n.", "m": "夢"}], "reference_words": [{"w": "paradise", "pos": "n.", "m": "天堂；樂園"}, {"w": "cave", "pos": "n.", "m": "洞穴"}, {"w": "amazed", "pos": "adj.", "m": "感到驚訝的"}, {"w": "forever", "pos": "adv.", "m": "永遠"}, {"w": "fairy", "pos": "n.", "m": "仙女"}, {"w": "cheek", "pos": "n.", "m": "臉頰"}, {"w": "thunder", "pos": "n.", "m": "雷聲"}], "text": ["A young **prince** had the same **dream** every night. He dreamed about a **beautiful** **garden**. The flowers in the garden never died. One night, **rain** fell hard. Outside, **wind** blew against his window. He wished harder than ever to find that garden.", "In the dream, a soft **wind** carried him over the sea. It carried him over tall mountains. He landed at a golden gate. A kind fairy opened the gate for him. She said he could **stay** in the garden as long as he liked. But she had one **rule**. He must never give her a **kiss**.", "Every day felt like paradise. But slowly, the prince forgot the rule. One evening, he could not stop himself. He gave the fairy a kiss. The sky turned **dark**. The beautiful garden began to sink into the sea. His dream started to **become** a bad dream. He woke up in his own dark room. He understood then. He had one test. He did **fail** that test. Paradise was gone."], "text_zh": ["一位年輕的王子每天晚上都做著同一個夢。他夢見一座美麗的花園。花園裡的花朵永遠不會枯萎。有一天晚上，外面下著大雨。窗外，風吹打著他的窗戶。他比以前更想找到那座花園。", "在夢裡，一陣輕柔的風帶著他飛過大海。風帶著他飛過高山。他降落在一扇金色的大門前。一位善良的仙子幫他打開了門。她說他可以想待多久就待多久。但她有一個規則。他絕對不能親她一下。", "每天都像天堂一樣。但王子漸漸忘了那個規則。有一天晚上，他忍不住了。他親了仙子一下。天空瞬間變黑。美麗的花園開始沉入海裡。他的夢開始變成一場惡夢。他醒來，發現自己回到了那間陰暗的房間。他終於明白了。他只有一次考驗的機會。他沒能通過那個考驗。天堂就這樣消失了。"]}, {"id": 2, "title_en": "The Selfish Giant", "title_zh": "自私的巨人", "author": "Oscar Wilde（王爾德）", "words": [{"w": "selfish", "pos": "adj.", "m": "自私的"}, {"w": "giant", "pos": "n.", "m": "巨人"}, {"w": "peach", "pos": "n.", "m": "桃子"}, {"w": "yell", "pos": "v.", "m": "叫喊；吼叫"}, {"w": "confuse", "pos": "v.", "m": "使困惑"}, {"w": "sweet", "pos": "adj.", "m": "甜美的"}, {"w": "reason", "pos": "n.", "m": "理由；原因"}, {"w": "climb", "pos": "v.", "m": "爬；攀登"}, {"w": "realize", "pos": "v.", "m": "了解；意識到"}, {"w": "consider", "pos": "v.", "m": "考慮"}, {"w": "friendly", "pos": "adj.", "m": "親切的；友善的"}, {"w": "spot", "pos": "v.", "m": "看見；瞥見"}], "reference_words": [{"w": "soft", "pos": "adj.", "m": "柔軟的"}], "text": ["A **selfish** **giant** had a beautiful garden. Tall **peach** trees grew there. Kids loved to play there after school. One day, the giant came home. He saw the kids in his garden. He opened his mouth to **yell**: \"Get out!\" He built a high wall. Now no kid could get in.", "After that, winter never left the giant's garden. Spring came to the rest of the town, but not to his garden. This began to **confuse** the giant. He could not understand the **reason**. Why did no flowers grow? Why did no birds sing? He sat alone. He missed the **sweet** smell of flowers.", "One morning, he saw a small boy. The boy tried to **climb** a tree. The tree was still frozen with snow. The giant lifted the boy up gently. This helped him **realize** something. His selfishness was the reason for the long winter. He knocked down the wall. From then on, he was a **friendly** giant. He let every kid play in every **spot** of his garden.", "He never stopped to **consider** something important. A simple garden can bring so much joy. He almost learned this lesson too late."], "text_zh": ["有一個自私的巨人，他有一座很美的花園。花園裡種著高大的桃樹。放學後，小朋友最喜歡去那裡玩。有一天，巨人回家了。他看見小朋友在他的花園裡玩。他張開嘴大吼：「都給我出去！」他蓋了一道高高的牆。從此沒有小朋友能再進去了。", "從那之後，巨人的花園就再也沒有春天了。鎮上其他地方都變成春天了，他的花園卻沒有。這讓巨人覺得很困惑。他不明白原因是什麼。為什麼花都不開？為什麼鳥都不叫？他常常一個人坐著。他很想念花朵香甜的味道。", "有一天早上，他看見一個小男孩。男孩正想爬上一棵樹。那棵樹還結著冰雪。巨人輕輕把男孩抱起來。這讓他終於明白了一件事。他的自私才是這場漫長冬天的原因。他把牆推倒了。從那以後，他變成一個友善的巨人。他讓每個小朋友都能在花園的每個角落玩耍。", "他一直沒有好好想過一件重要的事。一座簡單的花園，能帶來這麼多快樂。他差一點就太晚才學到這個道理。"]}, {"id": 3, "title_en": "The Gift of the Magi", "title_zh": "最珍貴的禮物", "author": "O. Henry（歐．亨利）", "words": [{"w": "cent", "pos": "n.", "m": "分（美、加等國的貨幣單位）"}, {"w": "horrible", "pos": "adj.", "m": "糟糕的"}, {"w": "envy", "pos": "v.", "m": "羨慕；嫉妒"}, {"w": "knee", "pos": "n.", "m": "膝蓋"}, {"w": "speed", "pos": "n.", "m": "速度"}, {"w": "shopkeeper", "pos": "n.", "m": "店主；老闆"}, {"w": "slender", "pos": "adj.", "m": "細長的；纖細的"}, {"w": "cost", "pos": "v.", "m": "要價；花費"}, {"w": "sofa", "pos": "n.", "m": "沙發"}, {"w": "dear", "pos": "n.", "m": "親愛的（用作稱呼）"}, {"w": "rose", "pos": "n.", "m": "玫瑰花"}, {"w": "bless", "pos": "v.", "m": "祝福；保佑"}], "reference_words": [{"w": "wig", "pos": "n.", "m": "假髮"}, {"w": "chain", "pos": "n.", "m": "（錶）帶；鏈條"}], "text": ["Della had only a **cent** or two left. But she wanted to buy her husband Jim a great Christmas present. She looked at her long hair in the mirror. She felt no **envy** of anyone. Her hair was the one thing she owned that was truly special.", "She went down on one **knee** for a moment, feeling sad. Then she ran at full **speed** to a **wig** shop. The **shopkeeper** looked at her long, **slender** hair. He offered her money for it. It was enough to **cost** exactly what she needed. She wanted to buy a gold **chain** for Jim's watch.", "That night, Jim came home. He stared at Della's short hair. Then he slowly took out his gift. It was a set of combs, for hair she no longer had. He had sold his watch to buy them. They sat together on the old **sofa**. They saw their gifts were now useless.", "But each of them had given up something precious. They did it for someone **dear** to them. They smiled, their cheeks as red as a **rose**. They knew love would **bless** them for life. At first, having nothing useful left felt like a **horrible** joke. But really, it was the best gift of all."], "text_zh": ["黛拉手上只剩下一兩分錢。但她想買一份很棒的聖誕禮物給丈夫吉姆。她對著鏡子，看著自己的長髮。她一點也不羨慕別人。她的頭髮，是她真正擁有、最特別的東西。", "她單膝跪了下來，覺得有點難過。接著，她用最快的速度跑去一家假髮店。店主看了看她纖細柔順的長髮。他開價要買下來。價錢剛好夠她買到需要的東西。她想買一條金鍊子給吉姆的懷錶。", "那天晚上，吉姆回到家。他盯著黛拉變短的頭髮看了好一會兒。接著，他慢慢拿出自己準備的禮物。那是一套梳子，配給她現在已經沒有的頭髮。原來他把自己的懷錶賣掉，才買得起這套梳子。他們一起坐在舊沙發上。他們發現彼此的禮物現在都用不上了。", "但他們兩人，都為了心愛的人，捨棄了自己最珍貴的東西。他們笑了，臉頰紅得像玫瑰一樣。他們相信愛會永遠祝福他們。一開始，兩人手上沒有一樣實用的東西，感覺像個糟糕的玩笑。但其實，這才是最棒的禮物。"]}, {"id": 4, "title_en": "The Model Millionaire", "title_zh": "模範百萬富翁", "author": "Oscar Wilde（王爾德）", "words": [{"w": "model", "pos": "adj./n.", "m": "模範的；模特兒"}, {"w": "friendly", "pos": "adj.", "m": "友善的；親切的"}, {"w": "fail", "pos": "v.", "m": "失敗"}, {"w": "marry", "pos": "v.", "m": "結婚；嫁娶"}, {"w": "painter", "pos": "n.", "m": "畫家"}, {"w": "coin", "pos": "n.", "m": "硬幣"}, {"w": "club", "pos": "n.", "m": "俱樂部；會所"}, {"w": "rich", "pos": "adj.", "m": "富有的"}, {"w": "gentleman", "pos": "n.", "m": "男士；紳士"}, {"w": "outside", "pos": "n.", "m": "外面；外部"}, {"w": "check", "pos": "n.", "m": "支票"}, {"w": "speech", "pos": "n.", "m": "演講"}], "reference_words": [{"w": "millionaire", "pos": "n.", "m": "百萬富翁"}, {"w": "beggar", "pos": "n.", "m": "乞丐"}, {"w": "best man", "pos": "n.", "m": "伴郎"}], "text": ["Hughie was a poor young **painter**. But he had a **friendly** heart. One day, he went to his art **club**. He saw an old beggar sitting **outside** as a **model** for another painter. Hughie felt so sorry for him. He gave the man every **coin** he had in his pocket.", "The next week, Hughie went to a **rich** **gentleman**'s party. He was shocked. He saw the same \"beggar\" there! But now the man was dressed like a real gentleman. It turned out the old man was really a millionaire. He just loved dressing up as a model for fun.", "Hughie was afraid he had made a silly mistake. But the millio
