<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>國中英文 2000 單字 × 故事閱讀｜系統性學習工具</title>
<style>
:root{
  --bg:#faf7f2;
  --card:#ffffff;
  --ink:#2d2a26;
  --muted:#767066;
  --brand:#c96f4a;
  --brand-dark:#a8562f;
  --good:#4c8c5c;
  --bad:#c0503f;
  --line:#ece5da;
  --radius:14px;
}
*{box-sizing:border-box;}
html,body{margin:0;padding:0;}
body{
  font-family:"PingFang TC","Microsoft JhengHei","Noto Sans TC",-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
  background:var(--bg);
  color:var(--ink);
  line-height:1.6;
}
.lock-screen{
  position:fixed; inset:0;
  background:linear-gradient(135deg,#c96f4a,#a8562f);
  display:flex; align-items:center; justify-content:center;
  z-index:200; padding:20px;
}
.lock-card{
  background:var(--card); border-radius:var(--radius);
  padding:28px 24px; max-width:320px; width:100%;
  text-align:center; box-shadow:0 8px 30px rgba(0,0,0,.25);
}
.lock-card h2{margin:0 0 6px;}
.lock-card .input-text{width:100%; margin:14px 0 10px; text-align:center; font-size:16px;}
.lock-card .btn{width:100%;}
header.topbar{
  background:linear-gradient(135deg,#c96f4a,#a8562f);
  color:#fff;
  padding:18px 20px 12px;
  position:sticky; top:0; z-index:10;
  box-shadow:0 2px 10px rgba(0,0,0,.12);
}
header.topbar h1{margin:0 0 10px; font-size:20px;}
.sync-indicator{font-size:12px; margin:-4px 0 10px; opacity:.9;}
.sync-indicator.sync-success{color:#dff2e1;}
.sync-indicator.sync-error{color:#ffd9d0;}
.sync-indicator.sync-pending,.sync-indicator.sync-saving{color:#fff2df;}
.tts-settings{
  display:flex; flex-wrap:wrap; align-items:center; gap:10px;
  font-size:12.5px; color:#fff; opacity:.95; margin:0 0 10px;
}
.tts-settings label{display:inline-flex; align-items:center; gap:4px;}
.tts-settings select{
  font-size:12.5px; padding:2px 6px; border-radius:6px; border:1px solid rgba(255,255,255,.5);
  background:#fff; color:var(--ink);
}
.tts-settings .btn{padding:3px 10px; font-size:12px;}
nav.tabs{display:flex; flex-wrap:wrap; gap:6px;}
.tab-btn{
  background:rgba(255,255,255,.15);
  border:1px solid rgba(255,255,255,.35);
  color:#fff;
  padding:6px 12px;
  border-radius:999px;
  cursor:pointer;
  font-size:13px;
  text-decoration:none;
  white-space:nowrap;
}
.tab-btn.active{ background:#fff; color:var(--brand-dark); font-weight:600; }
main{max-width:960px; margin:0 auto; padding:16px 14px 60px;}
.grid{display:grid; grid-template-columns:1fr 1fr; gap:14px;}
.grid .span-2{grid-column:1/3;}
@media (max-width:720px){ .grid{grid-template-columns:1fr;} .grid .span-2{grid-column:1;} }
.card{
  background:var(--card);
  border:1px solid var(--line);
  border-radius:var(--radius);
  padding:16px 18px;
  margin-bottom:14px;
  box-shadow:0 1px 3px rgba(0,0,0,.04);
}
.card.highlight{ border-color:var(--brand); background:#fff7f1; }
.card h2{margin:0 0 8px; font-size:19px;}
.card h3{margin:0 0 10px; font-size:16px;}
.muted{color:var(--muted); font-size:14px;}
.small{font-size:12px;}
.good{color:var(--good); font-weight:600;}
.bad{color:var(--bad); font-weight:600;}
.ai-box{background:#f4efe6; border-radius:10px; padding:10px 12px; margin-top:8px; font-size:14px; white-space:pre-wrap;}
.ai-box.ai-warn{background:#fbe7e3; color:var(--bad);}
.ai-box.ai-loading{color:var(--muted); font-style:italic;}
.translate-wrap{margin-top:10px;}
.translate-box{color:#555;}
.translate-box .story-p{margin:0 0 8px; font-size:14px;}
.translate-box .story-p:last-child{margin-bottom:0;}
.hint{background:#f4efe6; border-left:3px solid var(--brand); padding:8px 12px; border-radius:6px; font-size:13.5px; margin-bottom:8px;}
.progressbar{background:#eee2d3; border-radius:999px; height:14px; overflow:hidden; margin:8px 0 4px;}
.progressbar-fill{background:linear-gradient(90deg,#c96f4a,#e0956e); height:100%; transition:width .3s;}
.stat-row{display:flex; flex-wrap:wrap; gap:10px; margin-top:12px;}
.pill{background:#f4efe6; border-radius:10px; padding:8px 12px; min-width:92px; text-align:center;}
.pill-val{font-weight:700; font-size:16px; color:var(--brand-dark);}
.pill-label{font-size:11.5px; color:var(--muted);}
.row{display:flex; align-items:center;}
.row.gap{gap:8px;}
.row.wrap{flex-wrap:wrap;}
.row.space-between{justify-content:space-between;}
.row.center, .card.center{justify-content:center; text-align:center;}
.btn{
  background:#f4efe6; border:1px solid var(--line); color:var(--ink);
  padding:8px 14px; border-radius:10px; cursor:pointer; font-size:14px;
}
.btn:hover{filter:brightness(.97);}
.btn.small{padding:5px 10px; font-size:12.5px;}
.btn.big{padding:12px 22px; font-size:16px;}
.btn.primary{background:var(--brand); color:#fff; border-color:var(--brand);}
.btn.primary:hover{background:var(--brand-dark);}
.btn.ok{background:#e5f2e6; border-color:#bcdcc0; color:var(--good);}
.btn.danger{background:#fbe7e3; border-color:#f2c3ba; color:var(--bad);}
.speak-btn{
  background:#fff2df; border:1px solid #f0dcb3; color:var(--brand-dark);
  width:28px; height:28px; border-radius:50%; cursor:pointer;
  font-size:14px; line-height:1; display:inline-flex; align-items:center; justify-content:center;
  padding:0; vertical-align:middle;
}
.speak-btn:hover{filter:brightness(.96);}
.speak-btn.small{width:22px; height:22px; font-size:12px;}
.speak-btn.playing{background:var(--brand); border-color:var(--brand); color:#fff;}
.input-num{width:80px; padding:6px 8px; border-radius:8px; border:1px solid var(--line);}
.input-text{padding:8px 10px; border-radius:8px; border:1px solid var(--line); font-size:14px; flex:1; min-width:140px;}
select.input-text{flex:0 0 auto;}
.code-block{background:#2d2a26; color:#f4efe6; padding:12px 14px; border-radius:10px; font-size:12.5px; line-height:1.5; overflow-x:auto; white-space:pre; font-family:Menlo,Consolas,monospace;}
.row.wrap{flex-wrap:wrap;}

.flashcard{
  width:100%; max-width:420px; height:180px; margin:10px auto; cursor:pointer;
  position:relative; perspective:1000px;
}
.flash-front, .flash-back{
  position:absolute; inset:0; border-radius:16px; display:flex; flex-direction:column;
  align-items:center; justify-content:center; backface-visibility:hidden;
  transition:transform .5s; border:1px solid var(--line);
}
.flash-front{ background:#fff; transform:rotateY(0deg); }
.flash-back{ background:#fff2e8; transform:rotateY(180deg); }
.flashcard.flipped .flash-front{ transform:rotateY(180deg); }
.flashcard.flipped .flash-back{ transform:rotateY(360deg); }
.fw{font-size:30px; font-weight:700; color:var(--brand-dark);}
.fpos{font-size:13px; color:var(--muted); margin-top:6px;}
.fm{font-size:24px; font-weight:700;}

table.vocab-table{width:100%; border-collapse:collapse; font-size:14px;}
table.vocab-table th, table.vocab-table td{ text-align:left; padding:7px 8px; border-bottom:1px solid var(--line); }
table.vocab-table th{color:var(--muted); font-weight:600; font-size:12.5px;}
td.en{font-weight:600; color:var(--brand-dark);}
span.en.big{font-size:18px; font-weight:700; color:var(--brand-dark);}

.pattern-list{margin:0 0 10px; padding-left:18px; font-size:13.5px; color:#555;}
.sentence-input{width:100%; padding:10px; border-radius:10px; border:1px solid var(--line); font-size:14px; resize:vertical; font-family:inherit;}

.quiz-q{margin-bottom:14px;}
.quiz-question{font-weight:600; margin-bottom:6px;}
.quiz-options{display:flex; flex-direction:column; gap:4px;}
.quiz-opt{font-size:14px; display:flex; align-items:center; gap:6px; cursor:pointer;}
.quiz-result{margin:10px 0;}

.story-card{display:flex; flex-direction:column; gap:4px;}
.story-p{font-size:15px; margin:0 0 12px; text-align:justify;}
mark.hlword{background:#ffe3c2; color:var(--brand-dark); font-weight:700; padding:0 3px; border-radius:4px;}
.vocab-tags{display:flex; flex-wrap:wrap; gap:8px;}
.tag{background:#f4efe6; border-radius:999px; padding:5px 6px 5px 12px; font-size:13px; display:inline-flex; align-items:center; gap:4px;}

footer{max-width:960px; margin:0 auto; padding:0 14px 40px; color:var(--muted); font-size:12px; text-align:center;}

</style>
</head>
<body>
<div id="lockScreen" class="lock-screen">
  <div class="lock-card">
    <h2>🔒 請輸入密碼</h2>
    <p class="muted">請輸入密碼以繼續使用這個學習系統。</p>
    <input id="lockPasswordInput" type="password" class="input-text" placeholder="密碼" autocomplete="off">
    <button id="lockSubmitBtn" class="btn primary">進入</button>
    <p id="lockError" class="bad small" style="display:none;">密碼錯誤，請再試一次。</p>
  </div>
</div>
<div id="appRoot" style="display:none;">
<header class="topbar">
  <h1>📗 國中英文 2000 單字 × 故事閱讀學習系統</h1>
  <div id="cloudSyncIndicator" class="sync-indicator">☁️ 尚未設定雲端同步</div>
  <div id="ttsSettings" class="tts-settings">
    <span>🔊 朗讀：</span>
    <label>語速
      <select id="ttsRateSelect">
        <option value="0.7">慢</option>
        <option value="0.85">稍慢</option>
        <option value="1">正常</option>
        <option value="1.25">稍快</option>
      </select>
    </label>
    <label>語音
      <select id="ttsVoiceSelect"><option value="">系統預設</option></select>
    </label>
    <button id="ttsStopBtn" class="btn small" type="button">⏹ 停止朗讀</button>
  </div>
  <nav class="tabs" id="tabs">
    <a class="tab-btn" data-tab="storybook" href="#storybook">世界故事集</a>
    <a class="tab-btn" data-tab="reading" href="#reading">經典故事</a>
    <a class="tab-btn" data-tab="vocab" href="#vocab">每日故事</a>
    <a class="tab-btn" data-tab="guide" href="#guide">使用說明</a>
  </nav>
</header>
<main>
  <div id="view"></div>
</main>
<footer>資料來源：國中單字王 2000 單字題庫表（主題）；每日短文為原創寫作，用於情境化學習 2000 單字；延伸閱讀故事改寫自伊索寓言、格林童話、安徒生童話等公版經典故事；「世界故事集」的主題與重點單字取材自《國中生必讀世界經典英文故事集》，故事內文與中文翻譯為原創改寫撰寫（非原書文字或翻譯），如需原書完整內容、練習題與官方翻譯請另行參閱原書。</footer>
</div>

: "請用 lie（說謊）或 believe（相信）造一個句子，說說你對「誠實」的看法。", "text_zh": ["一位年輕的牧羊少年在村莊附近看顧著他的羊群。他每天獨自坐在山丘上。他覺得很無聊，於是決定開個玩笑捉弄大家。", "「狼來了！狼來了！有一隻狼在追我的羊！」他大喊。村民們拿著棍棒和石頭跑上山丘。但根本沒有狼。男孩大笑起來。「這只是個玩笑！」他說。", "幾天後，男孩又玩了同樣的把戲。「狼來了！狼來了！」他喊道。村民們又跑來幫他。結果還是沒有狼。村民們很生氣，轉身離開了。", "後來有一天晚上，一隻真正的狼從森林裡跑了出來，攻擊了羊群。男孩嚇壞了。「狼來了！狼來了！」他尖叫著。但這一次，沒有人來救他。村民們以為這又是一個謊言。", "那天晚上，狼吃掉了很多隻羊。男孩學到了重要的一課：如果你經常說謊，就算有一天你說了實話，也不會有人相信你。"]}, {"id": 2, "title_en": "The Tortoise and the Hare", "title_zh": "龜兔賽跑", "level": "★☆☆☆☆", "words": 140, "text": ["A hare always laughed at a tortoise because he was so slow. “You walk so slowly! Do you ever get anywhere?” the hare asked with a smile.", "“Yes,” replied the tortoise. “And I get there faster than you think. Let’s have a race and see.” The hare laughed, but he agreed.", "The fox marked a course and said, “Ready, get set, go!” The hare ran very fast and was soon far ahead of the tortoise. He thought, “I have plenty of time. I will just take a short nap under this tree.”", "So the hare lay down and fell asleep. Meanwhile, the tortoise kept walking, slowly but steadily, without stopping to rest.", "When the hare woke up, the sun was going down. He ran as fast as he could, but it was too late. The tortoise had already crossed the finish line.", "“Slow and steady wins the race,” said the tortoise with a smile."], "newWords": [{"en": "hare", "zh": "野兔"}, {"en": "tortoise", "zh": "陸龜"}, {"en": "race", "zh": "賽跑；競賽"}, {"en": "steadily", "zh": "穩定地"}, {"en": "nap", "zh": "小睡"}, {"en": "finish line", "zh": "終點線"}], "questions": [{"q": "Why did the hare agree to race the tortoise?", "options": ["He was afraid", "He thought he would easily win", "He wanted to be kind", "The fox forced him"], "answer": 1}, {"q": "What did the hare do during the race?", "options": ["He walked backward", "He stopped to eat lunch", "He took a nap", "He helped the tortoise"], "answer": 2}, {"q": "How did the tortoise win the race?", "options": ["He ran faster than the hare", "He kept walking steadily without stopping", "He took a shortcut", "The hare gave up"], "answer": 1}, {"q": "What lesson does this story teach?", "options": ["Sleeping is bad for you", "Slow and steady can win over fast and careless", "Rabbits cannot run fast", "Races are unfair"], "answer": 1}], "moral_zh": "穩定前進，比一時的快速卻大意更重要。", "writingPrompt": "請用 slow（慢的）和 fast（快的）各造一個句子，比較兩種做事態度。", "text_zh": ["一隻兔子總是嘲笑一隻烏龜，因為牠走得太慢了。「你走路怎麼這麼慢！你到得了任何地方嗎？」兔子微笑著問。", "「會啊，」烏龜回答。「而且我到達的時間會比你想的還快。我們來比賽看看吧。」兔子笑了，但還是答應了。", "狐狸畫出了比賽路線，說：「預備，各就各位，出發！」兔子跑得非常快，很快就把烏龜遠遠甩在後面。牠心想：「我時間多得很。我就在這棵樹下小睡一下吧。」", "於是兔子躺下來睡著了。與此同時，烏龜持續往前走，雖然慢，但每一步都很穩健，中途沒有停下來休息。", "兔子醒來時，太陽已經快下山了。牠盡全力狂奔，但已經太遲了。烏龜早已越過終點線。", "「穩紮穩打才能贏得比賽，」烏龜微笑著說。"]}, {"id": 3, "title_en": "The Ant and the Grasshopper", "title_zh": "螞蟻與蚱蜢", "level": "★☆☆☆☆", "words": 130, "text": ["In a green field, an ant worked hard all summer. Every day, she carried food to her home under the ground. She wanted to be ready for winter.", "A grasshopper watched her and laughed. “Why do you work so hard?” he asked. “Come and sing with me instead! Summer is for having fun, not for working!”", "“I am storing food for winter,” said the ant. “You should do the same.” But the grasshopper just laughed and kept playing his music all summer long.", "When winter came, snow covered the field. The grasshopper had no food and felt very hungry and cold. He went to the ant’s house and asked for help.", "The ant shared her food with him, but she said, “Next time, you should prepare for the future instead of only enjoying today.” The grasshopper felt sorry and thanked her."], "newWords": [{"en": "ant", "zh": "螞蟻"}, {"en": "grasshopper", "zh": "蚱蜢"}, {"en": "store", "zh": "儲存"}, {"en": "instead", "zh": "取而代之"}, {"en": "prepare", "zh": "準備"}, {"en": "share", "zh": "分享"}], "questions": [{"q": "What did the ant do all summer?", "options": ["She played music", "She stored food for winter", "She slept all day", "She traveled"], "answer": 1}, {"q": "What did the grasshopper do all summer?", "options": ["He worked hard", "He sang and played", "He stored food too", "He helped the ant"], "answer": 1}, {"q": "What happened to the grasshopper in winter?", "options": ["He had plenty of food", "He felt hungry and cold", "He moved to a warmer place", "He became a musician"], "answer": 1}, {"q": "What is the main lesson of this story?", "options": ["Music is more important than food", "It is wise to prepare for the future", "Ants are unfriendly", "Winter never comes"], "answer": 1}], "moral_zh": "未雨綢繆，為未來做準備，比只顧眼前享樂更重要。", "writingPrompt": "請用 prepare（準備）造一個句子，說說你會怎麼為考試做準備。", "text_zh": ["在一片綠色的田野裡，一隻螞蟻整個夏天都在努力工作。她每天都把食物搬到地底下的家裡。她想為冬天做好準備。", "一隻蚱蜢看著她，笑了出來。「妳為什麼要這麼辛苦工作？」他問。「不如來跟我一起唱歌吧！夏天是用來玩樂的，不是用來工作的！」", "「我在為冬天儲存食物，」螞蟻說。「你也應該這麼做。」但蚱蜢只是笑一笑，整個夏天都繼續彈奏他的音樂。", "冬天來臨時，雪覆蓋了整片田野。蚱蜢沒有食物，覺得又餓又冷。他跑去螞蟻家請求幫助。", "螞蟻把她的食物分給了他，但她說：「下次，你應該為未來做準備，而不是只顧著享受眼前的快樂。」蚱蜢感到很抱歉，並向她道謝。"]}, {"id": 4, "title_en": "The Fox and the Grapes", "title_zh": "狐狸與葡萄", "level": "★☆☆☆☆", "words": 100, "text": ["One hot afternoon, a hungry fox walked through a garden. He saw a bunch of purple grapes hanging from a high branch. They looked sweet and juicy.", "“Those grapes will be a perfect meal,” the fox thought. He jumped as high as he could, but he could not reach them. He tried again and again, but every time, he failed.", "Finally, the tired fox stopped jumping. He looked at the grapes one more time and said, “Those grapes are probably sour anyway. I don’t want them.”", "Then he walked away, pretending that he never wanted the grapes at all."], "newWords": [{"en": "bunch", "zh": "一串；一群"}, {"en": "branch", "zh": "樹枝"}, {"en": "juicy", "zh": "多汁的"}, {"en": "reach", "zh": "到達；伸手拿到"}, {"en": "sour", "zh": "酸的"}, {"en": "pretend", "zh": "假裝"}], "questions": [{"q": "What did the fox see in the garden?", "options": ["Apples", "Grapes", "Bananas", "Bread"], "answer": 1}, {"q": "Why couldn’t the fox eat the grapes?", "options": ["He was not hungry", "They were too high for him to reach", "They were rotten", "A dog stopped him"], "answer": 1}, {"q": "What did the fox say about the grapes at the end?", "options": ["They were delicious", "They were probably sour", "They were too small", "They were not ripe"], "answer": 1}, {"q": "What does this story teach us?", "options": ["People often say they don’t want something they can’t get", "Foxes love vegetables", "Jumping is good exercise", "Grapes are always sour"], "answer": 0}], "moral_zh": "得不到的東西，人們常會說它其實沒那麼好，藉此安慰自己。", "writingPrompt": "請用 want（想要）或 reach（達到）造一個句子。", "text_zh": ["一個炎熱的午後，一隻飢餓的狐狸走過一座花園。他看見一串紫色的葡萄掛在高高的枝頭上。看起來又甜又多汁。", "「那些葡萄一定是一頓完美的大餐，」狐狸心想。他盡可能地往上跳，但就是搆不到。他一次又一次地嘗試，但每次都失敗了。", "最後，疲累的狐狸停止了跳躍。他又看了葡萄一眼，說：「反正那些葡萄大概是酸的。我才不想要呢。」", "於是他轉身走開，假裝自己從來都不想要那些葡萄。"]}, {"id": 5, "title_en": "The Lion and the Mouse", "title_zh": "獅子與老鼠", "level": "★★☆☆☆", "words": 150, "text": ["A big lion was sleeping in the forest when a small mouse ran across his nose. The lion woke up angrily and caught the mouse with his huge paw.", "“Please let me go!” cried the mouse. “If you save my life today, I promise I will help you one day.” The lion laughed. “How could a tiny mouse like you ever help a lion?” But he was kind, so he let the mouse go free.", "A few weeks later, some hunters caught the lion in a strong rope net. He roared loudly, but he could not escape. The little mouse heard the sound and ran to help.", "“Don’t worry, my friend!” said the mouse. He used his sharp teeth to bite through the ropes, one by one, until the lion was finally free.", "“You were right,” said the lion. “Even a small friend can be a great friend.”"], "newWords": [{"en": "paw", "zh": "爪子"}, {"en": "promise", "zh": "承諾"}, {"en": "hunter", "zh": "獵人"}, {"en": "net", "zh": "網子"}, {"en": "roar", "zh": "吼叫"}, {"en": "escape", "zh": "逃脫"}], "questions": [{"q": "Why did the lion catch the mouse?", "options": ["The mouse stole his food", "The mouse woke him up by running on his nose", "The mouse attacked him", "The mouse was in his way"], "answer": 1}, {"q": "What did the mouse promise the lion?", "options": ["To bring him food", "To help him one day", "To leave the forest", "To find him a friend"], "answer": 1}, {"q": "How did the lion get caught?", "options": ["He fell into a hole", "He was caught in a hunter’s net", "He was chased by another lion", "He was tricked by the mouse"], "answer": 1}, {"q": "How did the mouse save the lion?", "options": ["He called other animals for help", "He bit through the ropes", "He scared the hunters away", "He carried the lion out"], "answer": 1}], "moral_zh": "即使是弱小的朋友，有時也能發揮很大的力量，善待他人終有回報。", "writingPrompt": "請用 promise（承諾）或 help（幫助）造一個句子，說說朋友之間的互相幫忙。", "text_zh": ["一隻大獅子正在森林裡睡覺，這時一隻小老鼠從牠的鼻子上跑過。獅子生氣地醒來，用牠巨大的爪子抓住了老鼠。", "「請放我走吧！」老鼠喊道。「如果你今天放我一條生路，我保證有一天我會幫助你。」獅子大笑。「像你這麼小的老鼠，怎麼可能幫得了獅子？」不過牠心地善良，於是放走了老鼠。", "幾個星期後，一些獵人用一張堅固的繩網抓住了獅子。牠大聲吼叫，卻無法逃脫。小老鼠聽到了聲音，跑來幫忙。", "「別擔心，我的朋友！」老鼠說。牠用銳利的牙齒一根一根地咬斷繩子，直到獅子終於重獲自由。", "「你說得對，」獅子說。「就算是渺小的朋友，也能成為偉大的朋友。」"]}, {"id": 6, "title_en": "The Town Mouse and the Country Mouse", "title_zh": "城市老鼠與鄉下老鼠", "level": "★★☆☆☆", "words": 180, "text": ["A country mouse invited his old friend, a town mouse, to visit his home in the fields. The country mouse offered simple food: corn, beans, and fresh water.", "The town mouse looked at the plain food and said, “How can you live like this? Come to the city with me. I will show you real food!” The country mouse agreed and followed him.", "In the city, the town mouse led his friend to a grand house with a long table full of cheese, cake, and bread. “This is amazing!” said the country mouse happily.", "Just as they began eating, a big cat jumped onto the table! Both mice ran and hid behind a cabinet, their hearts beating fast.", "A little later, a large dog came barking loudly. The two mice had to run and hide again. This happened again and again, all night long.", "Finally, the country mouse said, “I am going home. Your food is delicious, but I would rather eat simple beans in peace than fine food in constant fear.”"], "newWords": [{"en": "invite", "zh": "邀請"}, {"en": "plain", "zh": "樸素的；平淡的"}, {"en": "grand", "zh": "宏偉的"}, {"en": "cabinet", "zh": "櫥櫃"}, {"en": "bark", "zh": "吠叫"}, {"en": "peace", "zh": "和平；平靜"}, {"en": "fear", "zh": "恐懼"}], "questions": [{"q": "What kind of food did the country mouse first offer?", "options": ["Cake and cheese", "Corn, beans, and water", "Meat and bread", "Ice cream"], "answer": 1}, {"q": "Why did the country mouse go to the city?", "options": ["He wanted to buy a house", "The town mouse invited him to try better food", "He was lost", "He wanted to meet a cat"], "answer": 1}, {"q": "What frightened the two mice in the city?", "options": ["A loud storm", "A cat and a dog", "Other mice", "The town mouse’s owner"], "answer": 1}, {"q": "Why did the country mouse decide to go home?", "options": ["He missed his family", "He preferred simple food in peace over fine food in fear", "He didn’t like cheese", "He was too tired to stay"], "answer": 1}], "moral_zh": "平靜簡單的生活，勝過在恐懼與不安中享受奢華。", "writingPrompt": "請用 peace（平靜）造一個句子，說說你喜歡怎樣的生活。", "text_zh": ["一隻鄉下老鼠邀請他的老朋友，一隻城市老鼠，來他在田野裡的家作客。鄉下老鼠端出簡單的食物：玉米、豆子和新鮮的水。", "城市老鼠看著這些樸素的食物，說：「你怎麼能過這種生活？跟我到城市去吧。我讓你看看什麼是真正的美食！」鄉下老鼠答應了，跟著他一起去。", "到了城市，城市老鼠帶著他的朋友來到一棟豪華的房子，桌上擺滿了起司、蛋糕和麵包。「這太棒了！」鄉下老鼠開心地說。", "就在他們剛要開動時，一隻大貓跳上了桌子！兩隻老鼠拔腿就跑，躲到一個櫥櫃後面，心臟怦怦直跳。", "過了一會兒，一隻大狗大聲吠叫著跑來。兩隻老鼠又得再次逃跑躲藏。這樣的情況一整晚不斷重複發生。", "最後，鄉下老鼠說：「我要回家了。你的食物很美味，但比起提心吊膽地吃美食，我寧願安安穩穩地吃簡單的豆子。」"]}, {"id": 7, "title_en": "The Goose That Laid the Golden Eggs", "title_zh": "會生金蛋的鵝", "level": "★★☆☆☆", "words": 140, "text": ["Long ago, a poor farmer and his wife owned a special goose. One morning, they found a shiny golden egg in its nest. They could not believe their eyes!", "Every day after that, the goose laid one golden egg. The farmer sold the eggs and slowly became rich. He bought a bigger house and nicer clothes.", "But the farmer became greedy. “If this goose can lay one golden egg a day,” he thought, “there must be a lot of gold inside her. If I cut her open, I can get all the gold at once!”", "His wife told him it was a bad idea, but the farmer did not listen. He killed the goose and cut her open. But there was no gold inside — only the same organs as any other goose.", "The farmer had lost his special goose forever, and with it, his daily golden egg. He learned that greed can destroy even the best things in life."], "newWords": [{"en": "goose", "zh": "鵝"}, {"en": "nest", "zh": "巢"}, {"en": "greedy", "zh": "貪心的"}, {"en": "organ", "zh": "器官"}, {"en": "destroy", "zh": "摧毀"}, {"en": "rich", "zh": "有錢的"}], "questions": [{"q": "What did the farmer find in the goose’s nest?", "options": ["A silver coin", "A golden egg", "A letter", "A baby goose"], "answer": 1}, {"q": "How did the farmer become rich?", "options": ["He worked in the city", "He sold the golden eggs", "He found treasure", "He borrowed money"], "answer": 1}, {"q": "Why did the farmer kill the goose?", "options": ["He wanted to eat it", "He thought he could get all the gold at once", "It stopped laying eggs", "His wife told him to"], "answer": 1}, {"q": "What did the farmer find when he cut the goose open?", "options": ["A huge pile of gold", "Nothing but ordinary organs", "More golden eggs", "Another goose"], "answer": 1}], "moral_zh": "貪心可能會讓人失去原本擁有的美好事物。", "writingPrompt": "請用 greedy（貪心的）造一個句子。", "text_zh": ["很久以前，有一位貧窮的農夫和他的妻子養了一隻特別的鵝。有一天早上，他們在鵝窩裡發現了一顆閃閃發亮的金蛋。他們簡直不敢相信自己的眼睛！", "從那天起，這隻鵝每天都會生下一顆金蛋。農夫把金蛋賣掉，漸漸變得富有。他買了更大的房子和更好的衣服。", "但農夫變得貪心了。「如果這隻鵝一天能生一顆金蛋，」他心想，「牠肚子裡一定藏著很多黃金。如果我把牠剖開，就能一次拿到所有的黃金！」", "他的妻子告訴他這是個壞主意，但農夫不聽勸。他殺了那隻鵝，把牠剖開。但裡面根本沒有黃金——只有跟其他鵝一樣的內臟。", "農夫永遠失去了他那隻特別的鵝，也失去了每天都能得到的金蛋。他學到了：貪婪能夠毀掉生命中最美好的事物。"]}, {"id": 8, "title_en": "The North Wind and the Sun", "title_zh": "北風與太陽", "level": "★★☆☆☆", "words": 150, "text": ["One day, the North Wind and the Sun argued about who was stronger. They saw a traveler walking down the road, wearing a warm coat.", "“Let’s have a contest,” said the Sun. “Whoever can make that man take off his coat first is the stronger one.” The North Wind agreed happily.", "The North Wind blew as hard as he could. Cold air rushed down the road. But the harder the wind blew, the tighter the traveler held his coat around himself. He was determined not to lose it.", "Finally, the North Wind gave up, tired and out of breath. Now it was the Sun’s turn. The Sun smiled warmly and shone down gently on the traveler.", "Soon the man felt hot. He wiped his forehead and, a few minutes later, happily took off his coat. “Gentleness is often stronger than force,” said the Sun."], "newWords": [{"en": "argue", "zh": "爭論"}, {"en": "contest", "zh": "比賽"}, {"en": "determined", "zh": "下定決心的"}, {"en": "gently", "zh": "溫和地"}, {"en": "force", "zh": "力量；強迫"}, {"en": "wipe", "zh": "擦拭"}], "questions": [{"q": "What did the North Wind and the Sun argue about?", "options": ["Who was more beautiful", "Who was stronger", "Who was faster", "Who was kinder"], "answer": 1}, {"q": "What was the contest about?", "options": ["Who could make the traveler run", "Who could make the traveler take off his coat first", "Who could make it rain", "Who could travel farther"], "answer": 1}, {"q": "What happened when the North Wind blew hard?", "options": ["The traveler took off his coat immediately", "The traveler held his coat tighter", "The traveler fell down", "The traveler ran away"], "answer": 1}, {"q": "How did the Sun win the contest?", "options": ["By shining brightly and warmly", "By blowing gently", "By hiding behind clouds", "By making it rain"], "answer": 0}], "moral_zh": "溫和常常比強硬更有力量。", "writingPrompt": "請用 gently（溫和地）或 warm（溫暖的）造一個句子。", "text_zh": ["有一天，北風和太陽在爭論誰比較強。他們看見一位旅人正沿著路走，穿著一件保暖的外套。", "「我們來比賽吧，」太陽說。「誰能先讓那個人脫下外套，誰就是比較強的一方。」北風開心地答應了。", "北風用盡全力吹。冷風沿著道路呼嘯而過。但北風吹得越用力，那位旅人就把外套裹得越緊。他下定決心絕不能讓外套被吹走。", "最後，北風筋疲力盡、上氣不接下氣，只好放棄。輪到太陽了。太陽露出溫暖的笑容，輕柔地照耀著這位旅人。", "不久，這個人開始覺得炎熱。他擦了擦額頭，幾分鐘後，開心地脫下了外套。「溫柔往往比強硬更有力量，」太陽說。"]}, {"id": 9, "title_en": "Little Red Riding Hood", "title_zh": "小紅帽", "level": "★★★☆☆", "words": 230, "text": ["Once upon a time, there was a sweet little girl who always wore a red hood, so everyone called her Little Red Riding Hood. One day, her mother said, “Grandmother is sick. Please take this basket of bread and fruit to her house in the forest. But remember, stay on the path and don’t talk to strangers.”", "On her way through the forest, Little Red Riding Hood met a wolf. She did not know that wolves could be dangerous, so she stopped to talk with him. “Where are you going, little girl?” asked the wolf with a sly smile. “To my grandmother’s house,” she answered.", "The wolf ran ahead through a shortcut, arrived at the grandmother’s house first, and locked her in a closet. Then he put on her nightclothes and lay down in her bed, waiting for the girl.", "When Little Red Riding Hood arrived, she noticed something strange. “Grandmother, what big eyes you have!” she said. “The better to see you with,” replied the wolf. “Grandmother, what big ears you have!” “The better to hear you with.” “Grandmother, what big teeth you have!” “The better to eat you with!” shouted the wolf, jumping out of the bed.", "Little Red Riding Hood screamed loudly. A woodcutter working nearby heard her cry and rushed into the house. He chased the wolf away and helped free the grandmother from the closet.", "“From now on,” said Little Red Riding Hood, “I will always listen to my mother and never talk to strangers again.”"], "newWords": [{"en": "stranger", "zh": "陌生人"}, {"en": "sly", "zh": "狡猾的"}, {"en": "shortcut", "zh": "捷徑"}, {"en": "closet", "zh": "衣櫥；小房間"}, {"en": "notice", "zh": "注意到"}, {"en": "woodcutter", "zh": "樵夫"}, {"en": "rush", "zh": "衝；急忙"}], "questions": [{"q": "Why did Little Red Riding Hood go into the forest?", "options": ["To pick flowers", "To bring food to her sick grandmother", "To meet a wolf", "To find a shortcut home"], "answer": 1}, {"q": "What rule did her mother tell her?", "options": ["Come home before dark", "Stay on the path and don’t talk to strangers", "Never enter the forest", "Bring an umbrella"], "answer": 1}, {"q": "What did the wolf do at the grandmother’s house?", "options": ["He ate all the food", "He locked the grandmother in a closet and pretended to be her", "He fell asleep", "He ran away"], "answer": 1}, {"q": "Who saved Little Red Riding Hood and her grandmother?", "options": ["A hunter passing by", "A woodcutter working nearby", "Her mother", "A police officer"], "answer": 1}], "moral_zh": "不要輕易和陌生人交談，並且要記得聽從大人的叮嚀。", "writingPrompt": "請用 stranger（陌生人）造一個句子，說說和陌生人相處要注意什麼。", "text_zh": ["從前從前，有一個可愛的小女孩，總是戴著一頂紅色的帽子，所以大家都叫她小紅帽。有一天，她的媽媽說：「奶奶生病了。請把這籃麵包和水果送到她在森林裡的家。但記得，要走在小路上，不要跟陌生人說話。」", "小紅帽走在穿越森林的路上時，遇見了一隻狼。她不知道狼可能很危險，於是停下來跟牠說話。「小妹妹，妳要去哪裡呀？」狼露出狡猾的微笑問道。「去我奶奶家，」她回答。", "狼抄了一條近路先跑到了奶奶家，把奶奶鎖進了衣櫃裡。接著牠穿上奶奶的睡衣，躺進她的床上，等著小女孩到來。", "小紅帽到達時，注意到有些奇怪。「奶奶，妳的眼睛怎麼這麼大！」她說。「這樣才能看得更清楚呀，」狼回答。「奶奶，妳的耳朵怎麼這麼大！」「這樣才能聽得更清楚呀。」「奶奶，妳的牙齒怎麼這麼大！」「這樣才能把妳吃掉呀！」狼大喊著，從床上跳了起來。", "小紅帽大聲尖叫。附近工作的一位樵夫聽到了她的叫聲，衝進屋裡，把狼趕走，並幫忙把奶奶從衣櫃裡救了出來。", "「從現在開始，」小紅帽說，「我一定會聽媽媽的話，再也不會跟陌生人說話了。」"]}, {"id": 10, "title_en": "The Three Little Pigs", "title_zh": "三隻小豬", "level": "★★★☆☆", "words": 240, "text": ["Once there were three little pigs who left home to build their own houses. The first pig was lazy, so he built his house quickly out of straw. The second pig worked a little harder and built his house out of sticks. The third pig worked very hard and built a strong house out of bricks.", "One day, a hungry wolf came to the first pig’s straw house. “Little pig, little pig, let me come in!” he called. “Not by the hair on my chinny chin chin!” replied the pig. “Then I’ll huff, and I’ll puff, and I’ll blow your house in!” And with one big breath, the wolf blew the straw house down.", "The first pig ran to his brother’s stick house. But the wolf followed him and blew that house down too! Both pigs ran as fast as they could to their brother’s brick house.", "The wolf arrived and huffed and puffed with all his strength, but the brick house did not move at all. It was much too strong.", "Angry and hungry, the wolf tried to climb down the chimney. But the clever third pig had a pot of boiling water waiting in the fireplace below. The wolf jumped in and ran away, never to bother the pigs again.", "From that day on, the three pigs lived safely together in the strong brick house, and they learned that hard work truly pays off."], "newWords": [{"en": "straw", "zh": "稻草"}, {"en": "stick", "zh": "樹枝；木棍"}, {"en": "brick", "zh": "磚塊"}, {"en": "huff", "zh": "用力吹氣"}, {"en": "chimney", "zh": "煙囪"}, {"en": "boiling", "zh": "沸騰的"}, {"en": "pay off", "zh": "得到回報"}], "questions": [{"q": "What did the third pig build his house with?", "options": ["Straw", "Sticks", "Bricks", "Wood"], "answer": 2}, {"q": "What happened to the straw house?", "options": ["It burned down", "The wolf blew it down", "It fell in the rain", "Nothing happened"], "answer": 1}, {"q": "Why couldn’t the wolf blow down the third house?", "options": ["It was too small", "It was made of strong bricks", "The pig was too strong", "The wolf was tired"], "answer": 1}, {"q": "How did the pigs finally stop the wolf?", "options": ["They called the police", "They tricked him with boiling water in the fireplace", "They ran away forever", "They gave him food"], "answer": 1}], "moral_zh": "認真努力做好準備，最終會得到回報。", "writingPrompt": "請用 strong（強壯的）或 hard-working（努力工作的）造一個句子。", "text_zh": ["從前有三隻小豬離開家，去蓋屬於自己的房子。第一隻豬很懶惰，所以很快就用稻草蓋了一間房子。第二隻豬稍微努力一點，用樹枝蓋了房子。第三隻豬非常努力，用磚頭蓋了一間堅固的房子。", "有一天，一隻飢餓的狼來到第一隻豬的稻草屋前。「小豬，小豬，讓我進去！」牠喊道。「不要，就算用我下巴上的一根毛也不行！」小豬回答。「那我就用力吹氣，把你的房子吹倒！」狼深吸一口氣，一下子就把稻草屋吹垮了。", "第一隻豬跑到牠兄弟用樹枝蓋的房子。但狼跟了上去，也把那間房子吹垮了！兩隻豬拼命跑到牠們兄弟用磚頭蓋的房子。", "狼趕到後用盡全力猛吹，但磚頭房子紋絲不動。它實在太堅固了。", "又氣又餓的狼試著從煙囪爬下去。但聰明的第三隻豬早已在下方的壁爐裡準備好一鍋滾燙的熱水。狼掉了進去，逃走了，再也沒有回來騷擾這三隻豬。", "從那天起，三隻豬一起安全地住在那間堅固的磚頭房子裡，牠們也學到了：努力工作終究會有回報。"]}, {"id": 11, "title_en": "Goldilocks and the Three Bears", "title_zh": "金髮女孩與三隻熊", "level": "★★★☆☆", "words": 230, "text": ["Deep in the forest, there lived a family of three bears: a great big father bear, a middle-sized mother bear, and a tiny baby bear. One morning, the mother bear made porridge, but it was too hot to eat, so the bears went for a walk while it cooled.", "A little girl named Goldilocks was walking in the forest and found their cottage. She knocked, but nobody answered, so she walked right in. On the table, she saw three bowls of porridge. She tasted the first bowl — too hot! She tasted the second — too cold! She tasted the third — just right, and ate it all up.", "Next, she saw three chairs. The big chair was too hard, the middle chair was too soft, but the small chair was just right — until it broke under her weight!", "Feeling tired, Goldilocks went upstairs and found three beds. The first was too hard, the second too soft, but the third bed was just right. She fell fast asleep.", "When the three bears came home, they noticed someone had eaten their porridge, broken their chair, and was sleeping in the baby bear’s bed! “Someone is sleeping in my bed — and she’s still here!” cried the baby bear loudly.", "Goldilocks woke up, saw the three bears staring at her, and jumped out of the window in fright. She ran home through the forest and never went back to the bears’ cottage again."], "newWords": [{"en": "porridge", "zh": "粥；燕麥粥"}, {"en": "cottage", "zh": "小屋"}, {"en": "knock", "zh": "敲門"}, {"en": "weight", "zh": "重量"}, {"en": "stare", "zh": "盯著看"}, {"en": "fright", "zh": "驚嚇"}], "questions": [{"q": "Why did the bears leave their porridge and go for a walk?", "options": ["They were not hungry", "The porridge was too hot to eat", "They wanted to see Goldilocks", "It was a sunny day"], "answer": 1}, {"q": "Which bowl of porridge did Goldilocks like best?", "options": ["The father bear’s bowl", "The mother bear’s bowl", "The baby bear’s bowl", "She didn’t eat any"], "answer": 2}, {"q": "What happened to the small chair?", "options": ["It was too soft", "It broke under Goldilocks’s weight", "Nothing happened to it", "It was too hard"], "answer": 1}, {"q": "How did the story end?", "options": ["Goldilocks became friends with the bears", "Goldilocks jumped out of the window and ran home", "The bears invited her to stay", "Goldilocks fixed the chair"], "answer": 1}], "moral_zh": "未經同意進入別人家中、使用別人的東西是不對的。", "writingPrompt": "請用 just right（剛剛好）的概念，用 hot、cold 或 soft 造一個句子。", "text_zh": ["在森林深處，住著一家三隻熊：高大的熊爸爸、中等身材的熊媽媽，還有嬌小的小熊寶寶。有一天早上，熊媽媽煮了粥，但粥太燙了不能吃，於是熊一家人趁粥冷卻的時候出門散步。", "一個名叫金髮女孩的小女孩正在森林裡散步，發現了牠們的小屋。她敲了敲門，但沒有人回應，於是她就直接走了進去。桌上放著三碗粥。她嚐了第一碗——太燙了！她嚐了第二碗——太冷了！她嚐了第三碗——剛剛好，於是把它全部吃光了。", "接著，她看到三張椅子。大椅子太硬，中椅子太軟，但小椅子剛剛好——直到它在她的重量下壞掉了！", "覺得有點累的金髮女孩上了樓，發現了三張床。第一張太硬，第二張太軟，但第三張床剛剛好。她很快就沉沉睡去。", "當三隻熊回到家時，牠們發現有人吃了牠們的粥、弄壞了牠們的椅子，還睡在小熊寶寶的床上！「有人睡在我的床上——而且她還在那裡！」小熊寶寶大聲喊道。", "金髮女孩醒了過來，看見三隻熊正盯著她看，嚇得從窗戶跳了出去。她穿過森林跑回家，再也沒有回到熊一家的小屋。"]}, {"id": 12, "title_en": "The Ugly Duckling", "title_zh": "醜小鴨", "level": "★★★★☆", "words": 260, "text": ["On a farm one summer, a mother duck watched her eggs hatch one by one. The little ducklings were soft and yellow — all except the last one, who was big, gray, and different from his brothers and sisters.", "“What an ugly duckling!” the other animals on the farm said. Even his brothers and sisters laughed at him and would not let him play with them. The poor duckling felt very sad and lonely.", "One day, unable to bear the teasing any longer, the ugly duckling ran away from the farm. He traveled through fields and forests, always alone. In winter, he almost froze in an icy pond, but a kind farmer saved him.", "Time passed, and spring came again. The duckling, now grown, saw three beautiful white swans swimming gracefully on a lake. “I want to see them, even if they laugh at me too,” he thought sadly, and he swam toward them.", "But something amazing happened. As he looked down at his reflection in the water, he saw that he was no longer a gray, awkward duckling. He had grown into a beautiful white swan himself!", "The other swans welcomed him warmly, and children on the shore pointed and said, “Look at that new swan — he is the most beautiful one of all!” The swan felt truly happy for the first time, understanding that being different does not mean being any less worthy."], "newWords": [{"en": "hatch", "zh": "孵化"}, {"en": "duckling", "zh": "小鴨"}, {"en": "tease", "zh": "嘲笑；取笑"}, {"en": "freeze", "zh": "結冰；凍僵"}, {"en": "gracefully", "zh": "優雅地"}, {"en": "reflection", "zh": "倒影；反射"}, {"en": "worthy", "zh": "有價值的"}], "questions": [{"q": "Why did the other animals call him “ugly”?", "options": ["He was mean to others", "He looked different from the other ducklings", "He could not swim", "He was too small"], "answer": 1}, {"q": "Why did the duckling run away from the farm?", "options": ["He wanted an adventure", "He could not bear being teased", "He was looking for food", "His mother told him to leave"], "answer": 1}, {"q": "What did the duckling discover about himself in the end?", "options": ["He was actually a duck after all", "He had turned into a beautiful swan", "He could fly higher than birds", "He was the mother’s favorite"], "answer": 1}, {"q": "What is the main message of this story?", "options": ["Ugly animals should hide", "Being different doesn’t mean being less worthy — you may just need time to grow", "Swans are better than ducks", "Winter is the best season"], "answer": 1}], "moral_zh": "外表不同不代表沒有價值，也許只是還沒展現出真正的自己。", "writingPrompt": "請用 different（不同的）造一個句子，說說每個人都有自己的特別之處。", "text_zh": ["某年夏天，在一座農場裡，鴨媽媽看著她的蛋一顆接一顆孵化。小鴨們都軟軟黃黃的——除了最後一隻，牠又大又灰，跟牠的兄弟姊妹完全不一樣。", "「好醜的一隻小鴨啊！」農場裡的其他動物們說。就連牠的兄弟姊妹也嘲笑牠，不讓牠一起玩。這隻可憐的小鴨感到非常難過又孤單。", "有一天，再也受不了大家嘲笑的醜小鴨，逃離了農場。牠獨自穿越田野和森林，總是形單影隻。冬天時，牠幾乎在一個結冰的池塘裡凍僵，幸好一位善良的農夫救了牠。", "時間流逝，春天再次來臨。長大後的小鴨，看見三隻美麗的白天鵝優雅地在湖面上游泳。「我想去看看牠們，就算牠們也會嘲笑我，」牠難過地想著，還是朝牠們游了過去。", "但令人驚奇的事情發生了。當牠低頭看著自己在水中的倒影時，牠發現自己已經不再是那隻灰撲撲、笨拙的小鴨了。牠已經長成了一隻美麗的白天鵝！", "其他天鵝熱情地歡迎牠，岸邊的孩子們指著牠說：「快看那隻新來的天鵝——牠是所有天鵝中最美麗的一隻！」這隻天鵝第一次感到真正的快樂，牠終於明白：與眾不同並不代表比較差。"]}, {"id": 13, "title_en": "The Emperor's New Clothes", "title_zh": "國王的新衣", "level": "★★★★☆", "words": 250, "text": ["Long ago, there was an emperor who loved new clothes more than anything else in his kingdom. He spent all his money and time on fine outfits instead of caring for his people.", "One day, two clever swindlers came to the palace. “We can weave the finest cloth in the world,” they said. “It has a magic power — anyone who is foolish or unfit for their job cannot see it at all.” The emperor was excited and paid them a large amount of gold to begin.", "The swindlers set up empty looms and pretended to weave, though there was no thread at all. When the emperor sent his ministers to check on the progress, each minister saw nothing but empty looms. But afraid of appearing foolish, every minister praised the beautiful, imaginary cloth.", "Finally, the “clothes” were ready. The swindlers pretended to dress the emperor in the invisible suit. Nobody, including the emperor himself, dared to admit that they saw nothing at all.", "Proud of his “new clothes,” the emperor walked through the town in a grand parade. All the townspeople clapped and praised his outfit, afraid to admit the truth.", "Then, a small child in the crowd shouted, “But he isn’t wearing anything at all!” The crowd went silent for a moment, and then everyone began to whisper the same thing. The emperor realized the truth, but he continued walking, holding his head high, determined to finish the parade with dignity."], "newWords": [{"en": "emperor", "zh": "皇帝"}, {"en": "swindler", "zh": "騙子"}, {"en": "weave", "zh": "編織"}, {"en": "loom", "zh": "織布機"}, {"en": "minister", "zh": "大臣；部長"}, {"en": "invisible", "zh": "隱形的"}, {"en": "dignity", "zh": "尊嚴"}], "questions": [{"q": "What did the swindlers promise to make?", "options": ["Golden shoes", "Magic cloth that foolish people could not see", "A flying carpet", "A crown"], "answer": 1}, {"q": "Why did the ministers say the cloth was beautiful?", "options": ["They really saw beautiful cloth", "They were afraid of looking foolish", "They wanted more gold", "They liked the swindlers"], "answer": 1}, {"q": "Who finally told the truth?", "options": ["A minister", "The emperor himself", "A small child", "A swindler"], "answer": 2}, {"q": "What does this story teach us?", "options": ["Children should not speak in public", "It takes honesty and courage to say what is true, even when others stay silent", "Kings should wear simple clothes", "Weaving is a difficult skill"], "answer": 1}], "moral_zh": "有時候說出真相需要誠實與勇氣，即使大家都選擇沉默。", "writingPrompt": "請用 honest（誠實的）或 truth（真相）造一個句子。", "text_zh": ["很久以前，有一位皇帝，他愛新衣服勝過王國裡的任何東西。他把所有的金錢和時間都花在講究的服裝上，卻不去照顧他的人民。", "有一天，兩個狡猾的騙子來到了皇宮。「我們能織出世界上最精美的布料，」他們說。「這種布料有一種魔力——任何愚蠢或不適任自己職位的人都看不見它。」皇帝非常興奮，付給他們一大筆黃金，讓他們開始織布。", "這兩個騙子架起空空的織布機，假裝在織布，其實根本沒有任何線。當皇帝派大臣們去查看進度時，每位大臣看到的都只是空蕩蕩的織布機。但他們害怕被人當成愚蠢的人，於是每位大臣都稱讚這塊美麗、根本不存在的布料。", "終於，「衣服」做好了。騙子假裝為皇帝穿上這件隱形的衣裳。沒有人，包括皇帝自己在內，敢承認自己其實什麼都看不見。", "皇帝對他的「新衣」感到十分得意，穿著它走過城鎮，舉行一場盛大的遊行。全城的百姓都鼓掌稱讚他的服裝，不敢說出實話。", "這時，人群中一個小孩喊道：「可是他根本什麼都沒穿啊！」群眾安靜了片刻，接著大家開始交頭接耳，說著同樣的話。皇帝明白了真相，但他依然抬頭挺胸地繼續走完遊行，堅持要有尊嚴地走完全程。"]}];
const DAILY_STORIES = [{"day": 1, "title_zh": "書店裡的客人們", "text": "A big bookstore opened downtown. On the first day, many different people came in. An old **adult** brought his little **child** to look at picture books. A young **boy** and a **girl** stood by the comic books, laughing. A sweet **baby** slept quietly in a stroller. A happy **couple** held hands and chose a novel together. \"You look like a **genius**!\" a **gentleman** said to a boy who was reading a thick science book. Behind him, a **customer** asked, \"Do you have any story books for kids?\" A **giant** poster on the wall said, \"Everyone is welcome — even a **fool** can become smart by reading!\" The manager smiled at every **guest** who walked through the door, like a kind **angel** watching over the shop.", "text_zh": "市中心開了一家大書店。開幕第一天，來了許多不同的人。一位年長的成年人帶著他年幼的小孩去看圖畫書。一個男孩和一個女孩站在漫畫書旁邊笑著。一個可愛的嬰兒在嬰兒車裡安靜地睡覺。一對開心的情侶手牽著手一起挑選小說。「你看起來像個天才！」一位紳士對正在讀一本厚厚的科學書的男孩說。在他後面，一位顧客問：「你們有沒有給小孩看的故事書？」牆上一張巨大的海報寫著：「歡迎每一個人——就算是傻瓜也能透過閱讀變聰明！」店經理對每一位走進門的客人微笑，就像一位守護著書店的和善天使。"}, {"day": 2, "title_zh": "王國裡的一天", "text": "In a small kingdom by the sea, the **king** and his family lived in a tall castle. The **prince** liked to ride horses, and the **princess** liked to paint pictures. One day, a **hero** came to the castle gate. He was the **master** of a great sword, and he wanted to be the **host** of a big festival for the **people**. \"Every **person** in this land should have fun,\" he said. An old **lady** and a young **man** walked by and smiled. Even the king's **neighbor**, a friendly farmer, agreed to be his **partner** for the festival. A small **kid** ran through the crowd, shouting with joy.", "text_zh": "在海邊一個小王國裡，國王和他的家人住在一座高聳的城堡裡。王子喜歡騎馬，公主喜歡畫畫。有一天，一位英雄來到城堡門口。他是一把巨劍的主人，他想成為一場為人民舉辦的盛大慶典的主人。「這片土地上的每一個人都應該玩得開心，」他說。一位老太太和一位年輕男子走過並微笑。就連國王的鄰居，一位友善的農夫，也答應成為他慶典的夥伴。一個小孩在人群中跑來跑去，開心地大叫。"}, {"day": 3, "title_zh": "陌生人來訪", "text": "A **stranger** arrived at the festival. Nobody knew who she was. \"I am the **queen** of the next town,\" she said. A young **teenager** ran to tell the princess the news. Soon, more **visitor**s came from other towns. A **woman** with white hair looked very wise, and a **youth** next to her looked shy. The queen was very **beautiful**, but she could not see well — she was almost **blind**. Beside her stood a **chubby** little dog and a **cute** cat. Her guard was **deaf** in one ear and could not speak; he was **dumb** since he was young. Even the town's **fat** baker came to say hello.", "text_zh": "一位陌生人出現在慶典上。沒有人知道她是誰。「我是隔壁城鎮的女王，」她說。一位年輕的青少年跑去告訴公主這個消息。很快地，更多訪客從其他城鎮趕來。一位白髮的婦人看起來很有智慧，她身旁一位年輕人看起來很害羞。這位女王非常美麗，但她視力不好——她幾乎是全盲的。她身邊站著一隻圓滾滾的小狗和一隻可愛的貓。她的護衛一隻耳朵是聾的，也不能說話；他從小就是啞的。就連鎮上的胖麵包師傅也來打招呼。"}, {"day": 4, "title_zh": "派對上的每個人", "text": "That night, everyone went to a big party. A **handsome** young man in a **nice-looking** suit danced with a **tall** lady. An **old** grandfather sat by the door because the bags he carried were too **heavy**. A **short** boy and his **skinny** sister played games together. Next to them, a **slender** dancer moved gracefully, while a friend who felt a bit **over-weight** just watched and smiled. A **thin**, **under-weight** cat walked under the tables, looking for food. \"Don't call anyone **ugly**,\" the queen said kindly. \"Everybody is beautiful in their own way, whether they are **slim** or not.\"", "text_zh": "那天晚上，大家都去參加一場盛大的派對。一位穿著好看西裝的帥氣年輕男子和一位高䠷的女士跳舞。一位老爺爺坐在門邊，因為他提的袋子太重了。一個矮小的男孩和他瘦瘦的妹妹一起玩遊戲。他們旁邊，一位苗條的舞者優雅地舞動，而一位覺得自己有點胖的朋友只是在一旁微笑看著。一隻瘦弱、體重過輕的貓在桌子底下走來走去找東西吃。「不要叫任何人醜，」女王溫柔地說。「每個人都用自己的方式很美，不管纖瘦與否。」"}, {"day": 5, "title_zh": "個性大不同", "text": "At school the next day, the students talked about the party. \"The queen is so **young**, but she is very **active** and kind,\" said one student. Another student looked **angry** because his little brother was **careless** with his book. \"Stop being **childish**!\" he said, but then felt sorry — his brother was just **childlike** and playful. A **brave** and **confident** girl raised her hand: \"The queen isn't **boring** at all! She was so **considerate**, and always **careful** with everyone's feelings.\" The teacher, who was often **busy**, smiled. \"That's a good lesson,\" she said. \"Being **bad** to others is never as good as being kind.\"", "text_zh": "隔天在學校，學生們談論著那場派對。「女王雖然很年輕，但她既活潑又善良，」一位學生說。另一位學生看起來很生氣，因為他的弟弟對書本很粗心。「不要那麼幼稚！」他說，但隨即感到後悔——他弟弟只是像小孩子一樣愛玩。一位勇敢又有自信的女孩舉手說：「女王一點也不無聊！她非常體貼，總是小心顧慮到每個人的感受。」常常很忙碌的老師微笑了。「這是很好的一課，」她說。「對別人不好，永遠比不上善待別人。」"}, {"day": 6, "title_zh": "學校裡的怪奇同學", "text": "There were many interesting students in the class. Tom was **cool** and calm, but sometimes he acted **crazy** for fun. Nobody thought he was **cruel** — he was just very **curious** about everything. Mary was **diligent** and studied every night; she was never **dishonest** about her homework. Some students said an **evil** villain lived near the school, but that was just an **exciting**, **energetic** story the kids made up. A **famous** singer once visited their school, and everyone got **excited**. \"Don't be **foolish**,\" the teacher said with a **frank** smile. \"Rumors like that aren't true.\"", "text_zh": "班上有許多有趣的同學。湯姆很酷、很冷靜，但有時候會為了好玩而發瘋似地耍寶。沒有人覺得他殘忍——他只是對任何事都非常好奇。瑪麗很勤奮，每天晚上都讀書；她從來不會在功課上不誠實。有些學生說學校附近住著一個邪惡的壞蛋，但那只是孩子們編出來的刺激又充滿活力的故事。有一位知名歌手曾經來學校拜訪，讓大家都很興奮。「不要那麼傻，」老師坦率地笑著說。「那種謠言不是真的。」"}, {"day": 7, "title_zh": "友善的教室", "text": "Their classroom was full of **friendly** faces. Sam was always **funny**, and his **gentle**, **generous** heart made everyone **happy**. He was never **greedy** — he shared his lunch with new students. Lily was **hard-working** and **honest**, but still **humble** about her good grades. Jack had a **humorous** way of talking, though he could be a little **impolite** sometimes. \"You are so **intelligent**,\" the teacher told Amy, who was deeply **interested** in science and always asked good questions.", "text_zh": "他們班上充滿了友善的臉孔。山姆總是很搞笑，他溫和又慷慨的心讓大家都很開心。他從不貪心——他會把午餐分給新來的同學。莉莉很用功也很誠實，但對自己的好成績仍然很謙虛。傑克說話很幽默，不過有時候會有點沒禮貌。「你真聰明，」老師對艾咪說，她對科學非常有興趣，總是問很好的問題。"}, {"day": 8, "title_zh": "各種心情的一週", "text": "It was a strange week for feelings. Ben felt **jealous** when his friend won a prize, but he stayed **kind** and said congratulations. Nora felt **lazy** on Monday and a little **lonely** on Tuesday, but her **lovely** cat made her smile. \"Don't go **mad** at me!\" said her **naughty** little brother, who felt **nervous** about breaking a cup. Their mother was very **patient** and **polite**, even to a **poor** old man who knocked on the door. \"Being **rich** doesn't mean you should be **proud**,\" she told her children softly.", "text_zh": "這是情緒起伏很奇怪的一週。班看到朋友得獎時感到嫉妒，但他仍保持善良並向對方道賀。諾拉星期一覺得懶洋洋的，星期二又覺得有點寂寞，但她可愛的貓咪讓她露出笑容。「不要對我生氣！」她調皮的弟弟說，他因為打破杯子而感到緊張。他們的媽媽總是非常有耐心又有禮貌，就連對一位敲門的可憐老人也是如此。「有錢不代表你就該驕傲，」她溫柔地告訴孩子們。"}, {"day": 9, "title_zh": "誠實最重要", "text": "\"It's **rude** to laugh at others,\" the teacher said one **sad** morning. A **scared** student admitted he had copied homework because he was **selfish** and **shy** about asking for help. \"That was **silly** of me,\" he said. The teacher wasn't angry — she liked his **sincere** apology. \"You are a **smart** student. Don't be **sneaky** or **stingy** with the truth next time,\" she said. \"I don't think you're **stupid** at all. A **successful** person is simply an honest one.\" Even the most **talkative** classmate stayed quiet, listening carefully.", "text_zh": "「嘲笑別人是很沒禮貌的，」老師在一個悲傷的早晨說。一位受到驚嚇的學生承認他抄了作業，因為他很自私，也害羞得不敢開口求助。「我這樣做真的很傻，」他說。老師並沒有生氣——她欣賞他真誠的道歉。「你是個聰明的學生。下次不要偷偷摸摸，也不要在說實話這件事上小氣，」她說。「我一點都不覺得你笨。一個成功的人，其實就是一個誠實的人。」就連班上最愛講話的同學也安靜下來，仔細聆聽。"}, {"day": 10, "title_zh": "從心情到臉龐", "text": "By Friday, nobody felt **unhappy** anymore — the students had learned to be **wise**. In art class, they drew self-portraits. Ling drew a long **beard** on her grandfather and a round **chin**. Tim drew an **ear**, a big **eye**, and a smiling **face**. \"Don't forget the **hair**!\" the teacher laughed. Someone drew red **lip**s and an open **mouth**, showing a **nose** and even a little pink **tongue**. \"Careful with the **tooth** — make it small and white,\" said the art teacher, checking everyone's drawings one by one.", "text_zh": "到了星期五，已經沒有人感到不開心了——學生們學會了變得有智慧。在美術課上，他們畫自畫像。玲畫了爺爺長長的鬍子和圓圓的下巴。提姆畫了耳朵、一隻大眼睛和一張微笑的臉。「別忘了畫頭髮！」老師笑著說。有人畫了紅紅的嘴唇和一張張開的嘴巴，露出鼻子，甚至還有一點粉紅色的舌頭。「小心畫牙齒——要畫得小小白白的，」美術老師一一檢查大家的畫。"}, {"day": 11, "title_zh": "運動會上的意外", "text": "During the sports day, an accident happened. A runner twisted his **ankle** and fell, hurting his **arm** and **back**. \"Is your whole **body** okay?\" the teacher asked. \"I think a **bone** in my **finger** is fine, but my **foot** hurts,\" the boy said, holding his **hand** to his **head**. The nurse checked his **hip**, **knee**, and **leg** carefully. \"Your **nail** looks fine too,\" she said. \"Let's get you some ice.\"", "text_zh": "運動會期間發生了一場意外。一位跑者扭傷了腳踝並跌倒，傷到了手臂和背部。「你全身都還好嗎？」老師問。「我想我手指上的一根骨頭沒事，但我的腳很痛，」男孩說，一邊用手扶著頭。護士仔細檢查了他的臀部、膝蓋和腿。「你的指甲看起來也沒問題，」她說。「我們來冰敷一下吧。」"}, {"day": 12, "title_zh": "護士室裡", "text": "In the nurse's office, more students came in. One had a stiff **neck** and sore **shoulder** from playing basketball. Another had dry **skin** and a scratchy **throat**. \"My **thumb** and **toe** hurt from running,\" said a girl, rubbing her **waist** and **wrist** too. \"Take a deep breath,\" said the nurse, listening to his **heart** and touching his **stomach** gently. \"Are you **comfortable** now? Do you feel **dizzy**?\" \"No,\" the boy said. \"I feel much more **healthy** already.\"", "text_zh": "在保健室裡，更多學生走了進來。有一位因為打籃球而脖子僵硬、肩膀痠痛。另一位皮膚乾燥、喉嚨癢癢的。「我因為跑步，大拇指和腳趾都很痛，」一位女孩一邊揉著腰和手腕一邊說。「深呼吸，」護士一邊說，一邊聽他的心跳、輕輕觸摸他的肚子。「現在覺得舒服一點了嗎？會頭暈嗎？」「不會，」男孩說。「我已經覺得健康多了。」"}, {"day": 13, "title_zh": "感冒的一天", "text": "The next week, many students got sick. A **painful** cough spread through the class, and some students looked **pale**. \"I feel **sick** today,\" said a normally **strong** boy who now felt **weak** and **tired**. \"I don't feel **well** at all.\" The nurse checked his old **wound** and said it wasn't **cancer**, just a bad **cold** or the **flu**. \"You also have a **headache** and **stomachache**,\" she said. \"Go home and rest.\"", "text_zh": "接下來一週，很多學生生病了。班上流行起令人難受的咳嗽，有些學生看起來臉色蒼白。「我今天覺得不舒服，」一位平常很強壯的男孩說，他現在覺得虛弱又疲倦。「我一點都不舒服。」護士檢查了他舊的傷口，說那不是癌症，只是嚴重的感冒或流感。「你還有頭痛和肚子痛，」她說。「回家休息吧。」"}, {"day": 14, "title_zh": "看醫生", "text": "At the clinic, the boy told the doctor about his **toothache** and dry **cough**. \"I also have a **fever** and some **pain** in my chest, plus a **sore throat**,\" he said. \"Don't worry, we can **cure** this. You will **recover** soon,\" the doctor said kindly, thinking about **life** and **death** the way every good doctor does — with great care for **health**. She gave him some **medicine**. Outside, his **aunt** and **brother** were waiting to take him home.", "text_zh": "在診所裡，男孩告訴醫生他牙痛又乾咳。「我還發燒，胸口有點痛，喉嚨也痛，」他說。「別擔心，這是可以治好的。你很快就會康復，」醫生和藹地說，她像每一位認真的好醫生一樣，非常關心生命與死亡，也非常在乎健康。她開了一些藥給他。外面，他的阿姨和哥哥正等著帶他回家。"}, {"day": 15, "title_zh": "家庭團聚", "text": "That weekend, the whole family gathered for a reunion. His **cousin**, his **daughter**, and every **elder** in the **family** came together. His **father** cooked a big meal, while his **grandfather** and **grandmother** told old stories. His little **granddaughter** and **grandson** played in the yard. His **husband** helped his **mother** set the table, and his **nephew** and **niece** ran around laughing.", "text_zh": "那個週末，全家人聚在一起團圓。他的表親、女兒，還有家族裡的每一位長輩都到齊了。他的爸爸煮了一頓豐盛的大餐，爺爺和奶奶則講述著古老的故事。他年幼的孫女和孫子在院子裡玩耍。他的丈夫幫忙媽媽擺餐桌，姪子和姪女則笑著到處跑來跑去。"}, {"day": 16, "title_zh": "數一數家人", "text": "Every **parent** and **relative** was there — even his **sister**, his **son**, his **uncle**, and his **wife**. \"How wonderful to **grow** up in such a big family,\" someone said. \"We all **live** so close together, and my brother will **marry** next spring — he'll finally be **married**!\" Someone started counting everyone at the table: \"**Zero** empty seats, **one** big table, **two** long benches...\"", "text_zh": "每一位家長和親戚都到場了——甚至連他的姊妹、兒子、叔叔和妻子也來了。「能在這麼大的家庭裡長大真好，」有人說。「我們住得這麼近，我哥哥明年春天就要結婚了——他終於要結婚了！」有人開始數桌上的每一個人：「零個空位、一張大桌子、兩條長板凳……」"}, {"day": 17, "title_zh": "數字遊戲", "text": "After dinner, the children played a counting game. \"**Three**, **four**, **five**, **six**, **seven**, **eight**, **nine**, **ten**!\" they shouted, jumping rope. The youngest counted slower: \"**Eleven**... **twelve**... **thirteen**... **fourteen**... **fifteen**!\" Everyone clapped when she finished without a mistake.", "text_zh": "晚餐後，孩子們玩起數數遊戲。「三、四、五、六、七、八、九、十！」他們一邊跳繩一邊喊。年紀最小的那個數得比較慢：「十一……十二……十三……十四……十五！」當她一次都沒數錯地數完時，大家都鼓掌了。"}, {"day": 18, "title_zh": "數到一百", "text": "\"Let's count higher!\" said the teacher. \"**Sixteen**, **seventeen**, **eighteen**, **nineteen**, **twenty**...\" The class counted together, then jumped by tens: \"**Thirty**, **forty**, **fifty**, **sixty**, **seventy**, **eighty**, **ninety**, one **hundred**!\" Everyone clapped when they reached one hundred without a single mistake.", "text_zh": "「我們來數更大的數字吧！」老師說。「十六、十七、十八、十九、二十……」全班一起數，接著十個十個地跳著數：「三十、四十、五十、六十、七十、八十、九十、一百！」當他們一次都沒數錯地數到一百時，大家都鼓掌了。"}, {"day": 19, "title_zh": "第一名是誰？", "text": "At the year-end contest, over a **thousand** tickets were sold, and almost a **million** people watched online. \"Who got **first** place?\" someone asked. \"I got **second**, and my sister got **third**,\" said Amy. \"This was my **last** try,\" she added with **a few** tears and **a little** smile. \"I tried **a lot**, though **any** result was fine with me.\" **Both** sisters hugged. \"There are **few** losers here today, and **less** worry than last year,\" the coach said proudly.", "text_zh": "在年終比賽中，賣出了超過一千張票，將近一百萬人在線上觀看。「誰得到第一名？」有人問。「我得到第二名，我妹妹得到第三名，」艾咪說。「這是我最後一次嘗試了，」她補充道，帶著一點眼淚和一絲微笑。「我已經很努力了，不過不管結果如何我都能接受。」兩姊妹擁抱在一起。「今天很少有人是輸家，煩惱也比去年少，」教練驕傲地說。"}, {"day": 20, "title_zh": "從數字到時間", "text": "\"How **little** money is left for prizes?\" the coach asked, checking the **number**s. \"We have **several** boxes left,\" said a helper, counting the **total**. Outside, the sky changed from **dawn** to **morning**, then **noon**, **afternoon**, and finally **evening**. By **night**, only the cleaning staff worked, all the way until **midnight**. \"See you on **Monday**,\" they said, waving goodbye on **Tuesday** morning.", "text_zh": "「還剩下多少獎金？」教練一邊檢查數字一邊問。「我們還剩幾箱，」一位幫手說，一邊算著總數。外面，天空從黎明變成早晨，接著是中午、下午，最後是傍晚。到了晚上，只剩清潔人員在工作，一直忙到半夜。「星期一見，」他們說，在星期二的早晨互相揮手道別。"}, {"day": 21, "title_zh": "行事曆上的一週", "text": "The school calendar was busy. On **Wednesday** and **Thursday**, they had tests. On **Friday** and **Saturday**, there were club activities. **Sunday** was the only rest day of the **week**. \"I like **weekday**s better than the **weekend**,\" said one student, \"because I get bored at home.\" Their teacher wrote the **month**'s plan on the board, starting from **January**, then **February**, **March**, and **April**.", "text_zh": "學校的行事曆排得很滿。星期三和星期四他們有測驗。星期五和星期六有社團活動。星期天是這一週唯一的休息日。「我比較喜歡平日，」一位學生說，「因為待在家裡很無聊。」老師把這個月的計畫寫在黑板上，從一月開始，接著是二月、三月、四月。"}, {"day": 22, "title_zh": "十二個月與四季", "text": "The plan continued through **May**, **June**, **July**, **August**, **September**, **October**, **November**, and **December** — a whole year! Each **season** brought something new: flowers in **spring**, sunshine in **summer**, falling leaves in **autumn**, and snow in **winter**. \"My favorite season changes every year,\" the teacher laughed, showing a calendar with all twelve months.", "text_zh": "計畫接著排到五月、六月、七月、八月、九月、十月、十一月、十二月——整整一年！每個季節都帶來新的東西：春天有花朵，夏天有陽光，秋天有落葉，冬天有雪。「我最喜歡的季節每年都不一樣，」老師笑著說，一邊展示著標示十二個月份的月曆。"}, {"day": 23, "title_zh": "時鐘與手錶", "text": "In the morning, an **alarm clock** rang loudly. Tom looked at the **calendar** on the wall, then checked the **clock** in the kitchen and the **watch** on his wrist. His sister used a **stopwatch** during her run. \"It's **half** past seven,\" said their mother. \"You have one **hour** and thirty **minute**s before school. Wait a **moment** — it's actually eight **o’clock**! Ten **past** the **quarter** already! Every **second** counts!\"", "text_zh": "早上，鬧鐘大聲響起。湯姆看了看牆上的日曆，接著查看廚房裡的時鐘和手腕上的手錶。他的妹妹跑步時用了碼錶。「現在是七點半，」媽媽說。「你還有一小時三十分鐘可以準備上學。等一下——現在其實是八點了！已經過一刻鐘又十分了！每一秒都很重要！」"}, {"day": 24, "title_zh": "早到還是晚到？", "text": "\"What **time** is it now?\" Tom asked, running down the stairs. \"I checked **ago**, and you're **already** late!\" his mother said. His **current** habit of waking up **early** had changed — now he was always **late**, never on time like his **last** term. \"There's always a **next** chance,\" she said. \"**Now**, hurry! You **once** told me you'd never be late again. You can explain it **later**.\" Thinking about the **future**, Tom promised he would leave **soon** every day from now on.", "text_zh": "「現在幾點了？」湯姆一邊跑下樓梯一邊問。「我剛剛就說過了，你已經遲到了！」媽媽說。他原本早起的習慣已經改變了——現在他總是遲到，不像上學期那樣總是準時。「總是會有下一次機會，」她說。「現在，快點！你曾經跟我說過再也不會遲到了。你可以之後再解釋。」想著未來，湯姆答應從現在開始每天都會提早出門。"}, {"day": 25, "title_zh": "存錢筒的秘密", "text": "\"What are you doing **today**?\" Mia asked. \"**Tonight** I have homework, and **tomorrow** I have a test,\" said her friend. \"This whole **week**, even the **weekend**, is busy. Actually, this whole **year** feels busy!\" \"**Yesterday** was much easier,\" Mia laughed. \"I need a **daily** plan.\" That evening, she opened her piggy bank and found an old **bill**, some **cash**, one **cent**, a little **change**, and a shiny **coin**.", "text_zh": "「你今天要做什麼？」米亞問。「今晚我有功課，明天有測驗，」她朋友說。「這整個星期，連週末都很忙。其實這整年都覺得很忙！」「昨天輕鬆多了，」米亞笑著說。「我需要一個每日計畫。」那天晚上，她打開撲滿，發現一張舊鈔票、一些現金、一分錢、一些零錢，還有一枚閃亮的硬幣。"}, {"day": 26, "title_zh": "跟媽媽借錢", "text": "\"I also have a **credit card** now,\" Mia said, \"but I still like counting real **dollar**s and **money**.\" She checked the **price** of a new backpack. \"Can I **borrow** some money to **buy** it? The shop doesn't **charge** extra, and it doesn't **cost** too much,\" she said. \"I'll **earn** it back and **pay** you, I promise — I won't **spend** it on anything else. It's very **cheap**!\" \"Fine, I'll **lend** you the money this once,\" said her mother.", "text_zh": "「我現在也有信用卡了，」米亞說，「但我還是喜歡數真正的鈔票和錢。」她查看了一個新背包的價格。「我可以跟你借點錢買嗎？這家店不會多收費，也不會太貴，」她說。「我會把錢賺回來還你，我保證——我不會拿去買別的東西。真的很便宜！」「好吧，這次我就借你錢，」媽媽說。"}, {"day": 27, "title_zh": "水果攤前", "text": "At the market, fruit was not **expensive** at all. Mia bought **fruit** for her family: a red **apple**, a yellow **banana**, purple **grape**s, a green **guava**, a sour **lemon**, a sweet **mango**, a juicy **orange**, a soft **papaya**, a fuzzy **peach**, and a crisp **pear**. \"Don't forget the **pineapple**!\" her mother called.", "text_zh": "在市場裡，水果一點也不貴。米亞為家人買了水果：一顆紅蘋果、一根黃香蕉、一串紫葡萄、一顆綠芭樂、一顆酸檸檬、一顆甜芒果、一顆多汁的柳橙、一顆軟軟的木瓜、一顆毛茸茸的桃子，還有一顆清脆的梨子。「別忘了鳳梨！」媽媽喊道。"}, {"day": 28, "title_zh": "菜市場買菜", "text": "Next, they bought more fruit: sweet **strawberry**, orange **tangerine**, red **tomato**, and a big **watermelon**. Then Mia's mother picked out **vegetable**s: green **bean**s, fresh **cabbage**, orange **carrot**s, yellow **corn**, crisp **lettuce**, crunchy **nut**s, a strong **onion**, and a big **potato**.", "text_zh": "接著，他們又買了更多水果：甜甜的草莓、橘子、紅番茄，還有一顆大西瓜。接著米亞的媽媽挑了些蔬菜：青豆、新鮮的高麗菜、橘色的紅蘿蔔、黃色的玉米、清脆的萵苣、酥脆的堅果、一顆味道濃郁的洋蔥，還有一顆大馬鈴薯。"}, {"day": 29, "title_zh": "準備晚餐", "text": "For dinner, they also bought a small **pumpkin** and some **meat**: **beef**, **bread**, sweet **bun**s, a box of **cereal**, fresh **chicken**, and frozen **dumpling**s. \"Don't forget the **egg**s,\" said her father, who didn't like **fast food** at all. He preferred fresh **fish**, **flour** for baking, and simple home-cooked **food**.", "text_zh": "晚餐時，他們還買了一顆小南瓜和一些肉：牛肉、麵包、甜甜的小圓麵包、一盒穀片、新鮮的雞肉，還有冷凍水餃。「別忘了雞蛋，」爸爸說，他一點也不喜歡速食。他比較喜歡新鮮的魚、烘焙用的麵粉，還有簡單的家常菜。"}, {"day": 30, "title_zh": "廚房裡的晚餐", "text": "That night, they cooked a big meal: golden **fries**, sliced **ham**, a juicy **hamburger**, and a warm **hot dog**. Her brother made **instant noodle**s, while her mother cooked real **noodle**s and a cheesy **pizza**. There was also **pork**, steamed **rice**, a fresh **salad**, a tasty **sandwich**, some **seafood**, and grilled **shrimp**.", "text_zh": "那天晚上，他們煮了一頓豐盛的晚餐：金黃色的薯條、切片火腿、多汁的漢堡，還有溫熱的熱狗。她哥哥煮了泡麵，媽媽則煮了真正的麵條和起司披薩。餐桌上還有豬肉、蒸飯、新鮮沙拉、美味三明治、一些海鮮，還有烤蝦。"}, {"day": 31, "title_zh": "餐桌上的話題", "text": "\"This **soup** smells great, and the **spaghetti** looks perfect,\" said her father, cutting into his **steak**. Her little sister only ate **tofu**. \"We skipped **breakfast** and **brunch** today,\" said mother, \"so let's enjoy this big **dinner**.\" \"I liked **lunch** better,\" said Mia. \"Every **meal** matters, even a small **snack** or late-night **supper**.\" Her father had a cold **beer**, and her mother drank hot **coffee**.", "text_zh": "「這道湯聞起來很香，義大利麵看起來也很完美，」爸爸一邊切著他的牛排一邊說。她的妹妹只吃了豆腐。「我們今天跳過了早餐和早午餐，」媽媽說，「所以我們好好享受這頓豐盛的晚餐吧。」「我比較喜歡午餐，」米亞說。「每一餐都很重要，就連一份小點心或宵夜也是。」爸爸喝了一杯冰啤酒，媽媽則喝著熱咖啡。"}, {"day": 32, "title_zh": "飲料時間", "text": "After the meal, everyone chose a drink. Dad liked cold **cola**; Mom liked to **drink** something with **ice**. Mia chose orange **juice**, but her brother spilled the **liquid** on the table. Grandma had warm **milk**, while her cousin made a chocolate **milk shake**. \"I'll just have **soda**,\" said Uncle Ben, \"or any **soft drink**, really.\" Grandpa preferred hot **tea**, and the baby only drank **water**. For a treat, Mom brought out a **cake** and some **candy**.", "text_zh": "飯後，每個人都選了一杯飲料。爸爸喜歡冰可樂；媽媽喜歡喝加冰塊的東西。米亞選了柳橙汁，但她哥哥把液體灑在桌上了。奶奶喝溫牛奶，表姊則調了一杯巧克力奶昔。「我就喝汽水好了，」班叔叔說，「或任何一種軟性飲料都可以。」爺爺比較喜歡熱茶，寶寶則只喝水。作為獎勵，媽媽端出了蛋糕和一些糖果。"}, {"day": 33, "title_zh": "甜點時光", "text": "For dessert, there was a treat made with **cheese**, **chocolate**, and crunchy **cookie**s. \"This is my favorite **dessert**,\" said Mia, choosing a sweet **doughnut** and a scoop of **ice cream**. There was also a Mid-Autumn **moon cake**, a warm apple **pie**, salty **popcorn**, and crispy **toast** with **butter**, **ketchup**, or **cream**.", "text_zh": "甜點時間，有一款用起司、巧克力和酥脆餅乾做成的點心。「這是我最喜歡的甜點，」米亞說，選了一個甜甜圈和一球冰淇淋。還有中秋節的月餅、溫熱的蘋果派、鹹鹹的爆米花，以及酥脆的吐司，可以配奶油、番茄醬或奶油醬。"}, {"day": 34, "title_zh": "調味料的秘密", "text": "In the kitchen, Grandma showed Mia her secret ingredients: sweet **jam**, cooking **oil**, spicy **pepper**, and dark **soy sauce**. \"Just a little **salt** and **sugar**, plus a drop of **vinegar**,\" she said. \"Are you **hungry**?\" she asked. \"Not **full** yet, but a bit **thirsty**,\" said Mia. \"This soup is a little **bitter**, but still **delicious** and **hot**,\" said her brother.", "text_zh": "在廚房裡，奶奶讓米亞看她的秘密食材：甜甜的果醬、食用油、辣辣的胡椒，還有深色的醬油。「只要一點點鹽和糖，再加一滴醋，」她說。「妳餓了嗎？」她問。「還沒很飽，但有點口渴，」米亞說。「這湯有一點苦，但還是很好喝、很燙，」她哥哥說。"}, {"day": 35, "title_zh": "阿嬤的烘焙課", "text": "\"This cake is a little **sour**, but still **sweet** and **yummy**,\" said Mia. Grandma loved to **bake** bread and **boil** soup, but she was careful never to **burn** anything. \"To **cook** well, you must **eat** with your eyes first,\" she said. She let Mia **order** ingredients from a **menu** and taught her about a healthy **diet**. \"Now, **spread** the butter evenly, and **slice** the bread like this,\" Grandma said.", "text_zh": "「這個蛋糕有點酸，但還是甜甜的、很好吃，」米亞說。奶奶很喜歡烤麵包和煮湯，但她總是很小心，絕不把東西燒焦。「要煮得好吃，得先用眼睛品嚐，」她說。她讓米亞從菜單上點食材，並教她關於健康飲食的知識。「現在，把奶油均勻地塗開，像這樣把麵包切片，」奶奶說。"}, {"day": 36, "title_zh": "餐具大集合", "text": "For the food to look nice, they used a big **bowl**, wooden **chopsticks**, a clean **cup**, a pretty **dish**, a shiny **fork**, a tall **glass**, a sharp **knife**, a soft **napkin**, a round **plate**, a small **spoon**, and a paper **straw**. Mia's new **blouse** and warm **coat** stayed clean the whole time.", "text_zh": "為了讓食物看起來更好看，他們用了一個大碗、一雙木筷子、一個乾淨的杯子、一個漂亮的碟子、一支閃亮的叉子、一個高高的玻璃杯、一把鋒利的刀、一條柔軟的餐巾、一個圓盤子、一支小湯匙，還有一根紙吸管。米亞的新上衣和保暖外套整個過程都保持乾淨。"}, {"day": 37, "title_zh": "衣櫃大整理", "text": "The next day, Mia cleaned her closet. She found a flowery **dress**, a blue **jacket**, old **jeans**, comfy **pajamas**, long **pants**, a yellow **raincoat**, a white **shirt**, a favorite **T-shirt**, denim **shorts**, a pleated **skirt**, a formal **suit**, a warm **sweater**, and her old **swimsuit**.", "text_zh": "隔天，米亞整理了她的衣櫃。她找到一件花洋裝、一件藍色夾克、一條舊牛仔褲、舒適的睡衣、一條長褲、一件黃色雨衣、一件白襯衫、一件最愛的T恤、牛仔短褲、一件百褶裙、一套正式西裝、一件保暖毛衣，還有她的舊泳裝。"}, {"day": 38, "title_zh": "更多衣物與配件", "text": "She also found her school **uniform**, some plain **underwear**, and a soft **vest**. In a small box, there was a leather **belt**, a spare **button**, a red **cap**, an old **comb**, a **contact lens** case, tiny **earrings**, a wool **glove**, a cloth **handkerchief**, a blue **mask**, and a silver **necklace**.", "text_zh": "她還找到了她的校服、一些素面內衣，還有一件柔軟的背心。在一個小盒子裡，有一條皮帶、一顆備用鈕扣、一頂紅色帽子、一把舊梳子、一個隱形眼鏡盒、一對小耳環、一雙羊毛手套、一條布手帕、一個藍色口罩，還有一條銀項鍊。"}, {"day": 39, "title_zh": "口袋裡的東西", "text": "In her jacket **pocket**, Mia found a small **purse**, a gold **ring**, and a soft **scarf**. She also found her favorite **shoes**, comfy **slippers**, sporty **sneakers**, and a pair of warm **socks**. There was even Dad's **tie**, a folded **umbrella**, and his leather **wallet**. \"There's a **hole** in this old sock,\" she laughed, \"and a **spot** on this shirt too!\"", "text_zh": "在外套口袋裡，米亞發現了一個小錢包、一枚金戒指，還有一條柔軟的圍巾。她也找到了她最愛的鞋子、舒適的拖鞋、運動風的球鞋，還有一雙保暖的襪子。裡面甚至還有爸爸的領帶、一把摺疊傘，還有他的皮夾。「這隻舊襪子破了一個洞，」她笑著說，「這件襯衫上也有一個污漬！」"}, {"day": 40, "title_zh": "衣物的材質", "text": "Mia sorted all her **clothes** by material. Some were soft **cotton**, and one sparkly dress looked like it had **diamond**s on it, though it was really just **gold** and **silver** thread. \"Don't **iron** it too hot,\" her mom warned. \"What will you **wear** tomorrow?\" \"Something **black**, or maybe **blue**,\" Mia said, looking at her closet full of color: **brown**, every **color** of **gray**, and a fresh **green** sweater.", "text_zh": "米亞把所有衣服依材質分類。有些是柔軟的棉質，有一件閃亮的洋裝看起來好像鑲了鑽石，其實只是金線和銀線。「不要用太燙的溫度熨燙，」媽媽提醒她。「妳明天要穿什麼？」「黑色的，或是藍色的吧，」米亞說，看著她那滿是各種顏色的衣櫃：棕色、各種灰色調，還有一件清爽的綠色毛衣。"}, {"day": 41, "title_zh": "彩色的運動用品袋", "text": "Mia also had a bag full of sports gear in every color — **orange**, **pink**, **purple**, **red**, **white**, and **yellow**. Inside were a **badminton** racket, a **ball**, a **baseball** glove, a **basketball**, a **dodge ball**, a **football**, and a **frisbee**.", "text_zh": "米亞還有一個裝滿各種顏色運動用品的袋子——橘色、粉紅色、紫色、紅色、白色和黃色。裡面有一支羽球拍、一顆球、一副棒球手套、一顆籃球、一顆躲避球、一顆美式足球，還有一個飛盤。"}, {"day": 42, "title_zh": "運動會的項目", "text": "At the sports fair, there was **golf**, a fast **race**, **soccer**, **softball**, and many other **sports**. Some students played **table tennis** or **tennis**, others joined **volleyball**. In the evening, families would **barbecue** and try **bowling**. \"Let's **camp** in the mountains this weekend and **climb** a hill, then **dance** around the campfire,\" said Mia's father.", "text_zh": "在運動會上，有高爾夫球、一場快速賽跑、足球、壘球，還有很多其他運動。有些學生打桌球或網球，其他人則參加排球。晚上，各家庭會烤肉並試試保齡球。「這個週末我們去山上露營，爬一座小山，然後在營火旁跳舞吧，」米亞的爸爸說。"}, {"day": 43, "title_zh": "假日休閒清單", "text": "On the weekend, everyone chose a hobby. Grandpa liked to **draw**; Dad liked to **exercise** and **fish** by the river. Mom wanted to **hike** and **jog** every morning, then have a **picnic**. Mia's brother loved to **roller blade** or **roller skate**, and their cousin liked to **run**, **sail**, **sing**, **skate**, or **ski** in winter.", "text_zh": "週末，每個人都選了一項嗜好。爺爺喜歡畫畫；爸爸喜歡運動，還喜歡在河邊釣魚。媽媽想健行，每天早上慢跑，然後野餐。米亞的哥哥喜歡溜直排輪或溜冰，表哥則喜歡跑步、航行、唱歌、滑冰，或在冬天滑雪。"}, {"day": 44, "title_zh": "興趣的收藏", "text": "Mia collected many things: a **stamp** from every country she visited, since she loved to **surf**, **swim**, and **travel**. Every **trip** became a new **hobby** story. Her friends had a **band**, played **card** games, watched **cartoon**s, played **chess**, read **comic**s, or enjoyed a **computer game**. Her little sister just liked to hold her favorite **doll**.", "text_zh": "米亞收藏了很多東西：她去過的每個國家都收集一張郵票，因為她喜歡衝浪、游泳和旅行。每一趟旅程都成了一個新的嗜好故事。她的朋友們有的組樂團、打牌、看卡通、下棋、看漫畫，或玩電腦遊戲。她的妹妹只喜歡抱著她最愛的娃娃。"}, {"day": 45, "title_zh": "音樂與電影之夜", "text": "That night, the family watched a school **drama**, complete with a loud **drum** and a short **film**. Mia's uncle played the **flute** at a family **game** night. Grandpa played **guitar**, everyone's favorite **instrument**. \"Let's watch a **movie** instead,\" said Mom, turning on some soft **music**. Dad read a **novel**, while Mia liked to **paint** or play **piano**, humming her favorite **pop music**.", "text_zh": "那天晚上，全家人看了一齣校園話劇，還有響亮的鼓聲和一部短片。米亞的叔叔在家庭遊戲之夜吹長笛。爺爺彈吉他，那是大家最愛的樂器。「我們來看電影吧，」媽媽說，一邊播放輕柔的音樂。爸爸讀了一本小說，米亞則喜歡畫畫或彈鋼琴，一邊哼著她最愛的流行歌曲。"}, {"day": 46, "title_zh": "遊戲之夜", "text": "They played a **puzzle** game and sang a **song** together in their **apartment**. \"Let's split into two **team**s!\" said Dad, setting up a small **tent** in the living room like a fort. Mia's brother brought his favorite **toy**, a small **trumpet**, and a toy **violin**. Whoever solved the puzzle first would not **lose** — nobody wanted to be the **loser**! Everyone wanted to **win**, and in the end, everyone felt like a **winner**, and even the family dog became the biggest **fan** of the game.", "text_zh": "他們在公寓裡玩拼圖遊戲，一起唱歌。「我們分成兩隊吧！」爸爸說，在客廳搭了一個小帳篷，像個堡壘一樣。米亞的哥哥帶來了他最愛的玩具，一支小喇叭，還有一把玩具小提琴。誰先解開拼圖誰就不會輸——沒有人想當輸家！每個人都想贏，最後每個人都覺得自己是贏家，就連家裡的狗也成了這個遊戲最大的粉絲。"}, {"day": 47, "title_zh": "從公寓到房子", "text": "The next day, they visited a new apartment in a tall **building**. \"I still like our own **house** better,\" said Mia. \"**Home** is home.\" The apartment had a small **basement**, a clean **bathroom**, two **bedroom**s, and a bright **dining room**. Outside was a wooden **fence**, a **garage**, and a lovely **garden**. Inside, a long **hall** led to the **kitchen** and a cozy **living room**.", "text_zh": "隔天，他們去參觀一棟高樓裡的新公寓。「我還是比較喜歡我們自己的房子，」米亞說。「家就是家。」這間公寓有一個小地下室、一間乾淨的浴室、兩間臥室，還有一間明亮的餐廳。外面有一道木頭圍籬、一個車庫，還有一座可愛的花園。裡面，一條長長的走廊通往廚房和一間舒適的客廳。"}, {"day": 48, "title_zh": "房子的每個角落", "text": "Every **room** had a view of the **yard** from its **balcony**. The **ceiling** was high, and a heavy **door** led **downstairs**. The wooden **floor** shone under the light. At the front **gate**, you could see the red **roof**. A set of **stairs** led **upstairs**, past a white **wall** and a big **window**.", "text_zh": "每個房間的陽台都能看到院子的景色。天花板很高，一扇厚重的門通往樓下。木頭地板在燈光下閃閃發亮。在前門，可以看到紅色的屋頂。一段樓梯通往樓上，經過一面白牆和一扇大窗戶。"}, {"day": 49, "title_zh": "挑選家具", "text": "The family looked at **furniture** for the new place: a soft **armchair**, a big **bath**tub, a comfortable **bed**, a garden **bench**, a wooden **bookcase**, four **chair**s, a walk-in **closet**, a long **couch**, a floral **curtain**, a study **desk**, a **drawer** for socks, and a shiny **faucet** in the kitchen.", "text_zh": "一家人為新家挑選家具：一張柔軟的扶手椅、一個大浴缸、一張舒適的床、一張花園長椅、一個木製書櫃、四張椅子、一個步入式衣櫃、一張長沙發、一條印花窗簾、一張書桌、一個放襪子的抽屜，還有廚房裡一個閃亮的水龍頭。"}, {"day": 50, "title_zh": "臥室佈置", "text": "In the bedroom, they placed a small **lamp** for reading **light**, a tall **mirror**, a wooden **shelf**, a kitchen **sink**, a comfy **sofa**, a round **table**, and a deep **tub** for baths. On the bed were a warm **blanket**, a soft **carpet** nearby, a metal **hanger** in the closet, a fluffy **pillow**, and a clean **sheet**.", "text_zh": "在臥室裡，他們放了一盞小檯燈作為閱讀燈、一面高高的鏡子、一個木頭層架、一個廚房水槽、一張舒適的沙發、一張圓桌，還有一個深深的浴缸。床上有一條溫暖的毯子，旁邊有一塊柔軟的地毯，衣櫃裡有一個金屬衣架，還有一個蓬鬆的枕頭和一條乾淨的床單。"}, {"day": 51, "title_zh": "浴室與電器", "text": "In the bathroom, there was a new **toothbrush**, a bar of **soap**, and a fresh **towel**. The apartment also came with an **air conditioner**, a small **camera** by the door, a fast **computer**, a wooden **dresser**, a clothes **dryer**, a cooling **fan**, a bright **flashlight**, a **freezer**, a warm **heater**, and a washing **machine**.", "text_zh": "在浴室裡，有一支新牙刷、一塊肥皂，還有一條乾淨的毛巾。這間公寓還配有一台冷氣機、門邊一台小攝影機、一台快速的電腦、一個木頭梳妝台、一台烘衣機、一台涼風扇、一支明亮的手電筒、一台冷凍櫃、一台暖氣機，還有一台洗衣機。"}, {"day": 52, "title_zh": "廚房電器全開", "text": "In the kitchen, there was a big **oven**, an old **radio**, a full **refrigerator**, a loud **speaker**, a hot **stove**, a **telephone**, a large **television**, a **video** player, and a **printer** in the office corner. Nearby stood a woven **basket**, a red **brick**, a water **bucket**, and a tall **candle**.", "text_zh": "廚房裡有一個大烤箱、一台舊收音機、一台裝滿食物的冰箱、一個大聲的喇叭、一個熱騰騰的爐子、一支電話、一台大電視、一台放影機，還有辦公室角落的一台印表機。附近放著一個編織籃、一塊紅磚、一個水桶，還有一支高高的蠟燭。"}, {"day": 53, "title_zh": "修理工具箱", "text": "Dad opened his toolbox: a heavy **hammer** for **housework**, a spare **key**, a rubber **mat**, a sharp **needle**, a frying **pan**, a ceramic **teapot**, and a spare **umbrella**. \"We also need a new **toilet**, a **trash can**, a metal **wok**, and a plastic **tube**,\" he said, planning to **build** a small shed.", "text_zh": "爸爸打開他的工具箱：一把用來做家務的重槌子、一把備用鑰匙、一塊橡膠墊、一根尖銳的針、一個平底鍋、一個陶瓷茶壺，還有一把備用雨傘。「我們還需要一個新馬桶、一個垃圾桶、一個金屬炒鍋，還有一根塑膠管，」他說，打算蓋一間小工具間。"}, {"day": 54, "title_zh": "打掃新家", "text": "Everyone helped **clean** the new place. Mia wanted to **decorate** her room, and her mother wanted to **design** the kitchen herself. Dad had to **fix** a broken chair and **repair** the leaking faucet. \"I'll **sweep** the floor, and you **wash** the windows,\" said Mia. Outside, the **street** was quiet, close to an **elementary school**, a **junior high school**, a **kindergarten**, their new **school**, and a **senior high school** nearby.", "text_zh": "大家一起幫忙打掃新家。米亞想佈置自己的房間，媽媽則想自己設計廚房。爸爸得修理一張壞掉的椅子，還要修好漏水的水龍頭。「我來掃地，妳去擦窗戶，」米亞說。外面的街道很安靜，附近有一所小學、一所國中、一間幼稚園、他們的新學校，還有一所高中。"}, {"day": 55, "title_zh": "校園巡禮", "text": "Not far from home was a **university** with a huge **campus**. Mia's new **classroom** was bright and clean. A friendly **guard** stood at the gate. The school had a big **gym**, a fun **playground**, and a quiet **library**. On the playground was a **seesaw** and a tall **slide**. Inside her classroom was a wooden **board**, a **blackboard**, a shelf of **book**s, and a box of **chalk**.", "text_zh": "離家不遠處有一所校園很大的大學。米亞的新教室明亮又乾淨。一位友善的警衛站在校門口。學校裡有一個大體育館、一個好玩的遊樂場，還有一間安靜的圖書館。遊樂場上有一座蹺蹺板和一座高高的溜滑梯。她的教室裡有一塊木板、一塊黑板、一個書架，還有一盒粉筆。"}, {"day": 56, "title_zh": "文具盒裡的驚喜", "text": "Mia's pencil box had many things: colorful **crayon**s, a small **diary**, a thick **dictionary**, a white **envelope**, a pink **eraser**, her reading **glasses**, a bottle of **glue**, a pen of black **ink**, an old **letter**, a fun **magazine**, a folded **map**, a yellow **marker**, and a new **notebook**.", "text_zh": "米亞的鉛筆盒裡有很多東西：彩色蠟筆、一本小日記本、一本厚厚的字典、一個白色信封、一顆粉紅色橡皮擦、她的閱讀眼鏡、一瓶膠水、一支黑色墨水的筆、一封舊信、一本有趣的雜誌、一張摺起來的地圖、一支黃色麥克筆，還有一本新筆記本。"}, {"day": 57, "title_zh": "打開課本", "text": "She opened her **textbook** to the first **page** and pulled out a piece of **paper**. She used her **pen** and **pencil**, kept safe in her **pencil box**. On the wall was a **picture** and a **postcard** from a friend — a birthday **present**! She measured a line with her **ruler**, tore a **sheet** from her **workbook**, and packed everything into her **backpack**.", "text_zh": "她把課本翻到第一頁，抽出一張紙。她用了她的原子筆和鉛筆，都好好收在鉛筆盒裡。牆上掛著一張照片，還有朋友寄來的一張明信片——那是生日禮物！她用尺量了一條線，從練習本上撕下一張紙，然後把所有東西都裝進書包裡。"}, {"day": 58, "title_zh": "選課單", "text": "This term, Mia's **course** list included **art**, **Chinese**, **English**, **geography**, and **history**. Next year, she would also study **biology**, **chemistry**, and **physics**. \"I love learning a new **language**,\" she said. She was also curious about **law**, and of course, she had **math** and **music** class every week.", "text_zh": "這學期，米亞的課表有美術、國文、英文、地理和歷史。明年，她還會學生物、化學和物理。「我喜歡學新語言，」她說。她也對法律很好奇，當然，她每週都有數學課和音樂課。"}, {"day": 59, "title_zh": "教室裡的角色", "text": "Class also included **science** and **social science**. Mia was the **cheerleader** for the sports team, and her friend Ken was the **class leader**. Every **classmate** was also a **friend**. The **principal** visited to greet the new **student**s, and their kind **teacher** welcomed everyone. \"Please **answer** when I **ask** a question, and always **behave** in class,\" she said, ready to **explain** the first lesson.", "text_zh": "課程也包括科學和社會科。米亞是運動代表隊的啦啦隊長，她的朋友肯是班長。每個同學也都是朋友。校長來歡迎新生，他們親切的老師也歡迎大家。「我問問題的時候請回答，上課要保持規矩，」她說，準備開始講解第一課。"}, {"day": 60, "title_zh": "上課的規矩", "text": "\"To **learn** well, you must **listen** carefully,\" the teacher said. She would **mark** every test and hoped everyone would **pass**. \"**Practice** every day, and **prepare** before class. **Pronounce** each word clearly — I won't **punish** you for trying.\" She asked students to **read** aloud, **repeat** new words, and **review** old ones. \"Please **say** it again,\" she told a shy student, encouraging him to **speak** up.", "text_zh": "「要學得好，你必須仔細聆聽，」老師說。她會批改每一次測驗，希望每個人都能及格。「每天練習，上課前要先預習。每個字都要發音清楚——就算你唸錯了我也不會處罰你。」她請學生們朗讀、跟讀新單字、複習舊單字。「請再說一次，」她對一位害羞的學生說，鼓勵他大聲說出來。"}, {"day": 61, "title_zh": "拼字與寫作課", "text": "\"Can you **spell** this word?\" the teacher asked. \"I **study** every night,\" said one boy, ready to **talk** about the story in a short **conversation**. \"I love to **teach** this lesson,\" the teacher smiled, asking students to **draw** a picture, then **underline** the main idea. \"Do you **understand**?\" Everyone nodded and began to **write** their answers carefully, ready for the coming **exam**. \"Here is one **example**,\" she said, giving the class an **exercise** to try before the **final** bell rang.", "text_zh": "「你會拼這個字嗎？」老師問。「我每天晚上都讀書，」一個男孩說，準備用一段簡短的對話談談這個故事。「我很喜歡教這一課，」老師微笑著說，請學生們畫一幅圖，然後把主要概念畫線標出來。「你們懂了嗎？」大家點點頭，開始仔細寫下答案，準備迎接即將到來的考試。「這裡有一個例子，」她說，在下課鐘響前給全班一個練習題試做。"}, {"day": 62, "title_zh": "考卷發下來了", "text": "\"What **grade** did you get?\" Mia asked, worried about her **homework**. \"I studied hard, but this **knowledge** felt so new,\" she said, thinking about the last **lesson** — a long **poem** with a tricky **problem**. \"I couldn't answer every **question** in the **quiz**,\" she sighed. Her teacher kept a **record** of every **score**. \"Don't worry,\" said her friend. \"Even a **story** is a kind of **test** — you just need more **vocabulary**.\"", "text_zh": "「你考得怎麼樣？」米亞問，擔心著自己的作業。「我很用功讀書，但這個知識對我來說好陌生，」她說，想起上一課——一首很長的詩，裡面有個很棘手的問題。「這次小考我沒能答完每一題，」她嘆氣說。她的老師會記錄每一次的分數。「別擔心，」她朋友說。「就連一個故事也算是一種測驗——妳只是需要更多字彙。」"}, {"day": 63, "title_zh": "座位在哪裡？", "text": "It was a new **semester**, and Mia
