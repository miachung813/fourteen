naire only smiled. A few days later, a **check** arrived at Hughie's door. It was for much more money than he had given away. It came with a short **speech** of thanks. It said kindness should never **fail** to be rewarded. Not long after, Hughie was able to **marry** the woman he loved."], "text_zh": ["休伊是個貧窮的年輕畫家。但他有一顆善良的心。有一天，他去了他的美術社團。他看見一位老乞丐坐在外頭，替另一位畫家當模特兒。休伊看了非常心疼。他把口袋裡每一個銅板都給了那個人。", "隔週，休伊去參加一位有錢紳士的派對。他嚇了一跳。他又看見同一位「乞丐」！但這次那個人穿得像個道地的紳士。原來那位老人其實是位百萬富翁。他只是喜歡打扮成模特兒，純粹好玩。", "休伊很擔心自己鬧了個大笑話。但那位富翁只是笑了笑。幾天後，一張支票寄到了休伊家門口。金額比他當初給出去的錢多很多。支票還附上一段簡短的感謝話語。上面說，善良絕對不會得不到回報。不久之後，休伊順利娶了他心愛的女子。"]}, {"id": 5, "title_en": "The Star Talers", "title_zh": "星星銀幣", "author": "Brothers Grimm（格林兄弟）", "words": [{"w": "town", "pos": "n.", "m": "城鎮；市區"}, {"w": "hat", "pos": "n.", "m": "（有帽簷的）帽子"}, {"w": "thick", "pos": "adj.", "m": "厚的"}, {"w": "coat", "pos": "n.", "m": "大衣；外套"}, {"w": "road", "pos": "n.", "m": "路"}, {"w": "thin", "pos": "adj.", "m": "纖瘦的"}, {"w": "weak", "pos": "adj.", "m": "虛弱的"}, {"w": "continue", "pos": "v.", "m": "繼續"}, {"w": "sky", "pos": "n.", "m": "天空"}, {"w": "silver", "pos": "adj.", "m": "銀製的"}, {"w": "generous", "pos": "adj.", "m": "慷慨的；大方的"}, {"w": "collect", "pos": "v.", "m": "收集"}], "reference_words": [{"w": "taler", "pos": "n.", "m": "（德國古代的）銀幣"}, {"w": "rag", "pos": "n.", "m": "破衣"}], "text": ["A poor orphan girl walked alone toward the next **town**. She had only a small **hat** and a **thick** **coat** to keep warm. She had nothing else in the whole world. But she was kind. She trusted that God would take care of her.", "On the **road**, she met a **thin**, shivering old man. He begged for her coat. She gave it to him right away. Then a **weak** child asked for her hat. She gave that away too. She did not stop. She had to **continue** on her way, giving away her shoes, her dress, and finally her last little shirt.", "She stood alone under the open **sky**. She had nothing left to wear. Suddenly, she saw bright **silver** stars falling gently from above. Each star landed at her feet. Each one turned into a **silver** coin! She was amazed. She began to **collect** them. Because she had been so **generous**, she never had to be poor again."], "text_zh": ["一個貧窮的孤兒女孩，獨自走向下一座城鎮。她身上只有一頂小帽子和一件厚重的外套保暖。她在這世界上什麼都沒有。但她心地善良。她相信上天會照顧她。", "在路上，她遇見一位瘦弱、發抖的老人。老人向她討外套。她立刻就給了他。接著，一個虛弱的孩子跟她要帽子。她也給了出去。她沒有停下腳步，一定要繼續往前走，又把鞋子、洋裝，最後連最後一件小內衫都送給了別人。", "她獨自站在空曠的天空下。她身上已經沒有任何衣服了。忽然間，她看見明亮的銀色星星，輕輕從天上落下。每顆星星都落在她腳邊。每一顆都變成了一枚銀幣！她驚訝極了。她開始把銀幣收集起來。因為她一直這麼慷慨，從此以後再也不用過窮困的生活了。"]}, {"id": 6, "title_en": "The Wolf and the Seven Little Goats", "title_zh": "大野狼與七隻小羊", "author": "Brothers Grimm（格林兄弟）", "words": [{"w": "wolf", "pos": "n.", "m": "狼"}, {"w": "goat", "pos": "n.", "m": "山羊"}, {"w": "black", "pos": "adj.", "m": "黑色的"}, {"w": "foot", "pos": "n.", "m": "腳"}, {"w": "flour", "pos": "n.", "m": "麵粉"}, {"w": "door", "pos": "n.", "m": "門"}, {"w": "catch", "pos": "v.", "m": "抓到；捕獲"}, {"w": "hide", "pos": "v.", "m": "躲；藏"}, {"w": "tree", "pos": "n.", "m": "樹"}, {"w": "stone", "pos": "n.", "m": "石頭"}, {"w": "heavy", "pos": "adj.", "m": "重的"}, {"w": "less", "pos": "adv.", "m": "較少地；較小地"}], "reference_words": [{"w": "sack", "pos": "n.", "m": "麻布袋"}], "text": ["A mother **goat** had seven little kids. One day, she went out. She warned them. \"Never open the **door** for the **wolf**,\" she said. \"Watch for his **black** **foot** and his rough voice. That is how you will know him.\"", "The wolf came to the door. He tried tricks to sound nice. He ate chalk to make his voice soft. He put **flour** on his foot to make it white. Now the kids believed it was their mother. They opened the door. The wolf did **catch** six of the kids and swallow them right away. But the smallest kid ran to **hide** inside the clock.", "When the mother goat came home, she saw what happened. She found the wolf asleep under a **tree**. His stomach was big and round. She cut it open. She freed all six kids. Then she filled the wolf's stomach with **heavy** **stone** instead. When the wolf woke up, he tried to run to a well for water. The stones inside him were too heavy. He fell into the well. He never bothered the goats again.", "After that day, the kids trusted strangers **less**. Mother goat always told them to check a stranger's foot carefully. This way, the wolf could never **catch** them off guard again."], "text_zh": ["羊媽媽有七隻小山羊。有一天，她要出門。她叮嚀小羊們：「絕對不能替大野狼開門。」她說：「要注意牠黑黑的腳和粗啞的聲音，這樣你們就能認出牠來。」", "大野狼來到門口。牠耍了些花招，想讓自己聽起來友善一點。牠吃了粉筆，讓聲音變柔和。牠在腳上抹了麵粉，讓腳變白。小羊們這下相信門外真的是媽媽了。牠們打開了門。大野狼抓住六隻大一點的小羊，把牠們吞了下去。但最小的那隻小羊，跑去躲進了時鐘裡。", "羊媽媽回到家，看見發生的事。她發現大野狼正在一棵樹下睡覺。牠的肚子又大又圓。她把肚子剪開。她救出了六隻小羊。接著，她在狼的肚子裡塞滿了沉重的石頭。大野狼醒來後，想跑去水井邊喝水。石頭實在太重了。牠掉進了井裡。從此再也沒辦法騷擾羊群了。", "從那天起，小羊們對陌生人少了一分信任。羊媽媽總是提醒牠們，開門前一定要仔細檢查陌生人的腳。這樣一來，大野狼就再也沒辦法趁機抓住牠們了。"]}, {"id": 7, "title_en": "Little Claus and Big Claus", "title_zh": "小克勞斯與大克勞斯", "author": "Hans Christian Andersen（安徒生）", "words": [{"w": "arrive", "pos": "v.", "m": "到達；抵達"}, {"w": "oven", "pos": "n.", "m": "烤爐；烤箱"}, {"w": "enter", "pos": "v.", "m": "進入"}, {"w": "appear", "pos": "v.", "m": "出現"}, {"w": "market", "pos": "n.", "m": "市場"}, {"w": "joke", "pos": "n.", "m": "玩笑；笑話"}, {"w": "unhappy", "pos": "adj.", "m": "不開心的"}, {"w": "rich", "pos": "adj.", "m": "富有的"}], "reference_words": [{"w": "priest", "pos": "n.", "m": "牧師"}, {"w": "wizard", "pos": "n.", "m": "巫師"}, {"w": "switch", "pos": "v.", "m": "交換"}], "text": ["Little Claus was poor. He had only one horse. Big Claus, his neighbor, had five horses. Big Claus liked to tease him. He said, \"All five horses are mine!\" Little Claus got mad. One day he killed his horse by accident. He decided to sell the horse skin at the **market** in the next town.", "On the way, Little Claus needed a place to sleep. He knocked on a farmer's door. The farmer said he could sleep in the **oven** house. Little Claus saw something strange there. The farmer's wife was hiding good food. She did not want her husband to **enter** and see it. She was waiting for a secret visitor.", "The farmer came home early. He seemed to **appear** out of nowhere. The wife hid the food fast. Later, Little Claus played a funny **joke** on the farmer. He said his hat could make food **appear** by magic. He said his bag had a **wizard** inside. Little Claus was poor, and people often made fun of him. He felt **unhappy** about it. But he was smart. He tricked greedy Big Claus again and again. He told Big Claus there was treasure at the bottom of the river. Big Claus jumped in to find it. He never came back. Little Claus went home **rich** with all of Big Claus's things.", "Everyone in the village saw Little Claus **arrive** home with his new riches. They all talked about his amazing luck."], "text_zh": ["小克勞斯很窮，只有一匹馬。鄰居大克勞斯有五匹馬。大克勞斯喜歡嘲笑他，說：「這五匹馬都是我的！」小克勞斯很生氣。有一天，他不小心殺死了自己的馬。他決定把馬皮拿到隔壁城鎮的市場去賣。", "路上，小克勞斯需要找地方睡覺。他敲了一戶農夫的門。農夫說他可以睡在烤爐小屋裡。小克勞斯在那裡看到奇怪的事。農夫的太太正在藏好吃的食物。她不想讓丈夫進來看到。她在等一位祕密訪客。", "農夫提早回家了，好像突然冒出來一樣。太太趕快把食物藏起來。後來，小克勞斯跟農夫開了一個好笑的玩笑。他說他的帽子可以用魔法讓食物變出來。他說他的袋子裡裝著一個巫師。小克勞斯很窮，大家常常笑他，他覺得很不開心。但他很聰明，一次又一次騙貪心的大克勞斯。他告訴大克勞斯河底有寶藏。大克勞斯跳進河裡去找，再也沒有回來。小克勞斯帶著大克勞斯的東西回家，變得很富有。", "當小克勞斯帶著新財富抵達家門時，全村的人都在談論他驚人的好運氣。"]}, {"id": 8, "title_en": "The Three Spinning Women", "title_zh": "三個紡紗女", "author": "Brothers Grimm（格林兄弟）", "words": [{"w": "cry", "pos": "v.", "m": "哭"}, {"w": "queen", "pos": "n.", "m": "皇后"}, {"w": "castle", "pos": "n.", "m": "城堡"}, {"w": "prince", "pos": "n.", "m": "王子"}, {"w": "unhappy", "pos": "adj.", "m": "不開心的"}, {"w": "lip", "pos": "n.", "m": "嘴唇"}, {"w": "foot", "pos": "n.", "m": "腳"}, {"w": "problem", "pos": "n.", "m": "困擾；問題"}, {"w": "aunt", "pos": "n.", "m": "與父母同輩的女性（姑姑、阿姨等）"}, {"w": "agree", "pos": "v.", "m": "同意"}, {"w": "touch", "pos": "v.", "m": "碰觸；觸摸"}, {"w": "again", "pos": "adv.", "m": "再次；又"}], "reference_words": [{"w": "spin", "pos": "v.", "m": "紡紗；紡織"}, {"w": "yell", "pos": "v.", "m": "吼叫"}, {"w": "marry", "pos": "v.", "m": "結婚；嫁娶"}, {"w": "lower", "pos": "adj.", "m": "下部的"}], "text": ["A lazy girl did not like to spin. Her mother asked her to spin flax every day, and the girl would **cry** every time. One day, a **queen** rode by and heard her crying. The queen thought the girl loved to **spin** so much that she cried for more work. So the queen took her to the **castle**. She wanted the girl to marry the **prince**.", "At the castle, they locked the girl in a room full of flax. They told her to spin it all, or she could not marry the prince. The girl was **unhappy**. She did not know how to spin at all. Then three strange old women walked in. One had a huge **lip**. One had a huge **foot**. One had an old, wide thumb. They said they could fix her **problem**.", "\"You can call each one of us your **aunt**,\" they said. \"Invite us to your wedding. Don't be ashamed of us.\" The girl had to **agree**. That night, the three women spun all the flax. At the wedding, the prince saw the strange aunts and asked why they looked that way. They said too much spinning did it. The prince got scared. He said his new wife must never **touch** a spinning wheel **again**. So the girl never had to spin again."], "text_zh": ["有個懶女孩不喜歡紡紗。媽媽每天叫她紡麻線，她總是哭。有一天，一位皇后騎馬經過，聽到她哭。皇后以為女孩太愛紡紗了，哭著是因為還想要更多工作。於是皇后把她帶回城堡，想讓她嫁給王子。", "在城堡裡，他們把女孩關進一間堆滿麻線的房間。他們說她要把麻線全部紡完，不然不能嫁給王子。女孩覺得很不開心，她根本不會紡紗。這時，三個奇怪的老婦人走了進來。一個嘴唇很大，一個腳很大，一個大拇指又老又寬。她們說可以幫她解決這個難題。", "「叫我們阿姨吧，」她們說，「婚禮也邀請我們，不用覺得丟臉。」女孩答應了。那天晚上，三位婦人把麻線全紡完了。婚禮上，王子看到這些奇怪的阿姨，問她們為什麼長這樣。她們說是紡紗紡太多才變成這樣。王子嚇壞了，說他的新娘以後絕對不能再碰紡紗車。從此女孩再也不用紡紗了。"]}, {"id": 9, "title_en": "The Legend of Sleepy Hollow", "title_zh": "沉睡谷傳奇", "author": "Washington Irving（華盛頓．歐文）", "words": [{"w": "quiet", "pos": "adj.", "m": "寧靜的；安靜的"}, {"w": "monster", "pos": "n.", "m": "怪物；妖怪"}, {"w": "scared", "pos": "adj.", "m": "害怕的"}, {"w": "dark", "pos": "n./adj.", "m": "黑暗（的）"}, {"w": "trick", "pos": "n.", "m": "詭計；把戲"}, {"w": "evening", "pos": "n.", "m": "傍晚；晚上"}, {"w": "race", "pos": "n.", "m": "比賽；賽跑"}, {"w": "disappear", "pos": "v.", "m": "消失；不見"}, {"w": "shout", "pos": "v.", "m": "大叫；大喊"}, {"w": "remember", "pos": "v.", "m": "想起；記得"}, {"w": "hurry", "pos": "v.", "m": "趕緊；匆忙"}, {"w": "laugh", "pos": "v.", "m": "（出聲）笑"}], "reference_words": [{"w": "legend", "pos": "n.", "m": "傳說"}, {"w": "headless", "pos": "adj.", "m": "無頭的"}, {"w": "horseman", "pos": "n.", "m": "騎士"}, {"w": "figure", "pos": "n.", "m": "人影"}], "text": ["In a **quiet** little village called Sleepy Hollow, people told scary stories. They talked about a **headless** **monster** who rode a black horse at night. A nervous teacher named Ichabod got **scared** easily. But he still loved a rich farmer's pretty daughter.", "Ichabod had a rival named Brom. Brom was strong and liked to play a **trick** on him. One **dark** **evening**, Ichabod rode home alone after a party. He heard hoofbeats behind him in the **dark** woods. He turned and saw a headless **horseman**! The horseman held his own head under his arm.", "Ichabod kicked his horse and began to **race** away. His heart pounded fast. The horseman chased him all the way to a bridge. Just as Ichabod crossed it, something flew at him through the air. Ichabod let out a **shout** of fear. Then he seemed to **disappear** from the village forever. People still **remember** that night today. They tell the story and **laugh** about it, wondering if it was a real ghost, or just Brom's best trick ever. Even now, everyone likes to **hurry** home before dark."], "text_zh": ["在一個叫斷頭谷的安靜小村莊裡，大家都愛講恐怖故事。他們說森林裡有一個沒有頭的怪物，晚上會騎著黑馬出沒。一位膽小的老師叫伊卡博德，很容易被嚇到。但他還是喜歡上了一位有錢農夫的漂亮女兒。", "伊卡博德有個情敵，叫布朗姆。布朗姆很強壯，喜歡捉弄他。有一天晚上，天很黑，伊卡博德參加完派對後獨自騎馬回家。他聽到黑暗樹林裡傳來馬蹄聲。他回頭一看，看見一個沒有頭的騎士！那個騎士把自己的頭夾在手臂下。", "伊卡博德踢了踢馬，開始拼命奔跑。他的心跳得好快。那個騎士一路追他到一座橋。就在伊卡博德過橋的時候，有個東西朝他飛了過來。伊卡博德害怕地大叫一聲。接著他就好像消失了一樣，再也沒有回到村莊。村民們到現在還記得那個晚上。他們一邊講這個故事一邊笑，猜不出那到底是真的鬼，還是布朗姆開的最厲害的一個玩笑。直到現在，大家天黑前都會趕緊回家。"]}, {"id": 10, "title_en": "The Child's Story", "title_zh": "孩子的故事", "author": "Charles Dickens（查爾斯．狄更斯）", "words": [{"w": "child", "pos": "n.", "m": "孩童"}, {"w": "once", "pos": "adv.", "m": "從前；曾經"}, {"w": "forest", "pos": "n.", "m": "森林"}, {"w": "soon", "pos": "adv.", "m": "很快地；不久地"}, {"w": "beautiful", "pos": "adj.", "m": "美麗的；漂亮的"}, {"w": "marry", "pos": "v.", "m": "結婚；嫁娶"}, {"w": "wife", "pos": "n.", "m": "妻子"}, {"w": "path", "pos": "n.", "m": "路徑；小路"}, {"w": "white", "pos": "adj.", "m": "白色的"}, {"w": "return", "pos": "v.", "m": "返回"}, {"w": "nothing", "pos": "pron.", "m": "沒有東西"}, {"w": "glad", "pos": "adj.", "m": "高興的；愉快的"}], "reference_words": [{"w": "middle-aged", "pos": "adj.", "m": "中年的"}, {"w": "heaven", "pos": "n.", "m": "天堂"}, {"w": "clearing", "pos": "n.", "m": "（森林中的）空地"}, {"w": "journey", "pos": "n.", "m": "旅程"}], "text": ["There was **once** a happy **child** who walked down a long **path**. The path went through a green **forest**. He met many friendly people along the way. He **soon** grew into a boy. He kept walking and looking at everything with wonder.", "The path led him through his whole life. He grew into a young man. He fell in love with a **beautiful** young woman. They decided to **marry**. They walked hand in hand together, and now she was his **wife**. Later, their own children joined them on the path. Sometimes the children wore **white** clothes. The whole family walked and laughed together.", "As the man grew old, his steps got slower. But he was never scared, because kind friends always walked next to him. At last, the path came to an end. It was time to **return** to where he started. He felt he had lost **nothing** at all. He had only gained many happy memories. He was quietly **glad** for every step of his **journey**."], "text_zh": ["從前，有一個快樂的孩子，沿著一條長長的路往前走。這條路穿過一片綠色的森林。他一路上遇到很多友善的人。很快地，他長成了一個男孩。他繼續走著，用好奇的眼光看著身邊的一切。", "這條路陪著他走過一生。他長成了一個年輕人。他愛上了一位美麗的年輕女子。他們決定結婚。他們手牽著手一起走，現在她是他的妻子了。後來，他們自己的孩子也加入了這條路。孩子們有時穿著白色的衣服。一家人一起走著，一起笑著。", "這位男人漸漸老了，腳步也變慢了。但他從不害怕，因為總有和善的朋友陪在他身邊。最後，這條路走到了盡頭，是時候回到他出發的地方了。他覺得自己什麼都沒有失去，只得到了許多快樂的回憶。他安靜地為這趟旅程的每一步感到欣慰。"]}, {"id": 11, "title_en": "What Stumped the Blue Jays", "title_zh": "冠藍鴉的難題", "author": "Mark Twain（馬克．吐溫）", "words": [{"w": "roof", "pos": "n.", "m": "屋頂"}, {"w": "floor", "pos": "n.", "m": "地板"}, {"w": "store", "pos": "v.", "m": "貯存；存放"}, {"w": "hole", "pos": "n.", "m": "洞"}, {"w": "another", "pos": "adj.", "m": "另一個"}, {"w": "still", "pos": "adv.", "m": "仍然；依舊"}, {"w": "black", "pos": "n.", "m": "黑暗；黑色"}, {"w": "gather", "pos": "v.", "m": "採集；摘取"}, {"w": "curious", "pos": "adj.", "m": "好奇的"}, {"w": "front", "pos": "adj.", "m": "前面的"}, {"w": "pile", "pos": "n.", "m": "堆"}, {"w": "guy", "pos": "n.", "m": "傢伙；人"}], "reference_words": [{"w": "acorn", "pos": "n.", "m": "橡子"}, {"w": "entire", "pos": "adj.", "m": "全部的；整個"}], "text": ["Near an old, empty house, some blue jays found a small **hole** in the **roof**. They could look through the hole and see all the way down to the ground below. There was no **floor** inside the house at all. One jay thought the hole must be a **store** room. So he began to drop acorns into the hole, one by one.", "He worked all day. He dropped in **another** acorn, and another, and another. But the hole never seemed to fill up. It was **still** empty! Confused, he flew off to get his friends. Soon, a whole **black**-feathered crowd began to **gather** around the roof. They were all **curious** about this strange hole that never filled up.", "They took turns at the **front** of the line. Each jay dropped in acorns and shook its head. Finally, an old owl looked through a window. She laughed and explained: the hole went straight through the **entire** empty house! There was no floor inside at all. The jays saw they had wasted a big **pile** of acorns for nothing. They flew off laughing at themselves. \"You silly old **guy**!\" they said to each other."], "text_zh": ["在一間老舊空屋附近，幾隻藍樫鳥發現屋頂上有一個小洞。牠們從洞裡往下看，可以一路看到地面。屋子裡面根本沒有地板。有一隻樫鳥以為這個洞一定是個儲藏室。於是牠開始把橡實一顆一顆丟進洞裡。", "牠忙了一整天，丟進一顆又一顆橡實。但那個洞好像永遠填不滿，裡面還是空空的！牠覺得很困惑，就飛去找朋友來幫忙。很快地，一大群黑色羽毛的同伴聚集到屋頂上。牠們都對這個怎麼填都填不滿的怪洞感到好奇。", "牠們輪流排到隊伍最前面，每隻樫鳥都丟下橡實，然後搖搖頭。最後，一隻老貓頭鷹從窗戶望進去，笑著解釋：這個洞直通整棟空屋！裡面根本沒有地板。樫鳥們發現自己白白浪費了一大堆橡實，全都笑著飛走了。「你這個傻傢伙！」牠們互相這樣說。"]}, {"id": 12, "title_en": "The Man in the Moon", "title_zh": "月球人", "author": "American folklore（美國民間傳說）", "words": [{"w": "lonely", "pos": "adj.", "m": "孤單的；寂寞的"}, {"w": "jealous", "pos": "adj.", "m": "嫉妒的"}, {"w": "rise", "pos": "v.", "m": "升起"}, {"w": "slide", "pos": "v.", "m": "滑動；滑行"}, {"w": "dizzy", "pos": "adj.", "m": "暈眩的"}, {"w": "bowl", "pos": "n.", "m": "碗"}, {"w": "bite", "pos": "n.", "m": "一口的量"}, {"w": "tongue", "pos": "n.", "m": "舌頭"}, {"w": "police officer", "pos": "n.", "m": "警官"}, {"w": "honest", "pos": "adj.", "m": "誠實的"}, {"w": "balloon", "pos": "n.", "m": "氣球"}, {"w": "offer", "pos": "v.", "m": "提供；給予"}], "reference_words": [{"w": "heaven", "pos": "n.", "m": "天堂"}, {"w": "moonbeam", "pos": "n.", "m": "月光"}, {"w": "porridge", "pos": "n.", "m": "粥"}, {"w": "astronomer", "pos": "n.", "m": "天文學家"}, {"w": "recognize", "pos": "v.", "m": "認出；識別"}], "text": ["Long ago, a **lonely** old man lived all by himself on the moon. Every night, he looked down at Earth. He felt a little **jealous** when he saw children laughing and playing together. He had no one to talk to.", "One night, he felt brave. He let himself **slide** down a **moonbeam** all the way to Earth. When he landed, he felt very **dizzy** and hungry. He sat down right away and grabbed a **bowl** of hot **porridge**. He took a big **bite** too fast. He burned his **tongue** and had to fan his mouth to cool it down.", "A kind, **honest** **police officer** walked by. He saw the strange little visitor and stopped to **offer** his help. He helped the old man find his way home. He even gave him a bright red **balloon** to hold, so he would not feel so alone on the walk back.", "The old man floated home holding his balloon. From that night on, children look up at the sky. When they see his round, kind face, they **recognize** him right away. And every night, he watches the sun **rise** and set from his home in the sky. He is never **lonely** again."], "text_zh": ["很久很久以前，一位孤單的老人獨自住在月亮上。每天晚上，他都往下看著地球。看到孩子們一起開心地玩耍，他心裡有點嫉妒。他沒有人可以說話。", "有一天晚上，他鼓起勇氣，順著一道月光一路滑到地球上。降落的時候，他覺得又暈又餓。他馬上坐下來，端起一碗熱粥。他一口咬得太快太急，燙到了自己的舌頭，只好搧著嘴巴散熱。", "一位誠實善良的警察走了過來。他看見這位奇怪的小訪客，停下來主動要幫忙。他幫老人找到回家的路。他還送給老人一顆鮮紅色的氣球，讓他在回家的路上不會那麼孤單。", "老人抱著氣球飄回了家。從那天晚上起，孩子們抬頭看天空，一看到那張圓潤和善的臉，馬上就認出是他。從此每天晚上，他都在天上的家裡看著太陽升起又落下。他再也不孤單了。"]}, {"id": 13, "title_en": "The Happy Family", "title_zh": "快樂家庭", "author": "Hans Christian Andersen（安徒生）", "words": [{"w": "feed", "pos": "v.", "m": "餵食"}, {"w": "snail", "pos": "n.", "m": "蝸牛"}, {"w": "silver", "pos": "adj.", "m": "銀（製）的"}, {"w": "dish", "pos": "n.", "m": "盤子"}, {"w": "nearby", "pos": "adv.", "m": "附近"}, {"w": "couple", "pos": "n.", "m": "夫妻；情侶"}, {"w": "rush", "pos": "v.", "m": "急忙；匆忙"}, {"w": "hill", "pos": "n.", "m": "土丘；小山坡"}, {"w": "fly", "pos": "n.", "m": "蒼蠅"}, {"w": "wedding", "pos": "n.", "m": "婚禮"}, {"w": "pair", "pos": "n.", "m": "一對（伴侶）"}, {"w": "rule", "pos": "v.", "m": "統治；治理"}], "reference_words": [{"w": "duke", "pos": "n.", "m": "公爵"}, {"w": "honor", "pos": "n.", "m": "榮譽"}, {"w": "slug", "pos": "n.", "m": "蛞蝓"}], "text": ["A **snail** family lived under a big leaf. Every morning, an old woman came out to **feed** the plants **nearby**. The snails thought she did it just for them. They thought they were the most important family in the world.", "The father snail sat on a shiny **silver** leaf. He said, \"This garden is just for us.\" One day, a **couple** of storks landed close by. The baby snails looked at the **hill** behind their leaf. They hoped to see something fun.", "The storks did not stay long. They had to **fly** away. They were going to a big **wedding** at a faraway pond. Many animals were there in **pair**s. The snail family did not care. They just said their family **rule** again: \"We just need each other and our leaf. We are the happiest family.\"", "The snail family never had to **rush**. Every leaf, and every little **dish** of morning dew, was already enough for them."], "text_zh": ["一群**蝸牛**住在一片大葉子下面。每天早上，一位老婆婆會出來**餵**附近的植物。蝸牛們以為她只是為了牠們才這麼做。牠們覺得自己是世界上最重要的一家人。", "蝸牛爸爸坐在一片閃亮的**銀色**葉子上。牠說：「這座花園就是為我們造的。」有一天，一**對**鸛鳥飛來，降落在附近。小蝸牛們看著葉子後面的**小山**，希望能看到有趣的事發生。", "鸛鳥沒有停留太久，牠們得**飛**走了。牠們要去很遠的池塘參加一場盛大的**婚禮**。很多動物都成**對**出現在那裡。蝸牛一家並不在意，牠們只是又說了一次家庭**規矩**：「我們只需要彼此和這片葉子，我們是最幸福的一家人。」", "蝸牛一家從來不需要**匆忙**。每一片葉子，還有每天早上一**小碟**露水，對牠們來說都已經足夠了。"]}, {"id": 14, "title_en": "The Old Woman Who Lived in a Shoe", "title_zh": "鞋子裡的老太太", "author": "Nursery rhyme（童謠）", "words": [{"w": "husband", "pos": "n.", "m": "丈夫"}, {"w": "spot", "pos": "v.", "m": "看見；瞥見"}, {"w": "huge", "pos": "adj.", "m": "巨大的"}, {"w": "suggest", "pos": "v.", "m": "建議"}, {"w": "magic", "pos": "n.", "m": "魔法"}, {"w": "painful", "pos": "adj.", "m": "痛苦的"}, {"w": "bow", "pos": "n.", "m": "弓"}, {"w": "victory", "pos": "n.", "m": "勝利"}], "reference_words": [{"w": "smash", "pos": "v.", "m": "擊毀；打碎"}, {"w": "witch", "pos": "n.", "m": "女巫"}, {"w": "powerful", "pos": "adj.", "m": "強大的"}, {"w": "arrow", "pos": "n.", "m": "箭"}], "text": ["There was an old woman. She lived with her **husband** and all their kids inside a **huge** old shoe. The shoe stood in a **spot** at the edge of town. Every day, it got noisier and more crowded.", "One day, a monster came to scare the town. Everyone was scared. The old woman's husband had an idea. He **suggest**ed they ask the young archer for help. \"He knows some **magic**,\" he said. \"Maybe he can help us.\"", "The truth was **painful** — the monster was very **powerful**. But the archer's **arrow** had an old magic spell on it. He held his **bow** steady and shot. The whole town cheered for his **victory**. That night, the old woman finally had peace in her shoe, with all her children safe beside her."], "text_zh": ["從前有一位老婆婆，她和**丈夫**還有所有孩子，一起住在一隻**巨大**的舊鞋子裡。這隻鞋子在村子邊緣的一個**角落**。鞋子裡一天比一天更吵、更擠。", "有一天，一隻怪物跑來嚇唬村子，大家都很害怕。老婆婆的丈夫想到一個辦法，他**建議**大家去請年輕的弓箭手幫忙。他說：「他懂一點**魔法**，也許他能幫我們。」", "事實很**痛苦**——那隻怪物非常**強大**。但弓箭手的**箭**上有一道古老的魔法咒語。他穩穩地拉起**弓**，射了出去。全村都為他的**勝利**歡呼。那天晚上，老婆婆終於能在鞋子裡安心休息，所有孩子都平安地陪在她身邊。"]}, {"id": 15, "title_en": "The Adventures of Aladdin", "title_zh": "阿拉丁歷險記", "author": "One Thousand and One Nights（一千零一夜）", "words": [{"w": "adventure", "pos": "n.", "m": "歷險；冒險"}, {"w": "stranger", "pos": "n.", "m": "陌生人"}, {"w": "cover", "pos": "n.", "m": "遮蓋物"}, {"w": "lamp", "pos": "n.", "m": "（油）燈"}, {"w": "rub", "pos": "v.", "m": "摩擦；揉搓"}, {"w": "command", "pos": "n.", "m": "命令"}, {"w": "princess", "pos": "n.", "m": "公主"}, {"w": "diamond", "pos": "n.", "m": "鑽石"}, {"w": "instant", "pos": "n.", "m": "一剎那"}, {"w": "action", "pos": "n.", "m": "行動；行為"}, {"w": "servant", "pos": "n.", "m": "（尤指舊時的）僕人"}, {"w": "desire", "pos": "v.", "m": "渴望；要求"}], "reference_words": [{"w": "genie", "pos": "n.", "m": "精靈"}, {"w": "palace", "pos": "n.", "m": "宮殿；皇宮"}, {"w": "undo", "pos": "v.", "m": "取消"}, {"w": "vanish", "pos": "v.", "m": "消失"}], "text": ["Aladdin was a poor boy. He loved **adventure**. One day, a **stranger** came to him. The man said he was Aladdin's long-lost uncle. He led Aladdin to a hidden cave. A big stone used to **cover** the hole in the ground. The man said, \"Bring me the old **lamp** inside, and I will give you treasure.\"", "Inside the cave, Aladdin found the lamp. He also saw jewels that shined like **diamond**s. Aladdin **rub**bed the lamp to clean it. Suddenly, a **genie** popped out! The genie was ready to obey any **command** Aladdin gave.", "With the genie's help, Aladdin built a beautiful **palace**. He also won the heart of a **princess**. In an **instant**, his whole life changed. Aladdin always treated the genie like a good friend, not just a **servant**. He learned that with courage, almost any **desire** could come true. He took fast **action** to keep his family and the princess happy forever."], "text_zh": ["阿拉丁是個窮小子，他喜歡**冒險**。有一天，一個**陌生人**找上他，說自己是阿拉丁失散多年的叔叔。他帶阿拉丁到一個隱密的山洞。一塊大石頭**蓋**住了地上的洞口。那個人說：「把裡面的舊**油燈**拿給我，我就給你寶藏。」", "在山洞裡，阿拉丁找到了那盞燈，還看到閃閃發亮像**鑽石**一樣的珠寶。阿拉丁**摩擦**油燈想把它擦乾淨。突然，一個**精靈**跳了出來！精靈準備聽從阿拉丁下的任何**命令**。", "在精靈的幫助下，阿拉丁蓋了一座漂亮的**宮殿**，也贏得了一位**公主**的心。**一瞬間**，他的人生完全變了。阿拉丁一直把精靈當成好朋友，而不只是**僕人**。他學到，只要有勇氣，幾乎任何**願望**都能實現。他很快採取**行動**，讓家人和公主永遠幸福快樂。"]}, {"id": 16, "title_en": "The Traveling Companion", "title_zh": "旅伴", "author": "Hans Christian Andersen（安徒生）", "words": [{"w": "church", "pos": "n.", "m": "教堂"}, {"w": "rest", "pos": "v.", "m": "休息"}, {"w": "dead", "pos": "adj.", "m": "死掉的"}, {"w": "travel", "pos": "v.", "m": "旅行"}, {"w": "castle", "pos": "n.", "m": "城堡"}, {"w": "princess", "pos": "n.", "m": "公主"}, {"w": "marry", "pos": "v.", "m": "結婚；嫁娶"}, {"w": "question", "pos": "n.", "m": "問題"}], "reference_words": [{"w": "companion", "pos": "n.", "m": "同伴"}, {"w": "debt", "pos": "n.", "m": "債務；借款"}, {"w": "troll", "pos": "n.", "m": "（北歐傳說中的）巨人"}], "text": ["A kind young man once used his last money to bury a stranger. The stranger died with **debt**. People wanted to be cruel to his body outside the **church**. The young man said no, and gave him a proper burial. Soon after, another man asked to **travel** with him.", "The two **companion**s set out together. The young man wanted to win the heart of a beautiful **princess**. She lived in a faraway **castle**. Many men had tried to **marry** her before. But she asked a hard **question**, and none of them could answer. They all lost their lives.", "With his companion's quiet magic, the young man answered every question the princess asked. This broke the curse over her. At last, they could **rest**. Then the young man learned something amazing. His loyal companion was really the spirit of the man he had helped bury before.", "Long ago, the young man had helped bury that **dead** stranger. He never thought that one kind act would someday save his own life."], "text_zh": ["曾經有一位善良的年輕人，用他身上最後的錢，安葬了一位欠了**債**而過世的陌生人。大家想對他的遺體不禮貌，地點就在**教堂**外面。年輕人說不可以，並好好安葬了他。不久後，另一個人請求跟他一起**旅行**。", "兩位**旅伴**一起出發了。年輕人想要贏得一位美麗**公主**的心。她住在遙遠的**城堡**裡。許多人以前都試著**娶**她為妻，但她會問一個很難的**問題**，沒有人答得出來，全都因此丟了性命。", "靠著旅伴悄悄使用的魔法，年輕人答對了公主問的每一個問題。這解除了公主身上的詛咒。他們終於可以**休息**了。這時，年輕人才知道一件驚人的事：他忠心的旅伴，其實就是他之前幫忙安葬的那個人的靈魂。", "很久以前，年輕人幫忙安葬了那位**過世**的陌生人。他從沒想過，這個善良的舉動，有一天會救了自己一命。"]}, {"id": 17, "title_en": "The Five Boons of Life", "title_zh": "人生的五種恩賜", "author": "Mark Twain（馬克．吐溫）", "words": [{"w": "beginning", "pos": "n.", "m": "開始"}, {"w": "pleasure", "pos": "n.", "m": "歡樂；樂趣"}, {"w": "experience", "pos": "v.", "m": "體驗；經歷"}, {"w": "select", "pos": "v.", "m": "挑選"}, {"w": "easily", "pos": "adv.", "m": "輕易地"}, {"w": "lie", "pos": "n.", "m": "謊言"}, {"w": "final", "pos": "adj.", "m": "最後的"}, {"w": "horrible", "pos": "adj.", "m": "悲慘的；糟糕的"}, {"w": "full", "pos": "adj.", "m": "滿的；充滿的"}, {"w": "empty", "pos": "adj.", "m": "空蕩蕩的"}, {"w": "praise", "pos": "v.", "m": "讚揚"}, {"w": "precious", "pos": "adj.", "m": "珍貴的"}], "reference_words": [{"w": "boon", "pos": "n.", "m": "恩賜"}, {"w": "fairy", "pos": "n.", "m": "仙女"}, {"w": "disappoint", "pos": "v.", "m": "使失望"}, {"w": "in rags", "pos": "phr.", "m": "衣衫襤褸"}, {"w": "reply", "pos": "v.", "m": "回答；回覆"}], "text": ["At the **beginning** of a young man's life, a **fairy** came to him. She said he could **select** one gift: Fame, Love, Riches, **pleasure**, or Death. He thought he could **easily** figure out the best gift later. So he picked pleasure first.", "But pleasure gave him only a shallow **experience**. It left his heart **empty**. Next, he tried Fame. But people's **praise** felt fake and did not last. He tried Love, and then Riches too. But each gift turned out to be a **horrible** disappointment. His heart was **full** of regret, not joy.", "Finally, as an old man near his **final** days, he understood the **precious** truth. Death — the one gift he never picked — was really the best gift of all. It was the true rest waiting for everyone at the end of the road.", "Looking back, he saw that every early choice was based on a small **lie** he told himself about what really mattered."], "text_zh": ["在一個年輕人生命的**開始**，一位**仙子**出現了。她說他可以**挑選**一樣禮物：名聲、愛情、財富、**享樂**，或死亡。他以為之後可以**輕易**想清楚哪個禮物最好，於是他先選了享樂。", "享樂只帶給他膚淺的**體驗**，讓他心裡變得**空虛**。接著他試了名聲，但大家的**讚美**感覺很假，也不長久。他也試了愛情，還有財富，但每一樣禮物到頭來都是**可怕**的失望。他心裡**充滿**的不是快樂，而是後悔。", "最後，當這位老人走到生命**最後**的日子，他終於明白了那個**珍貴**的真相。死亡——他從來沒選過的那個禮物——其實才是最棒的禮物。那是每一條路的盡頭，等著每個人的真正休息。", "回頭看，他發現，早年的每一個選擇，都建立在他騙自己的一個小小**謊言**上，誤以為那才是真正重要的事。"]}, {"id": 18, "title_en": "The Frog in the Well", "title_zh": "井底之蛙", "author": "Chinese fable（中國寓言）", "words": [{"w": "frog", "pos": "n.", "m": "青蛙"}, {"w": "well", "pos": "n.", "m": "水井"}, {"w": "bottom", "pos": "n.", "m": "底部"}, {"w": "deep", "pos": "adj.", "m": "深的"}, {"w": "outside", "pos": "adj.", "m": "外面的"}, {"w": "cry", "pos": "v.", "m": "大叫"}, {"w": "low", "pos": "adj.", "m": "低矮的"}, {"w": "valley", "pos": "n.", "m": "山谷"}, {"w": "spot", "pos": "v.", "m": "看到；瞥見"}, {"w": "tiny", "pos": "adj.", "m": "微小的"}, {"w": "pond", "pos": "n.", "m": "池塘"}, {"w": "return", "pos": "v.", "m": "返回"}], "reference_words": [{"w": "surprising", "pos": "adj.", "m": "驚人的"}], "text": ["A little **frog** lived at the **bottom** of an old **well** his whole life. He thought the small circle of sky above him was the whole world. \"Nothing exists **outside** my well,\" he would proudly **cry** out to anyone who visited.", "One day, a sea turtle looked down into the **low**, narrow well. She tried to describe the ocean. She said it was wide. It was bigger than any **valley** or **pond** the frog could imagine. Its waves were as tall as mountains.", "The frog could not understand something so big. It sounded impossible to him. After all, he lived in such a **tiny** **spot**, compared to the turtle's home. He shook his head. He told the turtle to **return** to the sea and leave him alone.", "The frog simply could not imagine any place as **deep**, or as wide, as what the turtle described. It was too **surprising** for him to believe."], "text_zh": ["一隻小**青蛙**一輩子都住在一口老**井**的**底部**。牠以為頭頂上那一小圈天空就是整個世界。「我的井**外面**什麼都沒有，」牠總是驕傲地對每個來訪的人這樣**大聲說**。", "有一天，一隻海龜低頭看進這口**低矮**又狹窄的井裡。她試著描述大海的樣子。她說大海很寬廣，比青蛙能想像的任何山谷或**池塘**都大得多，海浪甚至高得像山一樣。", "青蛙沒辦法理解這麼巨大的東西，對牠來說聽起來根本不可能。畢竟，牠住的地方跟海龜的家比起來，只是一個**極小**的**角落**。牠搖搖頭，叫海龜**回**大海去，別來打擾牠。", "青蛙實在無法想像，有任何地方會像海龜說的那樣**深**、那樣寬廣。這對牠來說太**令人驚訝**了，難以相信。"]}, {"id": 19, "title_en": "The Legend of the White Snake", "title_zh": "白蛇傳", "author": "Chinese legend（中國民間傳說）", "words": [{"w": "snake", "pos": "n.", "m": "蛇"}, {"w": "thousand", "pos": "n.", "m": "千"}, {"w": "sight", "pos": "n.", "m": "看見；目睹"}, {"w": "couple", "pos": "n.", "m": "夫妻；情侶"}, {"w": "charge", "pos": "v.", "m": "索價；收費"}, {"w": "Dragon-boat Festival", "pos": "n.", "m": "端午節"}, {"w": "truth", "pos": "n.", "m": "事實；真相"}, {"w": "cup", "pos": "n.", "m": "一杯（的量）"}, {"w": "lock", "pos": "v.", "m": "鎖上"}, {"w": "safety", "pos": "n.", "m": "安全"}, {"w": "trap", "pos": "v.", "m": "使困住"}, {"w": "free", "pos": "adj.", "m": "自由的"}], "reference_words": [{"w": "monk", "pos": "n.", "m": "僧侶"}, {"w": "wine", "pos": "n.", "m": "酒"}, {"w": "legend", "pos": "n.", "m": "傳說"}], "text": ["Long ago in China, there was an old **legend**. A white **snake** spirit lived there. She practiced magic for a **thousand** years. At last, she could turn into a beautiful woman. At first **sight**, she fell in love with a young scholar. Soon they became a happy **couple**.", "An old **monk** did not trust her. He took **charge** of protecting the scholar. He warned him again and again, \"Your wife has a secret.\" During the **Dragon-boat Festival**, the monk had an idea. He told the scholar to test the **truth**. He gave her a special **cup** of **wine**.", "She drank the wine. She could not stay in her human form. For one moment, her true snake shape came out. Her husband was very scared. She wanted to protect her family's **safety**. She tried hard to prove her love. But the monk used his power to **trap** her under an old pagoda. She never stopped hoping to be **free** again.", "She was **lock**ed under the stone pagoda. But she still believed. One day, she would be free again."], "text_zh": ["很久很久以前，中國有一個古老的**傳說**。有一條白**蛇**精住在那裡。她修煉法力，修了**一千**年。最後，她能變成一位美麗的女子。**一見**面，她就愛上了一位年輕書生。很快，他們就成了一對幸福的**夫妻**。", "一位老**和尚**不相信她。他主動**負責**保護書生。他一再警告書生：「你的妻子藏著秘密。」在**端午節**這天，和尚想到一個辦法。他要書生試探**真相**。他給她一**杯**特別的**酒**。", "她喝下了酒。她沒辦法維持人形。有一瞬間，她現出了蛇的原形。她的丈夫嚇壞了。她想保護家人的**安全**。她努力想證明自己的愛。但和尚用法力把她**困**在一座古老的寶塔下。她從未放棄希望，相信自己有一天能重獲**自由**。", "她被**鎖**在石塔之下。但她仍然相信，總有一天，她會重獲自由。"]}, {"id": 20, "title_en": "The Crystal Ball", "title_zh": "水晶球", "author": "Brothers Grimm（格林兄弟）", "words": [{"w": "nest", "pos": "n.", "m": "巢；窩"}, {"w": "whale", "pos": "n.", "m": "鯨魚"}, {"w": "rat", "pos": "n.", "m": "老鼠"}, {"w": "princess", "pos": "n.", "m": "公主"}, {"w": "grandmother", "pos": "n.", "m": "（外）祖母"}, {"w": "guard", "pos": "v.", "m": "守衛；保護"}, {"w": "sharp", "pos": "adj.", "m": "銳利的"}, {"w": "sword", "pos": "n.", "m": "刀；劍"}, {"w": "wound", "pos": "n.", "m": "傷；傷口"}, {"w": "rise", "pos": "v.", "m": "浮起；升起"}, {"w": "victory", "pos": "n.", "m": "勝利"}, {"w": "kingdom", "pos": "n.", "m": "王國"}], "reference_words": [{"w": "crystal", "pos": "n.", "m": "水晶"}, {"w": "stepmother", "pos": "n.", "m": "後母"}, {"w": "witch", "pos": "n.", "m": "女巫"}, {"w": "grant", "pos": "v.", "m": "給予"}, {"w": "bull", "pos": "n.", "m": "公牛"}, {"w": "yolk", "pos": "n.", "m": "蛋黃"}], "text": ["Three brothers went on a quest. They wanted to break a **witch**'s curse. The curse trapped a beautiful **princess**. It also turned her **grandmother**'s **kingdom** to stone. The two older brothers grew greedy along the way. They turned into a **whale** and a black bird. Only the youngest brother could continue the quest.", "The youngest brother found a castle. Fierce dragons **guard**ed it. He had a **sharp** mind and a **sharp** magic **sword**. He fought past every danger. He got a small **wound**, but nothing could stop him.", "Inside, he found a hidden room. It looked like a **nest**. A little **rat** helped him find a hidden key. At last, he held the **crystal** ball. The curse broke right away.", "The princess, her grandmother, and the whole **kingdom** **rise** back to life. The young man's **victory** saved his brothers too. They all became people again."], "text_zh": ["三兄弟出發去冒險，想要打破一個**女巫**的詛咒。這個詛咒困住了一位美麗的**公主**，也讓她**祖母**的**王國**變成了石頭。兩位哥哥在路上變得貪心，先後被變成了一頭**鯨魚**和一隻黑鳥。只剩下最小的弟弟能繼續完成任務。", "小弟找到了一座城堡。兇猛的巨龍**看守**著它。他有機智的頭腦和一把鋒利的魔法**劍**。他一路打退每一個危險。他受了一點小**傷**，但沒有什麼能阻止他。", "裡面，他發現了一個藏起來的房間。看起來像個**巢**。一隻小**老鼠**幫他找到了一把藏起來的鑰匙。終於，他拿到了**水晶**球。詛咒立刻解除了。", "公主、她的祖母，還有整個**王國**都**重新活了過來**。這位年輕人的**勝利**也救了他的哥哥們。他們都變回了人。"]}, {"id": 21, "title_en": "After Twenty Years", "title_zh": "二十年後", "author": "O. Henry（歐．亨利）", "words": [{"w": "continue", "pos": "v.", "m": "繼續"}, {"w": "minute", "pos": "n.", "m": "分鐘"}, {"w": "later", "pos": "adv.", "m": "晚一點；稍後"}, {"w": "west", "pos": "n.", "m": "（美國）西部"}, {"w": "end", "pos": "n.", "m": "盡頭；尾端"}, {"w": "cry", "pos": "v.", "m": "喊；叫"}, {"w": "note", "pos": "n.", "m": "紙條；字條"}, {"w": "open", "pos": "v.", "m": "打開"}, {"w": "police officer", "pos": "n.", "m": "警察"}, {"w": "outside", "pos": "prep.", "m": "在……外面"}, {"w": "light", "pos": "v.", "m": "點燃"}, {"w": "white", "pos": "adj.", "m": "白色的"}], "reference_words": [{"w": "luck", "pos": "n.", "m": "運氣"}, {"w": "closed", "pos": "adj.", "m": "關閉的"}, {"w": "cigar", "pos": "n.", "m": "雪茄"}, {"w": "scar", "pos": "n.", "m": "傷疤"}, {"w": "well-dressed", "pos": "adj.", "m": "衣著講究的"}], "text": ["Twenty years ago, two close friends made a promise. They said they would meet again at the same door. It did not matter what happened in life. Now, one friend stood under a **light** on the **west** side of the city. He checked his watch every **minute**.", "A **police officer** walked by that night. He stopped to talk to the man **outside** the **closed** shop. The man said he came a long way just to keep this old promise. He did not want to **end** his wait, even if his friend never came.", "He waited a long time, and **later** another man arrived. He wore a long **white** coat and looked **well-dressed**. He said hello warmly and lit a **cigar**. But when they walked under brighter light, the first man saw a small **scar** on his face. Suddenly, the man said he had to go.", "Soon after, a plainclothes officer came instead. He held a small **note**. It said the truth: his old friend had already seen he was a wanted man. Maybe it was just bad **luck**. But he could not arrest his best friend himself. So he sent someone else and quietly walked away. He could not stop his tears. Their old friendship could not **continue** like before. He let himself **cry**, wondering if that door would ever **open** again."], "text_zh": ["二十年前，兩個好朋友許下一個約定。他們說，不管日後人生變成怎樣，都要在同一個地方再見面。現在，其中一位朋友站在城市**西邊**的一盞**燈**下。他每**一分鐘**就看一次手錶。", "那晚，一位**警察**走了過來。他停下來，和站在**打烊**商店**外面**的男子聊了幾句。男子說，他大老遠跑來，就是為了信守這個舊約定。他不想提早**結束**等待，就算朋友一直沒出現。", "**後來**，另一位男子到了。他穿著一件長長的**白色**大衣，看起來**打扮體面**。他熱情地打招呼，還點了根**雪茄**。但當他們走到更亮的燈光下時，第一位男子看見他臉上有一道小**疤痕**。突然間，這位男子說他得先走了。", "不久後，一位便衣警察來了，手裡拿著一張小**紙條**。上面寫著真相：他的老朋友早就發現他是通緝犯。也許這只是**運氣**不好。但他沒辦法親手逮捕自己最好的朋友。於是他派了別人來，自己悄悄地走開了。他忍不住流下眼淚。他們的老交情再也無法像以前一樣**繼續**下去了。他讓自己**哭**了出來，心裡想著，這扇門是否還會再為他們**打開**。"]}, {"id": 22, "title_en": "The Green Door", "title_zh": "綠色大門", "author": "O. Henry（歐．亨利）", "words": [{"w": "salesman", "pos": "n.", "m": "銷售員"}, {"w": "sidewalk", "pos": "n.", "m": "人行道"}, {"w": "blank", "pos": "adj.", "m": "空白的"}, {"w": "behind", "pos": "prep.", "m": "在……後面"}, {"w": "hall", "pos": "n.", "m": "走廊"}, {"w": "pretty", "pos": "adj.", "m": "漂亮的"}, {"w": "pale", "pos": "adj.", "m": "（臉色或膚色）蒼白的"}, {"w": "couch", "pos": "n.", "m": "長沙發；躺椅"}, {"w": "supper", "pos": "n.", "m": "晚餐"}, {"w": "state", "pos": "n.", "m": "狀態；情況"}, {"w": "sleepy", "pos": "adj.", "m": "睏的；想睡的"}, {"w": "pause", "pos": "v.", "m": "停頓；暫停"}], "reference_words": [{"w": "adventurer", "pos": "n.", "m": "冒險家"}, {"w": "fate", "pos": "n.", "m": "命運"}, {"w": "somehow", "pos": "adv.", "m": "不知怎地；不知為何"}, {"w": "dim", "pos": "adj.", "m": "光線昏暗的"}, {"w": "fan", "pos": "v.", "m": "搧風"}, {"w": "awake", "pos": "adj.", "m": "醒來的；清醒的"}], "text": ["A young **salesman** walked down a busy **sidewalk** one evening. A stranger gave him a small **blank** card. It had three words on it: \"The Green Door.\" He felt curious. He decided to follow the clue, like an **adventurer**.", "He walked **behind** an old building and found a green door. It led up a **dim** **hall**. He felt nervous but excited. He knocked and slowly opened the door. Inside, he found a thin, **pretty** young woman. She looked **pale** and lay on a small **couch**. She had almost no **supper** to eat.", "The young man bought her food right away. He helped her and asked for nothing back. Later, he tried to find the green door again. But there was no such door on that street. Every door led somewhere ordinary. He could not explain it. Maybe it was just **fate**, or **somehow** magic. He was glad he stayed **awake** and did not walk past **sleepy** and tired.", "He could never **state** why the green door disappeared. But he never felt bad about the **pause** he took that evening."], "text_zh": ["一位年輕的**推銷員**，在一個傍晚走在熱鬧的**人行道**上。一位陌生人塞給他一張**空白**小卡片。上面寫著三個字：「綠色大門」。他覺得很好奇，決定像個**冒險家**一樣，跟著這條線索走。", "在一棟老建築物**後面**，他找到了一扇綠色大門。門後是一條通往樓上、光線昏**暗**的**走廊**。他既緊張又興奮，敲了敲門，慢慢把門推開。裡面，他發現一位纖瘦、**清秀**的年輕女子。她臉色**蒼白**，躺在一張小**沙發**上，幾乎沒有**晚餐**可吃。", "年輕人立刻買了食物給她。他幫助她，也不求任何回報。後來，他想再找到那扇綠色大門，卻發現那條街上根本沒有那樣一扇門。每一扇門都通往再普通不過的地方。他沒辦法解釋這件事。也許這就是**命運**，或者**不知怎麼地**帶著點魔法。他很慶幸自己保持**清醒**，沒有帶著**睏意**、疲憊地直接走過去。", "他始終無法明確**說明**那扇綠色大門為什麼消失了。但他從不後悔那天傍晚自己**停下腳步**去追隨那條線索。"]}, {"id": 23, "title_en": "The Last Leaf", "title_zh": "最後一葉", "author": "O. Henry（歐．亨利）", "words": [{"w": "lady", "pos": "n.", "m": "小姐；女士"}, {"w": "painter", "pos": "n.", "m": "畫家"}, {"w": "count", "pos": "v.", "m": "數；計算"}, {"w": "backward", "pos": "adv.", "m": "向後地"}, {"w": "believe", "pos": "v.", "m": "相信"}, {"w": "hang", "pos": "v.", "m": "懸掛"}, {"w": "death", "pos": "n.", "m": "死亡"}, {"w": "freezing", "pos": "adj.", "m": "極冷的"}], "reference_words": [{"w": "wildly", "pos": "adv.", "m": "狂亂地；瘋狂地"}], "text": ["A young **lady** named Johnsy got very sick. She began to **believe** something strange. She thought that when the last leaf on the vine outside her window fell, she would die too. Her friend and an old **painter** who lived downstairs both worried about her.", "Every day, Johnsy would **count** the leaves. She watched them fall one by one in the cold wind. Her hope went **backward** with every leaf that fell. She truly believed her **death** would come with that last leaf.", "One **freezing**, stormy night, the old painter ran outside **wildly** in the storm. He carefully painted one leaf on the wall. It looked so real. The next morning, Johnsy saw the leaf still **hang**ing there. She felt hope again, and slowly got better. But the painter got very sick that night from the cold. He died soon after. He gave his life to save hers."], "text_zh": ["一位名叫強西的年輕**女子**病得很重。她心裡開始**相信**一件奇怪的事。她覺得，當窗外藤蔓上最後一片葉子掉下來時，自己也會跟著死去。她的朋友，還有住在樓下的老**畫家**，都很擔心她。", "強西每天都**數著**葉子。她看著葉子在寒風中一片接一片地掉落。她的希望也隨著每一片落下的葉子，一點一點地**倒退**消失。她真心相信，自己的**死亡**會跟著那最後一片葉子一起到來。", "在一個**寒冷刺骨**、暴風雨肆虐的夜晚，老畫家**不顧一切地**衝到外面。他小心翼翼地在牆上畫了一片葉子。畫得非常逼真。隔天早上，強西看見那片葉子還**掛**在那裡。她重新燃起希望，也漸漸康復了。但畫家那晚因為寒冷而病得很重。不久後，他就過世了。他用自己的生命，救了她的性命。"]}, {"id": 24, "title_en": "The Shadow", "title_zh": "影子", "author": "Hans Christian Andersen（安徒生）", "words": [{"w": "ground", "pos": "n.", "m": "地面；地板"}, {"w": "dark", "pos": "adj.", "m": "黑暗的"}, {"w": "believe", "pos": "v.", "m": "相信"}, {"w": "child", "pos": "n.", "m": "小孩；兒童"}, {"w": "answer", "pos": "v./n.", "m": "回答；答案"}, {"w": "stand", "pos": "v.", "m": "站起來；站立"}, {"w": "face", "pos": "v.", "m": "面向；正對"}, {"w": "dry", "pos": "v.", "m": "擦乾；使變乾"}, {"w": "grass", "pos": "n.", "m": "草；青草"}, {"w": "laugh", "pos": "v.", "m": "笑；大笑"}, {"w": "shine", "pos": "v.", "m": "照耀；發光"}, {"w": "belong", "pos": "v.", "m": "應在（某處）"}], "reference_words": [{"w": "shadow", "pos": "n.", "m": "影子"}, {"w": "angel", "pos": "n.", "m": "天使"}, {"w": "tear", "pos": "n.", "m": "眼淚；淚水"}, {"w": "field", "pos": "n.", "m": "（一大片廣闊的）地"}, {"w": "add", "pos": "v.", "m": "補充說"}], "text": ["A scholar once had a **shadow**. One night, the shadow walked away by itself. It never came back. Years later, a strange traveler visited the scholar. The traveler said, \"I am your old shadow. Now I can **stand** and act just like a real person.\"", "The shadow had learned everyone's secrets while hiding in the **dark**. It became rich and powerful. It did not want to **belong** below anyone anymore. Instead, it wanted the scholar to become its shadow.", "The scholar said no. He could not **believe** this was right. But the shadow told clever lies to a foreign princess. She believed the shadow instead of the honest scholar. Soon, everyone trusted the shadow. The scholar was forgotten, like dry **grass** on **dry** **ground**. A single **tear** rolled down his **face**, but the shadow just smiled a cold smile.", "As a **child**, the scholar could **answer** any hard question. He remembered how the sun used to **shine** on the green **field**. He would **laugh** freely with his old friends. That simple happiness, the shadow could never take away."], "text_zh": ["曾經有位學者，有一個**影子**。有一天晚上，這個影子自己走掉了，再也沒有回來。多年後，一位陌生的旅人來拜訪這位學者。旅人說：「我就是你的舊影子。現在我能像真正的人一樣**站立**、行動。」", "這個影子躲在**黑暗**中，偷偷學會了每個人的秘密。牠因此變得又有錢又有勢力。牠再也不想**屈居**在任何人之下。相反地，牠希望學者反過來變成牠的影子。", "學者拒絕了。他無法**相信**這樣做是對的。但這個影子在一位外國公主面前把謊話說得很動聽。公主相信了影子，卻不相信誠實的學者。很快地，大家都相信了影子。學者被大家遺忘，就像枯**乾**的**地面**上漸漸枯萎的**草**一樣。一滴**眼淚**滑落他的**臉**龐，而影子只是冷冷一笑。", "小時候，這位學者能自信地**回答**任何困難的問題。他還記得陽光曾經**照耀**在綠色的**草地**上。他總能和老朋友們開懷**大笑**。這份單純的快樂，影子永遠也奪不走。"]}, {"id": 25, "title_en": "Faithful John", "title_zh": "忠心的約翰", "author": "Brothers Grimm", "words": [{"w": "king", "pos": "n.", "m": "國王"}, {"w": "trip", "pos": "n.", "m": "旅行；旅程"}, {"w": "dangerous", "pos": "adj.", "m": "危險的"}, {"w": "mind", "pos": "v.", "m": "介意；在意"}, {"w": "right", "pos": "adj.", "m": "對的；正確的"}, {"w": "horse", "pos": "n.", "m": "馬"}, {"w": "ride", "pos": "v.", "m": "騎乘"}, {"w": "twice", "pos": "adv.", "m": "兩次；兩回"}, {"w": "hurt", "pos": "v.", "m": "傷害"}, {"w": "scared", "pos": "adj.", "m": "害怕的"}, {"w": "surprise", "pos": "n.", "m": "驚喜"}, {"w": "again", "pos": "adv.", "m": "再一次"}], "reference_words": [{"w": "marry", "pos": "v.", "m": "結婚；嫁娶"}, {"w": "faraway", "pos": "adj.", "m": "遙遠的"}, {"w": "stone", "pos": "n.", "m": "石頭"}, {"w": "wine", "pos": "n.", "m": "(葡萄)酒"}, {"w": "poison", "pos": "n.", "m": "毒藥"}, {"w": "wedding", "pos": "n.", "m": "婚禮"}, {"w": "blood", "pos": "n.", "m": "血"}, {"w": "statue", "pos": "n.", "m": "雕像"}, {"w": "alive", "pos": "adj.", "m": "活著的"}], "text": ["A **king** wanted to **marry** a pretty girl. She lived in a **dangerous** faraway land. He did not **mind** the long **trip** to find her. His helper, Faithful John, said, \"I will keep you safe.\"", "On the trip, John heard three birds talking. They said the king would be in trouble many times. John could stop it, but he could not tell anyone why. If he told the secret, he would turn to **stone**. John saved the king again and again, without a word. One day the king thought, \"Something is not **right** here.\"", "Later, a bad man put poison in the queen's **wine**. John saw it just in time. He did something that looked **scared** and strange — he grabbed the cup and drank it himself. The king got angry and told his guards to **hurt** John. Then John explained everything. The moment he stopped talking, he turned into a **stone** statue, just like the birds said.", "The king felt very sad. He kept the **statue** near him for many years. Then one day, a drop of the king's own **blood** touched the stone. John opened his eyes — he was **alive** **again**! It was a huge **surprise** for everyone.", "Faithful John once saved the king from getting **hurt** on a **horse** **ride**. He would gladly do it **twice** as much to keep the king safe. Even a short **ride** could turn dangerous, so John always stayed close by his side."], "text_zh": ["有一位國王想娶一位漂亮的女孩。她住在遙遠又危險的地方。國王一點也不介意這趟漫長的旅程。他的幫手，忠心的約翰說：「我會保護你的安全。」", "在路上，約翰聽到三隻鳥在說話。牠們說國王會遇到很多次麻煩。約翰能阻止，但不能告訴任何人原因。如果他說出祕密，就會變成石頭。約翰一次又一次悄悄救了國王，什麼都沒說。有一天國王心想：「這裡好像不太對勁。」", "後來，一個壞人在皇后的酒裡下了毒。約翰及時發現。他做了一件看起來很嚇人又奇怪的事——他一把抓起杯子，自己喝了下去。國王生氣了，叫侍衛去傷害約翰。這時約翰才把一切解釋清楚。他一說完話，就立刻變成了一座石像，就像那三隻鳥說的一樣。", "國王非常傷心。他把這座石像留在身邊，一放就是好多年。後來有一天，一滴國王自己的血滴到了石頭上。約翰睜開了眼睛——他又活過來了！大家都嚇了一大跳，覺得非常驚訝。", "忠心的約翰曾經在一次騎馬途中，救了國王一命，讓他免於受傷。他甚至願意冒兩倍的風險，只為了保護國王。就算只是短短騎一次馬，也可能變得很危險，所以約翰總是待在國王身邊。"]}, {"id": 26, "title_en": "The Star-Child", "title_zh": "星星之子", "author": "Oscar Wilde", "words": [{"w": "raise", "pos": "v.", "m": "養育"}, {"w": "snake", "pos": "n.", "m": "蛇"}, {"w": "frog", "pos": "n.", "m": "青蛙"}, {"w": "handsome", "pos": "adj.", "m": "俊美的；好看的"}, {"w": "realize", "pos": "v.", "m": "了解；意識到"}, {"w": "seek", "pos": "v.", "m": "尋找"}, {"w": "guard", "pos": "n.", "m": "侍衛；警衛"}, {"w": "beat", "pos": "v.", "m": "打；揍"}, {"w": "fox", "pos": "n.", "m": "狐狸"}, {"w": "free", "pos": "v.", "m": "釋放"}, {"w": "direct", "pos": "v.", "m": "引導；指路"}, {"w": "prince", "pos": "n.", "m": "王子"}], "reference_words": [{"w": "instead", "pos": "adv.", "m": "反而；卻"}, {"w": "vain", "pos": "adj.", "m": "自負的；虛榮的"}, {"w": "beggar", "pos": "n.", "m": "乞丐"}, {"w": "kindness", "pos": "n.", "m": "仁慈；好意"}], "text": ["A poor woodcutter found a baby in the snow. He believed the baby fell from a star. He decided to **raise** the boy as his own. The boy grew up **handsome**, but he became proud and mean. He was mean to everyone, even a poor **beggar** woman. He did not **realize** she was his real mother.", "One day, his real mother came to find him. He was cruel to her. He called her a **snake** and a **frog**. Because he was so mean, his handsome face turned as ugly as a **fox**'s face. Everyone in the village got scared and turned away.", "The boy felt very ashamed. He decided to **seek** his mother and say sorry. Along the way, he showed real **kindness** for the first time. He helped a trapped **fox** **instead** of walking away. He shared his food with hungry people. He tried to **direct** lost travelers back home.", "Only after he learned true kindness did his handsome face come back. A kind old **guard** at the city gate welcomed him home. Everyone now called him a good **prince**. His heart used to **beat** with pride and anger, but kindness finally set that cold pride **free**."], "text_zh": ["有一位貧窮的樵夫在雪地裡發現了一個嬰兒。他相信這個嬰兒是從星星上掉下來的。他決定把這男孩當作自己的孩子扶養長大。這男孩長大後很英俊，但個性變得驕傲又刻薄。他對每個人都很壞，甚至對一位貧窮的乞丐婦人也是。他不知道那其實是他的親生母親。", "有一天，他的親生母親來找他。他對她很殘忍，還罵她是蛇和青蛙。因為他太壞了，他英俊的臉突然變得像狐狸一樣醜。村子裡的人都嚇壞了，紛紛轉身離開他。", "這男孩感到非常羞愧。他決定去尋找母親，向她道歉。一路上，他第一次展現出真正的善良。他救了一隻受困的狐狸，而不是轉身走開。他把食物分給挨餓的人。他還試著幫迷路的旅人指路回家。", "直到他學會了真正的善良，他英俊的臉才恢復原樣。城門口一位善良的老守衛歡迎他回家。大家現在都稱他為一位好王子。他的心曾經因為驕傲和憤怒而跳動，但善良終於讓那份冰冷的驕傲得到了釋放。"]}, {"id": 27, "title_en": "The Red Shoes", "title_zh": "紅舞鞋", "author": "Andersen", "words": [{"w": "shoe", "pos": "n.", "m": "鞋子"}, {"w": "parent", "pos": "n.", "m": "雙親之一"}, {"w": "dress", "pos": "n.", "m": "連衣裙"}, {"w": "pick", "pos": "v.", "m": "挑選"}, {"w": "notice", "pos": "v.", "m": "注意；發現"}, {"w": "wear", "pos": "v.", "m": "穿戴"}, {"w": "strange", "pos": "adj.", "m": "奇怪的；不尋常的"}, {"w": "dance", "pos": "v.", "m": "跳舞"}, {"w": "road", "pos": "n.", "m": "道路"}, {"w": "town", "pos": "n.", "m": "城鎮"}, {"w": "door", "pos": "n.", "m": "門"}, {"w": "pray", "pos": "v.", "m": "禱告"}], "reference_words": [{"w": "priest", "pos": "n.", "m": "牧師"}, {"w": "wooden", "pos": "adj.", "m": "木頭的"}, {"w": "angel", "pos": "n.", "m": "天使"}], "text": ["A poor orphan girl never owned even one **shoe**. A kind rich woman took care of her like a **parent**. She bought the girl a new **dress**. She let the girl **pick** out any shoes she wanted from the shop. The girl picked a pretty pair of red shoes.", "People began to **notice** how much the girl loved to **wear** her red shoes. She even wore them to church. People thought this was **strange**. One day, she put them on again and began to **dance**. But this time, the shoes would not stop, no matter how tired she got.", "The shoes made her **dance** down every **road** and through every **town**. She never stopped at any **door**, even when she begged for help. At last, tired and sorry, she found a small church. She knelt down to **pray** for forgiveness. Only then did the red shoes finally let her rest."], "text_zh": ["一個貧窮的孤兒女孩從來沒有屬於自己的一雙鞋。一位善良的富有婦人像父母一樣照顧她，替她買了一件新洋裝，還讓她自己到店裡挑一雙喜歡的鞋子。女孩挑了一雙漂亮的紅鞋。", "大家漸漸注意到這女孩有多愛穿她的紅鞋，甚至穿去教堂。大家都覺得這樣很奇怪。有一天，她又穿上了紅鞋，開始跳起舞來。但這一次，不管她多累，那雙鞋都不肯停下來。", "紅鞋帶著她跳過一條又一條的路，穿過一座又一座的城鎮。無論她在哪一扇門前苦苦哀求，鞋子都沒有停下來。最後，她又累又後悔，找到了一間小教堂。她跪下來祈禱，請求原諒。直到那時，紅鞋才終於讓她休息。"]}, {"id": 28, "title_en": "Paul Bunyan", "title_zh": "保羅‧班揚", "author": "American folklore", "words": [{"w": "forest", "pos": "n.", "m": "森林"}, {"w": "deep", "pos": "adj.", "m": "深的"}, {"w": "ordinary", "pos": "adj.", "m": "平常的；一般的"}, {"w": "baby", "pos": "n.", "m": "寶寶；嬰兒"}, {"w": "ox", "pos": "n.", "m": "牛；公牛"}, {"w": "hole", "pos": "n.", "m": "洞"}, {"w": "ground", "pos": "n.", "m": "地面；地板"}, {"w": "rope", "pos": "n.", "m": "繩子"}, {"w": "hire", "pos": "v.", "m": "僱用"}, {"w": "worker", "pos": "n.", "m": "工人；員工"}, {"w": "swing", "pos": "v.", "m": "擺動；揮舞"}, {"w": "disappear", "pos": "v.", "m": "消失；不見"}], "reference_words": [{"w": "nowadays", "pos": "adv.", "m": "現在；當今"}, {"w": "lumberjack", "pos": "n.", "m": "伐木工人"}, {"w": "fur", "pos": "n.", "m": "(動物的)毛"}, {"w": "straighten", "pos": "v.", "m": "把……變直"}, {"w": "lumber", "pos": "n.", "m": "木材"}, {"w": "ax", "pos": "n.", "m": "斧頭"}, {"w": "earthquake", "pos": "n.", "m": "地震"}], "text": ["Paul Bunyan was born a giant **baby** in the middle of a big **forest**. Even as a baby, he was already bigger and stronger than any **ordinary** man. He grew up loving the outdoors. He loved digging one big **deep** **hole** in the **ground** just for fun.", "One winter, Paul found a giant blue **ox** calf freezing in the snow. He raised it as his best friend and named him Babe. Paul tied a long **rope** between Babe and a crooked road, then pulled hard to straighten it out. The huge holes Babe's feet left behind filled with water and became big lakes.", "When Paul grew up, he decided to **hire** many helpers. Every **worker** was loyal and strong. Together they cleared forests and built farms. Paul made sure to never cut down more trees than the land could spare. Babe could **swing** logs around like toys. The two friends worked so fast that whole forests seemed to **disappear** overnight and turn into farmland."], "text_zh": ["保羅‧班揚一出生就是個巨嬰，誕生在一片大森林的正中央。就算還是嬰兒，他已經比任何普通的成年人都高大強壯。他從小就熱愛戶外活動，特別喜歡純粹為了好玩，在地上挖一個又深又大的洞。", "有一年冬天，保羅發現一頭巨大的藍色小牛在雪地裡快要凍僵了。他把牠當作最好的朋友養大，取名叫貝比。保羅用一條長繩子綁住貝比和一條彎彎曲曲的路，用力一拉就把路拉直了。貝比走過留下的巨大坑洞，後來注滿了水，變成了大湖。", "保羅長大後，決定僱用很多幫手。每一位工人都忠心又強壯。大家一起開墾森林、建造農場。保羅總是小心，絕不砍伐超過土地能負擔的樹木。貝比可以像玩玩具一樣揮動原木。兩位好朋友合作得非常快，整片森林彷彿一夜之間就消失不見，變成了農地。"]}, {"id": 29, "title_en": "The Patient Cat", "title_zh": "耐心的小花貓", "author": null, "words": [{"w": "hungry", "pos": "adj.", "m": "飢餓的"}, {"w": "yard", "pos": "n.", "m": "院子"}, {"w": "summer", "pos": "n.", "m": "夏天"}, {"w": "blue", "pos": "adj.", "m": "藍色的"}, {"w": "during", "pos": "prep.", "m": "在……期間"}, {"w": "catch", "pos": "v.", "m": "抓；捕捉"}, {"w": "wash", "pos": "v.", "m": "清洗"}, {"w": "thin", "pos": "adj.", "m": "瘦的"}, {"w": "smile", "pos": "v.", "m": "微笑；笑"}, {"w": "decide", "pos": "v.", "m": "決定"}, {"w": "moment", "pos": "n.", "m": "片刻；極短的時間"}, {"w": "straight", "pos": "adv.", "m": "直接"}], "reference_words": [{"w": "patient", "pos": "adj.", "m": "有耐心的"}, {"w": "spotted", "pos": "adj.", "m": "有斑點的；有花紋的"}, {"w": "nest", "pos": "n.", "m": "巢；窩"}, {"w": "empty", "pos": "adj.", "m": "空的"}, {"w": "tiny", "pos": "adj.", "m": "極小的"}, {"w": "worm", "pos": "n.", "m": "蟲"}, {"w": "add", "pos": "v.", "m": "補充說"}, {"w": "meow", "pos": "interj.", "m": "貓叫聲"}], "text": ["A **spotted** cat felt **hungry** one day. She climbed a tree in a quiet **yard** to look for food. At the top, she found a bird's **nest**. It was still **empty**. She had to **decide** what to do, so she chose to wait there all **summer** for eggs to hatch.", "She stayed busy **during** that long wait. She would **catch** small bugs to eat. She would **wash** herself clean in the sun. She took long naps too. When she checked again, she found five **tiny**, **blue** eggs. But they looked so **thin** and small. She chose to wait a little longer.", "She had a big **smile** on her face. She felt sure she had made a smart choice. She did not waste one **moment** worrying. But when she went **straight** back to the nest, she found it completely empty. The baby birds had already grown up and flown away. They did not even say thank you. The **patient**, hungry cat had nothing to show for her long wait."], "text_zh": ["一隻有斑點的貓咪有一天覺得很餓。她爬上一座安靜院子裡的樹，想找找看有沒有食物。在樹頂，她發現了一個鳥巢，裡面還是空的。她得決定該怎麼做，於是選擇在那裡耐心等整個夏天，等蛋孵化。", "在漫長的等待期間，她也沒閒著。她會抓一些小蟲子來吃，還會在陽光下把自己洗乾淨，也睡了不少長長的午覺。當她再次檢查時，發現了五顆小小的藍色蛋，但它們看起來又瘦又小。她決定再多等一陣子。", "她臉上露出了微笑，覺得自己做了個聰明的選擇，一刻也不浪費地繼續等待。但當她直接回到鳥巢時，卻發現裡面已經完全空了。小鳥們早就長大飛走了，連一聲謝謝都沒說。這隻耐心又飢餓的貓咪，什麼收穫都沒有，白等了一場。"]}, {"id": 30, "title_en": "A Piece of Steak", "title_zh": "一塊牛排", "author": "Jack London", "words": [{"w": "steak", "pos": "n.", "m": "牛排"}, {"w": "evening", "pos": "n.", "m": "晚上；傍晚"}, {"w": "bread", "pos": "n.", "m": "麵包"}, {"w": "rent", "pos": "n.", "m": "租金"}, {"w": "clap", "pos": "v.", "m": "拍手；鼓掌"}, {"w": "precious", "pos": "adj.", "m": "珍貴的；寶貴的"}, {"w": "round", "pos": "n.", "m": "回合"}, {"w": "mat", "pos": "n.", "m": "墊子"}, {"w": "beat", "pos": "v.", "m": "(接連地)擊打"}, {"w": "chin", "pos": "n.", "m": "下巴"}, {"w": "recover", "pos": "v.", "m": "恢復；康復"}, {"w": "power", "pos": "n.", "m": "力氣；力量"}], "reference_words": [{"w": "boxer", "pos": "n.", "m": "拳擊手"}, {"w": "gravy", "pos": "n.", "m": "肉汁"}, {"w": "punch", "pos": "v.", "m": "用力猛擊"}, {"w": "tire", "pos": "v.", "m": "(使)感到疲累"}, {"w": "gloved", "pos": "adj.", "m": "戴著手套的"}, {"w": "fist", "pos": "n.", "m": "拳頭"}], "text": ["An old **boxer** named Tom had to fight a younger, stronger man that **evening**. He needed the money to buy **bread** and pay the **rent** for his family. Before he left, his wife made him a simple meal and wished him luck.", "When the fight began, the crowd started to **clap** loudly for the younger fighter. Tom knew every **round** would be hard. So he saved his **precious** energy. He stood steady on the **mat** and waited for his chance instead of rushing in.", "In the last rounds, Tom's opponent got tired. Tom landed a hard punch on the man's **chin** and knocked him down. But the young man was able to **recover** just in time and get back up. Sadly, Tom's own **power** ran out first. His mind drifted to the simple meal he never got to enjoy. In the end, tired Tom **beat** himself more than his opponent ever could.", "That night, Tom thought about the simple **steak** dinner he never got to fully enjoy. He realized that money and pride mattered much less than the family waiting for him at home."], "text_zh": ["一位年邁的拳擊手湯姆，那天傍晚必須跟一個更年輕、更強壯的對手比賽。他需要贏得獎金，買麵包、付房租，養活一家人。出門前，妻子替他做了一頓簡單的餐點，祝他好運。", "比賽開始後，觀眾開始為那位年輕拳擊手大聲鼓掌。湯姆知道每一回合都會很辛苦，於是他保留著寶貴的體力，穩穩站在擂台上，耐心等待機會，而不是貿然出手。", "到了最後幾回合，湯姆的對手累了。湯姆一記重拳打中對方的下巴，把他擊倒——但年輕人及時恢復過來，重新站了起來。可惜的是，湯姆自己的力氣先耗盡了。他的思緒飄回那頓還沒好好享用的簡單餐點。最後，筋疲力盡的湯姆，打敗自己的比打敗對手還要多。", "那天晚上，湯姆想起那頓還沒能好好享用的簡單牛排晚餐。他明白了，比起金錢和面子，在家等他的家人才是最重要的。"]}, {"id": 31, "title_en": "The Pendulum", "title_zh": "鐘擺", "author": "O. Henry", "words": [{"w": "kiss", "pos": "n.", "m": "親吻"}, {"w": "unhappy", "pos": "adj.", "m": "不開心的"}, {"w": "answer", "pos": "v.", "m": "回答"}, {"w": "guy", "pos": "n.", "m": "人；傢伙"}, {"w": "surprise", "pos": "n.", "m": "驚喜"}, {"w": "train", "pos": "n.", "m": "火車"}, {"w": "tomorrow", "pos": "adv.", "m": "明天"}, {"w": "touch", "pos": "v.", "m": "碰觸"}, {"w": "imagine", "pos": "v.", "m": "想像"}, {"w": "change", "pos": "n.", "m": "改變；變化"}, {"w": "treat", "pos": "v.", "m": "對待"}, {"w": "clock", "pos": "n.", "m": "時鐘"}], "reference_words": [{"w": "pendulum", "pos": "n.", "m": "鐘擺"}, {"w": "relax", "pos": "v.", "m": "放鬆"}, {"w": "pool", "pos": "n.", "m": "撞球"}, {"w": "suddenly", "pos": "adv.", "m": "突然地"}], "text": ["Every night, John's wife Katy gave him a **kiss** at the door. But one night, she was not there. She left a note. It said his mom was sick. Katy took a **train** to see her. She said she would write **tomorrow**.", "John felt **unhappy**. He and Katy had never slept apart before. He tried to call her, but he could not reach her. He began to **imagine** bad things. He did not even **touch** his hat. He always touched it before he went out to **relax** at the **pool** with friends. Not tonight.", "John sat alone and thought about Katy. He wanted to **treat** her better from now on. He watched the **clock** tick by slowly. Then, **suddenly**, the door opened! It was all just a mistake. Katy was home, safe and sound. She asked her usual question: \"Where are you going now?\" John gave a short **answer**: \"Nowhere.\" He felt like a new **guy**. He was ready to **change**.", "When Katy walked back through the door, John felt nothing but pure **surprise** and relief."], "text_zh": ["每天晚上，約翰的太太凱蒂都會在門口給他一個吻。但有一天晚上，她不在家。她留了一張紙條，說婆婆生病了。凱蒂搭火車去看她，說她明天會寫信回來。", "約翰覺得很難過。他和凱蒂從來沒有分開睡過。他想打電話給她，卻聯絡不上。他開始想像各種糟糕的事。他連自己的帽子都不想碰一下。他平常出門去游泳池放鬆、和朋友碰面前，都會先碰一下帽子。但今晚沒有。", "約翰獨自坐著，想著凱蒂。他決定以後要更好地對待她。他看著時鐘的指針慢慢移動。突然，門開了！原來這一切只是一場誤會。凱蒂平安到家了。她像往常一樣問：「你現在要去哪裡呀？」約翰簡短地回答：「哪裡都不去。」他覺得自己像變了一個人。他準備好要改變了。", "當凱蒂走進門的那一刻，約翰心裡只剩下滿滿的驚喜與如釋重負。"]}, {"id": 32, "title_en": "The Riverman", "title_zh": "河工", "author": "Stewart Edward White", "words": [{"w": "match", "pos": "n.", "m": "比賽；競賽"}, {"w": "pile", "pos": "n.", "m": "堆；疊"}, {"w": "roll", "pos": "v.", "m": "(使)滾動"}, {"w": "even", "pos": "adj.", "m": "勢均力敵的；相等的"}, {"w": "trip", "pos": "v.", "m": "(使)絆倒"}, {"w": "dishonest", "pos": "adj.", "m": "不誠實的；不老實的"}, {"w": "jam", "pos": "n.", "m": "積聚；堵塞"}, {"w": "interest", "pos": "v.", "m": "使感興趣"}, {"w": "jump", "pos": "v.", "m": "跳；跳躍"}, {"w": "pull", "pos": "v.", "m": "拉；拖"}, {"w": "pause", "pos": "n.", "m": "暫停；中斷"}, {"w": "brave", "pos": "adj.", "m": "勇敢的"}], "reference_words": [{"w": "boom", "pos": "n.", "m": "帆柱；橫桿"}, {"w": "floating", "pos": "adj.", "m": "浮起的；漂浮的"}, {"w": "play", "pos": "n.", "m": "打法"}, {"w": "lumber", "pos": "n.", "m": "木材"}, {"w": "crush", "pos": "v.", "m": "擠壓；壓扁"}, {"w": "crew", "pos": "n.", "m": "(團隊裡的)全體人員"}], "text": ["Jimmy and Dickey were two young river workers. They were famous for one thing: the birling **match**. In this **match**, two men stand on a **floating** log. Each man tries to **roll** the log and knock the other man into the river. On the day of the big log **jam**, the whole work **crew** stood on a big **pile** of **lumber** to watch. People said this would be an **even** match.", "Partway through, Dickey made Jimmy **trip**. It looked like an accident, but it was not. Jimmy later learned that Dickey liked to play **dishonest** tricks like this before. This gave Jimmy new **interest** in a fair rematch one day.", "The next year, there was another river **jam**. Logs began to **crush** together. Dickey got stuck in the middle. Jimmy did not stop to think. He was quick to **jump** onto a log. He gave a hard **pull** and brought Dickey to safety. He did not **pause**, not even for one second. Everyone said Jimmy was very **brave**. Jimmy just smiled. He said he saved Dickey for their next fair match."], "text_zh": ["吉米和迪基是兩個年輕的河邊工人。他們最有名的，就是滾木比賽。在這種比賽裡，兩個人會站在一根漂浮的木頭上，設法把木頭滾動，讓對方掉進河裡。在那次盛大的原木堆積的日子，整個工作團隊都站在一大堆木材上圍觀。大家都說，這兩人是勢均力敵的對手。", "比賽進行到一半，迪基故意讓吉米絆倒。看起來像是意外，但其實不是。吉米後來才知道，迪基以前也常耍這種不老實的把戲。這反而讓吉米更有興趣，想找機會公平地報仇。", "隔年，又發生了一次河上原木堵塞。原木開始互相擠壓，迪基被夾在中間動彈不得。吉米想都沒想，立刻跳上一根原木，把迪基拉到安全的地方。他一秒鐘都沒有猶豫。大家都說吉米真勇敢。吉米只是笑了笑，說他救迪基，是為了下次能有一場公平的比賽。"]}, {"id": 33, "title_en": "The Aged Mother", "title_zh": "年邁的母親", "author": "Japanese literature", "words": [{"w": "alone", "pos": "adv.", "m": "獨自地"}, {"w": "humble", "pos": "adj.", "m": "不起眼的；簡陋的"}, {"w": "base", "pos": "n.", "m": "底部"}, {"w": "order", "pos": "v.", "m": "命令"}, {"w": "painful", "pos": "adj.", "m": "痛苦的"}, {"w": "straight", "pos": "adj.", "m": "筆直的"}, {"w": "path", "pos": "n.", "m": "路徑；小路"}, {"w": "pile", "pos": "n.", "m": "堆"}, {"w": "command", "pos": "v.", "m": "下令"}, {"w": "rope", "pos": "n.", "m": "繩子"}, {"w": "frighten", "pos": "v.", "m": "使害怕；使驚恐"}, {"w": "success", "pos": "n.", "m": "成功"}], "reference_words": [{"w": "aged", "pos": "adj.", "m": "年邁的；上了年紀的"}, {"w": "journey", "pos": "n.", "m": "路途；旅程"}, {"w": "twig", "pos": "n.", "m": "小樹枝；細枝"}, {"w": "ash", "pos": "n.", "m": "灰燼"}, {"w": "saying", "pos": "n.", "m": "諺語"}, {"w": "wisdom", "pos": "n.", "m": "智慧"}], "text": ["A poor farmer lived **alone** with his **aged** mother. They lived in a **humble** little house at the **base** of a tall mountain. A cruel ruler gave a harsh **command**. His **order** said all old people must go up the mountain to die.", "This was **painful** for the farmer, but he did not dare say no. He carried his mother up a winding **path** on their sad **journey**. Along the way, she quietly dropped one small **pile** of twigs after another. She wanted to mark a **straight** trail home, so her son would not get lost without her.", "At the top, the farmer saw what she had done, even so close to death. He was moved deeply. He decided to hide her at home instead. He tied a **rope** around some **ash** to hide his secret. Such news could **frighten** anyone, but the farmer stayed brave. His clever plan was a big **success**. It even made the ruler end the cruel law. After that, old people could live safely with their families again."], "text_zh": ["一位貧窮的農夫獨自和年邁的母親住在一起。他們住在一座高山山腳下一間簡陋的小屋裡。當地一位殘暴的統治者下了一道嚴厲的命令：所有老人都必須被送上山等死。", "這件事讓農夫感到很痛苦，但他不敢違抗命令。他揹著母親走上一條蜿蜒的山路，展開這趟傷心的旅程。一路上，母親悄悄地留下一堆又一堆的小樹枝。她想標出一條筆直的回家路，這樣就算沒有她，兒子也不會迷路。", "到了山頂，農夫看到母親即使快要死了，仍然在為他著想，他深受感動。他決定把母親偷偷藏在家裡。他用一條繩子綁住一些灰燼，來掩飾自己的秘密。這種事被發現，可能會讓任何人害怕，但農夫還是勇敢面對。他這聰明的計畫最後大獲成功，甚至讓統治者廢除了這條殘忍的法令。從此以後，老人們可以安心地和家人住在一起了。"]}, {"id": 34, "title_en": "A Kidnapped Santa Claus", "title_zh": "被綁架的聖誕老人", "author": "L. Frank Baum", "words": [{"w": "castle", "pos": "n.", "m": "城堡"}, {"w": "valley", "pos": "n.", "m": "山谷"}, {"w": "hurt", "pos": "v.", "m": "傷害"}, {"w": "eve", "pos": "n.", "m": "前夕"}, {"w": "quick", "pos": "adj.", "m": "快的"}, {"w": "quiet", "pos": "adj.", "m": "安靜的"}, {"w": "rope", "pos": "n.", "m": "繩子"}, {"w": "tie", "pos": "v.", "m": "綁；捆"}, {"w": "mean", "pos": "adj.", "m": "兇惡的；殘暴的"}, {"w": "chance", "pos": "n.", "m": "機會"}, {"w": "wish", "pos": "v.", "m": "祝福；但願"}, {"w": "fail", "pos": "v.", "m": "失敗"}], "reference_words": [{"w": "cave", "pos": "n.", "m": "洞穴"}, {"w": "sleigh", "pos": "n.", "m": "雪橇"}, {"w": "upset", "pos": "adj.", "m": "煩躁的；難過的"}], "text": ["Santa Claus lived happily in a **castle**, in a cheerful **valley**. Some jealous monsters lived nearby. They wanted to **hurt** him. He made children so happy every year, right up to the **eve** of Christmas.", "One **quick** and **quiet** night, the monsters threw a **rope** around Santa. They used the rope to **tie** him up before his sleigh could leave. The monsters were not really **mean**. They just felt this was their only **chance** to be noticed. So they kept Santa in a mountain **cave**.", "One monster felt bad about it. That monster did not want to keep Santa trapped. Instead, the monster wanted to **wish** Santa well, and set him free. Santa did not get angry. He said thank you and rushed back to his **sleigh**. He did not want to **fail** the children who were waiting for their gifts. After that, the kind monster could always visit Santa's workshop in the valley."], "text_zh": ["聖誕老公公原本快樂地住在一座城堡裡，城堡座落在一個充滿歡笑的山谷中。附近住著一群嫉妒他的怪物，牠們想傷害他，因為聖誕老公公每年都能讓孩子們開心，一直到聖誕夜前夕都是這樣。", "在一個又快又安靜的夜晚，怪物們用一條繩子套住聖誕老公公，把他綁了起來，讓他的雪橇來不及離開。這些怪物其實並不兇惡，牠們只是覺得這是唯一能被注意到的機會，於是把聖誕老公公關在一個山洞裡。", "有一隻怪物覺得很內疚。牠不想繼續把聖誕老公公關起來，反而想祝福他，於是偷偷放他自由。聖誕老公公一點也不生氣，他道謝後就趕緊跑回雪橇上，因為他不想讓等著禮物的孩子們失望。從那之後，這隻善良的怪物永遠都可以去山谷裡的工作坊拜訪聖誕老公公。"]}, {"id": 35, "title_en": "The Snowman", "title_zh": "雪人", "author": "Andersen", "words": [{"w": "snowman", "pos": "n.", "m": "雪人"}, {"w": "sky", "pos": "n.", "m": "天空"}, {"w": "circle", "pos": "n.", "m": "圓形；圓圈"}, {"w": "summer", "pos": "n.", "m": "夏天"}, {"w": "behind", "pos": "prep.", "m": "在……後面"}, {"w": "stove", "pos": "n.", "m": "暖爐；火爐"}, {"w": "through", "pos": "prep.", "m": "穿過；通過"}, {"w": "near", "pos": "prep.", "m": "接近"}, {"w": "weather", "pos": "n.", "m": "天氣"}, {"w": "begin", "pos": "v.", "m": "開始"}, {"w": "poor", "pos": "adj.", "m": "可憐的"}, {"w": "over", "pos": "adj.", "m": "結束了的"}], "reference_words": [{"w": "set", "pos": "v.", "m": "(太陽)落下"}, {"w": "melt", "pos": "v.", "m": "融化"}, {"w": "puddle", "pos": "n.", "m": "水漥"}], "text": ["A little dog and his family made a **snowman**. They set him up proudly under the open **sky**. The snowman looked up and saw two strange, glowing shapes. Each one was shaped like a **circle**. One came out in the day. The other came out at night, and it looked colder and whiter.", "That night, the snowman saw a warm little house **behind** the yard. A cozy **stove** glowed **through** the window. The snowman told the dog, \"I love standing **near** the fence and looking at that warm light.\" The dog said, \"Wait until **summer** comes. It will feel very different.\" The snowman did not understand. He had never seen **summer** before.", "Slowly, the **weather** started to get warmer. Spring was about to **begin**. The **poor** snowman looked at the warm stove every day. He got too close. Each time, he melted a little more. By the time spring was **over**, the snowman was gone. All that was left was a small puddle. The dog felt a little sad. He understood now: the snowman had loved that warm stove so much, he could not stay away — even though it melted him in the end."], "text_zh": ["一隻小狗和牠的家人一起堆了一個雪人，驕傲地把牠立在露天的天空下。雪人抬頭看見兩個奇怪、發光的形狀，每一個都是圓形的。一個白天出現，另一個在夜裡出現，看起來更冷、更白。", "那天晚上，雪人看見院子後面有一間溫暖的小屋，一台舒服的暖爐的光透過窗戶照出來。雪人告訴小狗：「我最喜歡站在籬笆附近，看著那道溫暖的燈光。」小狗說：「等夏天來了，感覺會很不一樣喔。」雪人聽不懂，牠從來沒見過夏天。", "天氣漸漸開始變暖，春天就要來了。這個可憐的雪人每天都盯著那台溫暖的暖爐看，靠得太近。每一次，牠都融化一點點。等春天結束時，雪人已經消失了，只留下一小灘水。小狗有點難過，牠終於明白了：雪人是那麼喜歡那台暖爐，忍不住一直靠近它——即使最後因此融化了也一樣。"]}, {"id": 36, "title_en": "The Last Dream of the Old Oak", "title_zh": "老橡樹的最後一個夢", "author": "Andersen", "words": [{"w": "giant", "pos": "adj.", "m": "巨大的"}, {"w": "shore", "pos": "n.", "m": "海岸；湖岸"}, {"w": "sleep", "pos": "v.", "m": "睡覺"}, {"w": "bright", "pos": "adj.", "m": "明亮的"}, {"w": "count", "pos": "v.", "m": "計算"}, {"w": "repeat", "pos": "v.", "m": "重複"}, {"w": "single", "pos": "adj.", "m": "單一的"}, {"w": "memory", "pos": "n.", "m": "回憶"}, {"w": "rise", "pos": "v.", "m": "上升；升起"}, {"w": "feeling", "pos": "n.", "m": "感覺；感受"}, {"w": "storm", "pos": "n.", "m": "暴風雨"}, {"w": "die", "pos": "v.", "m": "死亡"}], "reference_words": [{"w": "oak", "pos": "n.", "m": "橡樹"}, {"w": "mayfly", "pos": "n.", "m": "蜉蝣"}, {"w": "root", "pos": "n.", "m": "根"}, {"w": "heaven", "pos": "n.", "m": "天堂"}], "text": ["A **giant**, old **oak** tree stood on the **shore** by the sea. It was three hundred sixty-five years old and full of memories. Every summer, one tiny **mayfly** after another danced happily around it. Every winter, the big tree would quietly go to **sleep**.", "One **bright** summer day, the old oak talked to a mayfly. The tree had a sad **feeling**. It felt bad that the mayfly's whole life was just a **single** day. But the little mayfly answered happily. It said, \"I do not **count** time that way. Every moment feels full and wonderful. I never feel sorry about my short, happy life.\"", "That winter, in a peaceful dream, the old oak felt its **root** **rise** up from the ground. It floated higher and higher, like it could finally fly. It gathered every happy **memory** it ever had. But that same night, a terrible **storm** hit the coast for real. The strong wind finally knocked the ancient tree down. But because the tree spent its last night living through all its happy memories, the old oak felt truly at peace, just like the mayfly before, as it passed away.", "That ancient, **giant** oak tree learned to **repeat** its happiest memories every single winter. When it finally began to **die**, it did so peacefully. It felt happy and at peace with the wonderful life it had lived."], "text_zh": ["一棵巨大又古老的橡樹，矗立在海邊的岸上。牠已經三百六十五歲了，充滿了許多回憶。每到夏天，小小的蜉蝣總會開心地在牠身邊飛舞。每到冬天，這棵大樹就會靜靜地進入睡眠。", "一個晴朗的夏日，老橡樹和一隻蜉蝣說話。老橡樹心裡有種難過的感覺，牠替蜉蝣感到惋惜，因為蜉蝣的一生只有短短一天。但這隻小蜉蝣卻開心地回答：「我不是這樣計算時間的。每一刻對我來說都很豐富、很美好。我從不為自己短暫卻快樂的一生感到後悔。」", "那年冬天，在一個平靜的夢裡，老橡樹感覺自己的樹根從地面升起，越飄越高，彷彿終於能夠飛翔。牠把自己擁有過的每一份快樂回憶都收集了起來。就在同一個晚上，一場真正猛烈的暴風雨侵襲了海岸。強風終於把這棵古老的大樹吹倒了。但因為牠在生命的最後一夜，重新活過了所有快樂的回憶，這棵老橡樹就像先前的蜉蝣一樣，在離世時感到了真正的平靜。", "這棵古老又巨大的橡樹，學會了每個冬天都重複回味自己最快樂的回憶。當牠終於開始凋零時，牠走得非常平靜，對自己曾經擁有過的美好一生感到心滿意足。"]}, {"id": 37, "title_en": "All Gold Canyon", "title_zh": "黃金谷", "author": "Jack London", "words": [{"w": "narrow", "pos": "adj.", "m": "狹窄的"}, {"w": "stream", "pos": "n.", "m": "溪流；小河"}, {"w": "pool", "pos": "n.", "m": "水池；水潭"}, {"w": "satisfy", "pos": "v.", "m": "使滿意、滿足"}, {"w": "edge", "pos": "n.", "m": "邊緣"}, {"w": "foot", "pos": "n.", "m": "呎；英尺"}, {"w": "strike", "pos": "v.", "m": "開採到(天然資源)"}, {"w": "yell", "pos": "v.", "m": "吶喊；吼叫"}, {"w": "sense", "pos": "v.", "m": "察覺；感覺到"}, {"w": "instant", "pos": "n.", "m": "瞬間；片刻"}, {"w": "dead", "pos": "adj.", "m": "死亡的；離世的"}, {"w": "wound", "pos": "n.", "m": "傷口"}], "reference_words": [{"w": "canyon", "pos": "n.", "m": "峽谷"}, {"w": "hillside", "pos": "n.", "m": "山坡"}, {"w": "quartz", "pos": "n.", "m": "石英"}, {"w": "dirt", "pos": "n.", "m": "泥土；髒土"}, {"w": "chunk", "pos": "n.", "m": "(黃金、木材等的)大塊、厚片"}, {"w": "sharp", "pos": "adj.", "m": "劇烈的"}, {"w": "grab", "pos": "v.", "m": "抓住"}, {"w": "afterward", "pos": "adv.", "m": "之後；後來"}], "text": ["Bill was a gold miner. He found a **narrow** canyon. It had a small **stream** and a calm **pool**. Bill looked at the ground and felt good. He said, \"Gold must be here.\"", "Bill dug next to the **edge** of the hillside. Each day he moved just one **foot** forward. One day, his shovel hit something hard. He was about to **strike** gold! Bill let out a big **yell**. It echoed through the whole canyon.", "But then Bill got a bad feeling. He could **sense** danger nearby. A greedy man was hiding and watching him. The man wanted to steal his gold. They fought hard. Bill got a small **wound** on his arm, but he won. The bad man fell into a hole and was **dead**. Bill was shaken, but not badly hurt.", "Bill dug one more **foot** near the edge of the pool. In an **instant**, he knew his search was over.", "Nothing could **satisfy** Bill more than holding real gold in his own hands."], "text_zh": ["比爾是個採金人。他發現了一座狹窄的峽谷。峽谷裡有一條小溪和一座平靜的水潭。比爾看著地面，感覺很不錯。他說：「這附近一定有黃金。」", "比爾在山坡邊緣旁邊挖土。他每天只前進一呎。有一天，他的鏟子挖到了硬硬的東西。他就快要挖到黃金了！比爾大聲吼了一聲，聲音在整個峽谷裡迴盪。", "但後來比爾有種不好的感覺。他能感覺到附近有危險。一個貪心的人正躲著偷看他。那個人想偷走他的黃金。他們打了一架。比爾手臂上留下一個小傷口，但他贏了。壞人掉進洞裡，死了。比爾嚇了一跳，但沒有受重傷。", "比爾在水潭邊緣又挖了一呎。就在那一瞬間，他知道自己找黃金的旅程結束了。", "沒有什麼比親手捧著真正的黃金，更能讓比爾感到滿足了。"]}, {"id": 38, "title_en": "Winter Bamboo", "title_zh": "孟宗竹的故事", "author": "Chinese legend", "words": [{"w": "village", "pos": "n.", "m": "村莊；村落"}, {"w": "wish", "pos": "n.", "m": "願望；希望"}, {"w": "cook", "pos": "v.", "m": "烹煮；做菜"}, {"w": "soup", "pos": "n.", "m": "湯"}, {"w": "season", "pos": "n.", "m": "季節"}, {"w": "forest", "pos": "n.", "m": "森林"}, {"w": "trouble", "pos": "v.", "m": "使煩惱；使苦惱"}, {"w": "hard", "pos": "adj.", "m": "堅硬的"}, {"w": "tear", "pos": "n.", "m": "眼淚"}, {"w": "wet", "pos": "adj.", "m": "濕的"}, {"w": "joy", "pos": "n.", "m": "歡樂；喜悅"}, {"w": "continue", "pos": "v.", "m": "持續；繼續"}], "reference_words": [{"w": "bamboo", "pos": "n.", "m": "竹子"}, {"w": "god", "pos": "n.", "m": "神"}], "text": ["Meng Tsung lived in a small **village** with his mother. His biggest **wish** was to see her smile. He liked to help her **cook**. They were poor, so most days they only had one small bowl of **soup**.", "One cold winter **season**, his mother became very sick. Meng Tsung was worried. The **forest** near their house had no bamboo in winter. This made his **trouble** even worse, because his mother wanted bamboo soup more than anything.", "Meng Tsung knelt down on the **hard**, cold ground. He cried, and each **tear** fell onto the dirt. The ground turned **wet** and warm. To his great **joy**, green bamboo shoots popped up out of the snow! He picked them fast and cooked soup for his mother. She got well again. Even today, people **continue** to call this rare winter bamboo \"Meng Tsung bamboo,\" after the boy whose love was so strong."], "text_zh": ["孟宗和媽媽住在一個小村莊裡。他最大的心願，就是希望媽媽能笑一笑。他很喜歡幫媽媽煮飯。他們家很窮，很多時候只能喝一小碗湯。", "有一年寒冷的冬天，媽媽病得很重。孟宗非常擔心。他們家附近的竹林，冬天完全沒有竹筍。這讓他的煩惱變得更嚴重，因為媽媽最想喝的就是竹筍湯。", "孟宗跪在又硬又冷的地面上。他哭了，每一滴眼淚都落在泥土上。地面漸漸變濕、變暖。讓他非常開心的是，翠綠的竹筍居然從雪地裡冒出來了！他趕緊採了竹筍，煮湯給媽媽喝。媽媽的病好了。直到現在，人們依然把這種罕見的冬筍，稱作「孟宗竹」，紀念這個愛媽媽愛得這麼深的男孩。"]}, {"id": 39, "title_en": "The Friday Everything Changed", "title_zh": "星期五，一切都改變了", "author": "Anne Hart", "words": [{"w": "pump", "pos": "n.", "m": "(打水或打氣的)幫浦"}, {"w": "railway", "pos": "n.", "m": "鐵路；鐵道"}, {"w": "mean", "pos": "v.", "m": "意味；意指"}, {"w": "bucket", "pos": "n.", "m": "桶子"}, {"w": "silence", "pos": "n.", "m": "安靜；沉默"}, {"w": "pause", "pos": "n.", "m": "停頓；暫停"}, {"w": "precious", "pos": "adj.", "m": "寶貴的；珍貴的"}, {"w": "softball", "pos": "n.", "m": "壘球"}, {"w": "hit", "pos": "v.", "m": "擊；打"}, {"w": "swing", "pos": "v.", "m": "揮動；揮舞"}, {"w": "leave", "pos": "v.", "m": "離開"}, {"w": "final", "pos": "adj.", "m": "最後的"}], "reference_words": [{"w": "seatmate", "pos": "n.", "m": "鄰坐者"}, {"w": "recess", "pos": "n.", "m": "下課；課間休息"}, {"w": "state", "pos": "v.", "m": "說出；聲明"}], "text": ["At a small country school, there was no running water. Each week, two boys walked to the **railway** station. They used a **pump** to get water. They carried it home in a big **bucket** for everyone to drink. It was a big, important job. No girl ever got to do it.", "One Friday, a girl named Alma raised her hand. She asked the teacher, Miss Ralston, why girls could never carry water too. The whole room went into **silence**. After a long **pause**, Miss Ralston said she would think about it.", "The two boys did not want to lose their **precious** job. They were mean to Alma and the other girls. They would not let the girls play **softball** at recess. But the next Friday, Miss Ralston did something amazing. She walked onto the softball field. She took a big **swing** and **hit** the ball far away. Then she said girls could take a **final** turn carrying water too.", "The two boys did not **mean** to be so unkind. But losing their turn made them act bad for a while. In the end, they learned to **leave** their unfair old ways behind."], "text_zh": ["在一所鄉下小學裡，沒有自來水。每個星期，都會選兩個男生走到火車站，用幫浦打水，再用一個大水桶把水扛回學校給大家喝。這是一份很重要的工作，從來沒有女生做過。", "有一個星期五，一個叫艾瑪的女生舉手，問老師拉爾斯頓小姐，為什麼女生不能也去打水。全班突然安靜下來。過了好長一段停頓，拉爾斯頓小姐說她會想一想。", "那兩個男生不想失去這份珍貴的工作，就對艾瑪和其他女生很壞，不讓她們下課時打壘球。但下一個星期五，拉爾斯頓小姐做了一件讓大家吃驚的事。她走上壘球場，用力一揮，把球打得老遠。接著她宣布，女生也可以輪到最後一次去打水。", "那兩個男生本來不是存心要那麼壞，只是失去打水的機會，讓他們有一陣子表現很差。最後，他們終於學會放下那些不公平的舊習慣。"]}, {"id": 40, "title_en": "One Thousand Dollars", "title_zh": "一千美元", "author": "O. Henry", "words": [{"w": "lawyer", "pos": "n.", "m": "律師"}, {"w": "hospital", "pos": "n.", "m": "醫院"}, {"w": "servant", "pos": "n.", "m": "(尤指舊時的)僕人"}, {"w": "report", "pos": "v.", "m": "回報；報告"}, {"w": "taxi", "pos": "n.", "m": "計程車"}, {"w": "rather", "pos": "adv.", "m": "相當"}, {"w": "surprised", "pos": "adj.", "m": "感到驚訝的"}, {"w": "gentle", "pos": "adj.", "m": "溫柔的；溫和的"}, {"w": "secret", "pos": "adj.", "m": "祕密的；不讓人知道的"}, {"w": "character", "pos": "n.", "m": "品格"}, {"w": "selfish", "pos": "adj.", "m": "自私的"}, {"w": "pocket", "pos": "n.", "m": "口袋"}], "reference_words": [{"w": "carefree", "pos": "adj.", "m": "無憂無慮的"}, {"w": "allowance", "pos": "n.", "m": "零用錢"}, {"w": "will", "pos": "n.", "m": "遺囑"}, {"w": "spending", "pos": "n.", "m": "花費；開銷"}, {"w": "instead", "pos": "adv.", "m": "反而；卻"}, {"w": "reveal", "pos": "v.", "m": "揭露；提示"}, {"w": "wisely", "pos": "adv.", "m": "有智慧地"}, {"w": "whistle", "pos": "v.", "m": "吹口哨"}, {"w": "confess", "pos": "v.", "m": "坦承；承認"}, {"w": "deserve", "pos": "v.", "m": "應得；值得"}], "text": ["Robert Gillian lived an easy, carefree life. His rich uncle gave him money to spend. But everything changed when his uncle died. At the **lawyer**'s office, Gillian learned his uncle left most of his money to a scientist and a **hospital**. Each **servant** in the family got only a ring and ten dollars.", "Gillian got just one thousand dollars. Strangely, he had to **report** back to the lawyer how he spent it. He felt confused and **surprised**. He got in a **taxi** and went to see Miss Hayden, a **gentle** young woman his uncle once helped.", "In a **secret** moment, Gillian gave her all one thousand dollars. He quietly told her how he felt, but she gently said no. Back at the lawyer's office, there was one more **secret**: if Gillian showed good **character** with the money, he would get fifty thousand dollars more. If he was **selfish** and wasted it, the money would go to Miss Hayden instead. Gillian said nothing about giving the money away. He tore up his honest report and put the pieces in his **pocket**. He chose to protect her secret, **rather** than take the reward for himself."], "text_zh": ["羅伯特‧吉利安一直過著輕鬆、無憂無慮的生活，靠有錢的叔叔給他花錢。但叔叔過世後，一切都變了。在律師事務所裡，吉利安得知叔叔把大部分財產，留給了一位科學家和一間醫院。家裡每個僕人，卻只拿到一枚戒指和十美元。", "吉利安自己只拿到一千美元。奇怪的是，他還得向律師回報這筆錢花在哪裡。他覺得又困惑又驚訝。他搭上一輛計程車，去找海登小姐——一位叔叔生前曾照顧過的溫柔女子。", "在一個祕密的時刻，吉利安把整整一千美元都給了她，悄悄說出自己的心意，但她溫柔地拒絕了他。回到律師事務所後，還有一個祕密：如果吉利安花這筆錢時表現出良好的品格，就能再得到五萬美元；但如果他自私地把錢浪費掉，這筆錢就會轉給海登小姐。吉利安隻字不提自己把錢送人的事，把自己那份誠實的報告撕碎，放進口袋裡。他選擇默默保護她的祕密，而不是為自己爭取獎金。"]}, {"id": 41, "title_en": "The Story of Chang'e", "title_zh": "嫦娥奔月", "author": "Chinese legend", "words": [{"w": "young", "pos": "adj.", "m": "年輕的；幼小的"}, {"w": "angry", "pos": "adj.", "m": "生氣的"}, {"w": "pass", "pos": "v.", "m": "(時間)過去；流逝"}, {"w": "become", "pos": "v.", "m": "成為；變成"}, {"w": "happen", "pos": "v.", "m": "發生"}, {"w": "rise", "pos": "v.", "m": "升起；上升"}, {"w": "shoot", "pos": "v.", "m": "射(箭)；射中"}, {"w": "enough", "pos": "pron.", "m": "足夠的"}, {"w": "power", "pos": "n.", "m": "能力；本領"}, {"w": "jump", "pos": "v.", "m": "跳；跳躍"}, {"w": "fall", "pos": "v.", "m": "落下；跌落"}, {"w": "successful", "pos": "adj.", "m": "成功的"}], "reference_words": [{"w": "hunter", "pos": "n.", "m": "獵人"}, {"w": "luckily", "pos": "adv.", "m": "幸運地"}, {"w": "forever", "pos": "adv.", "m": "永遠"}, {"w": "palace", "pos": "n.", "m": "宮殿"}, {"w": "instead", "pos": "adv.", "m": "反而；作為替代"}], "text": ["Ch
