needed to find her **position** in the classroom. \"Is my seat in the **back** or **forward** near the front?\" she asked. \"Walk **backward** two steps, then look **front**,\" said her friend. \"Your desk is on the **left**, in the **middle** row, not the **right** side.\" On the wall was a compass showing **east**, **west**, **south**, and **north**, with an arrow pointing to the top of the map.", "text_zh": "新學期開始了，米亞得找到自己在教室裡的位置。「我的座位在後面，還是在前面靠近講台？」她問。「往後走兩步，然後往前看，」她朋友說。「妳的桌子在左邊，中間那一排，不是右邊。」牆上有一個指南針，標示著東、西、南、北，箭頭指向地圖的上方。"}, {"day": 64, "title_zh": "社區地圖", "text": "At the **top** of the street was a warm **bakery**, a busy **bank**, and a sunny **beach**. Down the street was a cozy **bookstore**, a big **buffet**, and a school **cafeteria**. On the corner stood an old **church**, a handy **convenience store**, and a lively **culture center**. Further on was a tall **department store**, a small **drugstore**, and a busy **factory**.", "text_zh": "街的頂端有一間溫暖的麵包店、一間繁忙的銀行，還有一片陽光普照的海灘。往下走，有一間舒適的書店、一間大型自助餐廳，還有一間學校的餐廳。轉角處立著一座老教堂、一間方便的便利商店，還有一間熱鬧的文化中心。再往前，有一間高聳的百貨公司、一間小藥局，還有一間繁忙的工廠。"}, {"day": 65, "title_zh": "街上的商店", "text": "Mia's family often ate at a **fast food restaurant** near the **fire station**. Down the road was a pretty **flower shop**, a big **hospital**, and a tall **hotel**. On weekends, they visited the **mall** or the **market**. \"Where's the **men’s room**?\" Dad asked, while Mom checked the **women’s room**. Next door was a **movie theater**, a quiet **museum**, a busy **office**, and a green **park**.", "text_zh": "米亞一家人常在消防局附近的一間速食餐廳吃飯。沿路往下，有一間漂亮的花店、一間大醫院，還有一間高聳的飯店。週末，他們會去逛購物中心或市場。「男廁在哪裡？」爸爸問，媽媽則去確認女廁的位置。隔壁是一間電影院、一間安靜的博物館、一間繁忙的辦公室，還有一座綠意盎然的公園。"}, {"day": 66, "title_zh": "更多地方", "text": "Behind the park was a blue swimming **pool**, a **post office**, and a **police station**. \"Is there a **restroom** near this **restaurant**?\" Mia asked. She loved to visit every little **shop**, especially the **stationery store** and the toy **store**. On Saturdays, they went to the **supermarket**, an old **temple**, a grand **theater**, some famous **waterfalls**, and finally the **zoo**.", "text_zh": "公園後面有一座藍色的游泳池、一間郵局，還有一間警察局。「這間餐廳附近有洗手間嗎？」米亞問。她喜歡逛每一間小店，尤其是文具店和玩具店。星期六，他們會去超市、一座古老的寺廟、一座宏偉的劇院、幾座有名的瀑布，最後再去動物園。"}, {"day": 67, "title_zh": "城市與鄉村", "text": "\"Do you like the **city** or the **country**?\" Mia's grandfather asked. \"I like **downtown**, but you like the **farm**,\" she laughed. \"Every **place** has something special — I love our small **town** and its quiet **village**,\" he said. \"This **local** market is nice, but that **international** airport is exciting too!\" Just then, an **airplane** flew overhead, an **ambulance** rushed by, and a boy rode his **bicycle** near a small **boat** on the lake.", "text_zh": "「你喜歡城市還是鄉下？」米亞的爺爺問。「我喜歡市中心，但你喜歡農場，」她笑著說。「每個地方都有特別之處——我喜歡我們的小鎮和它安靜的村莊，」他說。「這個當地市場很不錯，但那座國際機場也很令人興奮！」就在這時，一架飛機從頭頂飛過，一輛救護車呼嘯而過，一個男孩騎著腳踏車經過湖邊的一艘小船。"}, {"day": 68, "title_zh": "各種交通工具", "text": "On the road, Mia saw a yellow school **bus**, a shiny **car**, and even a loud **helicopter** in the sky. A green **jeep** passed a **motorcycle** and a small **scooter**. Out at sea, a big **ship** looked as strong as a **tank**. \"Let's take a **taxi** to the **train**,\" said Dad, waving down a **truck** driver for directions. At the **airlines** counter in the **airport**, they checked their tickets.", "text_zh": "在路上，米亞看到一輛黃色校車、一輛閃亮的汽車，甚至天空中還有一架吵鬧的直升機。一輛綠色吉普車超過了一輛摩托車和一輛小型機車。在海上，一艘大船看起來像坦克一樣堅固。「我們搭計程車去搭火車吧，」爸爸說，一邊招手向一位卡車司機問路。在機場的航空公司櫃台，他們核對了機票。"}, {"day": 69, "title_zh": "從公車站到月台", "text": "They waited at the **bus stop**, then walked to the **parking lot** near the train **station**. At the **train station**, they crossed a **block**, then a tall **bridge**. \"Oh no, a **flat tire**!\" said a driver on the **highway**. Mia's family walked over an **overpass**, careful as **passenger**s should be. They followed a quiet **path** to the **platform**, close to the old **railroad**.", "text_zh": "他們在公車站等車，接著走到火車站附近的停車場。到了火車站，他們穿過一個街區，接著走過一座高聳的橋。「糟了，爆胎了！」高速公路上一位司機說。米亞一家人走過一座天橋，像乘客該有的樣子一樣小心。他們沿著一條安靜的小路走到月台，靠近那條老舊的鐵路。"}, {"day": 70, "title_zh": "交通規則", "text": "Along the **railway**, there was a clean **sidewalk** and a busy **subway** station. \"Watch the **traffic**!\" Dad said, guiding them through the **underpass**. A bicycle's **wheel** spun fast as they watched it **arrive**. \"Don't **cross** here,\" the guard warned. He watched cars **drive** by, birds **fly** above, and a plane **land** nearby. \"Let's **ride** the bus, or maybe **sail** on a boat instead,\" said Mom.", "text_zh": "沿著鐵路，有一條乾淨的人行道和一座繁忙的地鐵站。「小心來車！」爸爸說，帶著他們穿過地下道。一輛腳踏車的輪子快速轉動，他們看著它抵達。「不要在這裡穿越馬路，」警衛提醒。他看著車子開過、鳥兒在上方飛翔，還有一架飛機在附近降落。「我們搭公車吧，或是改搭船好了，」媽媽說。"}, {"day": 71, "title_zh": "量身高體重", "text": "At the clinic, Mia had to **turn** left down the hall. The nurse measured everything. \"Please don't move so **fast**,\" she said, \"or so **slow** either.\" She measured Mia's height in **centimeter**s, and her father's in **foot**. She weighed a toy in **gram**s, checked her pencil in **inch**es, and read her weight in **kilogram**s. She measured the walk home in **kilometer**s, water in **liter**s, the wall in **meter**s, a road in **mile**s, and a bag of rice in **pound**s.", "text_zh": "在診所，米亞得往左轉沿著走廊走。護士測量了每一項數據。「請不要動得太快，」她說，「也不要太慢。」她用公分測量米亞的身高，用英呎測量爸爸的身高。她用公克秤一個玩具，用英吋量她的鉛筆，用公斤讀出她的體重。她用公里測量走回家的距離，用公升測量水量，用公尺測量牆壁，用英哩測量一段路，用磅測量一袋米。"}, {"day": 72, "title_zh": "數學課的形狀", "text": "In math class, they also measured a garden in **yard**s. \"Draw a **circle**,\" said the teacher, marking a **dot** in the middle. \"Now a straight **line**, and a sharp **point**.\" Students drew a **rectangle**, sat in a neat **row**, and studied every **shape**: a **square**, a **triangle**, and the **angle** where two lines meet. \"This shape is **big**, but that hole is very **deep**,\" said one student.", "text_zh": "在數學課，他們還用碼測量了一座花園。「畫一個圓，」老師說，在中間標出一個點。「現在畫一條直線，還有一個尖尖的點。」學生們畫了一個長方形，整齊地坐成一排，研究每一種形狀：正方形、三角形，還有兩條線相交形成的角度。「這個形狀很大，但那個洞很深，」一位學生說。"}, {"day": 73, "title_zh": "遠近大小", "text": "\"That mountain looks **distant**,\" said Mia, needing **extra** time to walk. \"It's too **far** for today.\" The hill was **high**, but the valley below looked **large**. \"This bag feels **light**,\" she said, though the path felt very **little** compared to yesterday's **long** hike. \"The road looks **low** here.\" At its **maximum** height, the trail became **medium** in width, with a **minus** sign marking how far below sea level it once was, then quite **narrow**.", "text_zh": "「那座山看起來好遙遠，」米亞說，覺得需要更多時間才能走到。「今天去太遠了。」那座丘陵很高，但下方的山谷看起來很寬廣。「這個袋子摸起來很輕，」她說，不過這段路比起昨天的長途健行感覺短很多。「這裡的路看起來比較低。」在它的最高處，步道的寬度變得中等，一個負號標示著這裡曾經低於海平面多少，接著變得相當狹窄。"}, {"day": 74, "title_zh": "加加減減", "text": "In math, positive numbers used a **plus** sign. \"This pencil is too **short**,\" said Mia, comparing it to a **small** eraser. \"Draw a **straight** line, not a **tiny** one,\" said the teacher, pointing to a **wide**, **round** table. On it sat a **bottle**, a **cup**, a **dozen** eggs, a tall **glass**, a **loaf** of bread, and a **pack** of pencils.", "text_zh": "在數學裡，正數用加號表示。「這支鉛筆太短了，」米亞說，拿它跟一顆小橡皮擦比較。「畫一條直線，不要畫得太小，」老師說，指著一張又寬又圓的桌子。桌上放著一個瓶子、一個杯子、一打雞蛋、一個高玻璃杯、一條吐司，還有一包鉛筆。"}, {"day": 75, "title_zh": "包裹與重量", "text": "A **package** arrived at the door — inside was a **pair** of shoes and a **piece** of cake. \"What **size** is it?\" Mia asked, checking its **height**. She measured the **distance** to her room and the **weight** of the box. \"Let's **measure** the total **amount**,\" said Dad. Inside was also a red envelope for **Chinese New Year**, a card for **New Year’s Eve**, one for **Double Tenth Day**, and one for the **Dragon-boat Festival**.", "text_zh": "一個包裹送到門口——裡面是一雙鞋子和一塊蛋糕。「這是什麼尺寸？」米亞問，檢查它的高度。她量了到房間的距離，還有箱子的重量。「我們來量一下總重量，」爸爸說。裡面還有一個過農曆新年用的紅包、一張除夕卡片、一張雙十節的卡片，還有一張端午節的卡片。"}, {"day": 76, "title_zh": "節慶月曆", "text": "The calendar was full of festivals: the **Lantern Festival**, the **Moon Festival**, and **Teacher’s Day**. Later in the year came **Christmas**, **Easter**, and spooky **Halloween**. Then came **New Year’s Day**, **Mother’s Day**, **Father’s Day**, **Thanksgiving**, and sweet **Valentine’s Day**. \"Every **culture** has its own special **custom**,\" said the teacher.", "text_zh": "月曆上排滿了節日：元宵節、中秋節，還有教師節。年底則有聖誕節、復活節，還有嚇人的萬聖節。接著是元旦、母親節、父親節、感恩節，還有甜蜜的情人節。「每種文化都有自己特別的習俗，」老師說。"}, {"day": 77, "title_zh": "假期回憶", "text": "\"I love every **festival** and **holiday**,\" said Mia, lighting a red paper **lantern**. \"This summer **vacation** gave me a wonderful **memory**.\" Her family liked to **celebrate** together. At the festival show, they saw a talented **actor** and a graceful **actress**, plus a creative **artist**. Backstage, an **assistant** helped a **baby sitter** watch the little ones, while a **barber** trimmed the show's **boss**'s hair.", "text_zh": "「我喜歡每一個節日和假期，」米亞說，一邊點亮一盞紅色紙燈籠。「這個暑假給了我美好的回憶。」她的家人喜歡一起慶祝。在節慶表演上，他們看到一位有才華的男演員和一位優雅的女演員，還有一位有創意的藝術家。後台，一位助理幫忙保母照顧小朋友，一位理髮師則在幫節目的老闆剪頭髮。"}, {"day": 78, "title_zh": "職業博覽會", "text": "At the career fair, Mia met many workers: a busy **businessman**, a friendly shop **clerk**, and a skilled **cook**. There was also a kind **dentist**, a wise **diplomat**, a helpful **doctor**, a careful **driver**, and a clever **engineer**. She also saw a hard-working **farmer**, a patient **fisherman**, a fun **guide**, a talented **hair dresser**, and a busy **housewife**.", "text_zh": "在職業博覽會上，米亞認識了許多工作者：一位忙碌的商人、一位友善的店員，還有一位技術高超的廚師。還有一位親切的牙醫、一位睿智的外交官、一位樂於助人的醫生、一位小心謹慎的司機，還有一位聰明的工程師。她還看到一位辛勤的農夫、一位有耐心的漁夫、一位風趣的導遊、一位有才華的美髮師，還有一位忙碌的家庭主婦。"}, {"day": 79, "title_zh": "更多職業", "text": "There was also a skilled **hunter**, a curious **journalist**, a fair **judge**, and a smart **lawyer**. A **magician** performed tricks, while the **mailman** delivered letters nearby. A busy **manager** talked with a **mechanic**, and a tall **model** posed for photos. A talented **musician** played music, a caring **nurse** helped a child, a creative **painter** worked on a mural, and a brave **police officer** walked by.", "text_zh": "還有一位技術高超的獵人、一位好奇的記者、一位公正的法官，還有一位聰明的律師。一位魔術師表演戲法，郵差則在附近送信。一位忙碌的經理和一位技師在說話，一位高䠷的模特兒正在拍照擺姿勢。一位有才華的音樂家演奏音樂，一位貼心的護士在照顧小孩，一位有創意的畫家正在畫壁畫，一位勇敢的警察走了過去。"}, {"day": 80, "title_zh": "各行各業", "text": "Even the **president** came to visit, greeted by a kind **priest**. A **reporter** interviewed a **sailor** and a friendly **salesman**. Nearby, a curious **scientist** talked with a busy **secretary**. An old story told of a loyal **servant** and a proud **shopkeeper**. A famous **singer** performed, cheered on by a strong **soldier**, a helpful **waiter**, and a smiling **waitress**.", "text_zh": "就連總統也來訪，一位親切的神父迎接他。一位記者訪問了一位水手和一位友善的業務員。附近，一位好奇的科學家和一位忙碌的秘書聊了起來。一個古老的故事講述了一位忠誠的僕人和一位驕傲的店主。一位知名歌手登台演出，一位強壯的軍人、一位樂於助人的服務生，還有一位微笑的女服務生為他歡呼。"}, {"day": 81, "title_zh": "開公司", "text": "A famous **writer** signed books next to a food **vendor**. \"I want to start a **business**,\" said Mia's uncle, dreaming of his own **company**. \"You'll need to **employ** good workers and **hire** the right team,\" said Dad. Outside, they checked the **weather**: it looked **clear** in the morning, then **cloudy** by noon. \"It feels **cold**, but not too **cool**,\" said Mia. \"At least it's **dry**, not **foggy**.\"", "text_zh": "一位知名作家在一個食物攤販旁簽書。「我想創業，」米亞的叔叔說，夢想著擁有自己的公司。「你會需要雇用優秀的員工，聘請對的團隊，」爸爸說。外面，他們查看了天氣：早上看起來晴朗，到了中午轉陰。「感覺很冷，但沒有到涼爽的程度，」米亞說。「至少是乾燥的，沒有起霧。」"}, {"day": 82, "title_zh": "天氣播報", "text": "The weather report warned of **freezing** mornings and **hot** afternoons — strange but true! It felt **humid** and looked **rainy**, though it might turn **snowy** by night. \"It could get **stormy**,\" said the reporter, \"but this weekend looks **sunny** and **warm**.\" Roads were **wet** and **windy** near the coast, with thick **fog** rolling in and **lightning** flashing before a bright **rainbow** appeared.", "text_zh": "天氣預報警告早晨會結凍、下午會很炎熱——很奇怪但是真的！感覺很潮濕，看起來會下雨，不過到了晚上可能會轉成下雪。「可能會有暴風雨，」氣象主播說，「不過這個週末看起來晴朗溫暖。」海岸附近道路濕滑又多風，濃霧瀰漫，閃電閃過之後出現了一道明亮的彩虹。"}, {"day": 83, "title_zh": "颱風天", "text": "That afternoon, a sudden **shower** turned into heavy **snow** in the mountains. \"This **storm** is loud — listen to that **thunder**!\" said Mia, worried about the coming **typhoon**. The **wind** began to **blow** hard, and cold **rain** started to fall. By morning, the sun began to **shine** again. \"**Nature** can change so fast,\" said Dad. \"This is just part of our **natural** world.\" He checked the fresh **air** outside and talked about how the local **climate** was changing every year.", "text_zh": "那天下午，一場突如其來的陣雨在山區轉成了大雪。「這場暴風雨好吵——聽聽那個雷聲！」米亞說，擔心著即將來臨的颱風。風開始猛烈地吹，冰冷的雨也開始落下。到了早上，太陽又開始露臉。「大自然變化得好快，」爸爸說。「這只是我們自然世界的一部分。」他查看了外面的新鮮空氣，聊到當地的氣候每年是如何變化的。"}, {"day": 84, "title_zh": "露營夜觀星", "text": "That night, everyone looked up at the **cloud**s. \"The **temperature** dropped by ten **degree**s,\" said Dad, checking the sky. They talked about the **earth**, the recent **earthquake** on the news, the bright **moon**, and the wide **sky**. \"Look at the **sun** setting, and see how many **star**s appear,\" said Mom. Their camp was in a quiet **area**, near a river **bank** and a sandy **beach** along the **coast**.", "text_zh": "那天晚上，大家都抬頭看著雲。「氣溫下降了十度，」爸爸一邊看著天空一邊說。他們聊到地球、新聞上最近的地震、明亮的月亮，還有寬廣的天空。「看太陽下山了，看看出現了多少顆星星，」媽媽說。他們的營地在一個安靜的地區，靠近河岸和沿海的一片沙灘。"}, {"day": 85, "title_zh": "地理課本", "text": "In geography class, they learned about a dry **desert**, a green **environment**, and a deep **forest**. \"This map shows a small **hill**, a lonely **island**, and a calm **lake**,\" said the teacher, pointing to a tall **mountain** and a wide **ocean**. Nearby was a flat **plain**, a round **pond**, a clear **pool**, a winding **river**, and finally the open **sea**.", "text_zh": "在地理課，他們學到了乾燥的沙漠、綠意盎然的環境，還有一座深邃的森林。「這張地圖上有一座小山丘、一座孤島，還有一座平靜的湖泊，」老師說，指著一座高山和一片廣闊的海洋。附近有一片平坦的平原、一座圓形的池塘、一泓清澈的水池、一條蜿蜒的河流，最後是遼闊的大海。"}, {"day": 86, "title_zh": "山谷裡的動物", "text": "Deep in a **valley**, a small **spring** fed a quiet **stream**. Beyond the **woods**, many kinds of **animal**s lived: a sleepy **bear**, a lazy **cat**, a noisy **chicken**, a gentle **cow**, a shy **deer**, and even old bones from a **dinosaur**. A friendly **dog** ran past a slow **donkey**.", "text_zh": "在山谷深處，一道小泉水匯成一條安靜的小溪。樹林之外，住著各種動物：一隻愛睡覺的熊、一隻懶洋洋的貓、一隻吵鬧的雞、一頭溫馴的牛、一隻害羞的鹿，甚至還有恐龍留下的古老骨頭。一隻友善的狗跑過一隻慢吞吞的驢子身邊。"}, {"day": 87, "title_zh": "農場巡禮", "text": "On the farm, Mia saw a quacking **duck**, a soaring **eagle**, and a huge **elephant**. A clever **fox** watched a jumping **frog**, while a **goat** and a **goose** ate grass beside a clucking **hen**. A big **hippo** rested near a running **horse**. Nearby, a bouncing **kangaroo** played with a soft **kitten** and a sleepy **koala**.", "text_zh": "在農場裡，米亞看到一隻嘎嘎叫的鴨子、一隻翱翔的老鷹，還有一頭巨大的大象。一隻狡猾的狐狸看著一隻跳來跳去的青蛙，一隻山羊和一隻鵝在一隻咯咯叫的母雞旁邊吃草。一隻大河馬在一匹奔跑的馬旁邊休息。附近，一隻蹦蹦跳跳的袋鼠在跟一隻軟綿綿的小貓和一隻愛睏的無尾熊玩耍。"}, {"day": 88, "title_zh": "動物園裡的驚喜", "text": "At the zoo, a baby **lamb** stayed close to its mother, while a **lion** roared nearby. A playful **monkey** swung on a branch, and a costume shop sold a furry **monster** suit. A tiny **mouse** ran past a big **ox**. A black-and-white **panda** ate bamboo beside a colorful **parrot**. Mia's own **pet** was a **pig**, but she also loved the **pigeon**s, a new **puppy**, and a soft **rabbit**.", "text_zh": "在動物園裡，一隻小羊緊緊跟著媽媽，一隻獅子在附近吼叫。一隻愛玩的猴子在樹枝上盪來盪去，一間服裝店賣著毛茸茸的怪物裝。一隻小老鼠跑過一頭大公牛身邊。一隻黑白相間的貓熊在一隻色彩繽紛的鸚鵡旁邊吃竹子。米亞自己養的寵物是一隻豬，不過她也很喜歡鴿子、一隻新來的小狗，還有一隻軟綿綿的兔子。"}, {"day": 89, "title_zh": "更多動物朋友", "text": "A small **rat** hid near a fluffy **sheep**, and a graceful **swan** floated by. A brave **tiger** watched a proud **turkey**, while a lonely **wolf** howled far from a striped **zebra**. Nearby, a busy **insect** world buzzed with a hard-working **ant**, a flying **bat**, a buzzing **bee**, a singing **bird**, and a tiny **bug**.", "text_zh": "一隻小老鼠躲在一隻毛茸茸的綿羊附近，一隻優雅的天鵝漂浮而過。一隻勇敢的老虎看著一隻驕傲的火雞，一隻孤獨的狼在遠處對著一隻有條紋的斑馬嚎叫。附近，一個忙碌的昆蟲世界嗡嗡作響：一隻勤勞的螞蟻、一隻飛行的蝙蝠、一隻嗡嗡叫的蜜蜂、一隻唱歌的鳥，還有一隻小小的蟲子。"}, {"day": 90, "title_zh": "昆蟲觀察日記", "text": "In the garden, Mia watched a **butterfly** land near a **cockroach**, and imagined a **dragon** flying above. A **mosquito** buzzed by a slow **snail**, while a **snake** hid from a **spider**. A **worm** dug into the soil. At the beach, they saw a sideways **crab**, a playful **dolphin**, a silver **fish**, a fast **shark**, and a small **shrimp**.", "text_zh": "在花園裡，米亞看著一隻蝴蝶停在一隻蟑螂附近，並想像著一條龍在頭頂飛翔。一隻蚊子在一隻緩慢的蝸牛旁邊嗡嗡飛，一條蛇躲著一隻蜘蛛。一隻蟲鑽進了土裡。在海邊，他們看到一隻橫著走的螃蟹、一隻愛玩的海豚、一條銀色的魚、一條快速的鯊魚，還有一隻小蝦。"}, {"day": 91, "title_zh": "海邊的生物", "text": "In the sea, a slow **turtle** swam beside a huge **whale**. On the beach, a dog began to **bark** at a crab that tried to **bite** its tail; the dog had to **swallow** its fear! \"Look at **this** shell and **that** starfish,\" said Mia, holding a tiny **tail** and a broken **wing** she found. \"**These** shells are **my** favorite, but **those** over there look like **our** best finds today.\"", "text_zh": "在海裡，一隻慢吞吞的海龜在一隻巨大的鯨魚旁邊游泳。在沙灘上，一隻狗開始對著一隻想咬牠尾巴的螃蟹吠叫；那隻狗不得不忍住害怕的感覺！「看看這個貝殼和那隻海星，」米亞說，拿著她找到的一條小尾巴和一片破損的翅膀。「這些貝殼是我最喜歡的，不過那邊那些看起來才是我們今天最棒的收穫。」"}, {"day": 92, "title_zh": "沙灘上的對話", "text": "\"Is this **your** bucket?\" Mia asked a boy. \"Yes, and that is **his** shovel, while the red one is **her** towel,\" he said. \"The dog is looking for **its** ball — it must be **their** favorite toy.\" \"**I** love the beach,\" said Mia. \"Come with **me**!\" \"This towel is **my** towel — actually, it's **mine**,\" she laughed, drying **myself** off. \"What about **you**? Is **your** sandcastle finished? Is it **yours**?\"", "text_zh": "「這是你的水桶嗎？」米亞問一個男孩。「對，那是他的鏟子，紅色那條是她的毛巾，」他說。「這隻狗在找牠的球——那一定是牠們最愛的玩具。」「我好喜歡海灘，」米亞說。「跟我一起來吧！」「這條毛巾是我的毛巾——其實，它就是我的，」她笑著說，一邊把自己擦乾。「你呢？你的沙堡完成了嗎？它是你的嗎？」"}, {"day": 93, "title_zh": "沙堡比賽", "text": "\"Did **yourself** and your brother build this together?\" Mom asked. \"**Yourselves** did a great job!\" **He** smiled proudly; **him** and his friend had worked hard, and the castle was **his** own design, built all by **himself**. **She** clapped too — **her** flag on top was **hers**, and she planted it **herself**. \"Look at **it**,\" said Mia. \"**Its** tower is so tall, standing there all by **itself**!\"", "text_zh": "「這個是你自己和你哥哥一起蓋的嗎？」媽媽問。「你們自己做得很棒！」他驕傲地笑了；他和他朋友很努力，這座城堡是他自己設計的，全部都是他獨力完成的。她也拍手——塔頂上她的旗子是她自己的，是她自己插上去的。「看看它，」米亞說。「它的塔好高，就這樣獨自矗立在那裡！」"}, {"day": 94, "title_zh": "全家人一起玩", "text": "\"**We** should build one too!\" said Mia. \"**Us** kids can do it,\" she told **our** parents, who smiled at **ourselves** working together. This sandcastle was **ours** now. Meanwhile, **they** built a smaller castle; **them**, in fact, finished first, and the shovel became **their** shared tool — it was truly **theirs**, and they were proud of **themselves**. \"**All** of you did well,\" said Dad. \"Maybe **another** round tomorrow? Is there **any** sand left?\"", "text_zh": "「我們也應該蓋一座！」米亞說。「我們這些小孩可以做到，」她跟我們的爸媽說，他們看著我們一起合作的樣子笑了。這座沙堡現在是我們的了。同時，他們蓋了一座比較小的城堡；他們其實先完工了，那把鏟子成了他們共用的工具——真的是他們的，他們也對自己感到驕傲。「你們大家都做得很好，」爸爸說。「明天要不要再來一輪？還有剩下的沙子嗎？」"}, {"day": 95, "title_zh": "每個人都來幫忙", "text": "\"**Anyone** want to help?\" Mia called. \"I'll do **anything**!\" said her brother. \"**Both** of you can dig,\" said Dad. \"**Each** person gets a job. **Everyone** should help, and **everything** will get done faster.\" \"**Many** hands make light work,\" Mom added, though **nobody** wanted the messy **part**. \"**Nothing** is too hard if **some** of us try,\" said Mia. \"**Someone** should fetch water — **something** cold to drink would be nice too.\"", "text_zh": "「有誰想幫忙嗎？」米亞喊道。「什麼我都願意做！」她哥哥說。「你們兩個可以去挖沙，」爸爸說。「每個人都有工作要做。大家都應該幫忙，這樣每件事都會完成得更快。」「人多好辦事，」媽媽補充說，不過沒有人想做那個弄得髒兮兮的部分。「只要有些人願意嘗試，沒有什麼事情太難，」米亞說。「該有人去打水了——來點冰涼的飲料也不錯。」"}, {"day": 96, "title_zh": "十萬個為什麼", "text": "Mia's little cousin asked many questions. \"**How** do you build a sandcastle? **What** tools do you need? **Which** bucket is best? **Who** taught you? **Whose** shovel is that? **When** should we start, and **where** should we dig?\" \"I'm not sure **whether** we have time,\" said Mia, \"**while** the tide is coming in. **Why** do you ask so many questions?\" she laughed. \"Tell me **about** the sea, and look **above** the waves and **across** the bay.\"", "text_zh": "米亞的小表弟問了好多問題。「你要怎麼蓋沙堡？需要什麼工具？哪一個水桶最好？是誰教你的？那把鏟子是誰的？我們該什麼時候開始，該在哪裡挖？」「我不確定我們是否有時間，」米亞說，「因為潮水正在漲。你為什麼問這麼多問題？」她笑著說。「跟我說說大海的事，看看浪的上方，還有整個海灣的對岸。」"}, {"day": 97, "title_zh": "海灘地圖", "text": "\"The path goes **after** the rocks, right **against** the cliff, then **along** the shore,\" said the guide, walking **among** the crowd. \"We are **at** the north end **before** the lighthouse, **behind** the dunes, **below** the tall cliff, and **beside** the old pier — right **between** two rocks and **beyond** the last one. Head **by** the flag and go **down** to the water.\"", "text_zh": "「這條路經過那些岩石之後，緊貼著懸崖，接著沿著海岸走，」導遊一邊走在人群中一邊說。「我們在燈塔前方的北端，沙丘後面，高聳懸崖的下方，還有那座老碼頭旁邊——就在兩塊岩石之間，最後一塊的再過去一點。朝旗子的方向走，然後往水邊走下去。」"}, {"day": 98, "title_zh": "尋寶遊戲", "text": "\"**During** the search, look **except** in the deep water,\" said the guide. \"It's **for** everyone, made **from** old maps.\" The treasure was **in** a box, **in back of** the big rock, **in front of** the small cave, **inside** a hole. They had to walk **into** the cave first. \"It looks **like** gold, so search **near** the sand, **of** course under a pile **off** the main path.\"", "text_zh": "「搜尋的時候，除了深水區之外都要找，」導遊說。「這是給每個人的，是根據舊地圖做的。」寶藏在一個箱子裡，在那塊大岩石的後面，那個小山洞的前面，一個洞穴裡面。他們得先走進洞穴才行。「看起來像金子，所以在沙子附近找找，當然是在主要步道旁的一堆東西底下。」"}, {"day": 99, "title_zh": "終於找到寶藏", "text": "\"It's right **on** the sand, just **out of** the water, **outside** the cave, **over** there, **next to** that shell!\" Mia shouted. \"We've searched **since** morning, more **than** an hour, **through** the whole beach, **to** the very end, walking **toward** the cliff, **under** the rocks, **until** now, all the way **up** the hill!\"", "text_zh": "「就在沙灘上，剛好在水外面，山洞外面，就在那裡，那個貝殼旁邊！」米亞喊道。「我們從早上就開始找了，找了超過一個小時，走遍了整片海灘，一直到最盡頭，朝著懸崖走去，穿過岩石下方，直到現在，一路爬上了那座小山！」"}, {"day": 100, "title_zh": "慶祝晚會", "text": "That evening, they celebrated **with** music and danced **without** stopping. \"You **and** your team did great, **because** you never gave up,\" said Dad. \"**Besides**, it was fun! **But** we're tired now.\" \"**However**, **if** we rest, **or** we could keep dancing,\" said Mia, laughing **since** she felt so happy — happier **than** ever. **Therefore**, everyone kept dancing. \"**Though** it's late, let's dance a little more!\"", "text_zh": "那天晚上，他們用音樂慶祝，跳舞跳個不停。「你和你的隊伍表現得很棒，因為你們從沒放棄，」爸爸說。「而且，這真的很好玩！不過我們現在累了。」「不過，如果我們休息一下，或者我們也可以繼續跳，」米亞笑著說，因為她覺得好開心——比以往任何時候都開心。因此，大家繼續跳舞。「雖然已經很晚了，我們再多跳一下下吧！」"}, {"day": 101, "title_zh": "車禍新聞", "text": "On the news, there was a story about an **accident** on the highway. \"What **action** should the government take?\" asked a reporter, describing the rescue **activity**. A new safety **advertisement** gave good **advice** to drivers. \"At my **age**, I understand the **aim** of these rules,\" said an old man. A loud **alarm** went off nearby. In a photo **album**, a young **American** driver showed his **anger** about the traffic. An **army** truck and a bus full of **Asian** tourists had also stopped to help.", "text_zh": "新聞上報導了一則高速公路上發生車禍的新聞。「政府應該採取什麼行動？」一位記者問，一邊描述著救援行動。一則新的安全廣告給了駕駛人很好的建議。「以我這個年紀，我懂這些規定的目的，」一位老先生說。附近響起一陣刺耳的警報聲。在一本相簿裡，一位年輕的美國司機表達了他對交通的憤怒。一輛軍用卡車和一輛載滿亞洲遊客的巴士也停下來幫忙。"}, {"day": 102, "title_zh": "生日派對計畫", "text": "Mia's family planned a birthday party with great **attention** to detail. They bought a big **balloon**, hired a **band**, and set up a **base** for photos. \"What **beauty**!\" said a **beginner** decorator at the **beginning** of the job. They hung a **bell** near the door for the **birthday** guest. On a **blank** card, Mia wrote a sweet note — no need for **blood**, or a **bomb** of glitter, just simple joy from the **bottom** of her heart.", "text_zh": "米亞一家人非常仔細地籌劃了一場生日派對。他們買了一顆大氣球，請了一支樂隊，還搭了一個拍照用的台座。「太美了！」一位剛開始工作的新手佈置人員在工作一開始就這麼說。他們在門邊掛了一個鈴鐺迎接壽星客人。在一張空白卡片上，米亞寫下一段甜蜜的話——不需要流血，也不需要一顆閃亮碎片做成的炸彈，只需要發自內心深處的簡單喜悅。"}, {"day": 103, "title_zh": "生日禮物盒", "text": "Presents arrived in every shape: a wrapped **box**, a small tree **branch** for decoration, and a **bundle** of balloons tied with **cable**. Someone brought a bird in a **cage**, and a **can** of Mia's favorite juice. \"Like a ship's **captain**,\" joked Dad, \"I'll guard this treasure **case**!\" The cake was shaped like a **castle**. \"What's the **cause** of all this fun?\" laughed Grandma, taking a photo with her **cellphone** at the **center** of the room, feeling young again — like a whole **century** had passed since her own party.", "text_zh": "禮物以各種形狀送達：一個包好的盒子、一根用來裝飾的小樹枝，還有一束用繩索綁起來的氣球。有人帶來一隻裝在籠子裡的鳥，還有一罐米亞最愛的果汁。「就像船長一樣，」爸爸開玩笑說，「我來看守這個寶箱！」蛋糕做成城堡的形狀。「這麼多樂趣是怎麼來的？」奶奶笑著說，一邊用手機在房間中央拍照，感覺自己又年輕了起來——好像距離她自己的派對已經過了一整個世紀。"}, {"day": 104, "title_zh": "派對遊戲時間", "text": "\"Who wants a **chance** to play a game?\" asked Mia. They watched cartoons on a **channel**, and everyone dressed as their favorite **character**. Dad drew a **chart** to plan the games, and the room filled with **cheer**. \"This reminds me of my **childhood**,\" said Mom, smiling. Mia had a hard **choice** to make about her party favors. \"Let's start a **club** for board games,\" said her friend, acting like a **coach** giving a **command**. Everyone shared **congratulation**s, and Mom even brought a small party **contract** listing the fun rules, taped to the **corner** of the wall.", "text_zh": "「誰想要有機會玩個遊戲？」米亞問。他們看了一個頻道上的卡通，每個人都打扮成自己最喜歡的角色。爸爸畫了一張表格來安排遊戲，房間裡充滿了歡呼聲。「這讓我想起我的童年，」媽媽微笑著說。米亞在挑選派對小禮物時遇到了一個難題。「我們來成立一個桌遊社吧，」她朋友說，像教練一樣下達指令。大家互相道賀，媽媽甚至帶來一份列著好玩規則的小小派對合約，貼在牆角。"}, {"day": 105, "title_zh": "勇敢面對挑戰", "text": "During the games, Mia needed **courage** to compete in a mini game **court**. \"That's not fair — that's a **crime**!\" someone joked, as a small **crowd** gathered to watch. The path to the finish line had a tricky **curve**, and one runner caused **damage** to a chair — a small **danger** for other players. \"Let's have a quick **debate** about the rules,\" said Dad, and the group made a fair **decision**. Each game had its own **department**, matched to each guest's **desire**. \"What's the **difference** between this game and the last one?\" asked Mia, though she found no real **difficulty** at all.", "text_zh": "遊戲進行時，米亞需要鼓起勇氣在一個迷你賽場上比賽。「這不公平——這根本是犯罪！」有人開玩笑說，一小群人聚過來圍觀。通往終點線的路上有一個棘手的彎道，一位跑者撞壞了一張椅子——對其他玩家來說是個小小的危險。「我們來針對規則快速辯論一下，」爸爸說，大家做出了公平的決定。每個遊戲都有自己的部門，配合每位客人的喜好。「這個遊戲跟上一個有什麼不同？」米亞問，不過她其實完全沒感覺到什麼困難。"}, {"day": 106, "title_zh": "夢想的方向", "text": "\"What **direction** should I take in life?\" Mia asked during a family **discussion**. \"Follow your **dream**,\" said Dad. \"It's your **duty** to try your best, even at the **edge** of failure.\" Grandpa believed strongly in **education** and said success needs **effort**. Mia wrote him an **e-mail** about her **emotion**s, saying fear was like an **enemy** stealing her **energy**. \"Like an old **engine**, you just need one push through the **entrance** to start again,\" he replied.", "text_zh": "「我人生該往哪個方向走？」米亞在一次家庭討論中問道。「跟隨你的夢想，」爸爸說。「盡全力去嘗試是你的責任，就算走到快要失敗的邊緣也一樣。」爺爺非常相信教育的力量，也說成功需要努力。米亞寫了一封電子郵件給他，說到她的情緒，說恐懼就像是偷走她能量的敵人。「就像一台老舊的引擎，你只需要在入口處推它一把，它就能再次啟動，」他回信說。"}, {"day": 107, "title_zh": "誠實面對失敗", "text": "Mia made an **error** on her project. \"The night before the **eve** of the big **event**, I still made mistakes,\" she said, refusing to make an **excuse**. \"There's no easy **exit** from hard work,\" said her teacher. \"This is part of the learning **experience**. It's a **fact**: everyone makes mistakes. It's not your **fault** to feel **fear**.\" There was no extra **fee** for trying again. \"I understand your **feeling**,\" said the teacher, opening a **file** on her desk, warm as **fire**.", "text_zh": "米亞在她的專題上犯了一個錯誤。「在那個重要大日子前夕的前一晚，我還是犯了錯，」她說，拒絕找藉口。「努力工作沒有捷徑可以輕鬆脫身，」她的老師說。「這是學習經驗的一部分。這是事實：每個人都會犯錯。因為害怕而感到不安不是你的錯。」再試一次不需要額外付費。「我理解你的感受，」老師說，一邊打開她桌上的一份檔案，語氣溫暖如火。"}, {"day": 108, "title_zh": "校慶園遊會", "text": "At the school **flag** ceremony before their class **flight** to the science fair, a **foreigner** student brought a beautiful **flower** as a gift. \"**Freedom** and **friendship** bring real **fun**,\" said the principal. Volunteers picked up **garbage** and checked the **gas** heater. A student made a funny **gesture**, and someone told a **ghost** story. Then came a surprise **gift**: reaching this **goal** felt wonderful for the whole class.", "text_zh": "在班級搭機前往科展的升旗典禮上，一位外國學生帶來一朵漂亮的花當作禮物。「自由與友誼帶來真正的樂趣，」校長說。志工們撿垃圾，並檢查瓦斯暖爐。一位學生做了一個好笑的手勢，還有人講了一個鬼故事。接著出現一份驚喜禮物：達成這個目標讓全班感覺棒極了。"}, {"day": 109, "title_zh": "公民課討論", "text": "In civics class, they discussed the **government**, then went outside to sit on the **grass** and **ground** in a **group**. \"A **gun** is dangerous,\" said the teacher, teaching safety **habit**s. A student showed off his new **haircut**. \"This topic makes my **heat** rise!\" joked a classmate. \"**Honesty** matters,\" the teacher said, sweet as **honey**. \"Every **human** needs **humor** to balance the **hunger** for knowledge.\"", "text_zh": "在公民課上，他們討論政府議題，接著到外面一起坐在草地和地面上分組討論。「槍枝是很危險的，」老師說，教導大家安全習慣。一位學生炫耀他的新髮型。「這個話題讓我火氣都上來了！」一位同學開玩笑說。「誠實很重要，」老師說，語氣像蜂蜜一樣甜。「每個人都需要一點幽默感，來平衡對知識的渴望。」"}, {"day": 110, "title_zh": "上網找資料", "text": "For homework, Mia had an **idea**: research online. She learned the **importance** of checking **income** sources and **influence** before trusting **information**. \"I have great **interest** in this,\" she said, searching the **Internet**. She read an **interview**, replied to an **invitation**, and checked every **item** on her list. A **Japanese** friend told a funny **joke**, filling the room with **joy**.", "text_zh": "為了做功課，米亞有了一個點子：上網做研究。她學到在相信資訊之前，要先確認收入來源和影響力的重要性。「我對這個非常有興趣，」她說，一邊搜尋網路。她讀了一篇訪談，回覆了一則邀請，並核對清單上的每一項。一位日本朋友講了一個好笑的笑話，讓整個房間充滿歡笑。"}, {"day": 111, "title_zh": "各國文化報告", "text": "Mia's report covered many topics: what **kind** of **kingdom** existed in history, and how a **Korean** friend described her culture. \"There's a **lack** of information here,\" said the **leader** of her group, turning a **leaf** of notes. \"Let's raise the **level** of detail,\" she said, lifting the **lid** of a folder. She shared a **link** and grabbed papers from her **locker**. Her group sent a **mail**, following good **manner**s, though they still had a **mass** of work to do.", "text_zh": "米亞的報告涵蓋了許多主題：歷史上曾經存在過什麼樣的王國，還有一位韓國朋友如何描述她的文化。「這裡缺少一些資訊，」她小組的組長說，一邊翻動筆記的一頁。「我們把細節的程度提高一點吧，」她說，一邊掀開資料夾的蓋子。她分享了一個連結，也從她的置物櫃裡拿出文件。她的小組寄出了一封郵件，遵守禮節，不過他們還有一大堆工作要做。"}, {"day": 112, "title_zh": "解決問題的方法", "text": "\"What's the **matter**?\" asked the teacher during their **meeting**. Each **member** shared a **message** about a **metal** part in the science kit. \"There's a better **method**,\" said one student, riding the **metro** home to think. \"Keep an open **mind**,\" said the teacher, \"a **mistake** is just a step, like the **motion** of a **movement**.\" Someone joked their notes were now covered in **mud**, like a bird's messy **nest**.", "text_zh": "「怎麼了？」老師在他們的會議中問。每位成員分享了一則關於科學實驗箱裡一個金屬零件的訊息。「有一個更好的方法，」一位學生說，搭著地鐵回家的路上一邊想著。「保持開放的心態，」老師說，「一個錯誤只是一個步驟，就像一個動作中的一次移動。」有人開玩笑說他們的筆記現在沾滿了泥巴，就像鳥兒亂糟糟的巢一樣。"}, {"day": 113, "title_zh": "班級新聞台", "text": "For a class project, Mia wrote **news** for the school **newspaper**. \"Please reduce the **noise**,\" said the teacher, taking a **note**. The plan needed careful **operation** and everyone's **opinion**. \"I'll give the **order**,\" said the class leader, planning a small **party** with a fun **pattern** of games to bring **peace** to a busy **period**. They needed a group **photo** and a **pile** of decorations.", "text_zh": "為了一項班級專題，米亞為校刊寫了一篇新聞稿。「請降低音量，」老師說，一邊做筆記。這個計畫需要細心的執行和每個人的意見。「我來下指令，」班長說，計畫了一個小派對，用有趣的遊戲模式，為忙碌的一段時間帶來一點平靜。他們需要一張團體照和一堆裝飾品。"}, {"day": 114, "title_zh": "科展籌備", "text": "For the science fair, Mia used a **pin** to hold her poster, a **pipe** model of a **planet**, and asked another **player** to help. \"Careful — that's fake **poison**,\" she warned, explaining **pollution** and **population** growth. She used white **powder** for a volcano model, powered by a small battery for **power**. Under the **pressure** of the deadline, she hoped to win a **prize** for her **production**, part of the whole **program**.", "text_zh": "為了科展，米亞用一根大頭針固定她的海報，用一根管子做了一個行星模型，並請另一位隊員幫忙。「小心——那是假的毒藥，」她提醒大家，一邊解釋污染和人口成長的問題。她用白色粉末做了一個火山模型，用一顆小電池提供動力。在截止日期的壓力下，她希望自己的作品能得獎，這是整個計畫的一部分。"}, {"day": 115, "title_zh": "科展成果發表", "text": "Mia's project showed great **progress**. \"This **project** had a clear **purpose**,\" she told the judges, explaining her **reason**s for each **report**. The **result** amazed everyone — a working **robot** made of **rock**s! \"My **role** was to design it,\" she said, tracing its **root**s back to a simple idea. She used a **rope** and a paper **rose** as decoration. \"Follow the **rule**s,\" the judge reminded her, smiling.", "text_zh": "米亞的專題展現了很大的進步。「這個專題有一個很明確的目的，」她告訴評審，解釋每份報告背後的原因。結果讓大家都很驚豔——一個用石頭做成、真的能動的機器人！「我的角色是負責設計，」她說，一路追溯回一個簡單的想法。她用了一條繩子和一朵紙玫瑰做裝飾。「要遵守規則，」評審微笑著提醒她。"}, {"day": 116, "title_zh": "科展安全規則", "text": "\"**Safety** first,\" said the judge, checking the **sale** area near the exhibits. \"This is just a **sample** of what you can build,\" said Mia, near a table of **sand**. Everyone admired the **scene**, filled with painted **scenery** on a big **screen**. \"I'll tell you a **secret**,\" she whispered, offering a **seat** to a judge. In one **section**, she showed a tiny **seed** and explained her **sense** of design in one simple **sentence**.", "text_zh": "「安全第一，」評審一邊說，一邊檢查展覽區附近的銷售區。「這只是你能做出來的東西的一個樣品，」米亞在一張放著沙子的桌子旁說。大家都很欣賞這個場景，大螢幕上佈滿了彩繪的佈景。「我要告訴你一個秘密，」她小聲說，一邊請一位評審入座。在其中一個展區，她展示了一顆小小的種子，並用一句簡單的句子解釋她的設計理念。"}, {"day": 117, "title_zh": "頒獎典禮", "text": "The awards **service** began with a special **set** of trophies. Judges sat along the **shore** of the school pond, on one **side** of the stage. \"What a wonderful **sight**,\" someone whispered in the **silence** before the winners were called. \"Your **skill** deserves this,\" said the judge with a warm **smile**. \"This shows the value of **society**,\" he added, praising Mia's **soul** for hard work. There was enough **space** for one more **speech**, delivered with great **speed**.", "text_zh": "頒獎典禮以一組特別的獎盃開場。評審們沿著學校池塘的岸邊坐在舞台的一側。「多美的景象啊，」有人在得獎者被宣布前的寂靜中低聲說。「你的技術值得這個獎，」評審帶著溫暖的笑容說。「這展現了社會的價值，」他補充道，稱讚米亞為努力付出的靈魂。還有足夠的時間讓她再發表一段演說，而且說得又快又流暢。"}, {"day": 118, "title_zh": "得獎感言", "text": "\"With true **spirit**, in this **state** of excitement,\" Mia began her speech, feeling like rising **steam**. \"Every **step** mattered, from the first **stone** of the idea,\" she said, telling the whole **story**. \"Like a **string** connecting each part, in my own **style**, I explored this **subject** to find **success**.\" Her project even had a moving **swing** as a **symbol**, showing the whole **system** at work.", "text_zh": "「懷著真誠的精神，在這種興奮的狀態下，」米亞開始她的演說，感覺自己像升起的蒸氣一樣。「每一步都很重要，從最初那個點子的第一塊石頭開始，」她說，訴說著整個故事。「就像一條線串起每個部分，用我自己的風格，我探索了這個主題，找到了成功。」她的專題甚至有一個會動的鞦韆當作象徵，展示著整個系統的運作方式。"}, {"day": 119, "title_zh": "才藝表演", "text": "After the ceremony, a **Taiwanese** dance group showed great **talent**. Someone wiped away a happy **tear**. \"This **term** has been amazing,\" said the host. A costumed \"**thief**\" performed a funny **thing** on stage, sharing a clever **thought**. Each guest needed a **ticket**, and staff gave a small **tip** to helpers. The show's **title** was projected on screen, made using a digital **tool**, all about the **topic** of a tall paper **tower**.", "text_zh": "典禮結束後，一個台灣舞蹈團展現了精湛的才藝。有人擦去了一滴開心的眼淚。「這個學期真的很棒，」主持人說。一位打扮成「小偷」的表演者在台上做了一件好笑的事，分享了一個聰明的點子。每位賓客都需要一張票，工作人員也給了幫忙的人一點小費。節目的標題投影在螢幕上，用數位工具製作而成，主題是關於一座高高的紙塔。"}, {"day": 120, "title_zh": "跳蚤市場", "text": "The school held a **trade** fair, a fun **tradition**. \"Don't throw this in the **trash**,\" said a student, protecting her handmade **treasure**. \"Here's a **treat** for you,\" she said, offering candy shaped like a **tree**. Someone tried a card **trick**, though it caused a little **trouble**. \"Tell me the **truth**,\" laughed a friend, peeking through a cardboard **tunnel** shaped like the **universe**. \"This has real **value**,\" said a judge, awarding a small **victory** trophy.", "text_zh": "學校舉辦了一場交換市集，這是一個有趣的傳統。「不要把這個丟進垃圾桶，」一位學生說，保護著她手工做的寶貝。「這是給你的獎品，」她說，遞出一顆做成樹形的糖果。有人試玩了一個紙牌魔術，不過造成了一點小麻煩。「跟我說實話，」一位朋友笑著說，一邊從一個做成宇宙形狀的紙板隧道裡窺看。「這個真的有價值，」評審說，頒發了一座小小的勝利獎盃。"}, {"day": 121, "title_zh": "婚禮的回憶", "text": "That evening, Mia's aunt shared her wedding **voice**mail from long ago — a message about surviving the **war**time and finding her own **way** to a happy **wedding**. \"This **wood** box holds the **word**s from that day,\" she said, cherishing the **memory**. She kept an old fishing **net** as a keepsake, following her grandmother's **principle**: always **feel** grateful, always **hear**, **listen**, and **look** for the good in life.", "text_zh": "那天晚上，米亞的阿姨分享了她很久以前結婚時留下的語音留言——一則關於在戰爭年代倖存下來、並找到屬於自己的方式走向一場幸福婚禮的訊息。「這個木盒裡裝著那天說過的話，」她說，珍惜著這段回憶。她保留了一張舊漁網作為紀念品，遵循著她祖母的原則：永遠心懷感激，永遠傾聽、聆聽，並在生活中尋找美好的一面。"}, {"day": 122, "title_zh": "五感的感受", "text": "\"**See** how the sky changes,\" said Mia, teaching her cousin about the senses. \"**Smell** this flower, listen to the **sound** of the waves, **taste** this fruit, and **watch** the birds fly.\" \"**Check** your work before you **complete** it,\" said the teacher, helping students **end** and **finish** their projects. \"If you **succeed** today, you'll **survive** any challenge tomorrow — it will **affect** your whole future,\" she said. \"**Believe** in yourself.\"", "text_zh": "「看看天空是怎麼變化的，」米亞說，教她的表弟認識五感。「聞聞這朵花，聽聽海浪的聲音，嚐嚐這個水果，看看鳥兒飛翔。」「在完成之前先檢查一下你的作業，」老師說，幫助學生們結束並完成他們的專題。「如果你今天成功了，明天不管什麼挑戰你都能撐過去——這會影響你的整個未來，」她說。「要相信自己。」"}, {"day": 123, "title_zh": "誤會與原諒", "text": "\"Don't **blame** your friend, and don't let small things **bother** you,\" said Mom. \"Never **confuse** kindness with weakness — **consider** how much you've grown.\" It takes time to **develop** patience and **divide** big problems into small ones. \"When you **doubt** yourself, take it with **ease**,\" she said. \"Don't feel **embarrass**ed — just **forgive** and **forget**. Don't let mistakes **frighten** you.\" That evening, the family began to **gather** for dinner.", "text_zh": "「不要責怪你的朋友，也不要讓小事困擾你，」媽媽說。「絕對不要把善良和軟弱搞混——想想你已經成長了多少。」培養耐心需要時間，把大問題拆解成小問題也是。「當你懷疑自己的時候，放輕鬆一點面對，」她說。「不要覺得尷尬——原諒並忘記就好。不要讓錯誤嚇到你。」那天晚上，全家人開始聚在一起吃晚餐。"}, {"day": 124, "title_zh": "晚餐後的心事", "text": "\"I **guess** everyone has hard days,\" said Mia. \"I don't **hate** anyone, but sometimes I **hope** things were easier.\" \"**Imagine** a better tomorrow — let it **inspire** you,\" said Grandpa. \"You **know** I **like**, even **love**, seeing you grow.\" \"I don't **mind** the hard parts,\" said Mia. \"I just **need** support.\" \"I **notice** your effort, and I **realize** how far you've come. Don't **regret** trying,\" he said warmly.", "text_zh": "「我猜每個人都有難熬的日子，」米亞說。「我不恨任何人，但有時候我希望事情能簡單一點。」「想像一個更好的明天——讓它激勵你，」爺爺說。「你知道我喜歡，甚至可以說是愛，看著你成長。」「我不介意那些辛苦的部分，」米亞說。「我只是需要一些支持。」「我注意到你的努力，也體會到你走了多遠。不要後悔曾經嘗試過，」他溫暖地說。"}, {"day": 125, "title_zh": "睡前的心願", "text": "Before bed, Mia liked to **remember** the good parts of her day and **remind** herself to be grateful. \"I want to **surprise** you,\" said Dad. \"I **think** you deserve it.\" \"I don't **want** much,\" she said, \"just to **wish** upon a star and stop feeling like I **worry** too much.\" \"**Bless** you for trying so hard,\" said Mom. The next morning, Mia would **act** fast, **bathe** quickly, **beat** the clock, **blow** dry her hair, and take a small **bow** before heading to school.", "text_zh": "睡前，米亞喜歡回想這一天裡美好的部分，並提醒自己要心存感激。「我想給妳一個驚喜，」爸爸說。「我覺得妳值得擁有。」「我不需要太多，」她說，「只想對著星星許願，不要再覺得自己擔心太多了。」「你這麼努力，值得被祝福，」媽媽說。隔天早上，米亞會動作快一點，很快地洗好澡，搶在時間之前完成，把頭髮吹乾，並在出門上學前小小鞠一個躬。"}, {"day": 126, "title_zh": "打掃房間", "text": "On Saturday, Mia had to **break** from playing to clean her room. She would **bring** a bucket, **brush** the floor, and **carry** the trash bag outside. Her cat liked to **catch** bugs and **chase** her broom. \"Don't **cheat** and skip a corner,\" said Mom. Mia had to **choose** where to start, then **clap** the dust off her hands, **close** the window, and let fresh air **come** in. \"I'll **control** the mess and **collect** every toy,\" she said proudly.", "text_zh": "星期六，米亞得暫停玩耍去打掃房間。她會拿一個水桶，刷洗地板，再把垃圾袋提到外面。她的貓喜歡抓蟲子，還喜歡追著她的掃把跑。「不要偷懶跳過某個角落，」媽媽說。米亞得決定要從哪裡開始，然後拍掉手上的灰塵，關上窗戶，讓新鮮空氣進來。「我會把混亂控制好，把每個玩具都收起來，」她驕傲地說。"}, {"day": 127, "title_zh": "檢查作業", "text": "After cleaning, Mia checked her homework. \"Let me leave a **comment**,\" said her teacher the next day, marking every **correct** answer. \"Did you **copy** this from a friend?\" she asked. \"No, I **count**ed every step myself,\" Mia said, showing her work. \"**Cover** your eyes and try not to **cry** if it's hard,\" the teacher joked kindly. Mia had to **cut** out shapes for a project, **dial** her group leader on the phone, **dig** through her notes to **define** a word, **deliver** her report on time, and try not to **drop** anything. Later, the class would **elect** a new leader.", "text_zh": "打掃完後，米亞檢查了她的作業。「讓我留個評語，」老師隔天說，一邊標記每個正確的答案。「這是你抄朋友的嗎？」她問。「不是，每一個步驟都是我自己算的，」米亞說，展示她的計算過程。「如果太難的話，摀住眼睛，試著不要哭，」老師溫和地開玩笑說。米亞得為一項專題剪出形狀、打電話給她的組長、翻找筆記找出一個字的定義、準時交出她的報告，並盡量不要掉東西。之後，班上要選出一位新班長。"}, {"day": 128, "title_zh": "進入新教室", "text": "As she began to **enter** the new classroom, Mia realized rules **exist** for good reasons. \"Please **feed** the class fish and don't **fight** with classmates,\" said the teacher. \"**Follow** the schedule.\" At lunch, they would **fry** an egg together. \"Let's **go** now,\" said a friend, waiting to **greet** the new student. \"Watch him **grow** confident,\" the teacher smiled, ready to **guide** him. They helped **hang** his coat and **help** him settle in — nobody wanted to **hit** the wrong note on his first day.", "text_zh": "當她開始走進新教室時，米亞意識到規矩的存在都是有原因的。「請餵班上養的魚，不要跟同學打架，」老師說。「照著課表走。」午餐時間，他們會一起煎蛋。「我們現在走吧，」一位朋友說，等著迎接新同學。「看著他變得有自信吧，」老師微笑著說，準備引導他。他們幫忙掛好他的外套，幫助他安頓下來——沒有人希望在他第一天就出差錯。"}, {"day": 129, "title_zh": "體育課趣事", "text": "In gym class, students had to **hold** the rope, **hop** on one foot, and pretend to **hunt** for treasure. \"Don't **hurry**,\" said the coach, watching them **jump** and **kick** the ball. Someone dared to **knock** on the equipment shed, joking that it might **kill** the fun. A player blew a **kiss** to the crowd, making everyone **laugh**. \"**Lay** the mats down first,\" said the coach, before letting them **leave**. A dog nearby tried to **lick** the leftover snacks.", "text_zh": "在體育課上，學生們得握住繩子、單腳跳，並假裝在尋寶。「不要急，」教練說，看著他們跳躍、踢球。有人大膽地敲了敲器材室的門，開玩笑說這樣可能會破壞大家的興致。一位選手向觀眾飛吻，逗得大家哈哈大笑。「先把墊子鋪好，」教練說，然後才讓他們離開。附近一隻狗試著去舔剩下的點心。"}, {"day": 130, "title_zh": "整理置物櫃", "text": "Back in class, Mia had to **lift** a heavy box, **list** her missing items, and **lock** her locker. \"Let's **make** a plan,\" she said, ready to **meet** her study group. \"I don't want to **miss** anything,\" she said, trying not to **mix** up her notes. \"I'll **move** these books,\" she said with a **nod**, deciding to **offer** help. \"**Open** the door, please, and **pack** your bag — then we can **park** our bikes outside.\"", "text_zh": "回到教室，米亞得抬起一個很重的箱子，列出她遺失的物品清單，並鎖上她的置物櫃。「我們來訂個計畫吧，」她說，準備去見她的讀書小組。「我不想漏掉任何東西，」她說，努力不把筆記搞混。「我來搬這些書，」她點頭說，決定主動幫忙。「請開門，把書包收拾好——然後我們就可以把腳踏車停到外面了。」"}, {"day": 131, "title_zh": "美術課手作", "text": "In art class, Mia had to **paste** paper shapes, **pause** to think, and **pick** the right colors. \"Let's **plant** an idea here,\" said the teacher, showing how to **print** a design. \"You can **pull** this string to **produce** a nice effect,\" she said, teaching students to **protect** their work. \"**Push** gently, then **put** it here. Let's **recycle** old paper and **revise** our plans before the glue starts to **rise**.\"", "text_zh": "在美術課上，米亞得把紙做的形狀貼上去、停下來想一想，並挑選合適的顏色。「我們在這裡種下一個點子吧，」老師說，示範如何印出一個圖案。「你可以拉這條線來做出好看的效果，」她說，教學生們保護自己的作品。「輕輕地推，然後放在這裡。我們來回收舊紙張，並在膠水開始變乾之前修改我們的計畫。」"}, {"day": 132, "title_zh": "傳球遊戲", "text": "In PE, they had to **roll** a ball, **rub** their hands for warmth, and **run** across the field — but never **rob** another team of their turn. \"Take a **rest** before we **shake** hands,\" said the coach. \"Ready, **shoot**!\" someone would **shout**, then **shut** the goal tight. \"No one may **smoke** here,\" warned a **sign** on the wall. \"**Stand** still, don't **steal** the ball!\"", "text_zh": "體育課上，他們得滾球、搓手取暖，並跑過整個場地——但絕對不能搶走另一隊的機會。「先休息一下，然後我們來握手，」教練說。「預備，射門！」有人會這樣喊，接著把球門緊緊守住。「這裡禁止吸菸，」牆上的告示牌警告著。「站好，不要搶球！」"}, {"day": 133, "title_zh": "投票選班代", "text": "During class, they would **strike** up a discussion, **take** turns to **tell** their opinions, **throw** out ideas, and **touch** on new topics. \"**Type** your name here to **use** your **vote**,\" said the leader. Afterward, they would **walk** outside, **wave** to friends, **hug** classmates, and **yell** with excitement. Someone had to **mop** the floor before they left.", "text_zh": "上課時，他們會展開討論，輪流說出自己的意見，提出想法，並談到新的話題。「在這裡打上你的名字來投票，」班長說。之後，他們會走到外面，向朋友揮手，擁抱同學，並興奮地大喊。有人得在離開前先拖地。"}, {"day": 134, "title_zh": "接受新提議", "text": "The class had to **accept** a new plan and **add** more activities. \"I **admire** your idea,\" said the teacher, ready to **advise** the group. Everyone had to **agree** and **allow** time for questions. \"I must **apologize** for the delay,\" said the leader, as new problems began to **appear**. \"I **appreciate** your patience,\" she said, though some students began to **argue**. \"Let's **arrange** a better schedule — don't **assume** it will be easy, and don't let a small issue **attack** our teamwork.\"", "text_zh": "班上得接受一項新計畫，並增加更多活動。「我很佩服你的想法，」老師說，準備給這個小組一些建議。每個人都得同意，並留時間讓大家提問。「延誤的部分我必須道歉，」班長說，這時新的問題開始浮現。「我很感激大家的耐心，」她說，不過有些學生開始爭論起來。「我們來安排一個更好的時間表——不要假設事情會很簡單，也不要讓一個小問題破壞我們的團隊合作。」"}, {"day": 135, "title_zh": "面對困難", "text": "\"We must **avoid** more delays,\" said the leader, hoping the plan would **become** simple. \"Let's **begin** again.\" This project seemed to **belong** to the whole class. They planned to **broadcast** the results, hoping applause would **burst** out. \"I'll **call** a short meeting,\" she said, trying to stay **calm**. \"Let's **cancel** the extra task — I **care** about finishing on time.\" \"Are you **certain**?\" a friend asked. \"Let's **check** the schedule and **compare** it with last year's.\"", "text_zh": "「我們一定要避免更多延誤，」班長說，希望這個計畫能變得簡單一點。「我們重新開始吧。」這個專題感覺屬於全班。他們計畫要轉播結果，希望能引來一陣掌聲。「我來召集一個簡短的會議，」她說，努力保持冷靜。「我們取消那項額外的任務吧——我在乎能不能準時完成。」「你確定嗎？」一位朋友問。「我們來查一下時間表，跟去年的比較一下。」"}, {"day": 136, "title_zh": "解決班級問題", "text": "\"Don't **complain**,\" said the teacher, showing **concern** for the class. \"Let's **continue** and **create** a better plan.\" They picked a **date** for the event and learned to **deal** with problems together. \"We must **decide** soon,\" she said, hoping stress would **decrease**. \"You can **depend** on your team,\" she said, ready to **describe** the plan and **detect** any issues before they could **die** out. \"I'll **direct** the next meeting.\"", "text_zh": "「不要抱怨，」老師說，展現出對班上的關心。「我們繼續下去，訂出一個更好的計畫。」他們選定了活動的日期，也一起學會如何處理問題。「我們必須盡快做決定，」她說，希望壓力能減少一些。「你可以依靠你的團隊，」她說，準備描述這個計畫，並在問題消失之前先察覺出來。「我來主持下一次會議。」"}, {"day": 137, "title_zh": "找出問題根源", "text": "Slowly, the confusion began to **disappear**. \"Let's **discover** the real problem and **discuss** it,\" said the teacher. They would **download** the notes and **emphasize** the deadline. \"I **enjoy** this challenge,\" said one student, though another admitted she used to **envy** her classmate's easy grades. \"This should **excite** you, not scare you,\" the teacher said. \"I **expect** great things. Let me **explain** and **express** my full plan, even if some ideas **fall** through — we'll **fill** the gaps together.\"", "text_zh": "漸漸地，那些困惑開始消失。「我們來找出真正的問題並討論它，」老師說。他們會下載筆記，並強調截止日期的重要性。「我很享受這個挑戰，」一位學生說，不過另一位學生坦承她曾經嫉妒同學輕鬆拿到的好成績。「這應該讓你感到興奮，而不是害怕，」老師說。「我對你們期待很高。讓我來解釋並表達我完整的計畫，就算有些想法行不通——我們會一起把空缺補起來。」"}, {"day": 138, "title_zh": "尋找解決方法", "text": "\"Let's **find** a better way,\" said Mia. \"Does this plan **fit** everyone?\" They needed to **focus** and **form** small groups. \"**Get** your notebooks and **give** your best effort,\" said the teacher, ready to **handle** any problem that might **happen**. \"Don't **hide** your worries — that will only **hurt** the team,\" she said. \"Let's **improve** our plan and **include** everyone's ideas. Please don't **ignore** anyone's opinion.\"", "text_zh": "「我們來找一個更好的方法吧，」米亞說。「這個計畫適合每一個人嗎？」他們需要專心，並分成幾個小組。「拿出你們的筆記本，全力以赴，」老師說，準備好處理任何可能發生的問題。「不要隱藏你的擔憂——那只會傷害整個團隊，」她說。「我們來改善我們的計畫，把每個人的想法都納入。請不要忽視任何人的意見。」"}, {"day": 139, "title_zh": "老師的叮嚀", "text": "\"Effort will **increase** your chances,\" said the teacher. \"I must **insist** you don't **interrupt** each other.\" She began to **introduce** a new idea, one she wanted to **invent** herself, and would **invite** everyone to try: \"Let's **join** hands and let a fair **judge** decide who will **keep** the schedule and **lead** the group. **Let** everyone speak — don't **lie** about your progress, and don't **limit** your effort.\"", "text_zh": "「努力會增加你成功的機會，」老師說。「我必須堅持你們不能互相打斷。」她開始介紹一個新的想法，是她自己想發明的，並邀請大家一起嘗試：「我們攜手合作，讓一位公正的裁判來決定誰負責掌握進度、帶領小組。讓每個人都有機會發言——不要對自己的進度說謊，也不要限制自己的努力。」"}, {"day": 140, "title_zh": "誠實面對成績", "text": "\"Let's **list** every task and **match** each student to a job,\" said the teacher. \"What does this grade **mean**?\" a student asked. \"I **notice** your hard work,\" the teacher replied. \"Always **obey** the rules, and don't **omit** any steps — **own** your mistakes.\" \"I'll **plan** better next time and never **pollute** our teamwork with excuses,\" said Mia. \"I **praise** your honesty,\" said the teacher. \"I **pray** you'll keep this spirit — **prepare** well, and I **promise** to help you.\"", "text_zh": "「我們把每一項任務列出來，把每位學生分配到一項工作，」老師說。「這個成績代表什麼意思？」一位學生問。「我注意到你的努力了，」老師回答。「永遠要遵守規則，不要漏掉任何一個步驟——為自己的錯誤負責。」「下次我會計畫得更好，絕不會用藉口污染我們的團隊合作，」米亞說。「我很讚賞你的誠實，」老師說。「我祈禱你能保持這種精神——做好準備，我保證會幫助你。」"}, {"day": 141, "title_zh": "解決紛爭", "text": "The teacher offered to **provide** extra help, but told students not to **quit** early. \"**Raise** your hand if you **reach** a problem you can't solve,\" she said. When they **receive** feedback, they shouldn't **refuse** it or **reject** good advice. \"You don't need to **rent** extra books — just **respect** the schedule and **return** materials on time. Don't **ruin** your effort now,\" she said, hoping to **solve** every issue and fully **satisfy** everyone.", "text_zh": "老師主動提供額外的幫助，但告訴學生們不要太早放棄。「如果遇到解決不了的問題，就舉手，」她說。當他們收到回饋意見時，不應該拒絕，也不應該排斥好的建議。「你不需要額外租借書本——只要遵守時程表，準時歸還教材就好。現在不要毀掉你的努力，」她說，希望能解決每一個問題，讓大家都完全滿意。"}, {"day": 142, "title_zh": "整理作品集", "text": "\"Let's **save** our best work,\" said the teacher, helping students **search** their folders. \"It might **seem** hard now, but **select** your top three pieces.\" Some had to **sell** old projects at the fair, or **send** samples to be judged. \"I'm happy to **serve** as a helper and **share** my notes,\" said Mia, ready to **show** her folder. \"Don't **sleep** on this — **start** early, **stay** focused, and don't **stop** until it's done.\"", "text_zh": "「我們把最好的作品保存下來吧，」老師說，幫學生們翻找他們的資料夾。「現在可能覺得很難，但選出你最好的三件作品。」有些人得在園遊會上賣掉舊的作品，或是送樣品去給人評分。「我很樂意當個幫手，分享我的筆記，」米亞說，準備展示她的資料夾。「不要拖到最後——早點開始，保持專注，不做完不罷休。」"}, {"day": 143, "title_zh": "感謝與信任", "text": "\"I **suggest** we thank our teacher,\" said Mia. \"Let's **support** her and **thank** her for everything.\" \"I **treat** her like family, and I **trust** her advice,\" said a classmate. \"I'll **try** my best, **upload** our project photos, and **visit** her office to say thanks.\" \"Let's not **wait** too long — **wake** up early tomorrow. Don't **waste** this chance,\" she said. \"We **welcome** every bit of help — we are **able** to do this together.\"", "text_zh": "「我建議我們謝謝老師，」米亞說。「我們來支持她，感謝她所做的一切。」「我把她當家人一樣看待，也信任她的建議，」一位同學說。「我會盡全力，上傳我們專題的照片，並到她的辦公室當面道謝。」「我們別等太久了——明天早點起床。不要浪費這個機會，」她說。「我們歡迎任何一點幫助——我們有能力一起完成這件事。」"}, {"day": 144, "title_zh": "缺席的同學", "text": "One student was **absent** that day. \"I'm **afraid** he's sick,\" said the teacher. \"He and his brother look **alike**,\" said Mia, \"but thankfully both are **alive** and well.\" The class studied **ancient** history, though a few students looked **asleep**. \"Extra notes are **available** for him,\" said the teacher, keeping the lesson **basic** but clear. Outside, the sky was **bright**, the road was **broad**, and the topic was almost **classical** — full of **colorful**, **common** stories from the past.", "text_zh": "那天有一位同學缺席。「恐怕他生病了，」老師說。「他和他哥哥長得很像，」米亞說，「不過還好兩個人都健健康康活著。」班上學習古代歷史，不過有幾個學生看起來快睡著了。「我會幫他準備額外的筆記，」老師說，把這堂課講得簡單但清楚。外面，天空很晴朗，道路很寬廣，這個主題幾乎算是經典——充滿了色彩豐富、常見的過去的故事。"}, {"day": 145, "title_zh": "打掃教室", "text": "The classroom project felt **complete**. \"This new shelf is very **convenient**,\" said Mia. \"Is my answer **correct**?\" she asked, in a room that felt a little **crowded**. \"That old wire looks **dangerous**,\" warned the teacher, noticing the corner was too **dark**. Luckily, no plant was fully **dead** yet. \"That vase is very **dear** to me,\" said the teacher. \"Each classroom feels **different**, some more **difficult** to keep clean, some just **dirty**.\" Mia worked with **double** the effort to make it **easy** for everyone.", "text_zh": "教室的整理專案感覺完成了。「這個新架子真的很方便，」米亞說。「我的答案對嗎？」她問，教室裡感覺有點擁擠。「那條舊電線看起來很危險，」老師警告，注意到那個角落太暗了。幸好，還沒有一株植物完全枯死。「那個花瓶對我來說非常珍貴，」老師說。「每間教室感覺都不一樣，有些比較難保持乾淨，有些就只是髒亂。」米亞加倍努力，讓每個人都能輕鬆一點。"}, {"day": 146, "title_zh": "更新教室設備", "text": "The school installed a new **electric** fan. \"There's **enough** space now, and it feels more **equal** for everyone,\" said the teacher. \"This new light is **excellent**, even **fantastic**!\" said Mia. \"It's only **fair** that we all help decorate.\" The room looked **fashionable** with new curtains — Mia's **favorite** color. A **foreign** student suggested a more **formal** display. \"Our **former** classroom was too plain,\" said a classmate. \"Now it feels **free** and **fresh**.\"", "text_zh": "學校裝了一台新的電風扇。「現在空間夠了，感覺對大家也比較公平，」老師說。「這盞新燈好棒，甚至可以說很棒！」米亞說。「我們大家一起幫忙佈置也是應該的。」新窗簾讓教室看起來很時髦——正是米亞最喜歡的顏色。一位外國學生建議做一個更正式一點的展示。「我們以前的教室太單調了，」一位同學說。「現在感覺自由又清新。」"}, {"day": 147, "title_zh": "溫馨的教室", "text": "\"I'm so **glad** we finished,\" said Mia, though it was **hard** work. \"You were so **helpful**,\" said the teacher. A new student who felt **homesick** smiled at the change. \"That old chair looked **horrible** before,\" said Mia. \"It's **important** to make school feel like home.\" \"It's not **impossible**,\" said the teacher, praising their **independent** work. \"This was **instant** teamwork, truly **interesting** to watch.\" She loved their **latest** idea, even if it got a little **loud**. \"We're so **lucky** to have you all.\"", "text_zh": "「我好高興我們終於完成了，」米亞說，儘管過程很辛苦。「你幫了好大的忙，」老師說。一位想家的新同學看著這個改變露出了微笑。「那張舊椅子以前看起來好可怕，」米亞說。「讓學校感覺像家一樣很重要。」「這不是不可能的，」老師說，稱讚他們獨立完成的作品。「這真是一次即時的團隊合作，看著真的很有趣。」她很喜歡他們最新的點子，就算過程有點吵。「我們何其幸運能擁有你們大家。」"}, {"day": 148, "title_zh": "教室裡的驚喜", "text": "A student did a **magic** trick as a surprise. \"That was a **major** part of today's fun — truly **marvelous**!\" said the teacher, though a **minor** mistake made everyone laugh. \"This feels so **modern**,\" said Mia, admiring the new posters, almost like a **national** treasure. \"It's **necessary** to celebrate small wins,\" said the teacher, avoiding any **negative** mood, even if the room got a little **noisy**. \"This isn't an **ordinary** day,\" she smiled, feeling like they'd traveled **overseas**. The room felt **peaceful** and nearly **perfect**.", "text_zh": "一位學生表演了一個魔術當作驚喜。「這真是今天樂趣的重要部分——真的很奇妙！」老師說，不過一個小小的失誤也讓大家笑了。「這感覺好現代，」米亞說，讚嘆著新海報，幾乎像是國寶一樣。「慶祝這些小小的勝利是必要的，」老師說，避免任何負面情緒，就算教室有點吵鬧也沒關係。「今天不是普通的一天，」她微笑著說，感覺就像出國旅行一樣。教室裡的氣氛平靜，幾乎完美。"}, {"day": 149, "title_zh": "個人心得分享", "text": "\"This was a **personal** favorite project,\" said Mia, and it became very **popular** with her classmates. \"I feel **positive** about our teamwork,\" she said. \"Anything is **possible** when we work together.\" The memory was **precious** to her. \"This **present** moment matters most,\" said the teacher, though some students wanted a **private** corner to think, away from **public** noise. \"Let's stay **quiet** for a moment,\" she said. Such teamwork was **rare**. \"Are you **ready**?\" she asked. \"This is **real** progress, and I hope it becomes **regular**.\"", "text_zh": "「這是我個人最喜歡的專題，」米亞說，這個專題也在同學間變得非常受歡迎。「我對我們的團隊合作感到很正向，」她說。「只要我們一起合作，任何事都有可能。」這段回憶對她來說十分珍貴。「當下這一刻最重要，」老師說，不過有些學生想要一個私人的小角落來思考，遠離公開的喧鬧。「我們安靜一會兒吧，」她說。這樣的團隊合作真的很難得。「你準備好了嗎？」她問。「這是真正的進步，我希望它能變成常態。」"}, {"day": 150, "title_zh": "負責任的態度", "text": "\"Being **responsible** feels **right**,\" said Mia. \"I feel **safe** here, like we're all the **same** team.\" \"I was **scared** at first,\" she admitted, especially with a **secondary** worry about grades. \"This is a **serious** goal, so stay **sharp**,\" said the teacher. The class grew **silent**, each idea **similar** but **single** in its own way. \"You've all become so **skillful**,\" she said, though a few looked **sleepy** by the end of the day.", "text_zh": "「負責任的感覺是對的，」米亞說。「我在這裡感覺很安全，就好像我們都是同一隊的。」「一開始我很害怕，」她坦承，尤其還有一個關於成績的次要煩惱。「這是一個很重要的目標，所以要保持警覺，」老師說。全班安靜了下來，每個想法都很相似，卻又各自獨一無二。「你們都變得好熟練，」她說，儘管到了這天結束時有幾個人看起來昏昏欲睡。"}, {"day": 151, "title_zh": "說再見的時刻", "text": "\"I'm **sorry** the term is ending,\" said the teacher. \"This was a **special** year — sometimes **strange**, with **sudden** surprises.\" \"You were a **super** class,\" she said, looking **surprised** by how much they'd grown. \"It wasn't always easy — some days felt **terrible**, but most were **terrific**.\" The class photo book was **thick** now, and the classroom stayed **tidy** because of their **traditional** end-of-year cleaning. \"You made this classroom **unique** and **useful** for the next class.\"", "text_zh": "「很遺憾這學期要結束了，」老師說。「這是特別的一年——有時候很奇特，還帶著突如其來的驚喜。」「你們是超棒的一班，」她說，看著他們成長了這麼多，感到很驚訝。「並不是每件事都很容易——有些日子很糟糕，但大多數日子都很棒。」班級相簿現在已經很厚了，教室也因為他們傳統的期末大掃除而保持整潔。「是你們讓這間教室變得獨一無二，也對下一屆很有用。」"}, {"day": 152, "title_zh": "最後的叮嚀", "text": "\"Your hard work was truly **valuable**,\" said the teacher, praising their **social** teamwork, never **wild** or careless. \"This was a **wonderful** year, without one **wrong** step.\" \"I will **always** remember this,\" said Mia. \"I will **ever** forget it? **Never**!\" \"We **often** laughed together, though we **seldom** argued.\" \"**Sometimes** it was hard, but we **usually** found a way,\" said the teacher. \"**Actually**, this was the best class I've ever had.\"", "text_zh": "「你們的努力真的非常寶貴，」老師說，稱讚他們的團隊合作，從不魯莽也不隨便。「這是很棒的一年，沒有走錯一步。」「我會永遠記得這一切，」米亞說。「我會忘記嗎？絕對不會！」「我們常常一起大笑，卻很少吵架。」「有時候很辛苦，但我們通常都能找到辦法，」老師說。「其實，這是我教過最棒的一班。」"}, {"day": 153, "title_zh": "畢業前的叮囑", "text": "\"Let's meet **again** next year, even after everyone moves **away**,\" said Mia. \"I **almost** cried today, **especially** at the end.\" \"**Even** small memories matter,\" said the teacher. \"**Finally**, I want to say thank you.\" \"I could **hardly** believe how fast this year went, with **least** worry about the future.\" \"I **really** loved this class,\" said Mia. \"**So** did I. Let's **still** stay in touch, **then** meet again — we grew **together**.\"", "text_zh": "「就算大家以後各自搬走，我們明年還是要再見面，」米亞說。「我今天差點哭出來，尤其是到最後的時候。」「就連小小的回憶也很重要，」老師說。「最後，我想說聲謝謝。」「我幾乎不敢相信這一年過得這麼快，對未來的擔心也降到最低。」「我真的很愛這個班級，」米亞說。「我也是。我們要保持聯絡，以後再見面——我們是一起成長的。」"}, {"day": 154, "title_zh": "畢業快樂", "text": "\"We've met **twice** this week already, but I'm **very** happy it's not over **yet**,\" said Mia, cheering **aloud**. \"Even if you move **abroad**, keep looking **ahead**,\" said the teacher. \"I'll think of you **everywhere**, **anywhere**, and **somewhere** in my heart, **either** in Taiwan **nor** far away — you will always be my class.\"", "text_zh": "「這星期我們已經見過兩次面了，不過我還是很高興這一切還沒結束，」米亞說，大聲歡呼。「就算你搬到國外，也要繼續往前看，」老師說。「我會在每個地方、任何地方、心裡的某個角落想著你，不管是在台灣還是在遙遠的地方——你永遠是我的班級。」"}];
const STORYBOOK = [{"id": 1, "title_en": "The Garden of Paradise", "title_zh": "天國花園", "author": "Hans Christian Andersen（安徒生）", "words": [{"w": "garden", "pos": "n.", "m": "花園"}, {"w": "prince", "pos": "n.", "m": "王子"}, {"w": "rain", "pos": "v.", "m": "下雨"}, {"w": "wind", "pos": "n.", "m": "風"}, {"w": "beautiful", "pos": "adj.", "m": "美麗的；漂亮的"}, {"w": "stay", "pos": "v.", "m": "留下；停留"}, {"w": "kiss", "pos": "v.", "m": "親吻"}, {"w": "fail", "pos": "v.", "m": "失敗"}, {"w": "rule", "pos": "n.", "m": "規則"}, {"w": "become", "pos": "v.", "m": "變成；變得"}, {"w": "dark", "pos": "adj.", "m": "黑暗的"}, {"w": "dream", "pos": "n.", "m": "夢"}], "reference_words": [{"w": "paradise", "pos": "n.", "m": "天堂；樂園"}, {"w": "cave", "pos": "n.", "m": "洞穴"}, {"w": "amazed", "pos": "adj.", "m": "感到驚訝的"}, {"w": "forever", "pos": "adv.", "m": "永遠"}, {"w": "fairy", "pos": "n.", "m": "仙女"}, {"w": "cheek", "pos": "n.", "m": "臉頰"}, {"w": "thunder", "pos": "n.", "m": "雷聲"}], "text": ["A young **prince** often had the same **dream**: a magical **garden** where every flower stayed **beautiful** forever and never died. One stormy night, with **rain** pouring down and the **wind** howling outside his window, he wished harder than ever to find that garden for real.", "In the dream, a gentle **wind** carried him over oceans and mountains until he landed at a golden gate. A kind fairy opened it and said the prince could **stay** in the garden as long as he liked — she only had one **rule**: he must never give her a **kiss**.", "Day after day felt like paradise, and the prince slowly forgot how important that one rule was. One evening he could not help himself and broke it. The sky turned **dark**, the beautiful garden began to sink into the sea, and his dream started to **become** a nightmare. When he woke up in his own dark room, he understood — he had **failed** the only test he was ever given, and paradise was gone."], "text_zh": ["一位年輕的**王子**常常做著同一個夢：一座神奇的**花園**，裡面的花朵永遠**美麗**、永不凋謝。一個暴風雨的夜晚，**雨**下得又大，**風**在窗外呼嘯，他比以往任何時候都更渴望能真的找到那座花園。", "在夢裡，一陣溫柔的**風**把他吹過海洋和高山，最後降落在一扇金色大門前。一位善良的仙子打開門，說王子可以想**待**多久就**待**多久——但她只有一個**規則**：絕對不可以親吻她。", "一天又一天，這裡簡直就是天堂，王子也漸漸忘了那條規則有多重要。某個傍晚，他終於忍不住，破壞了約定。天空瞬間變得**黑暗**，美麗的花園開始沉入海底，他的夢**變成**了一場惡夢。當他醒來，發現自己回到了自己那間陰暗的房間——他終於明白，自己**沒能通過**唯一的考驗，天堂就這樣消失了。"]}, {"id": 2, "title_en": "The Selfish Giant", "title_zh": "自私的巨人", "author": "Oscar Wilde（王爾德）", "words": [{"w": "selfish", "pos": "adj.", "m": "自私的"}, {"w": "giant", "pos": "n.", "m": "巨人"}, {"w": "peach", "pos": "n.", "m": "桃子"}, {"w": "yell", "pos": "v.", "m": "叫喊；吼叫"}, {"w": "confuse", "pos": "v.", "m": "使困惑"}, {"w": "sweet", "pos": "adj.", "m": "甜美的"}, {"w": "reason", "pos": "n.", "m": "理由；原因"}, {"w": "climb", "pos": "v.", "m": "爬；攀登"}, {"w": "realize", "pos": "v.", "m": "了解；意識到"}, {"w": "consider", "pos": "v.", "m": "考慮"}, {"w": "friendly", "pos": "adj.", "m": "親切的；友善的"}, {"w": "spot", "pos": "v.", "m": "看見；瞥見"}], "reference_words": [{"w": "soft", "pos": "adj.", "m": "柔軟的"}], "text": ["A **selfish** **giant** owned a beautiful garden with tall **peach** trees, where children loved to play after school. One day the giant came home and found them there. \"Get out!\" he **yelled**, and built a high wall so no child could enter again.", "After that, winter never left the giant's garden, even when spring came to the rest of the town. The giant was **confused** — he could not understand the **reason** why no flowers grew and no birds sang. He would sit alone, missing the **sweet** smell of blossoms.", "One morning he saw a small boy trying to **climb** a tree that was still frozen with snow. The giant lifted him up gently, and at that moment he finally **realized** his selfishness was the reason for the endless winter. He knocked down the wall, and from then on he was a **friendly** giant who let every child play in every **spot** of his garden.", "He never stopped to **consider** how much joy a simple garden could bring, until it was almost too late."], "text_zh": ["一位**自私**的**巨人**擁有一座美麗的花園，裡面種著高大的**桃**樹，放學後孩子們最喜歡到那裡玩耍。有一天巨人回家，看見孩子們在他的花園裡，他**大吼**：「都給我出去！」還築起一道高牆，不讓任何孩子再進來。", "從那之後，就算鎮上其他地方都進入春天了，巨人的花園卻永遠停留在冬天。巨人感到很**困惑**——他不明白為什麼花不開、鳥不叫的**原因**是什麼。他常常獨自坐著，懷念花朵**甜美**的香氣。", "有一天早上，他看見一個小男孩正想**爬**上一棵還結著冰的樹。巨人輕輕把男孩抱起來，就在那一刻，他終於**意識到**，自己的自私才是這場永無止盡的冬天的原因。他推倒了那道牆，從此以後，他成了一個**友善**的巨人，讓每個孩子都能在花園的每個**角落**玩耍。", "在一切幾乎為時已晚之前，他從未停下來**仔細想過**，一座簡單的花園能帶來多大的快樂。"]}, {"id": 3, "title_en": "The Gift of the Magi", "title_zh": "最珍貴的禮物", "author": "O. Henry（歐．亨利）", "words": [{"w": "cent", "pos": "n.", "m": "分（美、加等國的貨幣單位）"}, {"w": "horrible", "pos": "adj.", "m": "糟糕的"}, {"w": "envy", "pos": "v.", "m": "羨慕；嫉妒"}, {"w": "knee", "pos": "n.", "m": "膝蓋"}, {"w": "speed", "pos": "n.", "m": "速度"}, {"w": "shopkeeper", "pos": "n.", "m": "店主；老闆"}, {"w": "slender", "pos": "adj.", "m": "細長的；纖細的"}, {"w": "cost", "pos": "v.", "m": "要價；花費"}, {"w": "sofa", "pos": "n.", "m": "沙發"}, {"w": "dear", "pos": "n.", "m": "親愛的（用作稱呼）"}, {"w": "rose", "pos": "n.", "m": "玫瑰花"}, {"w": "bless", "pos": "v.", "m": "祝福；保佑"}], "reference_words": [{"w": "wig", "pos": "n.", "m": "假髮"}, {"w": "chain", "pos": "n.", "m": "（錶）帶；鏈條"}], "text": ["Della had only a few **cents** left, but she wanted to buy her husband Jim a wonderful Christmas present. She looked at her long, beautiful hair in the mirror without **envy** of anyone — it was the one thing she owned that was truly precious.", "She fell to her **knees** for a moment, then ran at full **speed** to a wig shop. The **shopkeeper** offered her money for her **slender** locks of hair, enough to **cost** exactly what she needed for a gold chain for Jim's watch.", "That night, Jim came home and stared at Della's short hair, then slowly took out his own gift: a set of combs for hair she no longer had, because he had sold his watch to buy them. Sitting together on the old **sofa**, they realized their gifts were now useless — but each had given up their most precious thing for someone **dear** to them, and that, they agreed with a smile as red as a **rose**, was the greatest gift of all. They felt truly **blessed**.", "At first, having nothing useful left to show for their trouble felt like a truly **horrible** joke."], "text_zh": ["黛拉手上只剩下幾**分錢**，但她想買一份很棒的聖誕禮物給丈夫吉姆。她對著鏡子看著自己一頭美麗的長髮，一點也不**羨慕**別人——那是她真正擁有、最珍貴的東西。", "她一時激動**跪**了下來，接著便以最快的**速度**跑去一家假髮店。**店主**開價買下她那頭**纖細**柔順的長髮，價錢剛好夠她買一條金鍊，配吉姆的懷錶。", "那天晚上，吉姆回到家，盯著黛拉變短的頭髮看了好一會兒，接著才慢慢拿出他準備的禮物：一套梳子，配給她如今已經不存在的頭髮——因為他把自己的懷錶賣掉，才買得起這套梳子。兩人一起坐在舊**沙發**上，才發現彼此的禮物現在都派不上用場了——但他們都為了心愛的人，捨棄了自己最**珍貴**的東西，兩人相視而笑，笑容像**玫瑰**一樣紅潤，都覺得自己十分**幸運**。", "一開始，兩人辛苦一場卻什麼實用的東西都沒能留住，感覺簡直像個**糟糕**的玩笑。"]}, {"id": 4, "title_en": "The Model Millionaire", "title_zh": "模範百萬富翁", "author": "Oscar Wilde（王爾德）", "words": [{"w": "model", "pos": "adj./n.", "m": "模範的；模特兒"}, {"w": "friendly", "pos": "adj.", "m": "友善的；親切的"}, {"w": "fail", "pos": "v.", "m": "失敗"}, {"w": "marry", "pos": "v.", "m": "結婚；嫁娶"}, {"w": "painter", "pos": "n.", "m": "畫家"}, {"w": "coin", "pos": "n.", "m": "硬幣"}, {"w": "club", "pos": "n.", "m": "俱樂部；會所"}, {"w": "rich", "pos": "adj.", "m": "富有的"}, {"w": "gentleman", "pos": "n.", "m": "男士；紳士"}, {"w": "outside", "pos": "n.", "m": "外面；外部"}, {"w": "check", "pos": "n.", "m": "支票"}, {"w": "speech", "pos": "n.", "m": "演講"}], "reference_words": [{"w": "millionaire", "pos": "n.", "m": "百萬富翁"}, {"w": "beggar", "pos": "n.", "m": "乞丐"}, {"w": "best man", "pos": "n.", "m": "伴郎"}], "text": ["Hughie was a poor young **painter**, but he had a **friendly** heart. One day at his art **club**, he saw an old beggar sitting **outside** as a **model** for another artist. Hughie felt so sorry for the man that he gave him all the **coins** in his pocket.", "The next week, at a **rich** **gentleman**'s party, Hughie was shocked to see the same \"beggar\" — except now he was dressed like a real gentleman! It turned out the old man was actually a millionaire who loved dressing up as a model just for fun.", "Hughie was afraid he had made a silly mistake, but the millionaire only smiled. A few days later, a **check** arrived at Hughie's door for far more money than he had given away, along with a short **speech** of thanks: kindness, it said, should never **fail** to be rewarded. Not long after, Hughie was able to **marry** the woman he loved."], "text_zh": ["休伊是個貧窮的年輕**畫家**，但他有一顆**善良**的心。有一天，在他的美術**社團**裡，他看見一位老乞丐正坐在外頭，替另一位畫家當**模特兒**。休伊看了非常不忍，便把口袋裡所有的**銅板**都給了他。", "隔週，在一位**有錢****紳士**的派對上，休伊竟然驚訝地看見同一位「乞丐」——只是這次他穿得像個道地的紳士！原來那位老人其實是位百萬富翁，只是喜歡打扮成模特兒，純粹好玩而已。", "休伊很擔心自己鬧了個大笑話，但那位富翁只是笑了笑。幾天後，一張**支票**寄到休伊家門口，金額遠遠超過他當初給出去的錢，還附上一段簡短的感謝**話語**：善良絕對**不會**得不到回報。不久之後，休伊也順利與心愛的女子**結婚**了。"]}, {"id": 5, "title_en": "The Star Talers", "title_zh": "星星銀幣", "author": "Brothers Grimm（格林兄弟）", "words": [{"w": "town", "pos": "n.", "m": "城鎮；市區"}, {"w": "hat", "pos": "n.", "m": "（有帽簷的）帽子"}, {"w": "thick", "pos": "adj.", "m": "厚的"}, {"w": "coat", "pos": "n.", "m": "大衣；外套"}, {"w": "road", "pos": "n.", "m": "路"}, {"w": "thin", "pos": "adj.", "m": "纖瘦的"}, {"w": "weak", "pos": "adj.", "m": "虛弱的"}, {"w": "continue", "pos": "v.", "m": "繼續"}, {"w": "sky", "pos": "n.", "m": "天空"}, {"w": "silver", "pos": "adj.", "m": "銀製的"}, {"w": "generous", "pos": "adj.", "m": "慷慨的；大方的"}, {"w": "collect", "pos": "v.", "m": "收集"}], "reference_words": [{"w": "taler", "pos": "n.", "m": "（德國古代的）銀幣"}, {"w": "rag", "pos": "n.", "m": "破衣"}], "text": ["A poor orphan girl walked alone toward the next **town**, with only a small **hat** and a **thick** **coat** to keep her warm. She had nothing else in the whole world, but she was kind, and she trusted that God would take care of her.", "On the **road**, she met a **thin**, shivering old man who begged for her coat, and she gave it to him at once. Then a **weak** child asked for her hat, and she gave that away too. She **continued** on, giving away her shoes, her dress, and finally her last little shirt to those in need.", "Standing alone under the open **sky** with nothing left to wear, she suddenly saw bright **silver** stars falling gently from above. Each star landed at her feet and turned into a **silver** coin! Amazed, she began to **collect** them, and because she had been so **generous**, she never had to be poor again."], "text_zh": ["一個貧窮的孤兒女孩獨自走向下一座**城鎮**，身上只有一頂小**帽子**和一件**厚**重的**外套**為她保暖。她在這世上一無所有，但她心地善良，相信上天會照顧她。", "在**路**上，她遇見一位**瘦**弱、直發抖的老人向她討要外套，她二話不說立刻送給他。接著一個**虛弱**的孩子跟她要帽子，她也給了出去。她**繼續**往前走，又陸續把鞋子、洋裝，甚至最後一件小內衫都送給了需要的人。", "當她站在空曠的**天空**下，身上已經一無所有時，她突然看見明亮的**銀色**星星從空中輕輕落下。每一顆星星落地後都變成了一枚**銀**幣！她驚訝地開始**收集**這些銀幣，因為她曾經如此**慷慨**，從此以後再也不必過窮困的生活了。"]}, {"id": 6, "title_en": "The Wolf and the Seven Little Goats", "title_zh": "大野狼與七隻小羊", "author": "Brothers Grimm（格林兄弟）", "words": [{"w": "wolf", "pos": "n.", "m": "狼"}, {"w": "goat", "pos": "n.", "m": "山羊"}, {"w": "black", "pos": "adj.", "m": "黑色的"}, {"w": "foot", "pos": "n.", "m": "腳"}, {"w": "flour", "pos": "n.", "m": "麵粉"}, {"w": "door", "pos": "n.", "m": "門"}, {"w": "catch", "pos": "v.", "m": "抓到；捕獲"}, {"w": "hide", "pos": "v.", "m": "躲；藏"}, {"w": "tree", "pos": "n.", "m": "樹"}, {"w": "stone", "pos": "n.", "m": "石頭"}, {"w": "heavy", "pos": "adj.", "m": "重的"}, {"w": "less", "pos": "adv.", "m": "較少地；較小地"}], "reference_words": [{"w": "sack", "pos": "n.", "m": "麻布袋"}], "text": ["A mother **goat** warned her seven little kids never to open the **door** for the **wolf** while she went out. \"Watch for his **black** **feet** and his rough voice,\" she said, \"that is how you will know him.\"", "The wolf came and tried his tricks — he even ate chalk to soften his voice and covered his feet with **flour** to make them white. The kids finally believed it was their mother and opened the door. The wolf **caught** and swallowed six of them, but the smallest kid managed to **hide** inside the clock.", "When their mother came home and saw what had happened, she found the wolf asleep under a **tree**, his tummy round and full. She cut it open, freed all six kids, and filled the wolf's stomach with **heavy** **stones** instead. When the wolf woke up and tried to run to a well for water, the stones were far too heavy — and he fell in, never to bother the goats again. The kids learned to trust no strangers, no matter how convincing, ever **less** than that day.", "From then on, mother goat always warned her kids to check a stranger's **foot** carefully before opening the door, so the wolf could never **catch** them off guard again."], "text_zh": ["一隻**山羊**媽媽出門前，叮嚀她七隻小山羊，絕對不能替**大野狼**開**門**。她說：「要注意牠**黑黑**的**腳**和粗啞的聲音，這樣你們就能認出牠來。」", "大野狼來了，還耍了不少花招——牠甚至吃了粉筆讓聲音變細，還在腳上抹了**麵粉**讓腳變白。小羊們終於相信門外真的是媽媽，便打開了門。大野狼**抓**住並吞下了六隻小羊，只有最小的那隻機靈地**躲**進了時鐘裡。", "羊媽媽回家看見發生的事，發現大野狼正在一棵**樹**下睡著，肚子又圓又飽。她剪開狼的肚子，救出了六隻小羊，然後在狼的肚子裡塞滿了**沉重**的**石頭**。大野狼醒來後想跑去水井邊喝水，石頭實在太重了——牠就這樣掉進井裡，再也沒辦法騷擾羊群。小羊們學到了一課：不管騙術多麼逼真，都**絕**不能輕易相信陌生人。", "從那之後，羊媽媽總是提醒小羊們，開門前一定要仔細檢查陌生人的**腳**，這樣大野狼就再也無法趁機**抓住**牠們了。"]}, {"id": 7, "title_en": "Little Claus and Big Claus", "title_zh": "小克勞斯與大克勞斯", "author": "Hans Christian Andersen（安徒生）", "words": [{"w": "arrive", "pos": "v.", "m": "到達；抵達"}, {"w": "oven", "pos": "n.", "m": "烤爐；烤箱"}, {"w": "enter", "pos": "v.", "m": "進入"}, {"w": "appear", "pos": "v.", "m": "出現"}, {"w": "market", "pos": "n.", "m": "市場"}, {"w": "joke", "pos": "n.", "m": "玩笑；笑話"}, {"w": "unhappy", "pos": "adj.", "m": "不開心的"}, {"w": "rich", "pos": "adj.", "m": "富有的"}], "reference_words": [{"w": "priest", "pos": "n.", "m": "牧師"}, {"w": "wizard", "pos": "n.", "m": "巫師"}, {"w": "switch", "pos": "v.", "m": "交換"}], "text": ["Little Claus was poor and only owned one horse, while his neighbor Big Claus owned five. To tease him, Big Claus often said, \"All five of my horses belong to me!\" whenever anyone passed by. One day, angry at being teased, Little Claus killed his own horse by mistake and decided to sell its skin at the **market** in the next city.", "On the road, Little Claus needed a place to sleep and knocked on a farmer's door. He was told he could rest in the **oven** house instead, and it was there that he happened to see the farmer's wife hiding a delicious dinner for a secret visitor before her husband could **enter**.", "When the farmer suddenly **appeared** early, the wife hid everything, and Little Claus later played a clever **joke**, tricking the farmer into believing a magic hat could make food **appear** and that his sack held a wizard. Poor Little Claus was often mocked and **unhappy** about being poor, but through one trick after another, he cleverly convinced greedy Big Claus that even more wealth was hidden at the bottom of the river — and Big Claus jumped in chasing riches, never to be seen again, while Little Claus quietly went home **rich** with the treasure Big Claus left behind.", "By the time Little Claus finally **arrived** home with his new riches, the whole village was talking about his incredible luck."], "text_zh": ["小克勞斯很窮，只有一匹馬，鄰居大克勞斯卻有五匹馬。大克勞斯常常故意在人前說：「我這五匹馬全都是我的！」藉此嘲笑他。有一天，小克勞斯被嘲笑得生氣，一時失手殺死了自己的馬，決定把馬皮拿到隔壁城市的**市場**去賣。", "路上，小克勞斯需要找個地方過夜，便去敲了一戶農家的門。對方讓他到**烤爐**小屋裡休息，就在那裡，他碰巧看見農夫的妻子正把一頓豐盛的晚餐藏起來，準備留給一位祕密訪客，還不能讓丈夫**進來**看見。", "當農夫突然提早**出現**時，妻子急忙把東西藏好，後來小克勞斯耍了個聰明的**玩笑**，讓農夫誤以為一頂魔法帽子可以變出食物、他的袋子裡裝著一位巫師。可憐的小克勞斯常常因為窮而被嘲笑、感到**不開心**，但靠著一個又一個的計謀，他成功說服貪心的大克勞斯，說河底藏著更多財寶——大克勞斯跳進河裡追逐財富，從此再也沒有出現過，而小克勞斯則悄悄帶著大克勞斯留下的財寶回家，過上了**富裕**的生活。", "當小克勞斯終於帶著新得來的財富**抵達**家門時，全村的人都在談論他驚人的好運。"]}, {"id": 8, "title_en": "The Three Spinning Women", "title_zh": "三個紡紗女", "author": "Brothers Grimm（格林兄弟）", "words": [{"w": "cry", "pos": "v.", "m": "哭"}, {"w": "queen", "pos": "n.", "m": "皇后"}, {"w": "castle", "pos": "n.", "m": "城堡"}, {"w": "prince", "pos": "n.", "m": "王子"}, {"w": "unhappy", "pos": "adj.", "m": "不開心的"}, {"w": "lip", "pos": "n.", "m": "嘴唇"}, {"w": "foot", "pos": "n.", "m": "腳"}, {"w": "problem", "pos": "n.", "m": "困擾；問題"}, {"w": "aunt", "pos": "n.", "m": "與父母同輩的女性（姑姑、阿姨等）"}, {"w": "agree", "pos": "v.", "m": "同意"}, {"w": "touch", "pos": "v.", "m": "碰觸；觸摸"}, {"w": "again", "pos": "adv.", "m": "再次；又"}], "reference_words": [{"w": "spin", "pos": "v.", "m": "紡紗；紡織"}, {"w": "yell", "pos": "v.", "m": "吼叫"}, {"w": "marry", "pos": "v.", "m": "結婚；嫁娶"}, {"w": "lower", "pos": "adj.", "m": "下部的"}], "text": ["A lazy girl always **cried** when her mother asked her to spin flax, because she simply did not want to do it. One day, the **queen** passing by heard the **crying** and, thinking it meant the girl loved spinning so much she cried for more work, took her to the **castle** to marry the **prince**.", "At the castle, the girl was locked in a room full of flax and told to spin it all, or she could not marry the prince. She was **unhappy** and had no idea how to begin, until three strange old women appeared — one with a huge **lip**, one with a huge **foot**, and one with an old thumb — and offered to solve her **problem** for her.", "\"Call us your **aunts**, and invite us to your wedding without shame,\" they said, and the girl **agreed**. The women spun all the flax overnight. At the wedding, when the prince asked why his new aunts looked so strange, they explained that spinning too much had caused it. Frightened, the prince declared his bride must never **touch** a spinning wheel **again** — and so she never had to spin for the rest of her life."], "text_zh": ["一個懶惰的女孩每次媽媽要她紡麻線時都會**哭**，因為她根本不想做這件事。有一天，路過的**皇后**聽見了哭聲，誤以為女孩是因為太愛紡紗、還想要更多工作才哭，便把她帶回**城堡**，準備讓她嫁給**王子**。", "在城堡裡，女孩被關進一間堆滿麻線的房間，被告知必須把麻線全部紡完，否則不能嫁給王子。她**不開心**極了，完全不知從何下手，直到三位奇怪的老婦人出現——一位嘴**唇**大得驚人，一位**腳**大得驚人，一位大拇指又老又寬——她們表示願意幫她解決這個**難題**。", "「叫我們**阿姨**就好，婚禮時也請邀請我們，不用感到丟臉，」她們說，女孩**答應**了。這三位婦人一夜之間就把麻線全紡完了。婚禮上，王子問這幾位新來的阿姨為什麼長得這麼奇怪，她們解釋是紡紗紡太多才變成這樣。王子嚇壞了，下令從此**不准**新娘再**碰**紡紗車一次——於是女孩這輩子再也不用紡紗了。"]}, {"id": 9, "title_en": "The Legend of Sleepy Hollow", "title_zh": "沉睡谷傳奇", "author": "Washington Irving（華盛頓．歐文）", "words": [{"w": "quiet", "pos": "adj.", "m": "寧靜的；安靜的"}, {"w": "monster", "pos": "n.", "m": "怪物；妖怪"}, {"w": "scared", "pos": "adj.", "m": "害怕的"}, {"w": "dark", "pos": "n./adj.", "m": "黑暗（的）"}, {"w": "trick", "pos": "n.", "m": "詭計；把戲"}, {"w": "evening", "pos": "n.", "m": "傍晚；晚上"}, {"w": "race", "pos": "n.", "m": "比賽；賽跑"}, {"w": "disappear", "pos": "v.", "m": "消失；不見"}, {"w": "shout", "pos": "v.", "m": "大叫；大喊"}, {"w": "remember", "pos": "v.", "m": "想起；記得"}, {"w": "hurry", "pos": "v.", "m": "趕緊；匆忙"}, {"w": "laugh", "pos": "v.", "m": "（出聲）笑"}], "reference_words": [{"w": "legend", "pos": "n.", "m": "傳說"}, {"w": "headless", "pos": "adj.", "m": "無頭的"}, {"w": "horseman", "pos": "n.", "m": "騎士"}, {"w": "figure", "pos": "n.", "m": "人影"}], "text": ["In a **quiet** little village called Sleepy Hollow, people loved to tell scary stories about a headless **monster** who rode a black horse through the woods at night. A nervous schoolteacher named Ichabod was easily **scared** by these tales, but he still loved a rich farmer's beautiful daughter.", "Ichabod had a rival, a strong young man named Brom, who liked to play **tricks** on him. One dark **evening**, riding home alone after a party, Ichabod suddenly heard hooves behind him in the **dark** woods and saw a rider without a head, carrying its head on the saddle instead!", "Ichabod kicked his horse into a **race**, his heart pounding, as the headless rider chased him toward a bridge. Just as he crossed it, something flew through the air toward him, and Ichabod **shouted** in fear before he suddenly **disappeared** from the village forever. The villagers still **remember** and **laugh** about that night, wondering if it was really a ghost, or just Brom playing his best trick of all, and they always **hurry** home before dark."], "text_zh": ["在一個名叫斷頭谷的**安靜**小村莊裡，人們喜歡講述一個恐怖故事：一個沒有頭的**怪物**，會在夜裡騎著黑馬穿過樹林。膽小的教師伊卡博德很容易被這些故事**嚇到**，但他仍然愛慕著一位富有農夫美麗的女兒。", "伊卡博德有個情敵，是個強壯的年輕人叫布朗姆，他很愛捉弄伊卡博德。某個漆黑的**夜晚**，伊卡博德在派對後獨自騎馬回家，途中突然聽見**黑暗**樹林裡傳來馬蹄聲，接著看見一位沒有頭的騎士，還把自己的頭抱在馬鞍上！", "伊卡博德嚇得心臟狂跳，猛踢馬兒**狂奔**起來，那個無頭騎士在後面追著他一路衝向一座橋。就在他過橋的瞬間，有個東西朝他飛了過來，伊卡博德害怕地**大叫**了一聲，從此便**消失**在村莊裡，再也沒有人見過他。村民們至今仍然**記得**這個夜晚，也常常邊**笑**邊猜，那究竟是真的鬼魂，還是布朗姆開的一個最厲害的玩笑，大家也總是趕在天黑前**趕緊**回家。"]}, {"id": 10, "title_en": "The Child's Story", "title_zh": "孩子的故事", "author": "Charles Dickens（查爾斯．狄更斯）", "words": [{"w": "child", "pos": "n.", "m": "孩童"}, {"w": "once", "pos": "adv.", "m": "從前；曾經"}, {"w": "forest", "pos": "n."
