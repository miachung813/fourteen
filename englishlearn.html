 "代名詞": {tip:"代名詞：代替前面提過的名詞，注意主格/受格。",
   patterns:["___ + be動詞/一般動詞 ...", "I gave the book to ___."]},
 "所有格": {tip:"所有格：後面一定要加名詞，表示「誰的」。",
   patterns:["This is ___ book.", "___ dog is very cute."]},
 "限定詞": {tip:"限定詞：放在名詞前，限定範圍或數量。",
   patterns:["I have ___ apples.", "___ students like this class."]},
 "疑問詞": {tip:"疑問詞：放句首，用來構成疑問句。",
   patterns:["___ is your name?", "___ do you go to school?"]},
 "感嘆詞": {tip:"感嘆詞：獨立使用，表達情緒。", patterns:["___! That's amazing!"]},
 "冠詞": {tip:"冠詞：放在名詞前。", patterns:["I saw ___ dog."]},
 "助動詞": {tip:"助動詞：與主要動詞連用，構成問句、否定句或表語氣。", patterns:["___ you like tea?", "I ___ go to school."]},
 "片語": {tip:"片語：整體當作一個詞使用。", patterns:["請把這個片語放進一個完整句子中使用。"]},
 "副詞/連接詞": {tip:"可當副詞或連接詞使用，常用於 not...either 句型。", patterns:["I don't like it ___.", "Neither A nor B ..."]}
};
function posPattern(pos){ return POS_PATTERNS[pos] || {tip:"請試著用這個字造一個完整的句子。", patterns:["___"]}; }

/* ---------- 學習排程：每週一~六各 13 個新字，週日複習 + 閱讀 ---------- */
const CHUNK = 13;
const VOCAB_DAYS_PER_WEEK = 6;
const TOTAL_WEEKS = 26;

function buildSchedule(){
  const schedule = [];
  let vi = 0;
  let storyCounter = 0; // 0-based index into DAILY_STORIES, increments once per vocab day
  for(let week=1; week<=TOTAL_WEEKS; week++){
    const weekWords = [];
    for(let d=1; d<=VOCAB_DAYS_PER_WEEK; d++){
      let chunk = [];
      let dailyStory = null;
      if(vi < VOCAB.length){
        chunk = VOCAB.slice(vi, vi+CHUNK);
        vi += CHUNK;
        dailyStory = DAILY_STORIES[storyCounter] || null;
        storyCounter++;
      }
      schedule.push({type:'vocab', week, weekday:d, words:chunk, dailyStory, label:`第 ${week} 週．第 ${d} 天`});
      weekWords.push(...chunk);
    }
    const story = STORIES[(week-1) % STORIES.length];
    schedule.push({type:'review', week, weekday:7, words:weekWords, story, label:`第 ${week} 週．複習日`});
  }
  return schedule;
}
const SCHEDULE = buildSchedule();
const TOTAL_DAYS = SCHEDULE.length;

/* ---------- 狀態（記憶體中，需靠匯出/匯入保存） ---------- */
const DEFAULT_STATE = () => ({
  version: 1,
  currentDay: 0,               // 0-based index into SCHEDULE
  wordStatus: {},              // {wordId: 0=新,1=學習中,2=已熟悉}
  sentences: {},                // {wordId: "使用者造的句子"}
  dayDone: {},                  // {dayIndex: true}
  quizBest: {},                  // {dayIndex: {score,total}}
  storyProgress: {},             // {storyId: {read:bool, quizScore, total, writing:""}}
  storybookProgress: {},         // {storybookStoryId: {read:bool}} 世界故事集複習標記
  storybookSentences: {},        // {"storyId_wordIndex": "使用者造的句子"}（重點單字造句）
  storybookRefSentences: {},     // {"storyId_wordIndex": "使用者造的句子"}（參考單字造句）
  readingSentences: {},          // {"storyId_wordIndex": "使用者造的句子"}（經典故事重點單字造句）
  streakDates: [],               // ["2026-07-13", ...] 只作記錄用，不影響進度
  createdAt: new Date().toISOString()
});
let STATE = DEFAULT_STATE();

/* ---------- 小工具 ---------- */
function $(sel, root){ return (root||document).querySelector(sel); }
function $all(sel, root){ return Array.from((root||document).querySelectorAll(sel)); }
function el(tag, attrs, children){
  const e = document.createElement(tag);
  if(attrs) for(const k in attrs){
    if(k==='class') e.className = attrs[k];
    else if(k==='html') e.innerHTML = attrs[k];
    else if(k.startsWith('on') && typeof attrs[k]==='function') e.addEventListener(k.slice(2), attrs[k]);
    else e.setAttribute(k, attrs[k]);
  }
  (children||[]).forEach(c=>{ if(c==null) return; e.appendChild(typeof c==='string'?document.createTextNode(c):c); });
  return e;
}
function shuffle(arr){ const a=arr.slice(); for(let i=a.length-1;i>0;i--){ const j=Math.floor(Math.random()*(i+1)); [a[i],a[j]]=[a[j],a[i]]; } return a; }
function pad2(n){ return n<10 ? '0'+n : ''+n; }
function todayStr(){ const d=new Date(); return `${d.getFullYear()}-${pad2(d.getMonth()+1)}-${pad2(d.getDate())}`; }

function markTodayActive(){
  const t = todayStr();
  if(!STATE.streakDates.includes(t)) STATE.streakDates.push(t);
}
function escapeHtml(s){
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}
// Converts **word** markdown-style bolding into highlighted <mark> spans, safely escaping the rest.
function renderStoryHtml(text){
  const escaped = escapeHtml(text);
  return escaped.replace(/\*\*(.+?)\*\*/g, '<mark class="hlword">$1</mark>');
}
// Builds a "顯示中文翻譯" toggle button + hidden translation block.
// zhContent can be a single string (daily story) or an array of paragraph strings (classic story).
function buildTranslationToggle(zhContent){
  const wrap = el('div',{class:'translate-wrap'});
  const box = el('div',{class:'ai-box translate-box', style:'display:none;'});
  const paras = Array.isArray(zhContent) ? zhContent : [zhContent];
  paras.forEach(p=> box.appendChild(el('p',{class:'story-p'},[p])));
  const btn = el('button',{class:'btn small', onclick:()=>{
    const showing = box.style.display !== 'none';
    box.style.display = showing ? 'none' : 'block';
    btn.textContent = showing ? '🀄 顯示中文翻譯' : '🙈 隱藏中文翻譯';
  }},['🀄 顯示中文翻譯']);
  wrap.appendChild(btn);
  wrap.appendChild(box);
  return wrap;
}

/* ---------- 朗讀（用瀏覽器內建的語音合成，不需要任何 AI 服務或網路連線） ---------- */
const TTS_RATE_KEY = 'vocabAppTtsRate_v1';
const TTS_VOICE_KEY = 'vocabAppTtsVoiceURI_v1';
function getTtsRate(){
  try{ const v = parseFloat(localStorage.getItem(TTS_RATE_KEY)); return isNaN(v) ? 0.85 : v; }catch(e){ return 0.85; }
}
function setTtsRate(r){
  try{ localStorage.setItem(TTS_RATE_KEY, String(r)); }catch(e){}
}
function getTtsVoiceURI(){
  try{ return localStorage.getItem(TTS_VOICE_KEY)||''; }catch(e){ return ''; }
}
function setTtsVoiceURI(uri){
  try{ if(uri) localStorage.setItem(TTS_VOICE_KEY, uri); else localStorage.removeItem(TTS_VOICE_KEY); }catch(e){}
}
function getTtsVoice(){
  try{
    const uri = getTtsVoiceURI();
    if(!uri || !('speechSynthesis' in window)) return null;
    return window.speechSynthesis.getVoices().find(v=>v.voiceURI===uri) || null;
  }catch(e){ return null; }
}

let activeSpeakBtn = null;
function setSpeakBtnPlaying(btn, playing){
  if(!btn) return;
  btn.classList.toggle('playing', playing);
  btn.textContent = playing ? '⏹' : '🔊';
}
function speakText(text, opts, btn){
  opts = opts || {};
  if(!('speechSynthesis' in window)){
    alert('抱歉，這個瀏覽器不支援語音朗讀功能，建議換成 Chrome、Edge 或 Safari 最新版試試看。');
    return;
  }
  try{
    window.speechSynthesis.cancel(); // 先停掉正在念的內容，避免疊在一起
    if(activeSpeakBtn) setSpeakBtnPlaying(activeSpeakBtn, false);
    const utter = new SpeechSynthesisUtterance(text);
    utter.lang = opts.lang || 'en-US';
    utter.rate = getTtsRate();
    const voice = getTtsVoice();
    if(voice) utter.voice = voice;
    const clearActive = ()=>{ setSpeakBtnPlaying(btn, false); if(activeSpeakBtn===btn) activeSpeakBtn=null; };
    utter.onend = clearActive;
    utter.onerror = clearActive;
    activeSpeakBtn = btn;
    setSpeakBtnPlaying(btn, true);
    window.speechSynthesis.speak(utter);
  }catch(e){ setSpeakBtnPlaying(btn, false); }
}
function stopSpeaking(){
  try{ if('speechSynthesis' in window) window.speechSynthesis.cancel(); }catch(e){}
  if(activeSpeakBtn){ setSpeakBtnPlaying(activeSpeakBtn, false); activeSpeakBtn=null; }
}
// 去除 **粗體** 標記與多餘符號，取得純英文朗讀用文字。
function plainTextFor(text){
  return (text||'').replace(/\*\*(.+?)\*\*/g, '$1');
}
// 小小的喇叭按鈕：點一下開始朗讀，朗讀中再點一次（按鈕會變成 ⏹）就停止。
function buildSpeakBtn(text, opts){
  opts = opts || {};
  const btn = el('button',{class:'speak-btn'+(opts.small?' small':''), title:'朗讀（再點一次可停止）'},['🔊']);
  btn.addEventListener('click', (e)=>{
    if(e) e.stopPropagation();
    if(btn.classList.contains('playing')){
      stopSpeaking();
    } else {
      speakText(text, opts, btn);
    }
  });
  return btn;
}
// 填入語音選單（只列出英文語音），並套用之前儲存的選擇。語音清單常常是非同步載入的，
// 所以除了頁面載入時呼叫一次，也要監聽 voiceschanged 事件再填一次。
function populateVoiceSelect(){
  const sel = document.getElementById('ttsVoiceSelect');
  if(!sel || !('speechSynthesis' in window)) return;
  const voices = window.speechSynthesis.getVoices().filter(v=>/^en/i.test(v.lang));
  if(!voices.length) return;
  const current = getTtsVoiceURI();
  sel.innerHTML = '';
  sel.appendChild(el('option',{value:''},['系統預設']));
  voices.forEach(v=>{
    const opt = el('option',{value:v.voiceURI},[v.name+'（'+v.lang+'）']);
    if(v.voiceURI===current) opt.setAttribute('selected','selected');
    sel.appendChild(opt);
  });
}
function initTtsControls(){
  const rateSel = document.getElementById('ttsRateSelect');
  const voiceSel = document.getElementById('ttsVoiceSelect');
  const stopBtn = document.getElementById('ttsStopBtn');
  if(rateSel){
    rateSel.value = String(getTtsRate());
    rateSel.addEventListener('change', ()=>{ setTtsRate(parseFloat(rateSel.value)||0.85); });
  }
  if(voiceSel){
    voiceSel.addEventListener('change', ()=>{ setTtsVoiceURI(voiceSel.value); });
  }
  if(stopBtn){
    stopBtn.addEventListener('click', ()=> stopSpeaking());
  }
  if('speechSynthesis' in window){
    populateVoiceSelect();
    window.speechSynthesis.addEventListener('voiceschanged', populateVoiceSelect);
  }
}

/* ---------- 複製到剪貼簿（給「造句練習」用來自己貼去問 AI，本系統不直接呼叫任何 AI API） ---------- */
function copyToClipboard(text, done){
  function fallback(){
    let ok = false;
    try{
      const ta = document.createElement('textarea');
      ta.value = text;
      ta.style.position = 'fixed';
      ta.style.left = '-9999px';
      ta.style.top = '0';
      document.body.appendChild(ta);
      ta.focus(); ta.select();
      ok = document.execCommand('copy');
      document.body.removeChild(ta);
    }catch(e){ ok = false; }
    done(ok);
  }
  if(navigator.clipboard && navigator.clipboard.writeText){
    navigator.clipboard.writeText(text).then(()=>done(true)).catch(fallback);
  } else {
    fallback();
  }
}

// Builds a compact "造句練習" widget for one word: pattern hint + textarea (auto-saved
// into `store[key]`) + a "複製，貼去問 AI" button that copies a ready-to-paste grading
// request to the clipboard, so the user can paste it into any AI chat site themselves.
function buildSentenceWidget(w, store, key, opts){
  opts = opts || {};
  const pat = posPattern(w.pos);
  const card = el('div',{class:'card'});
  const meta = w.pos ? (' ('+w.pos+') '+w.m) : (' － '+w.m);
  card.appendChild(el('div',{class:'row space-between'},[
    el('div',{},[el('span',{class:'en big'},[w.w]), el('span',{class:'muted'},[meta])]),
    buildSpeakBtn(w.w, {small:true}),
  ]));
  card.appendChild(el('div',{class:'hint'},[pat.tip]));
  if(opts.showPatternList){
    const patList = el('ul',{class:'pattern-list'});
    pat.patterns.forEach(p=> patList.appendChild(el('li',{},[p])));
    card.appendChild(patList);
  }
  const ta = el('textarea',{class:'sentence-input', placeholder:'請用「'+w.w+'」寫一個完整的英文句子...', rows:'2'});
  ta.value = store[key]||'';
  ta.addEventListener('input', ()=>{ store[key]=ta.value; scheduleCloudSave(); });
  card.appendChild(ta);

  const statusMsg = el('p',{class:'muted small', style:'margin:6px 0 0;'},['']);
  const preview = el('div',{class:'ai-box', style:'display:none;'});
  card.appendChild(el('button',{class:'btn small', style:'margin-top:8px', onclick:()=>{
    if(!ta.value.trim()){ alert('請先寫一個句子，才能複製提問內容喔！'); return; }
    const promptText = `請幫我看看這句英文的文法對不對：\n\n單字：${w.w}（${w.pos}，意思：${w.m}）\n句子：「${ta.value.trim()}」\n\n如果有錯，請給我修改後的正確版本，並簡單說明為什麼要這樣改；如果本來就正確，也請給我一個更道地的說法參考。`;
    copyToClipboard(promptText, (ok)=>{
      statusMsg.textContent = ok ? '✅ 已複製！可以貼到 Claude.ai 或其他 AI 聊天視窗詢問。' : '⚠️ 自動複製失敗，請手動選取下方文字複製。';
      statusMsg.className = ok ? 'good small' : 'bad small';
      preview.textContent = promptText;
      preview.style.display = 'block';
    });
  }},['📋 複製，貼去問 AI']));
  card.appendChild(statusMsg);
  card.appendChild(preview);
  return card;
}

/* ---------- 雲端同步（選用：透過 Google Apps Script 網頁應用程式存到 Google 試算表） ---------- */
// 這個系統本身沒有後端，預設進度只存在記憶體裡（重新整理就消失）。
// 使用者可以在「使用說明」頁貼上自己部署的 Apps Script 網頁應用程式網址，
// 之後每次操作系統就會自動（debounce）把整個 STATE 存成 JSON 存進試算表；
// 開啟頁面時也會先嘗試從試算表讀回最新進度。網址本身存在 localStorage（僅存在使用者自己的瀏覽器裡）。
const SHEET_URL_KEY = 'vocabAppSheetUrl_v1';
function getSheetUrl(){
  try{ return (localStorage.getItem(SHEET_URL_KEY)||'').trim(); }catch(e){ return ''; }
}
function setSheetUrl(url){
  try{
    if(url) localStorage.setItem(SHEET_URL_KEY, url);
    else localStorage.removeItem(SHEET_URL_KEY);
  }catch(e){ /* 私密瀏覽模式等情況下 localStorage 可能無法使用，安靜失敗即可 */ }
}

let cloudSyncState = {status:'idle', text:'☁️ 尚未設定雲端同步'};
function setCloudSyncState(status, text){
  cloudSyncState = {status, text};
  const indEl = document.getElementById('cloudSyncIndicator');
  if(indEl){
    indEl.textContent = text;
    indEl.className = 'sync-indicator sync-'+status;
  }
  const guideEl = document.getElementById('cloudSyncGuideStatus');
  if(guideEl){
    guideEl.textContent = text;
    guideEl.className = (status==='error' ? 'bad small' : (status==='success' ? 'good small' : 'muted small'));
  }
}

let cloudSaveTimer = null;
function scheduleCloudSave(){
  const url = getSheetUrl();
  if(!url) return; // 沒設定雲端同步，什麼都不做
  setCloudSyncState('pending', '☁️ 已變更，準備同步…');
  clearTimeout(cloudSaveTimer);
  cloudSaveTimer = setTimeout(()=>{ cloudSaveTimer=null; saveToCloud(url); }, 1500);
}

function saveToCloud(url, opts){
  opts = opts || {};
  setCloudSyncState('saving', '☁️ 同步中…');
  return fetch(url, {
    method:'POST',
    headers:{'Content-Type':'text/plain;charset=utf-8'}, // 避免瀏覽器送出 CORS 預檢請求，Apps Script 才收得到
    body: JSON.stringify(STATE),
    keepalive: !!opts.keepalive
  }).then(res=>{
    if(!res.ok) throw new Error('HTTP '+res.status);
    return res.text();
  }).then(()=>{
    setCloudSyncState('success', '☁️ 已同步雲端資料庫');
  }).catch(()=>{
    setCloudSyncState('error', '⚠️ 同步失敗，請檢查網路連線或網址設定（下次操作會自動重試）');
  });
}

function loadFromCloud(url){
  setCloudSyncState('pending', '☁️ 正在從雲端載入進度…');
  return fetch(url).then(res=>{
    if(!res.ok) throw new Error('HTTP '+res.status);
    return res.text();
  }).then(text=>{
    text = (text||'').trim();
    if(!text){
      setCloudSyncState('idle', '☁️ 雲端試算表目前是空的，將從新進度開始');
      return false;
    }
    let data;
    try{ data = JSON.parse(text); }catch(e){ throw new Error('bad json'); }
    if(data && typeof data==='object' && data.version){
      STATE = Object.assign(DEFAULT_STATE(), data);
      setCloudSyncState('success', '☁️ 已同步雲端資料庫');
      return true;
    }
    setCloudSyncState('idle', '☁️ 雲端試算表目前是空的，將從新進度開始');
    return false;
  }).catch(()=>{
    setCloudSyncState('error', '⚠️ 無法連線到雲端試算表，請檢查網址是否正確');
    return false;
  });
}

function buildQuizCard(day){
  const card = el('div',{class:'card'});
  card.appendChild(el('h3',{},['小測驗（單字 → 中文意思）']));
  const words = day.words;
  const quizWords = words.length>10 ? shuffle(words).slice(0,10) : words;
  const form = el('div',{class:'quiz-form'});
  const answers = {};
  quizWords.forEach((w,idx)=>{
    const distractors = shuffle(VOCAB.filter(v=>v.id!==w.id && v.pos===w.pos)).slice(0,3);
    let options = shuffle([w, ...distractors]);
    if(options.length<4){ options = shuffle([w, ...shuffle(VOCAB.filter(v=>v.id!==w.id)).slice(0,3)]); }
    const qDiv = el('div',{class:'quiz-q'});
    qDiv.appendChild(el('div',{class:'quiz-question'},[`${idx+1}. ${w.w} (${w.pos}) 是什麼意思？`]));
    const optDiv = el('div',{class:'quiz-options'});
    options.forEach(o=>{
      const id = 'q'+day.week+'_'+day.weekday+'_'+w.id+'_'+o.id;
      const label = el('label',{class:'quiz-opt'});
      const radio = el('input',{type:'radio', name:'q'+w.id});
      radio.addEventListener('change', ()=>{ answers[w.id]=o.id; });
      label.appendChild(radio);
      label.appendChild(document.createTextNode(' '+o.m));
      optDiv.appendChild(label);
    });
    qDiv.appendChild(optDiv);
    form.appendChild(qDiv);
  });
  card.appendChild(form);
  const resultBox = el('div',{class:'quiz-result'});
  card.appendChild(resultBox);
  card.appendChild(el('button',{class:'btn primary', onclick:()=>{
    let correct=0;
    quizWords.forEach(w=>{ if(answers[w.id]===w.id) correct++; });
    resultBox.innerHTML='';
    resultBox.appendChild(el('p',{class: correct===quizWords.length?'good':'muted'},[`得分：${correct} / ${quizWords.length}`]));
    const key = STATE.currentDay;
    const prev = STATE.quizBest[key];
    if(!prev || correct>prev.score){ STATE.quizBest[key] = {score:correct, total:quizWords.length}; }
    quizWords.forEach(w=>{ if(answers[w.id]===w.id){ STATE.wordStatus[w.id] = Math.max(STATE.wordStatus[w.id]||0, 2);} });
  }},['送出測驗']));
  return card;
}

  sentenceWrap.appendChild(el('p',{class:'muted'},['挑幾個這篇故事的重點單字，練習自己寫一句完整的英文句子；寫完可以複製提問文字，貼去問 AI。']));
  root.appendChild(sentenceWrap);
  s.newWords.forEach((v, idx)=>{
    const key = s.id+'_'+idx;
    root.appendChild(buildSentenceWidget({w:v.en, pos:'', m:v.zh}, STATE.readingSentences, key));
  });

  const quizCard = el('div',{class:'card'});
  quizCard.appendChild(el('h3',{},['📝 閱讀理解測驗']));
  const answers = {};
  s.questions.forEach((q,qi)=>{
    const qDiv = el('div',{class:'quiz-q'});
    qDiv.appendChild(el('div',{class:'quiz-question'},[(qi+1)+'. '+q.q]));
    const optDiv = el('div',{class:'quiz-options'});
    q.options.forEach((opt,oi)=>{
      const label = el('label',{class:'quiz-opt'});
      const radio = el('input',{type:'radio', name:'sq'+s.id+'_'+qi});
      radio.addEventListener('change', ()=>{ answers[qi]=oi; });
      label.appendChild(radio);
      label.appendChild(document.createTextNode(' '+opt));
      optDiv.appendChild(label);
    });
    qDiv.appendChild(optDiv);
    quizCard.appendChild(qDiv);
  });
  const resultBox = el('div',{class:'quiz-result'});
  quizCard.appendChild(resultBox);
  quizCard.appendChild(el('button',{class:'btn primary', onclick:()=>{
    let correct=0;
    s.questions.forEach((q,qi)=>{ if(answers[qi]===q.answer) correct++; });
    resultBox.innerHTML='';
    resultBox.appendChild(el('p',{class: correct===s.questions.length?'good':'muted'},[`得分：${correct} / ${s.questions.length}　｜　故事大意：${s.moral_zh}`]));
    const prog = STATE.storyProgress[s.id]||{};
    prog.read = true; prog.quizScore = correct; prog.total = s.questions.length;
    STATE.storyProgress[s.id] = prog;
  }},['送出測驗']));
  root.appendChild(quizCard);

  const writeCard = el('div',{class:'card'});
  writeCard.appendChild(el('h3',{},['✍️ 延伸造句']));
  writeCard.appendChild(el('p',{class:'hint'},[s.writingPrompt]));
  const ta = el('textarea',{class:'sentence-input', rows:'3', placeholder:'寫下你的句子...'});
  const prog0 = STATE.storyProgress[s.id]||{};
  ta.value = prog0.writing||'';
  ta.addEventListener('input', ()=>{ const p=STATE.storyProgress[s.id]||{}; p.writing=ta.value; STATE.storyProgress[s.id]=p; scheduleCloudSave(); });
  writeCard.appendChild(ta);
  writeCard.appendChild(el('button',{class:'btn', onclick:()=>{ const p=STATE.storyProgress[s.id]||{}; p.read=true; STATE.storyProgress[s.id]=p; render(); }},['標記已讀完這篇 ✅']));
  root.appendChild(writeCard);
}

/* ---------- Storybook vocab（另一本《國中生必讀世界經典英文故事集》42 篇故事的重點單字表） ---------- */
let storybookOpenId = null;
let sbFlashIndex = 0;
let sbFlashFlipped = false;

function renderStorybook(root){
  if(storybookOpenId==null){
    root.appendChild(el('div',{class:'card'},[
      el('h2',{},['📗 世界故事集']),
      el('p',{class:'muted'},['這裡是另一套延伸閱讀：取材自你另一本《國中生必讀世界經典英文故事集》全書 42 篇故事的主題與重點單字，改寫成適合國中程度的原創短篇故事＋中文翻譯，並整理出對應的單字表（單字、詞性、中文意思）。這裡的故事內文和翻譯都是重新原創撰寫，並非原書的文字或翻譯；如果想看原書的完整內容、課本練習題與官方翻譯，還是要翻閱你自己的書。']),
      el('p',{class:'muted'},['這是「新」的學習選項，和原本的「每日故事」「經典故事」是各自獨立、並存的內容，不會互相取代或影響彼此的進度。'])
    ]));
    const grid = el('div',{class:'grid'});
    STORYBOOK.forEach(s=>{
      const prog = STATE.storybookProgress[s.id]||{};
      const card = el('div',{class:'card story-card'});
      card.appendChild(el('h3',{},['Story '+s.id+'　'+s.title_en]));
      card.appendChild(el('p',{class:'muted'},[s.title_zh + (s.author? '　｜　'+s.author : '')]));
      card.appendChild(el('p',{class:'muted'},['重點單字 '+s.words.length+' 個'+((s.reference_words&&s.reference_words.length)? '　＋參考單字 '+s.reference_words.length+' 個':'')+(prog.read?'　✅ 已複習':'')]));
      card.appendChild(el('button',{class:'btn', onclick:()=>{storybookOpenId=s.id; sbFlashIndex=0; sbFlashFlipped=false; render();}},['查看故事 →']));
      grid.appendChild(card);
    });
    root.appendChild(grid);
    return;
  }

  const s = STORYBOOK.find(x=>x.id===storybookOpenId);
  root.appendChild(el('button',{class:'btn small', onclick:()=>{storybookOpenId=null; render();}},['← 回故事列表']));

  const header = el('div',{class:'card'});
  header.appendChild(el('h2',{},['Story '+s.id+'　'+s.title_en]));
  header.appendChild(el('p',{class:'muted'},[s.title_zh + (s.author? '　｜　'+s.author : '')]));
  header.appendChild(el('p',{class:'hint'},['✍️ 這篇是我們依照這篇故事的主題與重點單字改寫的原創簡化版故事，方便你直接在這裡閱讀＋對照中文翻譯；如果想看原書完整的內文、練習題與官方翻譯，請翻閱你自己的書。']));
  root.appendChild(header);

  if(s.text && s.text.length){
    const storyCard = el('div',{class:'card highlight'});
    storyCard.appendChild(el('div',{class:'row space-between'},[
      el('h3',{},['📖 故事（螢光標記處為本課重點單字）']),
      buildSpeakBtn(plainTextFor(s.text.join(' '))),
    ]));
    s.text.forEach(p=>{
      const pEl = el('p',{class:'story-p'});
      pEl.innerHTML = renderStoryHtml(p);
      storyCard.appendChild(pEl);
    });
    if(s.text_zh){
      storyCard.appendChild(buildTranslationToggle(s.text_zh));
    }
    root.appendChild(storyCard);
  }

  if(s.words.length){
    sbFlashIndex = Math.min(sbFlashIndex, s.words.length-1);
    const card = el('div',{class:'card center'});
    card.appendChild(el('h3',{},['單字卡　'+(sbFlashIndex+1)+' / '+s.words.length]));
    const w = s.words[sbFlashIndex];
    const flash = el('div',{class:'flashcard'+(sbFlashFlipped?' flipped':'')});
    flash.appendChild(el('div',{class:'flash-front'},[el('div',{class:'fw'},[w.w]), el('div',{class:'fpos'},[w.pos]), buildSpeakBtn(w.w)]));
    flash.appendChild(el('div',{class:'flash-back'},[el('div',{class:'fm'},[w.m])]));
    flash.addEventListener('click', ()=>{ sbFlashFlipped=!sbFlashFlipped; render(); });
    card.appendChild(flash);
    card.appendChild(el('div',{class:'row gap center'},[
      el('button',{class:'btn small', onclick:(e)=>{e.stopPropagation(); sbFlashIndex=(sbFlashIndex-1+s.words.length)%s.words.length; sbFlashFlipped=false; render();}},['◀ 上一個']),
      el('button',{class:'btn small', onclick:(e)=>{e.stopPropagation(); sbFlashIndex=(sbFlashIndex+1)%s.words.length; sbFlashFlipped=false; render();}},['下一個 ▶']),
    ]));
    root.appendChild(card);
  }

  const listCard = el('div',{class:'card'});
  listCard.appendChild(el('h3',{},['📌 重點單字']));
  const table = el('table',{class:'vocab-table'});
  table.appendChild(el('tr',{},[el('th',{},['英文']), el('th',{},['詞性']), el('th',{},['中文意思']), el('th',{},['朗讀'])]));
  s.words.forEach(w=>{
    table.appendChild(el('tr',{},[el('td',{class:'en'},[w.w]), el('td',{},[w.pos]), el('td',{},[w.m]), el('td',{},[buildSpeakBtn(w.w, {small:true})])]));
  });
  listCard.appendChild(table);
  root.appendChild(listCard);

  root.appendChild(buildStorybookSentenceCard(s));

  if(s.reference_words && s.reference_words.length){
    const refCard = el('div',{class:'card'});
    refCard.appendChild(el('h3',{},['🔖 參考單字']));
    refCard.appendChild(el('p',{class:'muted'},['書中額外補充的詞彙，非本課要求熟記的重點單字。']));
    const rGrid = el('div',{class:'vocab-tags'});
    s.reference_words.forEach(w=> rGrid.appendChild(el('span',{class:'tag'},[w.w+' － '+w.m+' ', buildSpeakBtn(w.w, {small:true})])));
    refCard.appendChild(rGrid);
    root.appendChild(refCard);

    const refSentenceWrap = el('div',{class:'card'});
    refSentenceWrap.appendChild(el('h3',{},['✍️ 參考單字造句練習']));
    refSentenceWrap.appendChild(el('p',{class:'muted'},['參考單字也可以練習造句，寫完一樣可以複製提問文字，貼去問 AI。']));
    root.appendChild(refSentenceWrap);
    s.reference_words.forEach((w, idx)=>{
      const key = s.id+'_ref_'+idx;
      root.appendChild(buildSentenceWidget(w, STATE.storybookRefSentences, key));
    });
  }

  const doneCard = el('div',{class:'card center'});
  const isDone = !!(STATE.storybookProgress[s.id]||{}).read;
  doneCard.appendChild(el('button',{class: isDone?'btn ok':'btn primary', onclick:()=>{
    const p = STATE.storybookProgress[s.id]||{};
    p.read = !p.read;
    STATE.storybookProgress[s.id] = p;
    render();
  }},[isDone? '✅ 已標記複習完成（點我取消）':'標記這篇單字已複習完成']));
  root.appendChild(doneCard);
}

// Builds a "造句練習" card for a storybook story: one compact widget per core word,
// with a sentence pattern hint, textarea, and a "複製，貼去問 AI" button.
function buildStorybookSentenceCard(s){
  const wrap = el('div',{class:'card'});
  wrap.appendChild(el('h3',{},['✍️ 造句練習']));
  wrap.appendChild(el('p',{class:'muted'},['挑幾個這篇故事的重點單字，練習自己寫一句完整的英文句子；寫完可以複製提問文字，貼去問 AI。']));
  s.words.forEach((w, idx)=>{
    const key = s.id+'_'+idx;
    wrap.appendChild(buildSentenceWidget(w, STATE.storybookSentences, key));
  });
  return wrap;
}

  root.appendChild(el('div',{class:'card'},[

    el('p',{},['週一～週六：花 10-15 分鐘讀完當天短文，再做單字卡＋測驗＋造句。週日：花 20-30 分鐘複習整週單字、閱讀經典故事並完成理解測驗。']),
  ]));
}

/* ---------- Init ---------- */
function startApp(){
  initTtsControls();
  window.addEventListener('hashchange', render);
  if(!location.hash) location.hash = '#storybook';
  window.addEventListener('beforeunload', ()=>{
    const url = getSheetUrl();
    if(url && cloudSaveTimer){
      clearTimeout(cloudSaveTimer);
      cloudSaveTimer = null;
      saveToCloud(url, {keepalive:true});
    }
  });
  const url = getSheetUrl();
  if(url){
    loadFromCloud(url).finally(()=>{ skipNextAutoSave = true; render(); });
  } else {
    render();
  }
}

/* ---------- 開啟密碼 ---------- */
// 簡單的用戶端密碼鎖：只是避免公開網址被隨意打開，不是真正的帳號安全機制。
const APP_PASSWORD = '0813';
const UNLOCK_KEY = 'vocabAppUnlocked_v1';
function initLock(){
  const lockScreen = document.getElementById('lockScreen');
  const appRoot = document.getElementById('appRoot');
  function showApp(){
    if(lockScreen) lockScreen.style.display = 'none';
    if(appRoot) appRoot.style.display = '';
    startApp();
  }
  let unlocked = false;
  try{ unlocked = sessionStorage.getItem(UNLOCK_KEY) === '1'; }catch(e){}
  if(unlocked){ showApp(); return; }

  const input = document.getElementById('lockPasswordInput');
  const btn = document.getElementById('lockSubmitBtn');
  const err = document.getElementById('lockError');
  function tryUnlock(){
    if((input.value||'') === APP_PASSWORD){
      try{ sessionStorage.setItem(UNLOCK_KEY, '1'); }catch(e){}
      showApp();
    } else {
      if(err) err.style.display = 'block';
      if(input){ input.value=''; input.focus(); }
    }
  }
  if(btn) btn.addEventListener('click', tryUnlock);
  if(input){
    input.addEventListener('keydown', (e)=>{ if(e.key==='Enter') tryUnlock(); });
    input.focus();
  }
}
document.addEventListener('DOMContentLoaded', initLock);
})();
